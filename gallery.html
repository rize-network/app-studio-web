  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

e shipping app here. Inter and Geist are kept as\n   documented fallbacks. */\n\n:root,\n[data-theme=\"light\"] {\n  /* ----- Brand ----- */\n  --brand-orange:        #F97316;  /* theme-color from index.html */\n  --brand-orange-hover:  #EA6A0D;\n  --brand-orange-press:  #C2580B;\n  --brand-orange-soft:   #FFEDD5;  /* color-orange-100 */\n\n  /* ----- Theme semantic tokens (mirror app-studio ThemeProvider) ----- */\n  --theme-primary:       #1D4ED8;  /* color-blue-700 — default provider primary */\n  --theme-secondary:     #A855F7;  /* color-purple-500 */\n  --theme-background:    #FFFFFF;\n  --theme-surface:       #FFFFFF;\n  --theme-text:          #0A0A0A;\n  --theme-text-muted:    #4B5563;  /* color-gray-600 */\n  --theme-border:        #E5E7EB;  /* color-gray-200 */\n  --theme-border-strong: #D1D5DB;  /* color-gray-300 */\n  --theme-disabled:      #E5E7EB;\n\n  /* ----- Neutrals (Tailwind-ish gray scale used in components) ----- */\n  --gray-50:  #F9FAFB;\n  --gray-100: #F3F4F6;\n  --gray-200: #E5E7EB;\n  --gray-300: #D1D5DB;\n  --gray-400: #9CA3AF;\n  --gray-500: #6B7280;\n  --gray-600: #4B5563;\n  --gray-700: #374151;\n  --gray-800: #1F2937;\n  --gray-900: #111827;\n\n  /* Warm gray — used as hero body color */\n  --warmGray-500: #78716C;\n\n  /* ----- Palette hues referenced by code (color-<hue>-<step>) ----- */\n  --color-blue-50:   #EFF6FF;\n  --color-blue-100:  #DBEAFE;\n  --color-blue-500:  #3B82F6;\n  --color-blue-700:  #1D4ED8;\n  --color-blue-900:  #1E3A8A;\n\n  --color-indigo-500:#6366F1;\n  --color-purple-500:#A855F7;\n  --color-purple-600:#9333EA;\n  --color-pink-500:  #EC4899;\n  --color-red-500:   #EF4444;\n  --color-amber-500: #F59E0B;\n  --color-emerald-500:#10B981;\n  --color-green-500: #22C55E;\n  --color-orange-500:#F97316;\n\n  --color-dark-500:  #1F2937; /* loader fallback */\n\n  /* ----- Shadows (from Card.style.ts elevated variant) ----- */\n  --shadow-sm: 0 1px 2px rgba(0,0,0,.05);\n  --shadow-md: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);\n  --shadow-lg: 0 4px 6px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.06);\n  --shadow-xl: 0 10px 15px -3px rgba(0,0,0,.10);\n\n  /* ----- Radii (from Button/Card Shapes) ----- */\n  --radius-square: 0;\n  --radius-sm: 4px;\n  --radius-md: 8px;   /* default \"rounded\" */\n  --radius-lg: 12px;\n  --radius-xl: 16px;\n  --radius-pill: 999px;\n\n  /* ----- Spacing — app-studio uses a 4px grid ----- */\n  --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px; --sp-4: 16px;\n  --sp-5: 20px; --sp-6: 24px; --sp-8: 32px; --sp-10: 40px;\n  --sp-12: 48px; --sp-16: 64px;\n\n  /* ----- Focus ring (Button.style.ts _focusVisible pattern) ----- */\n  --focus-ring-inner: rgba(255,255,255,1);\n  --focus-ring-outer: var(--theme-primary);\n\n  /* ----- Type ----- */\n  --font-sans: 'Mulish', system-ui, -apple-system, 'Segoe UI', Roboto,\n               'Helvetica Neue', Arial, sans-serif;\n  --font-mono: ui-monospace, SFMono-Regular, 'SF Mono', Menlo,\n               Consolas, 'Liberation Mono', monospace;\n\n  /* Body scale — mirrors Button ButtonFontSize/LineHeight */\n  --fs-xs: 10px;  --lh-xs: 12px;\n  --fs-sm: 12px;  --lh-sm: 16px;\n  --fs-md: 14px;  --lh-md: 20px;  /* body default */\n  --fs-lg: 16px;  --lh-lg: 24px;\n  --fs-xl: 20px;  --lh-xl: 28px;\n\n  /* Display / heading scale — from home.page.tsx desktop media queries */\n  --fs-display-xl: 110px; --lh-display-xl: 112px; --ls-display-xl: -1.5px;\n  --fs-display-lg: 96px;  --lh-display-lg: 112px; --ls-display-lg: -1.5px;\n  --fs-display-md: 48px;  --lh-display-md: 57px;\n  --fs-h1: 32px;  --lh-h1: 38px;\n  --fs-h2: 28px;  --lh-h2: 34px;\n  --fs-h3: 24px;  --lh-h3: 30px;\n  --fs-h4: 20px;  --lh-h4: 26px;\n\n  --fw-regular: 400;\n  --fw-medium:  500;\n  --fw-semibold:600;\n  --fw-bold:    700;\n  --fw-extrabold:800;\n}\n\n[data-theme=\"dark\"] {\n  --theme-background: #0B0B0E;\n  --theme-surface:    #111827;   /* color-gray-900 */\n  --theme-text:       #F9FAFB;\n  --theme-text-muted: #D1D5DB;\n  --theme-border:     #374151;   /* color-gray-700 */\n  --theme-border-strong: #4B5563;\n  --theme-disabled:   #374151;\n\n  --shadow-sm: 0 1px 2px rgba(0,0,0,.4);\n  --shadow-md: 0 4px 12px rgba(0,0,0,.30);\n  --shadow-lg: 0 8px 16px rgba(0,0,0,.40);\n}\n\n/* ----- Base typography ----- */\nhtml { box-sizing: border-box; }\n*, *::before, *::after { box-sizing: inherit; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-sans);\n  font-size: var(--fs-md);\n  line-height: var(--lh-md);\n  color: var(--theme-text);\n  background: var(--theme-background);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  text-rendering: optimizeLegibility;\n}\n\n/* Semantic element styles */\nh1, .h1 { font-size: var(--fs-h1); line-height: var(--lh-h1); font-weight: var(--fw-bold); letter-spacing: -0.01em; margin: 0; }\nh2, .h2 { font-size: var(--fs-h2); line-height: var(--lh-h2); font-weight: var(--fw-semibold); letter-spacing: -0.01em; margin: 0; }\nh3, .h3 { font-size: var(--fs-h3); line-height: var(--lh-h3); font-weight: var(--fw-semibold); margin: 0; }\nh4, .h4 { font-size: var(--fs-h4); line-height: var(--lh-h4); font-weight: var(--fw-semibold); margin: 0; }\n\n.display-xl { font-size: var(--fs-display-xl); line-height: var(--lh-display-xl); letter-spacing: var(--ls-display-xl); font-weight: var(--fw-bold); }\n.display-lg { font-size: var(--fs-display-lg); line-height: var(--lh-display-lg); letter-spacing: var(--ls-display-lg); font-weight: var(--fw-bold); }\n.display-md { font-size: var(--fs-display-md); line-height: var(--lh-display-md); font-weight: var(--fw-bold); }\n\np  { margin: 0 0 var(--sp-3); }\nsmall, .small { font-size: var(--fs-sm); line-height: var(--lh-sm); color: var(--theme-text-muted); }\ncode, pre, kbd, samp { font-family: var(--font-mono); font-size: 0.95em; }\n\na { color: var(--theme-primary); text-decoration: underline; text-underline-offset: 2px; text-decoration-thickness: 1px; }\na:hover { opacity: .8; }\n\nhr { border: 0; border-top: 1px solid var(--them
