<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#F97316" />
  <meta name="description" content="App Studio Web Components" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' data: https://fonts.gstatic.com https://fonts.googleapis.com; connect-src 'self' ws: wss: http: https:; worker-src 'self' blob:;" />
  <link rel="apple-touch-icon" href="/assets/apple-logo.png">
  <link rel="preload" as="image" href="/orange.webp" fetchpriority="high" />
  <link rel="manifest" href="/manifest.json" />
  <!-- Preload LCP image to improve Largest Contentful Paint -->
  <link rel="preload" as="image" href="/src/assets/orange.webp" type="image/webp" />
  <!-- DNS prefetch for CDN domains to reduce connection latency -->
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body,
    #root {
      min-height: 100%;
      background: #FAFAFA;
    }

    body {
      margin: 0;
      font-family: 'Mulish', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    td {
      min-width: 200px;
    }

    input,
    button,
    textarea,
    select {
      font: inherit;
      -webkit-font-smoothing: inherit;
    }

    /* Inline critical loading styles to avoid layout shift */
    #root {
      min-height: 100vh;
    }
  </style>
  <title>App Studio</title>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
