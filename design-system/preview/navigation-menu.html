<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"/><title>NavigationMenu</title><link rel="stylesheet" href="_card.css"/></head><body>
<div class="card">
  <div style="display:flex;gap:2px;font-size:13px;font-weight:500;">
    <div style="padding:8px 14px;border-radius:6px;color:var(--gray-700);display:inline-flex;align-items:center;gap:4px;">Home</div><div style="padding:8px 14px;border-radius:6px;color:#1D4ED8;background:#1D4ED810;display:inline-flex;align-items:center;gap:4px;">Components <i data-lucide="chevron-down" style="width:12px;height:12px;"></i></div><div style="padding:8px 14px;border-radius:6px;color:var(--gray-700);display:inline-flex;align-items:center;gap:4px;">Docs</div><div style="padding:8px 14px;border-radius:6px;color:var(--gray-700);display:inline-flex;align-items:center;gap:4px;">Pricing</div><div style="padding:8px 14px;border-radius:6px;color:var(--gray-700);display:inline-flex;align-items:center;gap:4px;">Blog</div>
  </div>
  <div style="width:400px;background:#fff;border:1px solid var(--theme-border);border-radius:12px;padding:12px;box-shadow:var(--shadow-lg);">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:12px;">
      <div style="padding:8px;border-radius:6px;"><div style="font-weight:600;font-size:13px;color:var(--gray-900);">Buttons</div><div style="color:var(--gray-500);">Filled, outlined, link</div></div><div style="padding:8px;border-radius:6px;"><div style="font-weight:600;font-size:13px;color:var(--gray-900);">Forms</div><div style="color:var(--gray-500);">Input, select, checkbox</div></div><div style="padding:8px;border-radius:6px;"><div style="font-weight:600;font-size:13px;color:var(--gray-900);">Overlays</div><div style="color:var(--gray-500);">Modal, drawer, popover</div></div><div style="padding:8px;border-radius:6px;"><div style="font-weight:600;font-size:13px;color:var(--gray-900);">Data</div><div style="color:var(--gray-500);">Table, pagination, charts</div></div>
    </div>
  </div>
</div><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script><script>lucide.createIcons();</script></body></html>
