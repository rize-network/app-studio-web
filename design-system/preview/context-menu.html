<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"/><title>ContextMenu</title><link rel="stylesheet" href="_card.css"/></head><body>
<div class="card" style="background:var(--gray-50);">
  <div style="width:260px;background:#fff;border:1px solid var(--theme-border);border-radius:8px;box-shadow:var(--shadow-lg);padding:4px 0;font-size:13px;">
    <div style="display:flex;gap:10px;align-items:center;padding:6px 12px;color:var(--gray-700);"><i data-lucide="copy" style="width:14px;height:14px;"></i><span style="flex:1;">Copy</span><span style="font-family:var(--font-mono);font-size:10px;color:var(--gray-400);">⌘C</span></div><div style="display:flex;gap:10px;align-items:center;padding:6px 12px;color:var(--gray-700);"><i data-lucide="clipboard" style="width:14px;height:14px;"></i><span style="flex:1;">Paste</span><span style="font-family:var(--font-mono);font-size:10px;color:var(--gray-400);">⌘V</span></div><div style="display:flex;gap:10px;align-items:center;padding:6px 12px;color:var(--gray-700);"><i data-lucide="edit" style="width:14px;height:14px;"></i><span style="flex:1;">Edit</span><span style="font-family:var(--font-mono);font-size:10px;color:var(--gray-400);"></span></div><div style="height:1px;background:var(--theme-border);margin:4px 0;"></div><div style="display:flex;gap:10px;align-items:center;padding:6px 12px;color:var(--gray-700);"><i data-lucide="share-2" style="width:14px;height:14px;"></i><span style="flex:1;">Share</span><span style="font-family:var(--font-mono);font-size:10px;color:var(--gray-400);"></span></div><div style="display:flex;gap:10px;align-items:center;padding:6px 12px;color:var(--gray-700);"><i data-lucide="star" style="width:14px;height:14px;"></i><span style="flex:1;">Favorite</span><span style="font-family:var(--font-mono);font-size:10px;color:var(--gray-400);"></span></div><div style="height:1px;background:var(--theme-border);margin:4px 0;"></div><div style="display:flex;gap:10px;align-items:center;padding:6px 12px;color:#DC2626;"><i data-lucide="trash-2" style="width:14px;height:14px;"></i><span style="flex:1;">Delete</span><span style="font-family:var(--font-mono);font-size:10px;color:var(--gray-400);">⌫</span></div>
  </div>
</div><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script><script>lucide.createIcons();</script></body></html>
