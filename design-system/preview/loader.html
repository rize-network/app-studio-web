<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"/><title>Loader</title><link rel="stylesheet" href="_card.css"/></head><body>
<style>@keyframes spin{to{transform:rotate(360deg);}}@keyframes bounce{0%,80%,100%{opacity:.3}40%{opacity:1}}</style>
<div class="card">
  <div class="row" style="gap:26px;align-items:center;">
    <div style="width:22px;height:22px;border:2px solid var(--gray-200);border-top-color:#1D4ED8;border-radius:50%;animation:spin .8s linear infinite;"></div>
    <div class="row" style="gap:4px;">
      <span style="width:8px;height:8px;border-radius:50%;background:#1D4ED8;animation:bounce 1.2s ease-in-out infinite both;"></span>
      <span style="width:8px;height:8px;border-radius:50%;background:#1D4ED8;animation:bounce 1.2s ease-in-out -.16s infinite both;"></span>
      <span style="width:8px;height:8px;border-radius:50%;background:#1D4ED8;animation:bounce 1.2s ease-in-out -.32s infinite both;"></span>
    </div>
    <div style="width:120px;height:6px;background:var(--gray-200);border-radius:3px;overflow:hidden;"><div style="width:45%;height:100%;background:#1D4ED8;"></div></div>
    <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--gray-500);font-style:italic;">
      <div style="width:14px;height:14px;border:2px solid var(--gray-200);border-top-color:#1D4ED8;border-radius:50%;animation:spin .8s linear infinite;"></div>
      AI is thinking…
    </div>
  </div>
</div></body></html>
