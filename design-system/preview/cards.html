<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<title>Cards</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card" style="background:var(--gray-50);">
  <div class="row" style="gap:12px;align-items:stretch;">
    <div style="flex:1;background:#fff;border-radius:8px;padding:14px 16px;border:1px solid var(--theme-border);">
      <div style="font-weight:600;font-size:14px;margin-bottom:4px;">Outlined</div>
      <div style="font-size:12px;color:var(--gray-600);">1px border, no shadow.</div>
    </div>
    <div style="flex:1;background:#fff;border-radius:8px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);">
      <div style="font-weight:600;font-size:14px;margin-bottom:4px;">Elevated</div>
      <div style="font-size:12px;color:var(--gray-600);">Shadow-md resting.</div>
    </div>
    <div style="flex:1;background:#fff;border-radius:8px;overflow:hidden;">
      <div style="padding:12px 14px;border-bottom:1px solid var(--gray-100);font-weight:600;font-size:13px;color:#1D4ED8;">Header</div>
      <div style="padding:12px 14px;font-size:12px;color:var(--gray-600);">Content</div>
      <div style="padding:10px 14px;border-top:1px solid var(--gray-100);font-size:12px;color:var(--gray-500);">Footer</div>
    </div>
  </div>
</div></body></html>
