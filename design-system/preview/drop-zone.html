<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"/><title>DropZone · Uploader</title><link rel="stylesheet" href="_card.css"/></head><body>
<div class="card">
  <div style="border:2px dashed var(--theme-border);border-radius:12px;padding:22px;text-align:center;background:var(--gray-50);">
    <i data-lucide="upload-cloud" style="width:28px;height:28px;color:#1D4ED8;"></i>
    <div style="font-weight:600;font-size:14px;margin-top:6px;">Drop files here</div>
    <div style="font-size:12px;color:var(--gray-500);margin-top:2px;">or <span style="color:#1D4ED8;text-decoration:underline;">browse</span> — PNG, JPG up to 10MB</div>
  </div>
  <div class="col" style="gap:6px;">
    <div style="display:flex;gap:10px;align-items:center;font-size:12px;">
      <i data-lucide="image" style="width:14px;height:14px;color:#1D4ED8;"></i>
      <span style="flex:1;">hero-image.png · 2.1MB</span>
      <span style="color:var(--gray-500);">68%</span>
    </div>
    <div style="height:4px;background:var(--gray-100);border-radius:2px;overflow:hidden;"><div style="width:68%;height:100%;background:#1D4ED8;"></div></div>
  </div>
</div><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script><script>lucide.createIcons();</script></body></html>
