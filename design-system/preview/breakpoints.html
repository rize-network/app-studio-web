<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<title>Breakpoints</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card">
  <div class="col" style="gap:4px;">
    
      <div class="row" style="gap:12px;align-items:center;">
        <div style="font-family:var(--font-mono);font-size:12px;width:44px;font-weight:600;">xs</div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--gray-500);width:58px;">0px</div>
        <div style="height:6px;background:var(--theme-primary);width:8px;border-radius:2px;opacity:.8"></div>
        <div style="font-size:11px;color:var(--gray-500);">mobile</div>
      </div>
      <div class="row" style="gap:12px;align-items:center;">
        <div style="font-family:var(--font-mono);font-size:12px;width:44px;font-weight:600;">sm</div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--gray-500);width:58px;">340px</div>
        <div style="height:6px;background:var(--theme-primary);width:42.5px;border-radius:2px;opacity:.8"></div>
        <div style="font-size:11px;color:var(--gray-500);">mobile</div>
      </div>
      <div class="row" style="gap:12px;align-items:center;">
        <div style="font-family:var(--font-mono);font-size:12px;width:44px;font-weight:600;">md</div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--gray-500);width:58px;">560px</div>
        <div style="height:6px;background:var(--theme-primary);width:70px;border-radius:2px;opacity:.8"></div>
        <div style="font-size:11px;color:var(--gray-500);">tablet</div>
      </div>
      <div class="row" style="gap:12px;align-items:center;">
        <div style="font-family:var(--font-mono);font-size:12px;width:44px;font-weight:600;">lg</div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--gray-500);width:58px;">1080px</div>
        <div style="height:6px;background:var(--theme-primary);width:135px;border-radius:2px;opacity:.8"></div>
        <div style="font-size:11px;color:var(--gray-500);">tablet / desktop</div>
      </div>
      <div class="row" style="gap:12px;align-items:center;">
        <div style="font-family:var(--font-mono);font-size:12px;width:44px;font-weight:600;">xl</div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--gray-500);width:58px;">1300px</div>
        <div style="height:6px;background:var(--theme-primary);width:162.5px;border-radius:2px;opacity:.8"></div>
        <div style="font-size:11px;color:var(--gray-500);">desktop</div>
      </div>
  </div>
</div></body></html>
