<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"/><title>Toast</title><link rel="stylesheet" href="_card.css"/></head><body>
<div class="card">
  <div class="col" style="gap:8px;max-width:340px;">
    <div style="display:flex;gap:10px;padding:10px 14px;background:#fff;border:1px solid var(--theme-border);border-left:3px solid #22C55E;border-radius:8px;box-shadow:var(--shadow-md);"><i data-lucide="check-circle" style="width:18px;height:18px;color:#22C55E;flex:none;margin-top:2px;"></i><div><div style="font-weight:600;font-size:13px;">Saved</div><div style="font-size:12px;color:var(--gray-600);">Your changes have been published.</div></div><i data-lucide="x" style="width:14px;height:14px;color:var(--gray-400);margin-left:auto;"></i></div>
    <div style="display:flex;gap:10px;padding:10px 14px;background:#111827;color:#fff;border-radius:8px;box-shadow:var(--shadow-md);"><i data-lucide="info" style="width:18px;height:18px;flex:none;margin-top:2px;"></i><div><div style="font-weight:600;font-size:13px;">New update available</div><div style="font-size:12px;opacity:.75;">v0.9.98 is ready to install.</div></div><button style="padding:4px 10px;border-radius:6px;background:#1D4ED8;color:#fff;border:0;font-size:12px;font-weight:500;">Update</button></div>
    <div style="display:flex;gap:10px;padding:10px 14px;background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;"><i data-lucide="alert-circle" style="width:18px;height:18px;color:#DC2626;flex:none;margin-top:2px;"></i><div style="color:#991B1B;font-size:12px;">Network error. Please try again.</div></div>
  </div>
</div><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script><script>lucide.createIcons();</script></body></html>
