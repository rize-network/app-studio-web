<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<title>Shadows</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card" style="background:var(--gray-50);">
  <div class="row" style="gap:18px;justify-content:space-around;padding:20px 0;">
    
      <div class="col" style="gap:8px;align-items:center;">
        <div style="width:84px;height:64px;background:#fff;border-radius:8px;box-shadow:none;border:1px solid var(--theme-border)"></div>
        <span class="label">none</span>
      </div>
      <div class="col" style="gap:8px;align-items:center;">
        <div style="width:84px;height:64px;background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.05);border:none"></div>
        <span class="label">sm</span>
      </div>
      <div class="col" style="gap:8px;align-items:center;">
        <div style="width:84px;height:64px;background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);border:none"></div>
        <span class="label">md</span>
      </div>
      <div class="col" style="gap:8px;align-items:center;">
        <div style="width:84px;height:64px;background:#fff;border-radius:8px;box-shadow:0 4px 6px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.06);border:none"></div>
        <span class="label">lg</span>
      </div>
      <div class="col" style="gap:8px;align-items:center;">
        <div style="width:84px;height:64px;background:#fff;border-radius:8px;box-shadow:0 10px 15px -3px rgba(0,0,0,.10);border:none"></div>
        <span class="label">xl</span>
      </div>
  </div>
</div></body></html>
