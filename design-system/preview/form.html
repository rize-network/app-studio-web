<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"/><title>Form</title><link rel="stylesheet" href="_card.css"/></head><body>
<div class="card">
  <div class="col" style="gap:10px;max-width:360px;">
    <div class="col" style="gap:4px;">
      <label class="label">Full name</label>
      <input value="Jesse Cohen" style="font-size:14px;padding:10px 12px;border:1px solid var(--theme-border);border-radius:8px;outline:none;"/>
    </div>
    <div class="col" style="gap:4px;">
      <label class="label">Email</label>
      <input value="not-an-email" style="font-size:14px;padding:10px 12px;border:1px solid #EF4444;border-radius:8px;outline:none;background:#FEF2F2;"/>
      <span style="font-size:11px;color:#DC2626;">Please enter a valid email</span>
    </div>
    <div class="row" style="gap:8px;">
      <button style="padding:10px 18px;border:0;background:#1D4ED8;color:#fff;border-radius:8px;font-weight:500;font-size:13px;">Save</button>
      <button style="padding:10px 18px;border:1px solid var(--theme-border);background:#fff;border-radius:8px;font-size:13px;">Cancel</button>
    </div>
  </div>
</div></body></html>
