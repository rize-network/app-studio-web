<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"/><title>Slider</title><link rel="stylesheet" href="_card.css"/></head><body>
<div class="card">
  <div class="col" style="gap:20px;">
    <div style="position:relative;height:20px;">
      <div style="position:absolute;top:50%;left:0;right:0;height:4px;background:var(--gray-200);border-radius:2px;transform:translateY(-50%);"></div>
      <div style="position:absolute;top:50%;left:0;width:40%;height:4px;background:#1D4ED8;border-radius:2px;transform:translateY(-50%);"></div>
      <div style="position:absolute;top:50%;left:40%;width:18px;height:18px;border-radius:50%;background:#fff;border:2px solid #1D4ED8;transform:translate(-50%,-50%);box-shadow:var(--shadow-sm);"></div>
    </div>
    <div style="position:relative;height:20px;">
      <div style="position:absolute;top:50%;left:0;right:0;height:4px;background:var(--gray-200);border-radius:2px;transform:translateY(-50%);"></div>
      <div style="position:absolute;top:50%;left:25%;width:50%;height:4px;background:#1D4ED8;border-radius:2px;transform:translateY(-50%);"></div>
      <div style="position:absolute;top:50%;left:25%;width:16px;height:16px;border-radius:50%;background:#1D4ED8;transform:translate(-50%,-50%);"></div>
      <div style="position:absolute;top:50%;left:75%;width:16px;height:16px;border-radius:50%;background:#1D4ED8;transform:translate(-50%,-50%);"></div>
    </div>
  </div>
</div></body></html>
