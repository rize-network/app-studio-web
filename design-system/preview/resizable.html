<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"/><title>Resizable</title><link rel="stylesheet" href="_card.css"/></head><body>
<div class="card" style="padding:0;">
  <div style="display:flex;height:160px;">
    <div style="width:35%;background:var(--gray-50);padding:14px;font-size:12px;color:var(--gray-700);">Left panel<br/><span style="color:var(--gray-400);">35%</span></div>
    <div style="width:6px;background:var(--theme-border);position:relative;cursor:col-resize;"><div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:2px;height:22px;background:var(--gray-400);border-radius:1px;"></div></div>
    <div style="flex:1;background:#fff;padding:14px;font-size:12px;">Right panel<br/><span style="color:var(--gray-400);">65%</span></div>
  </div>
</div></body></html>
