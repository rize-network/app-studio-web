<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"/><title>Tabs</title><link rel="stylesheet" href="_card.css"/></head><body>
<div class="card">
  <div class="col" style="gap:14px;">
    <div style="display:flex;gap:4px;border-bottom:1px solid var(--theme-border);">
      <div style="padding:8px 14px;font-size:13px;font-weight:500;color:#1D4ED8;border-bottom:2px solid #1D4ED8;margin-bottom:-1px;">Overview</div><div style="padding:8px 14px;font-size:13px;font-weight:500;color:var(--gray-500);">Activity</div><div style="padding:8px 14px;font-size:13px;font-weight:500;color:var(--gray-500);">Files</div><div style="padding:8px 14px;font-size:13px;font-weight:500;color:var(--gray-500);">Settings</div>
    </div>
    <div style="display:inline-flex;gap:2px;background:var(--gray-100);border-radius:8px;padding:3px;width:fit-content;font-size:13px;">
      <div style="padding:5px 12px;border-radius:5px;color:var(--gray-600);">Day</div><div style="padding:5px 12px;border-radius:5px;background:#fff;color:var(--gray-900);font-weight:600;box-shadow:var(--shadow-sm);">Week</div><div style="padding:5px 12px;border-radius:5px;color:var(--gray-600);">Month</div><div style="padding:5px 12px;border-radius:5px;color:var(--gray-600);">Year</div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;">
      <div style="padding:6px 12px;border-radius:999px;font-size:12px;background:#1D4ED8;color:#fff;">All</div><div style="padding:6px 12px;border-radius:999px;font-size:12px;background:#fff;color:var(--gray-700);border:1px solid var(--theme-border);">Buttons</div><div style="padding:6px 12px;border-radius:999px;font-size:12px;background:#fff;color:var(--gray-700);border:1px solid var(--theme-border);">Forms</div><div style="padding:6px 12px;border-radius:999px;font-size:12px;background:#fff;color:var(--gray-700);border:1px solid var(--theme-border);">Overlays</div><div style="padding:6px 12px;border-radius:999px;font-size:12px;background:#fff;color:var(--gray-700);border:1px solid var(--theme-border);">Feedback</div>
    </div>
  </div>
</div></body></html>
