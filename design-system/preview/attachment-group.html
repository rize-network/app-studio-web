<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"/><title>AttachmentGroup</title><link rel="stylesheet" href="_card.css"/></head><body>
<div class="card">
  <div class="row" style="gap:8px;flex-wrap:wrap;">
    
      <div style="display:flex;gap:8px;align-items:center;padding:6px 10px 6px 8px;border:1px solid var(--theme-border);border-radius:999px;background:#fff;font-size:12px;">
        <span style="width:22px;height:22px;border-radius:50%;background:#1D4ED8;color:#fff;display:inline-flex;align-items:center;justify-content:center;"><i data-lucide="file-text" style="width:12px;height:12px;"></i></span>
        <span>proposal.pdf · 1.2 MB</span>
        <i data-lucide="x" style="width:12px;height:12px;color:var(--gray-400);cursor:pointer;"></i>
      </div>
      <div style="display:flex;gap:8px;align-items:center;padding:6px 10px 6px 8px;border:1px solid var(--theme-border);border-radius:999px;background:#fff;font-size:12px;">
        <span style="width:22px;height:22px;border-radius:50%;background:#A855F7;color:#fff;display:inline-flex;align-items:center;justify-content:center;"><i data-lucide="archive" style="width:12px;height:12px;"></i></span>
        <span>brand.zip · 8.4 MB</span>
        <i data-lucide="x" style="width:12px;height:12px;color:var(--gray-400);cursor:pointer;"></i>
      </div>
      <div style="display:flex;gap:8px;align-items:center;padding:6px 10px 6px 8px;border:1px solid var(--theme-border);border-radius:999px;background:#fff;font-size:12px;">
        <span style="width:22px;height:22px;border-radius:50%;background:#22C55E;color:#fff;display:inline-flex;align-items:center;justify-content:center;"><i data-lucide="type" style="width:12px;height:12px;"></i></span>
        <span>mulish.ttf · 128 KB</span>
        <i data-lucide="x" style="width:12px;height:12px;color:var(--gray-400);cursor:pointer;"></i>
      </div>
  </div>
</div><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script><script>lucide.createIcons();</script></body></html>
