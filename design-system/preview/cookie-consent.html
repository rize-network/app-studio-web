<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"/><title>CookieConsent</title><link rel="stylesheet" href="_card.css"/></head><body>
<div class="card">
  <div style="background:#fff;border:1px solid var(--theme-border);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow-md);display:flex;gap:14px;align-items:center;">
    <i data-lucide="cookie" style="width:24px;height:24px;color:#1D4ED8;flex:none;"></i>
    <div style="flex:1;"><div style="font-weight:600;font-size:13px;">We use cookies</div><div style="font-size:12px;color:var(--gray-600);">We use them to analyze traffic and improve your experience.</div></div>
    <div class="row" style="gap:8px;flex:none;">
      <button style="padding:8px 12px;border:1px solid var(--theme-border);background:#fff;border-radius:8px;font-size:12px;font-weight:500;">Préférences</button>
      <button style="padding:8px 14px;border:0;background:#1D4ED8;color:#fff;border-radius:8px;font-size:12px;font-weight:500;">Accept all</button>
    </div>
  </div>
</div><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script><script>lucide.createIcons();</script></body></html>
