<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"/><title>Pagination</title><link rel="stylesheet" href="_card.css"/></head><body>
<div class="card">
  <div class="row" style="gap:4px;font-size:13px;">
    <button style="width:32px;height:32px;border:1px solid var(--theme-border);background:#fff;border-radius:6px;color:var(--gray-400);"><i data-lucide="chevron-left" style="width:14px;height:14px;"></i></button>
    <button style="min-width:32px;height:32px;padding:0 10px;border:1px solid var(--theme-border);background:#fff;color:var(--gray-700);border-radius:6px;">1</button><button style="min-width:32px;height:32px;padding:0 10px;border:1px solid #1D4ED8;background:#1D4ED8;color:#fff;border-radius:6px;">2</button><button style="min-width:32px;height:32px;padding:0 10px;border:1px solid var(--theme-border);background:#fff;color:var(--gray-700);border-radius:6px;">3</button><button style="min-width:32px;height:32px;padding:0 10px;border:1px solid var(--theme-border);background:#fff;color:var(--gray-700);border-radius:6px;">…</button><button style="min-width:32px;height:32px;padding:0 10px;border:1px solid var(--theme-border);background:#fff;color:var(--gray-700);border-radius:6px;">8</button><button style="min-width:32px;height:32px;padding:0 10px;border:1px solid var(--theme-border);background:#fff;color:var(--gray-700);border-radius:6px;">9</button>
    <button style="width:32px;height:32px;border:1px solid var(--theme-border);background:#fff;border-radius:6px;"><i data-lucide="chevron-right" style="width:14px;height:14px;"></i></button>
  </div>
</div><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script><script>lucide.createIcons();</script></body></html>
