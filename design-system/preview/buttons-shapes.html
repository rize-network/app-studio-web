<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<title>Button shapes</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card">
  <div class="row">
    <button style="font-family:var(--font-sans);font-weight:500;padding:10px 20px;font-size:14px;background:#F97316;color:#fff;border:0;border-radius:0;">square</button>
    <button style="font-family:var(--font-sans);font-weight:500;padding:10px 20px;font-size:14px;background:#F97316;color:#fff;border:0;border-radius:8px;">rounded</button>
    <button style="font-family:var(--font-sans);font-weight:500;padding:10px 20px;font-size:14px;background:#F97316;color:#fff;border:0;border-radius:999px;">pill</button>
  </div>
</div></body></html>
