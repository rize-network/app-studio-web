<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"/><title>Gradient</title><link rel="stylesheet" href="_card.css"/></head><body>
<div class="card" style="padding:0;">
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:2px;">
    <div style="aspect-ratio:3/2;background:linear-gradient(135deg,#1D4ED8,#A855F7);"></div>
    <div style="aspect-ratio:3/2;background:linear-gradient(135deg,#0EA5E9,#22C55E);"></div>
    <div style="aspect-ratio:3/2;background:linear-gradient(135deg,#F97316,#EC4899);"></div>
    <div style="aspect-ratio:3/2;background:conic-gradient(from 180deg,#1D4ED8,#A855F7,#F97316,#1D4ED8);"></div>
  </div>
</div></body></html>
