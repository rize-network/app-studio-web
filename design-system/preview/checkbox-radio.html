<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<title>Checkbox & radio</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card">
  <div class="row" style="gap:24px;">
    <label style="display:inline-flex;gap:8px;align-items:center;font-size:14px;">
      <span style="width:18px;height:18px;border-radius:4px;background:#1D4ED8;display:inline-flex;align-items:center;justify-content:center;">
        <i data-lucide="check" style="width:14px;height:14px;color:#fff;"></i>
      </span>
      Checked
    </label>
    <label style="display:inline-flex;gap:8px;align-items:center;font-size:14px;">
      <span style="width:18px;height:18px;border-radius:4px;border:1.5px solid var(--gray-400);background:#fff;"></span>
      Unchecked
    </label>
    <label style="display:inline-flex;gap:8px;align-items:center;font-size:14px;">
      <span style="width:18px;height:18px;border-radius:999px;border:1.5px solid #1D4ED8;background:#fff;display:inline-flex;align-items:center;justify-content:center;">
        <span style="width:10px;height:10px;border-radius:999px;background:#1D4ED8;"></span>
      </span>
      Selected
    </label>
    <label style="display:inline-flex;gap:8px;align-items:center;font-size:14px;">
      <span style="width:34px;height:20px;border-radius:999px;background:#1D4ED8;position:relative;">
        <span style="position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:999px;background:#fff;"></span>
      </span>
      Switch on
    </label>
  </div>
</div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons();</script></body></html>
