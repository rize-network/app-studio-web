<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"/><title>StatusIndicator</title><link rel="stylesheet" href="_card.css"/></head><body>
<div class="card">
  <div class="row" style="gap:18px;font-size:13px;">
    <span style="display:inline-flex;gap:8px;align-items:center;"><span style="position:relative;width:10px;height:10px;border-radius:50%;background:#22C55E;"><span style="position:absolute;inset:-3px;border-radius:50%;background:#22C55E;opacity:.35;animation:pulse 1.8s ease-out infinite;"></span></span>Online</span><span style="display:inline-flex;gap:8px;align-items:center;"><span style="position:relative;width:10px;height:10px;border-radius:50%;background:#EF4444;"></span>Busy</span><span style="display:inline-flex;gap:8px;align-items:center;"><span style="position:relative;width:10px;height:10px;border-radius:50%;background:#F59E0B;"></span>Away</span><span style="display:inline-flex;gap:8px;align-items:center;"><span style="position:relative;width:10px;height:10px;border-radius:50%;background:#9CA3AF;"></span>Offline</span>
  </div>
</div>
<style>@keyframes pulse{0%{transform:scale(1);opacity:.4}100%{transform:scale(2);opacity:0}}</style></body></html>
