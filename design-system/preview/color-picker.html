<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"/><title>ColorPicker</title><link rel="stylesheet" href="_card.css"/></head><body>
<div class="card">
  <div class="row" style="gap:14px;align-items:flex-start;">
    <div style="display:flex;flex-direction:column;gap:6px;">
      <div style="width:160px;height:100px;background:linear-gradient(to right,#fff,#1D4ED8);position:relative;border-radius:6px;overflow:hidden;">
        <div style="position:absolute;inset:0;background:linear-gradient(to bottom,transparent,#000);"></div>
        <div style="position:absolute;top:30%;left:60%;width:10px;height:10px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.4);"></div>
      </div>
      <div style="width:160px;height:10px;border-radius:999px;background:linear-gradient(to right,#EF4444,#F59E0B,#22C55E,#3B82F6,#A855F7,#EF4444);position:relative;">
        <div style="position:absolute;top:-2px;left:28%;width:4px;height:14px;border-radius:2px;background:#fff;border:1px solid var(--gray-500);"></div>
      </div>
    </div>
    <div class="col" style="gap:8px;">
      <div class="row" style="gap:6px;">
        <span style="width:22px;height:22px;border-radius:5px;background:#1D4ED8;border:1px solid rgba(0,0,0,.08);"></span><span style="width:22px;height:22px;border-radius:5px;background:#A855F7;border:1px solid rgba(0,0,0,.08);"></span><span style="width:22px;height:22px;border-radius:5px;background:#22C55E;border:1px solid rgba(0,0,0,.08);"></span><span style="width:22px;height:22px;border-radius:5px;background:#F97316;border:1px solid rgba(0,0,0,.08);"></span><span style="width:22px;height:22px;border-radius:5px;background:#EF4444;border:1px solid rgba(0,0,0,.08);"></span><span style="width:22px;height:22px;border-radius:5px;background:#111827;border:1px solid rgba(0,0,0,.08);"></span>
      </div>
      <div style="display:flex;gap:6px;align-items:center;font-family:var(--font-mono);font-size:11px;">
        <span style="background:var(--gray-100);padding:4px 8px;border-radius:4px;">#1D4ED8</span>
        <span style="color:var(--gray-500);">HEX</span>
      </div>
    </div>
  </div>
</div></body></html>
