<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"/><title>DropdownMenu</title><link rel="stylesheet" href="_card.css"/></head><body>
<div class="card" style="background:var(--gray-50);">
  <div style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:#fff;border:1px solid var(--theme-border);border-radius:8px;font-size:13px;font-weight:500;width:fit-content;">Actions <i data-lucide="chevron-down" style="width:14px;height:14px;color:var(--gray-500);"></i></div>
  <div style="width:200px;background:#fff;border:1px solid var(--theme-border);border-radius:8px;box-shadow:var(--shadow-lg);padding:4px 0;font-size:13px;">
    <div style="display:flex;gap:10px;align-items:center;padding:6px 12px;"><i data-lucide="pencil" style="width:14px;height:14px;color:var(--gray-500);"></i>Rename</div><div style="display:flex;gap:10px;align-items:center;padding:6px 12px;"><i data-lucide="copy" style="width:14px;height:14px;color:var(--gray-500);"></i>Duplicate</div><div style="display:flex;gap:10px;align-items:center;padding:6px 12px;"><i data-lucide="share-2" style="width:14px;height:14px;color:var(--gray-500);"></i>Share</div>
    <div style="height:1px;background:var(--theme-border);margin:4px 0;"></div>
    <div style="display:flex;gap:10px;align-items:center;padding:6px 12px;color:#DC2626;"><i data-lucide="trash-2" style="width:14px;height:14px;"></i>Delete</div>
  </div>
</div><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script><script>lucide.createIcons();</script></body></html>
