<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"/><title>Toggle · ToggleGroup</title><link rel="stylesheet" href="_card.css"/></head><body>
<div class="card">
  <div class="row" style="gap:16px;align-items:center;">
    <button style="width:36px;height:36px;border-radius:6px;border:1px solid var(--theme-border);background:#fff;color:var(--gray-600);"><i data-lucide="bold" style="width:15px;height:15px;"></i></button>
    <button style="width:36px;height:36px;border-radius:6px;border:1px solid #1D4ED8;background:#1D4ED810;color:#1D4ED8;"><i data-lucide="italic" style="width:15px;height:15px;"></i></button>
    <div style="display:inline-flex;border:1px solid var(--theme-border);border-radius:6px;overflow:hidden;">
      <button style="width:36px;height:36px;background:#fff;color:var(--gray-600);border:0;border-right:1px solid var(--theme-border);"><i data-lucide="align-left" style="width:15px;height:15px;"></i></button><button style="width:36px;height:36px;background:#1D4ED810;color:#1D4ED8;border:0;border-right:1px solid var(--theme-border);"><i data-lucide="align-center" style="width:15px;height:15px;"></i></button><button style="width:36px;height:36px;background:#fff;color:var(--gray-600);border:0;border-right:1px solid var(--theme-border);"><i data-lucide="align-right" style="width:15px;height:15px;"></i></button><button style="width:36px;height:36px;background:#fff;color:var(--gray-600);border:0;"><i data-lucide="align-justify" style="width:15px;height:15px;"></i></button>
    </div>
  </div>
</div><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script><script>lucide.createIcons();</script></body></html>
