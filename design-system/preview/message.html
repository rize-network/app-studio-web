<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"/><title>Message</title><link rel="stylesheet" href="_card.css"/></head><body>
<div class="card" style="background:var(--gray-50);">
  <div class="col" style="gap:8px;">
    <div style="align-self:flex-start;background:#fff;border:1px solid var(--theme-border);padding:10px 14px;border-radius:14px 14px 14px 4px;font-size:13px;max-width:75%;">Hey! Have you tried the new Card component?</div>
    <div style="align-self:flex-end;background:#1D4ED8;color:#fff;padding:10px 14px;border-radius:14px 14px 4px 14px;font-size:13px;max-width:75%;">Yes — the elevated variant ships shadows by default.</div>
    <div style="align-self:flex-start;background:#fff;border:1px solid var(--theme-border);padding:10px 14px;border-radius:14px;font-size:13px;max-width:75%;display:flex;gap:4px;"><span style="width:6px;height:6px;border-radius:50%;background:var(--gray-400);animation:bounce 1.2s infinite both;"></span><span style="width:6px;height:6px;border-radius:50%;background:var(--gray-400);animation:bounce 1.2s -.2s infinite both;"></span><span style="width:6px;height:6px;border-radius:50%;background:var(--gray-400);animation:bounce 1.2s -.4s infinite both;"></span></div>
  </div>
</div>
<style>@keyframes bounce{0%,80%,100%{opacity:.3}40%{opacity:1}}</style></body></html>
