<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"/><title>ChatInput</title><link rel="stylesheet" href="_card.css"/></head><body>
<div class="card" style="background:var(--gray-50);">
  <div style="background:#fff;border:1px solid var(--theme-border);border-radius:16px;padding:10px;box-shadow:var(--shadow-md);">
    <div contenteditable style="padding:8px 8px 12px;font-size:14px;color:var(--gray-700);outline:none;">Type your message… use <span style="color:#1D4ED8;background:#DBEAFE;padding:1px 6px;border-radius:4px;">@john_doe</span> to mention</div>
    <div style="display:flex;align-items:center;gap:6px;padding:4px 2px 0;">
      <button style="width:32px;height:32px;border-radius:8px;border:0;background:transparent;color:var(--gray-500);"><i data-lucide="paperclip" style="width:16px;height:16px;"></i></button>
      <button style="width:32px;height:32px;border-radius:8px;border:0;background:transparent;color:var(--gray-500);"><i data-lucide="image" style="width:16px;height:16px;"></i></button>
      <button style="width:32px;height:32px;border-radius:8px;border:0;background:transparent;color:var(--gray-500);"><i data-lucide="smile" style="width:16px;height:16px;"></i></button>
      <span style="flex:1"></span>
      <button style="width:32px;height:32px;border-radius:8px;border:0;background:transparent;color:var(--gray-500);"><i data-lucide="mic" style="width:16px;height:16px;"></i></button>
      <button style="padding:7px 14px;border-radius:8px;background:#1D4ED8;color:#fff;border:0;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:6px;"><i data-lucide="send" style="width:14px;height:14px;"></i>Send</button>
    </div>
  </div>
</div><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script><script>lucide.createIcons();</script></body></html>
