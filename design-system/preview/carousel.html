<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"/><title>Carousel</title><link rel="stylesheet" href="_card.css"/></head><body>
<div class="card">
  <div style="position:relative;border-radius:12px;overflow:hidden;background:linear-gradient(135deg,#1D4ED8,#A855F7);height:160px;display:flex;align-items:flex-end;padding:16px;color:#fff;">
    <div>
      <div style="font-weight:700;font-size:18px;">Ship faster with App Studio</div>
      <div style="font-size:12px;opacity:.85;">40+ themeable components, typed end to end.</div>
    </div>
    <button style="position:absolute;left:10px;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.9);border:0;"><i data-lucide="chevron-left" style="width:16px;height:16px;"></i></button>
    <button style="position:absolute;right:10px;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.9);border:0;"><i data-lucide="chevron-right" style="width:16px;height:16px;"></i></button>
    <div style="position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:6px;">
      <span style="width:18px;height:4px;border-radius:2px;background:#fff;"></span>
      <span style="width:4px;height:4px;border-radius:2px;background:rgba(255,255,255,.5);"></span>
      <span style="width:4px;height:4px;border-radius:2px;background:rgba(255,255,255,.5);"></span>
    </div>
  </div>
</div><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script><script>lucide.createIcons();</script></body></html>
