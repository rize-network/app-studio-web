<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"/><title>ShareButton</title><link rel="stylesheet" href="_card.css"/></head><body>
<div class="card">
  <div class="row">
    <button style="padding:8px 14px;border:1px solid var(--theme-border);background:#fff;border-radius:8px;display:inline-flex;gap:6px;align-items:center;font-size:13px;"><i data-lucide="share-2" style="width:14px;height:14px;"></i>Share</button>
    <button style="width:34px;height:34px;border-radius:50%;background:#1DA1F2;color:#fff;border:0;display:inline-flex;align-items:center;justify-content:center;"><i data-lucide="twitter" style="width:15px;height:15px;"></i></button><button style="width:34px;height:34px;border-radius:50%;background:#1877F2;color:#fff;border:0;display:inline-flex;align-items:center;justify-content:center;"><i data-lucide="facebook" style="width:15px;height:15px;"></i></button><button style="width:34px;height:34px;border-radius:50%;background:#0A66C2;color:#fff;border:0;display:inline-flex;align-items:center;justify-content:center;"><i data-lucide="linkedin" style="width:15px;height:15px;"></i></button><button style="width:34px;height:34px;border-radius:50%;background:#181717;color:#fff;border:0;display:inline-flex;align-items:center;justify-content:center;"><i data-lucide="github" style="width:15px;height:15px;"></i></button><button style="width:34px;height:34px;border-radius:50%;background:#374151;color:#fff;border:0;display:inline-flex;align-items:center;justify-content:center;"><i data-lucide="mail" style="width:15px;height:15px;"></i></button>
  </div>
</div><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script><script>lucide.createIcons();</script></body></html>
