<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<title>Badges</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card">
  <div class="row">
    <span style="display:inline-flex;align-items:center;font-family:var(--font-sans);font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px;background:#E5E7EB;color:#374151;letter-spacing:0.02em;">DEFAULT</span>
    <span style="display:inline-flex;align-items:center;font-family:var(--font-sans);font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px;background:#1D4ED8;color:#fff;letter-spacing:0.02em;">PRIMARY</span>
    <span style="display:inline-flex;align-items:center;font-family:var(--font-sans);font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px;background:#22C55E;color:#fff;letter-spacing:0.02em;">SUCCESS</span>
    <span style="display:inline-flex;align-items:center;font-family:var(--font-sans);font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px;background:#F59E0B;color:#fff;letter-spacing:0.02em;">WARNING</span>
    <span style="display:inline-flex;align-items:center;font-family:var(--font-sans);font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px;background:#EF4444;color:#fff;letter-spacing:0.02em;">DANGER</span>
    <span style="display:inline-flex;align-items:center;font-family:var(--font-sans);font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px;background:#3B82F6;color:#fff;letter-spacing:0.02em;">INFO</span>
    <span style="display:inline-flex;align-items:center;font-family:var(--font-sans);font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px;background:#F97316;color:#fff;letter-spacing:0.02em;">BRAND</span>
  </div>
  <div class="row">
    <span style="display:inline-flex;align-items:center;font-family:var(--font-sans);font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px;background:#EF4444;color:#fff;letter-spacing:0.02em;">8</span>
    <span style="display:inline-flex;align-items:center;font-family:var(--font-sans);font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px;background:#FFEDD5;color:#C2580B;letter-spacing:0.02em;">NEW</span>
    <span style="display:inline-flex;align-items:center;font-family:var(--font-sans);font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px;background:#FEE2E2;color:#991B1B;letter-spacing:0.02em;">●  LIVE</span>
  </div>
</div></body></html>
