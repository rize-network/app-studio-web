<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"/><title>EditComponent</title><link rel="stylesheet" href="_card.css"/></head><body>
<div class="card">
  <div style="padding:10px 14px;border:1px solid #1D4ED8;border-radius:8px;background:#fff;display:flex;gap:10px;align-items:center;">
    <div contenteditable style="flex:1;font-size:14px;outline:none;">Click to edit this heading</div>
    <div class="row" style="gap:4px;">
      <button style="width:28px;height:28px;border-radius:6px;border:1px solid var(--theme-border);background:#fff;"><i data-lucide="bold" style="width:13px;height:13px;"></i></button>
      <button style="width:28px;height:28px;border-radius:6px;border:1px solid var(--theme-border);background:#fff;"><i data-lucide="italic" style="width:13px;height:13px;"></i></button>
      <button style="width:28px;height:28px;border-radius:6px;border:0;background:#22C55E;color:#fff;"><i data-lucide="check" style="width:13px;height:13px;"></i></button>
    </div>
  </div>
</div><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script><script>lucide.createIcons();</script></body></html>
