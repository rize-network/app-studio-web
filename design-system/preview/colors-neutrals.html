<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<title>Neutral scale</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card">
  <div class="grid" style="grid-template-columns:repeat(10,1fr);gap:4px;">
    <div class="swatch" style="background:#F9FAFB;color:#111;aspect-ratio:1;padding:4px;min-height:48px;justify-content:flex-end;">
        <small style="font-size:9px;">50</small>
      </div><div class="swatch" style="background:#F3F4F6;color:#111;aspect-ratio:1;padding:4px;min-height:48px;justify-content:flex-end;">
        <small style="font-size:9px;">100</small>
      </div><div class="swatch" style="background:#E5E7EB;color:#111;aspect-ratio:1;padding:4px;min-height:48px;justify-content:flex-end;">
        <small style="font-size:9px;">200</small>
      </div><div class="swatch" style="background:#D1D5DB;color:#111;aspect-ratio:1;padding:4px;min-height:48px;justify-content:flex-end;">
        <small style="font-size:9px;">300</small>
      </div><div class="swatch" style="background:#9CA3AF;color:#111;aspect-ratio:1;padding:4px;min-height:48px;justify-content:flex-end;">
        <small style="font-size:9px;">400</small>
      </div><div class="swatch" style="background:#6B7280;color:#fff;aspect-ratio:1;padding:4px;min-height:48px;justify-content:flex-end;">
        <small style="font-size:9px;">500</small>
      </div><div class="swatch" style="background:#4B5563;color:#fff;aspect-ratio:1;padding:4px;min-height:48px;justify-content:flex-end;">
        <small style="font-size:9px;">600</small>
      </div><div class="swatch" style="background:#374151;color:#fff;aspect-ratio:1;padding:4px;min-height:48px;justify-content:flex-end;">
        <small style="font-size:9px;">700</small>
      </div><div class="swatch" style="background:#1F2937;color:#fff;aspect-ratio:1;padding:4px;min-height:48px;justify-content:flex-end;">
        <small style="font-size:9px;">800</small>
      </div><div class="swatch" style="background:#111827;color:#fff;aspect-ratio:1;padding:4px;min-height:48px;justify-content:flex-end;">
        <small style="font-size:9px;">900</small>
      </div>
  </div>
  <div class="meta">color-gray-{50…900} — 1px borders use 200 (light) / 700 (dark).</div>
</div></body></html>
