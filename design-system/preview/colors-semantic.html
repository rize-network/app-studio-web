<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<title>Semantic theme tokens</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card">
  <div class="grid" style="grid-template-columns:repeat(4,1fr);">
    
  <div class="swatch" style="background:#1D4ED8;color:#fff;">
    <strong style="font-weight:600;">Primary</strong>
    <small>theme-primary</small>
    <small>#1D4ED8</small>
  </div>
    
  <div class="swatch" style="background:#A855F7;color:#fff;">
    <strong style="font-weight:600;">Secondary</strong>
    <small>theme-secondary</small>
    <small>#A855F7</small>
  </div>
    
  <div class="swatch" style="background:#22C55E;color:#fff;">
    <strong style="font-weight:600;">Success</strong>
    <small>color-green-500</small>
    <small>#22C55E</small>
  </div>
    
  <div class="swatch" style="background:#EF4444;color:#fff;">
    <strong style="font-weight:600;">Danger</strong>
    <small>color-red-500</small>
    <small>#EF4444</small>
  </div>
    
  <div class="swatch" style="background:#F59E0B;color:#111;">
    <strong style="font-weight:600;">Warning</strong>
    <small>color-amber-500</small>
    <small>#F59E0B</small>
  </div>
    
  <div class="swatch" style="background:#3B82F6;color:#fff;">
    <strong style="font-weight:600;">Info</strong>
    <small>color-blue-500</small>
    <small>#3B82F6</small>
  </div>
    
  <div class="swatch" style="background:#FFFFFF;color:#111;">
    <strong style="font-weight:600;">Surface</strong>
    <small>color-white</small>
    <small>#FFFFFF</small>
  </div>
    
  <div class="swatch" style="background:#111827;color:#fff;">
    <strong style="font-weight:600;">Text</strong>
    <small>theme-text</small>
    <small>#111827</small>
  </div>
  </div>
</div></body></html>
