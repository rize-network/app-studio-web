<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"/><title>Command palette</title><link rel="stylesheet" href="_card.css"/></head><body>
<div class="card" style="background:var(--gray-50);">
  <div style="background:#fff;border:1px solid var(--theme-border);border-radius:12px;box-shadow:var(--shadow-lg);overflow:hidden;">
    <div style="display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--theme-border);">
      <i data-lucide="search" style="width:16px;height:16px;color:var(--gray-500);"></i>
      <input placeholder="Type a command or search…" style="flex:1;border:0;outline:none;font-size:13px;font-family:var(--font-sans);"/>
      <span style="font-family:var(--font-mono);font-size:10px;color:var(--gray-500);border:1px solid var(--theme-border);padding:2px 6px;border-radius:4px;">ESC</span>
    </div>
    <div style="padding:6px 0;">
      <div style="padding:4px 14px;font-size:10px;letter-spacing:0.08em;color:var(--gray-500);font-weight:600;text-transform:uppercase;">Suggestions</div>
      
      <div style="display:flex;gap:10px;align-items:center;padding:7px 14px;font-size:13px;background:#1D4ED80D;color:#1D4ED8;">
        <i data-lucide="file-plus" style="width:15px;height:15px;"></i>
        <span style="flex:1;">New file</span>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--gray-500);">⌘N</span>
      </div>
      <div style="display:flex;gap:10px;align-items:center;padding:7px 14px;font-size:13px;">
        <i data-lucide="settings" style="width:15px;height:15px;"></i>
        <span style="flex:1;">Open settings</span>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--gray-500);">⌘,</span>
      </div>
      <div style="display:flex;gap:10px;align-items:center;padding:7px 14px;font-size:13px;">
        <i data-lucide="users" style="width:15px;height:15px;"></i>
        <span style="flex:1;">Invite team</span>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--gray-500);"></span>
      </div>
      <div style="display:flex;gap:10px;align-items:center;padding:7px 14px;font-size:13px;">
        <i data-lucide="sun" style="width:15px;height:15px;"></i>
        <span style="flex:1;">Toggle theme</span>
        <span style="font-family:var(--font-mono);font-size:10px;color:var(--gray-500);">⇧⌘T</span>
      </div>
    </div>
  </div>
</div><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script><script>lucide.createIcons();</script></body></html>
