<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"/><title>Modal</title><link rel="stylesheet" href="_card.css"/></head><body>
<div class="card" style="padding:0;height:280px;position:relative;overflow:hidden;background:rgba(15,23,42,0.55);display:flex;align-items:center;justify-content:center;">
  <div style="width:340px;background:#fff;border-radius:12px;box-shadow:var(--shadow-xl);overflow:hidden;">
    <div style="padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--theme-border);"><div style="font-weight:600;">Delete project?</div><i data-lucide="x" style="width:16px;height:16px;color:var(--gray-500);"></i></div>
    <div style="padding:16px 20px;font-size:13px;color:var(--gray-600);">This will permanently delete <b>app-studio-web</b>. This action cannot be undone.</div>
    <div style="padding:12px 16px;border-top:1px solid var(--theme-border);display:flex;justify-content:flex-end;gap:8px;"><button style="padding:8px 14px;border:1px solid var(--theme-border);background:#fff;border-radius:8px;font-size:13px;">Cancel</button><button style="padding:8px 14px;background:#EF4444;color:#fff;border:0;border-radius:8px;font-size:13px;font-weight:500;">Delete</button></div>
  </div>
</div><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script><script>lucide.createIcons();</script></body></html>
