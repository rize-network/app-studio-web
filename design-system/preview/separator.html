<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"/><title>Separator</title><link rel="stylesheet" href="_card.css"/></head><body>
<div class="card">
  <div class="col" style="gap:12px;">
    <div style="height:1px;background:var(--theme-border);"></div>
    <div style="font-size:11px;color:var(--gray-500);text-align:center;position:relative;"><span style="background:#fff;padding:0 8px;">OR CONTINUE WITH</span><div style="position:absolute;top:50%;left:0;right:0;height:1px;background:var(--theme-border);z-index:-1;"></div></div>
    <div style="border-top:1px dashed var(--theme-border);"></div>
    <div class="row" style="gap:10px;align-items:center;"><span>Active</span><div style="width:1px;height:16px;background:var(--theme-border);"></div><span style="color:var(--gray-500);">Archived</span></div>
  </div>
</div></body></html>
