<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<title>Brand color</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card">
  <div class="grid" style="grid-template-columns:repeat(4,1fr);">
    
  <div class="swatch" style="background:#F97316;color:#fff;">
    <strong style="font-weight:600;">Orange 500</strong>
    <small>color-orange-500</small>
    <small>#F97316</small>
  </div>
    
  <div class="swatch" style="background:#EA6A0D;color:#fff;">
    <strong style="font-weight:600;">Hover</strong>
    <small>hover</small>
    <small>#EA6A0D</small>
  </div>
    
  <div class="swatch" style="background:#C2580B;color:#fff;">
    <strong style="font-weight:600;">Press</strong>
    <small>press</small>
    <small>#C2580B</small>
  </div>
    <div class="swatch" style="background:#FFEDD5;color:#C2580B;border-color:#FDBA74;">
      <strong style="font-weight:600;">Orange soft</strong>
      <small>color-orange-100</small>
      <small>#FFEDD5</small>
    </div>
  </div>
  <div class="meta">Brand accent — set as &lt;meta name="theme-color"&gt; on the shipping app.</div>
</div></body></html>
