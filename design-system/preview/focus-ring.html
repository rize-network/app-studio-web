<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<title>Focus ring</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card" style="background:var(--gray-50);">
  <div class="row" style="gap:20px;">
    <button style="font-family:var(--font-sans);font-weight:500;padding:10px 20px;font-size:14px;background:#1D4ED8;color:#fff;border:0;border-radius:8px;outline:none;box-shadow:0 0 0 2px #fff, 0 0 0 4px #1D4ED8;">Focused</button>
    <div class="col" style="gap:4px;">
      <span style="font-size:12px;">Double-ring: 2px white + 4px token color</span>
      <code style="font-family:var(--font-mono);font-size:11px;color:var(--gray-600);">box-shadow: 0 0 0 2px #fff, 0 0 0 4px &lt;color&gt;</code>
    </div>
  </div>
</div></body></html>
