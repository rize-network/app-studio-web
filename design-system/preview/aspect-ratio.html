<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"/><title>AspectRatio</title><link rel="stylesheet" href="_card.css"/></head><body>
<div class="card">
  <div class="row" style="gap:12px;">
    <div style="flex:1;aspect-ratio:1/1;background:var(--gray-100);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--gray-500);font-family:var(--font-mono);font-size:11px;">1 : 1</div>
    <div style="flex:1.333;aspect-ratio:4/3;background:var(--gray-100);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--gray-500);font-family:var(--font-mono);font-size:11px;">4 : 3</div>
    <div style="flex:1.777;aspect-ratio:16/9;background:var(--gray-100);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--gray-500);font-family:var(--font-mono);font-size:11px;">16 : 9</div>
  </div>
</div></body></html>
