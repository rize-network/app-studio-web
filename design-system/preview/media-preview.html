<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"/><title>MediaPreview</title><link rel="stylesheet" href="_card.css"/></head><body>
<div class="card">
  <div class="row" style="gap:10px;flex-wrap:wrap;">
    <div style="width:110px;height:82px;border-radius:8px;background:linear-gradient(135deg,#1D4ED8,#A855F7);position:relative;overflow:hidden;">
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;"><i data-lucide="play" style="width:24px;height:24px;color:#fff;"></i></div>
      <span style="position:absolute;right:4px;bottom:4px;background:rgba(0,0,0,.6);color:#fff;padding:1px 5px;border-radius:3px;font-family:var(--font-mono);font-size:10px;">2:14</span>
    </div>
    <div style="width:110px;height:82px;border-radius:8px;background:var(--gray-100);display:flex;align-items:center;justify-content:center;"><i data-lucide="image" style="width:22px;height:22px;color:var(--gray-400);"></i></div>
    <div style="width:110px;height:82px;border-radius:8px;background:#FEF3C7;position:relative;overflow:hidden;">
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;"><i data-lucide="file-text" style="width:22px;height:22px;color:#92400E;"></i></div>
      <span style="position:absolute;left:4px;bottom:4px;color:#92400E;font-family:var(--font-mono);font-size:10px;font-weight:600;">PDF</span>
    </div>
    <div style="width:110px;height:82px;border-radius:8px;background:var(--gray-50);border:1px dashed var(--theme-border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;"><i data-lucide="plus" style="width:18px;height:18px;color:var(--gray-400);"></i><span style="font-size:10px;color:var(--gray-400);">Add media</span></div>
  </div>
</div><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script><script>lucide.createIcons();</script></body></html>
