<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"/><title>ChatWidget</title><link rel="stylesheet" href="_card.css"/></head><body>
<div class="card" style="padding:0;">
  <div style="display:flex;flex-direction:column;height:280px;">
    <div style="padding:10px 14px;border-bottom:1px solid var(--theme-border);display:flex;align-items:center;gap:10px;">
      <div style="width:28px;height:28px;border-radius:50%;background:#1D4ED8;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:600;font-size:11px;">AS</div>
      <div style="flex:1;"><div style="font-weight:600;font-size:13px;">Support</div><div style="font-size:11px;color:var(--gray-500);">Online · typing…</div></div>
      <i data-lucide="minus" style="width:16px;height:16px;color:var(--gray-500);"></i>
    </div>
    <div style="flex:1;padding:12px 14px;display:flex;flex-direction:column;gap:8px;background:var(--gray-50);overflow:hidden;">
      <div style="align-self:flex-start;background:#fff;border:1px solid var(--theme-border);padding:8px 12px;border-radius:12px;font-size:13px;max-width:75%;">Hi! How can we help?</div>
      <div style="align-self:flex-end;background:#1D4ED8;color:#fff;padding:8px 12px;border-radius:12px;font-size:13px;max-width:75%;">I need to theme a Button.</div>
      <div style="align-self:flex-start;background:#fff;border:1px solid var(--theme-border);padding:8px 12px;border-radius:12px;font-size:13px;max-width:75%;">Pass <code style="background:var(--gray-100);padding:1px 4px;border-radius:3px;font-family:var(--font-mono);font-size:11px;">color="theme.secondary"</code>.</div>
    </div>
    <div style="padding:8px;border-top:1px solid var(--theme-border);display:flex;gap:6px;align-items:center;">
      <input placeholder="Type a message" style="flex:1;border:0;padding:8px;outline:none;font-family:var(--font-sans);font-size:13px;"/>
      <button style="width:32px;height:32px;border-radius:50%;background:#1D4ED8;color:#fff;border:0;"><i data-lucide="send" style="width:14px;height:14px;"></i></button>
    </div>
  </div>
</div><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script><script>lucide.createIcons();</script></body></html>
