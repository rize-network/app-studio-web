<!doctype html><html lang="en" data-theme="light"><head><meta charset="utf-8"/><title>Background</title><link rel="stylesheet" href="_card.css"/></head><body>
<div class="card" style="padding:0;">
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:2px;">
    <div style="aspect-ratio:3/2;background:linear-gradient(135deg,#1D4ED8,#A855F7);"></div>
    <div style="aspect-ratio:3/2;background-image:radial-gradient(circle at 1px 1px, var(--gray-300) 1px, transparent 0);background-size:12px 12px;background-color:#fff;"></div>
    <div style="aspect-ratio:3/2;background-image:linear-gradient(var(--gray-200) 1px,transparent 1px),linear-gradient(90deg,var(--gray-200) 1px,transparent 1px);background-size:16px 16px;background-color:#fff;"></div>
    <div style="aspect-ratio:3/2;background:radial-gradient(ellipse at top,#DBEAFE,#fff 70%);"></div>
    <div style="aspect-ratio:3/2;background:repeating-linear-gradient(45deg,#fff,#fff 8px,#F3F4F6 8px,#F3F4F6 16px);"></div>
    <div style="aspect-ratio:3/2;background:#111827;background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,.15) 1px, transparent 0);background-size:14px 14px;"></div>
  </div>
</div></body></html>
