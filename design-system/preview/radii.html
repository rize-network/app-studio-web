<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<title>Radii</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card">
  <div class="row" style="gap:16px;align-items:flex-end;">
    
      <div class="col" style="gap:6px;align-items:center;">
        <div style="width:72px;height:72px;background:var(--brand-orange);border-radius:0;"></div>
        <span class="label">square<br/><span style="color:var(--gray-400);">0</span></span>
      </div>
      <div class="col" style="gap:6px;align-items:center;">
        <div style="width:72px;height:72px;background:var(--brand-orange);border-radius:8px;"></div>
        <span class="label">rounded<br/><span style="color:var(--gray-400);">8px</span></span>
      </div>
      <div class="col" style="gap:6px;align-items:center;">
        <div style="width:72px;height:72px;background:var(--brand-orange);border-radius:12px;"></div>
        <span class="label">lg<br/><span style="color:var(--gray-400);">12px</span></span>
      </div>
      <div class="col" style="gap:6px;align-items:center;">
        <div style="width:72px;height:72px;background:var(--brand-orange);border-radius:16px;"></div>
        <span class="label">xl<br/><span style="color:var(--gray-400);">16px</span></span>
      </div>
      <div class="col" style="gap:6px;align-items:center;">
        <div style="width:72px;height:72px;background:var(--brand-orange);border-radius:999px;"></div>
        <span class="label">pill<br/><span style="color:var(--gray-400);">999px</span></span>
      </div>
  </div>
</div></body></html>
