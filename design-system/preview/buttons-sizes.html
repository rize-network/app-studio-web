<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<title>Button sizes</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card">
  <div class="row" style="align-items:flex-end;">
    <button style="font-family:var(--font-sans);font-weight:500;padding:6px 12px;font-size:10px;line-height:12px;background:#1D4ED8;color:#fff;border:0;border-radius:8px;">xs</button>
    <button style="font-family:var(--font-sans);font-weight:500;padding:8px 16px;font-size:12px;line-height:16px;background:#1D4ED8;color:#fff;border:0;border-radius:8px;">sm</button>
    <button style="font-family:var(--font-sans);font-weight:500;padding:10px 20px;font-size:14px;line-height:20px;background:#1D4ED8;color:#fff;border:0;border-radius:8px;">md</button>
    <button style="font-family:var(--font-sans);font-weight:500;padding:12px 24px;font-size:16px;line-height:24px;background:#1D4ED8;color:#fff;border:0;border-radius:8px;">lg</button>
    <button style="font-family:var(--font-sans);font-weight:500;padding:14px 28px;font-size:20px;line-height:28px;background:#1D4ED8;color:#fff;border:0;border-radius:8px;">xl</button>
  </div>
</div></body></html>
