<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<title>Button variants</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card">
  <div class="row">
    <button style="font-family:var(--font-sans);font-size:14px;font-weight:500;line-height:20px;letter-spacing:-0.01em;padding:10px 20px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .2s ease;background:#1D4ED8;color:#fff;">Filled</button>
    <button style="font-family:var(--font-sans);font-size:14px;font-weight:500;line-height:20px;letter-spacing:-0.01em;padding:10px 20px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .2s ease;background:transparent;color:#1D4ED8;border-color:#1D4ED8;">Outline</button>
    <button style="font-family:var(--font-sans);font-size:14px;font-weight:500;line-height:20px;letter-spacing:-0.01em;padding:10px 20px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .2s ease;background:transparent;color:#1D4ED8;border-color:transparent;">Ghost</button>
    <button style="font-family:var(--font-sans);font-size:14px;font-weight:500;line-height:20px;letter-spacing:-0.01em;padding:10px 20px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .2s ease;background:rgba(29,78,216,0.05);color:#1D4ED8;border-color:#1D4ED8;">Subtle</button>
    <button style="font-family:var(--font-sans);font-size:14px;font-weight:500;line-height:20px;letter-spacing:-0.01em;padding:10px 20px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .2s ease;background:transparent;color:#1D4ED8;border:0;padding:10px 4px;"><span style="text-decoration:underline;text-underline-offset:2px;">Link</span></button>
  </div>
  <div class="meta">filled · outline · ghost · subtle · link — all sharing the same main color.</div>
</div></body></html>
