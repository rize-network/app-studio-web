ems:center;justify-content:center;font-size:20px;cursor:pointer;border-radius:4px;">🥳</div><div style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;border-radius:4px;">😤</div>

</div><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script><script>lucide.createIcons();</script></body></html>
