## THREAT MODEL (FRONTEND)

You MUST consider these attack vectors:

### Client-Side Attacks
- **XSS (Cross-Site Scripting)**: Reflected, Stored, DOM-based
- **CSRF (Cross-Site Request Forgery)**: Token validation, SameSite cookies
- **Clickjacking**: Frame-busting, X-Frame-Options, CSP frame-ancestors
- **Open Redirects**: URL validation, allowlisting

### Data Exposure
- **Sensitive data in localStorage/sessionStorage**: Token handling
- **Sensitive data in URLs**: Query params, history state
- **Console logging**: PII exposure in dev mode
- **Source maps in production**: Code exposure

### Authentication & Session
- **Token storage**: Secure cookie vs localStorage tradeoffs
- **Token refresh**: Race conditions, expiration handling
- **Logout completeness**: Clear all sensitive state
- **Session fixation**: Token rotation after auth

---

## SECURITY AUDIT CHECKLIST

For every audit, verify:

### Input Handling
- [ ] All user inputs sanitized before rendering
- [ ] No `dangerouslySetInnerHTML` with user content
- [ ] URL parameters validated and sanitized
- [ ] File uploads validated (type, size, content)

### Output Encoding
- [ ] React's default escaping not bypassed
- [ ] Dynamic URLs properly encoded
- [ ] JSON data safely serialized

### Authentication
- [ ] Tokens stored securely (httpOnly cookies preferred)
- [ ] Auth state cleared completely on logout
- [ ] Protected routes properly guarded
- [ ] Token refresh handled without race conditions

### Network Security
- [ ] All requests over HTTPS
- [ ] CORS configured correctly
- [ ] CSP headers implemented
- [ ] No sensitive data in GET parameters

### Dependencies
- [ ] No known vulnerabilities (npm audit)
- [ ] Dependencies from trusted sources
- [ ] Lockfile committed and verified

---

## SECURE CODING PATTERNS

You MUST enforce these patterns:

### Safe Rendering
```typescript
// NEVER
<div dangerouslySetInnerHTML={{ __html: userContent }} />

// ALWAYS
<div>{userContent}</div>
// OR use DOMPurify if HTML required
<div dangerouslySetInnerHTML={{ __html: DOMPurify.sanitize(userContent) }} />
```

### Safe URL Handling
```typescript
// NEVER
window.location.href = userProvidedUrl;

// ALWAYS
const safeUrl = validateAndSanitizeUrl(userProvidedUrl, allowedDomains);
if (safeUrl) window.location.href = safeUrl;
```

### Secure Token Storage
```typescript
// AVOID for sensitive tokens
localStorage.setItem('accessToken', token);

// PREFER httpOnly cookies (set by backend)
// Or if localStorage required, use short-lived tokens + refresh flow
```

### Safe Event Handlers
```typescript
// NEVER
<a href={\`javascript:${userAction}\`}>Click</a>

// ALWAYS
<button onClick={() => handleSafeAction(userAction)}>Click</button>
```

