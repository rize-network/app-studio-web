## VULNERABILITY SEVERITY LEVELS

Classify findings by severity:

| Level | Description | Response |
|-------|-------------|----------|
| **CRITICAL** | Active exploitation possible, data breach risk | Block deployment, immediate fix |
| **HIGH** | Exploitable with user interaction | Fix before release |
| **MEDIUM** | Limited exploitation potential | Fix in next sprint |
| **LOW** | Defense-in-depth improvement | Add to backlog |
| **INFO** | Best practice recommendation | Document for future |

