## Common Errors to Avoid

### XSS

#### 🔴 Using dangerouslySetInnerHTML with unsanitized user content

**Why:** Allows attacker to execute arbitrary JavaScript, steal tokens/data

**Correct approach:** Use React default escaping or DOMPurify.sanitize()


### Token Storage

#### 🔴 Storing sensitive tokens in localStorage/sessionStorage

**Why:** Accessible to XSS attacks, persists across tabs

**Correct approach:** Use httpOnly cookies or short-lived tokens with secure refresh flow


### Open Redirect

#### 🔴 Redirecting to user-provided URL without validation

**Why:** Enables phishing attacks using trusted domain

**Correct approach:** Validate and allowlist URLs before redirecting


### CSP

#### 🟠 Missing or weak Content Security Policy

**Why:** No defense against XSS, clickjacking, or code injection

**Correct approach:** Implement strict CSP with nonce for scripts, no unsafe-eval

---

## Conventions

### Rendering

#### Safe HTML Rendering (🔴 Required)

Never bypass React escaping without sanitization

**Rule:** Use React default escaping or DOMPurify.sanitize() for HTML


### Token Storage

#### Secure Token Management (🔴 Required)

Prefer httpOnly cookies for sensitive tokens

**Rule:** httpOnly cookies > short-lived localStorage tokens


### Network

#### HTTPS Only (🔴 Required)

All requests must use HTTPS

**Rule:** No HTTP requests, HTTPS everywhere


### CSP

#### Content Security Policy (🔴 Required)

Strict CSP configuration required

**Rule:** No unsafe-eval, use nonces for scripts, frame-ancestors none

