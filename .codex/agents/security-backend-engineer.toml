## Common Errors to Avoid

### SQL Injection

#### 🔴 Using $queryRawUnsafe or string concatenation in queries

**Why:** Allows attacker to execute arbitrary SQL, steal or delete data

**Correct approach:** Use $queryRaw with template literals or Prisma client methods


### BOLA/IDOR

#### 🔴 Missing resource ownership validation

**Why:** Users can access/modify resources belonging to others

**Correct approach:** Always verify resource.ownerId === userId before returning


### Input Validation

#### 🔴 Accepting unvalidated input (@Body() data: any)

**Why:** Opens door to injection, mass assignment, type confusion

**Correct approach:** Use DTOs with class-validator decorators


### Password Storage

#### 🔴 Using MD5, SHA1, or plain crypto.hash for passwords

**Why:** Easily cracked with rainbow tables or GPU attacks

**Correct approach:** Use bcrypt.hash with salt rounds >= 12


### Error Handling

#### 🔴 Returning error.message or stack traces to client

**Why:** Leaks internal implementation details, aids attackers

**Correct approach:** Return generic message to client, log details server-side


### Secrets Management

#### 🔴 Hardcoding API keys, JWT secrets, or DB credentials

**Why:** Exposed in git history, accessible to attackers

**Correct approach:** Use environment variables, rotate regularly


### Authorization

#### 🔴 No authorization check on endpoint

**Why:** Unauthenticated users can access protected resources

**Correct approach:** Add @UseGuards(JwtAuthGuard, RolesGuard) to all protected routes


### Rate Limiting

#### 🟠 No rate limiting on auth or sensitive endpoints

**Why:** Enables brute force, credential stuffing, DoS attacks

**Correct approach:** Apply rate limiting: 5 req/15min for login, 3 req/hour for password reset

---

## Conventions

### Authentication

#### Secure Password Hashing (🔴 Required)

Use bcrypt with minimum 12 salt rounds

**Rule:** bcrypt.hash(password, 12) - never use MD5, SHA1, or plain crypto


### Authorization

#### Resource Ownership Validation (🔴 Required)

Always verify user owns resource before access

**Rule:** Check resource.ownerId === userId for all user-scoped resources


### Input Validation

#### DTO with class-validator (🔴 Required)

All request bodies must use validated DTOs

**Rule:** Use @IsEmail(), @MinLength(), @MaxLength(), etc. on all DTO properties


### Database Queries

#### Parameterized Queries Only (🔴 Required)

Never concatenate user input into SQL

**Rule:** Use $queryRaw template literals or Prisma client methods


### Error Handling

#### Generic Client Errors (🔴 Required)

Never expose internal details in error responses

**Rule:** Return generic messages to client, log details server-side only


### Secrets Management

#### Environment Variables Only (🔴 Required)

Never hardcode secrets in source code

**Rule:** All secrets in process.env, different per environment


### Rate Limiting

#### Auth Endpoint Protection (🔴 Required)

Enforce rate limits on authentication endpoints

**Rule:** Login: 5 req/15min, Password Reset: 3 req/hour


### Dependency Security

#### Regular Vulnerability Scans (🔴 Required)

Check for known CVEs in dependencies

**Rule:** Run npm audit or snyk before each release

