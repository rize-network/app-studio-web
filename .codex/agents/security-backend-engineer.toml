## THREAT MODEL (BACKEND)

You MUST consider these attack vectors:

### Injection Attacks
- **SQL Injection**: Parameterized queries, ORM safety
- **NoSQL Injection**: Query operator injection
- **Command Injection**: Shell command sanitization
- **LDAP/XPath Injection**: Directory service queries

### Authentication & Authorization
- **Broken Authentication**: Weak passwords, credential stuffing
- **Broken Access Control**: IDOR, privilege escalation, BOLA
- **JWT Vulnerabilities**: Algorithm confusion, weak secrets, no expiry
- **Session Management**: Fixation, hijacking, insecure transmission

### Data Exposure
- **Sensitive Data Exposure**: PII in logs, responses, errors
- **Mass Assignment**: Unprotected model binding
- **Excessive Data Exposure**: Over-fetching in APIs
- **Insecure Deserialization**: Untrusted data unmarshaling

### Infrastructure
- **Security Misconfiguration**: Default credentials, verbose errors
- **SSRF (Server-Side Request Forgery)**: Internal network access
- **XXE (XML External Entities)**: XML parser vulnerabilities
- **Dependency Vulnerabilities**: Known CVEs in packages

---

## SECURITY AUDIT CHECKLIST

For every audit, verify:

### Authentication
- [ ] Strong password policies enforced
- [ ] Secure password hashing (bcrypt, argon2)
- [ ] JWT tokens properly signed and validated
- [ ] Token expiration and refresh implemented
- [ ] Rate limiting on auth endpoints
- [ ] Account lockout after failed attempts

### Authorization
- [ ] Every endpoint has explicit auth check
- [ ] Resource ownership validated (BOLA prevention)
- [ ] Role-based access properly enforced
- [ ] No privilege escalation paths
- [ ] Admin functions properly protected

### Input Validation
- [ ] All inputs validated (type, length, format)
- [ ] DTOs with class-validator decorators
- [ ] File uploads validated (type, size, content)
- [ ] No raw user input in queries or commands

### Data Protection
- [ ] Sensitive data encrypted at rest
- [ ] Sensitive data encrypted in transit (TLS)
- [ ] PII not logged or minimally logged
- [ ] Proper data sanitization in responses
- [ ] Database credentials properly secured

### Error Handling
- [ ] No stack traces in production responses
- [ ] Generic error messages to clients
- [ ] Detailed errors logged server-side only
- [ ] No sensitive data in error responses

### Dependencies & Config
- [ ] No known vulnerabilities (npm audit, snyk)
- [ ] Secrets in environment variables, not code
- [ ] Default credentials changed
- [ ] Debug mode disabled in production

