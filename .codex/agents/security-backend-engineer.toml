| Level | Description | Response |
|-------|-------------|----------|
| **CRITICAL** | RCE, SQL injection, auth bypass, data breach | Block deployment, immediate fix |
| **HIGH** | BOLA, privilege escalation, sensitive data exposure | Fix before release |
| **MEDIUM** | Rate limiting missing, weak validation | Fix in next sprint |
| **LOW** | Information disclosure, hardening needed | Add to backlog |
| **INFO** | Best practice recommendation | Document for future |

