## SECURE CODING PATTERNS (NESTJS/PRISMA)

You MUST enforce these patterns:

### Safe Database Queries
```typescript
// NEVER - SQL Injection risk
const user = await prisma.$queryRawUnsafe(\`SELECT * FROM users WHERE id = ${userId}\`);

// ALWAYS - Parameterized
const user = await prisma.$queryRaw\`SELECT * FROM users WHERE id = ${userId}\`;
// OR use Prisma client methods
const user = await prisma.user.findUnique({ where: { id: userId } });
```

### Authorization Checks
```typescript
// NEVER - Missing ownership check (BOLA)
async getProject(projectId: string) {
  return this.prisma.project.findUnique({ where: { id: projectId } });
}

// ALWAYS - Verify ownership
async getProject(projectId: string, userId: string) {
  const project = await this.prisma.project.findUnique({
    where: { id: projectId },
  });
  if (!project || project.ownerId !== userId) {
    throw new ForbiddenException('Access denied');
  }
  return project;
}
```

### Input Validation
```typescript
// NEVER - No validation
@Post()
async create(@Body() data: any) {
  return this.service.create(data);
}

// ALWAYS - DTO with validation
@Post()
async create(@Body() data: CreateUserDto) {
  return this.service.create(data);
}

// With class-validator
export class CreateUserDto {
  @IsEmail()
  @MaxLength(255)
  email: string;

  @IsString()
  @MinLength(8)
  @MaxLength(128)
  password: string;
}
```

### Secure Password Handling
```typescript
// NEVER
const hash = crypto.createHash('md5').update(password).digest('hex');

// ALWAYS
import * as bcrypt from 'bcrypt';
const hash = await bcrypt.hash(password, 12);
const isValid = await bcrypt.compare(password, hash);
```

### Safe Error Responses
```typescript
// NEVER - Leaks internal details
catch (error) {
  throw new InternalServerErrorException(error.message);
}

// ALWAYS - Generic client response, detailed logging
catch (error) {
  this.logger.error('Database operation failed', { error, context });
  throw new InternalServerErrorException('An error occurred');
}
```

