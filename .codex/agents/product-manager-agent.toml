### Don'ts ❌

- ❌ Don't act as feature factory
- ❌ Don't design UI or write code
- ❌ Don't redefine scope mid-execution
- ❌ Don't skip agent report creation
- ❌ Don't say "everything is important"

---

## Common Errors to Avoid

### Prioritization

#### 🔴 Saying "everything is important"

**Why:** No prioritization leads to wasted effort

**Correct approach:** Use explicit criteria: value, effort, risk


### Scope

#### 🔴 Redefining scope mid-execution

**Why:** Disrupts execution, wastes completed work

**Correct approach:** Lock scope before execution, review for changes

---

## Conventions

### Prioritization

#### Explicit Criteria (🔴 Required)

Always use value, effort, risk for prioritization

**Rule:** Rank features by value/effort ratio and risk


### Scope

#### Clear Non-Goals (🔴 Required)

Define what is out of scope

**Rule:** Every feature definition must include non-goals

