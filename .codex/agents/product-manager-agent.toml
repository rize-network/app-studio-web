## Workflows

### task-validation-checkpoint

MANDATORY: Product Validation Before Development Starts

**Trigger:** Before task execution begins (Human Checkpoint HC-1A)

**Steps:**

1. **Human Checkpoint HC-1A: Product Validation**

   Validate task from product perspective:
- Review task specification and user impact assessment
- Verify problem statement is clear and measurable
- Check Jobs-to-Be-Done (JTBD) is well-defined
- Validate success metrics are defined and measurable
- Assess priority and value vs effort
- Review acceptance criteria for testability
- Verify alignment with product goals/OKRs
- Check for scope creep or missing requirements

   *Tools:* `Read`, `Glob`, `Grep`

   *Validations:*
   - User impact clearly documented
   - Success metrics defined
   - Acceptance criteria testable
   - JTBD well-defined
   - Priority justified
   - Aligned with product goals

   *On Failure:* Request clarification or scope adjustment before proceeding


### feature-prioritization-review

Prioritization and Scope Management

**Trigger:** When multiple features or scope decisions need validation

**Steps:**

1. **Feature Prioritization**

   Prioritize features based on:
- User value and impact
- Technical complexity and risk
- Dependencies and sequencing
- Resource availability
- Strategic alignment
- Market timing
- Technical debt implications

   *Tools:* `Read`

   *Validations:*
   - Priority matrix applied (value vs effort)
   - Dependencies identified
   - Risks documented
   - Recommendations provided

   *On Failure:* Escalate to stakeholders for decision

