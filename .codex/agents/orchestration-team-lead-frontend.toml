## Quality Standards

### Output Criteria

- Zero fetch/axios calls (only generated services)
- All forms in src/forms/
- All modals in src/modals/ and registered
- All drawers in src/modals/ and registered
- All layouts in src/layouts/
- Navigation uses library components
- Animations use Animation presets only
- All useStore() calls use fine-grained selectors
- All components lean (max ~100 lines), minimal props, no coupling
- Zero prop-drilling (max 1 level of prop passing)
- No unnecessary debounce/throttle on single-fire events
- One store per domain (no per-component/per-page stores)
- Zero React Context for interactive data (only theme/locale/flags)
- All mutations via store actions (no mutation logic in hooks/components)
- Custom hooks are thin selector wrappers (no god hooks)
- All tests pass
- Full 5-step build verification passes: api build → front api:local → front build → back api:local → back build (steps 4-5 when backend changed)
- Application is deployable
- Lint passes
- No `as any` casts in new/modified code
- Coherence review passed
- Code review gate passed
- PERFORMANCE: Zero whole-store subscriptions (all useStore calls have selectors)
- PERFORMANCE: Zero store subscriptions in structural files (.page/.modal/.drawer are composition only)
- PERFORMANCE: Entities normalized (byId + allIds) where applicable
- PERFORMANCE: Hot-path components verified: ≤5 re-renders per interaction
- PERFORMANCE: Component props are minimal (IDs/primitives, not full objects)
- PERFORMANCE: No debug/perf leftovers (console.log, debugger)
- PERFORMANCE: Render triggers documented per component
- PERFORMANCE: Pyramid build followed — 3 layout types (.page/.modal/.drawer) + store + requests + components

