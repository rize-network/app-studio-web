## Workflows

### frontend-implementation-pipeline

Parallel-optimized sub-agent dispatch with quality gates

**Trigger:** Receives delegation contract from APM

**Steps:**

1. **PARALLEL GROUP A: Dispatch Component + Form + Store + i18n + Layout + Navigation (6 simultaneously)**

   Dispatch ALL 6 agents at the same time using parallel Task calls:

1. process.frontend.component — Send UI spec + component catalog
   Output: components/{Domain}/*.tsx
2. process.frontend.form — Send form fields + validation rules
   Output: src/forms/{Domain}{Action}Form.tsx
3. process.frontend.store — Send state requirements + API service signatures
   Output: src/stores/use{Domain}Store.ts
4. process.frontend.i18n — Send UI spec for translation keys
   Output: src/i18n/locales/en/{domain}.json
5. process.frontend.layout — Send page structure requirements
   Output: src/layouts/{Name}Layout.tsx
6. process.frontend.navigation — Send navigation/menu requirements
   Output: src/navigation/{domain}.navigation.ts + nav components

CRITICAL: These 6 agents have ZERO dependencies on each other.
Launch them simultaneously for maximum speed.

   *Tools:* `Task`

   *Validations:*
   - All 6 agents dispatched in parallel
   - Components use app-studio-web library where available
   - Forms placed in src/forms/ with Formik + Yup
   - Stores use Zustand + generated API services only
   - Layouts in src/layouts/ with slot-based children
   - Navigation uses NavigationMenu/SideBarNavItem from library

2. **Coherence Review (Internal Gate: Coherence)**

   After ALL 6 parallel agents complete, check cross-agent consistency:
- Component props types align with Store state types
- Form value types match Store action parameter types
- Store methods call correct generated API service methods
- Layout accepts children prop and slot props
- Navigation hrefs match planned page routes
- i18n keys cover all UI labels, form messages, nav items
- No naming conflicts between agents
- No misplaced forms, modals, layouts
- All imports will resolve when wired together

   *Tools:* `Read`, `Grep`

   *Validations:*
   - Component props align with store data shapes
   - Form value types match store/API expectations
   - Store API service calls are correct
   - No convention violations

   *On Failure:* Re-dispatch to responsible sub-agent with corrections

3. **PARALLEL GROUP B: Dispatch Modal + Drawer + Animation + Test (4 simultaneously)**

   After Gate 1, dispatch ALL 4 agents at the same time:

1. process.frontend.modal — Send form refs + component refs for modal composition
   Output: src/modals/{Domain}{Action}Modal.tsx + updated index.tsx
2. process.frontend.drawer — Send component refs for drawer composition
   Output: src/modals/{Domain}{Action}Drawer.tsx + updated index.tsx
3. process.frontend.animation — Send component files to enhance with animations
   Output: Edited component files with Animation presets
4. process.frontend.test — Test Group A outputs (components, forms, stores)
   Output: *.test.tsx files for Group A artifacts

All 4 agents need Group A outputs but NOT each other. Launch simultaneously.

   *Tools:* `Task`

   *Validations:*
   - All 4 agents dispatched in parallel
   - Modals in src/modals/ and registered in index.tsx
   - Drawers in src/modals/ and registered in index.tsx
   - Animations use Animation presets only (no custom CSS)
   - Tests cover all visual states
   - Store tests cover success + error paths

4. **GROUP C: Dispatch Page Agent + Wiring + Test (pages)**

   After Group B completes:

1. process.frontend.page — Compose EVERYTHING: components + forms + stores + modals + drawers + layouts + navigation
   Output: src/pages/{domain}/{PageName}.tsx
2. process.frontend.wiring — Register routes, modals, drawers, navigation
   Output: Updated router, modal registry, navigation config
3. process.frontend.test — Write page tests + modal tests + drawer tests
   Output: *.test.tsx for pages, modals, drawers

   *Tools:* `Task`

   *Validations:*
   - Page composes from sub-components (no inlining)
   - Page handles loading/error/empty/data states
   - Page uses Layout from Layout Agent
   - Routes registered
   - Modals/drawers registered in src/modals/
   - Page tests written

5. **Code Review Gate (Internal Gate: Code Review)**

   Full convention check + active violation scan:
- [ ] No fetch() or axios in src/ (grep scan)
- [ ] All forms in src/forms/ (glob scan)
- [ ] All modals in src/modals/ and registered in index.tsx
- [ ] All drawers in src/modals/ and registered in index.tsx
- [ ] All layouts in src/layouts/ with slot-based children
- [ ] Navigation uses NavigationMenu/SideBarNavItem (no custom nav)
- [ ] Animations use Animation presets only (no custom CSS/@keyframes)
- [ ] Using generated services only
- [ ] Components use library first
- [ ] Zustand for global state (no Redux/MobX/Context)
- [ ] PascalCase.tsx for components
- [ ] Tests exist for components, forms, stores, modals, drawers, pages
- [ ] All page states handled (loading/error/empty/data)
- [ ] All useStore() calls use fine-grained selectors (s => s.field)
- [ ] Components are lean (max ~100 lines each)
- [ ] No prop-drilling through 2+ layers
- [ ] Minimal props — no passing entire objects when 1 field suffices
- [ ] No unnecessary debounce on click/submit handlers
- [ ] One store per domain (no per-component/per-page stores)
- [ ] No React Context for data that updates during interaction
- [ ] All mutations via store actions (not in hooks or component bodies)
- [ ] Custom hooks are thin selector wrappers (max 5-8 fields, no god hooks)
- [ ] createModelStore used for parent-child entity patterns

   *Tools:* `Read`, `Grep`, `Glob`

   *Validations:*
   - Zero convention violations
   - All checks pass

   *On Failure:* Dispatch fixes to responsible sub-agent, max 2 cycles

6. **Run Tests + Lint Fix (Internal Gate: Tests)**

   Run lint:fix FIRST to auto-fix formatting, then run tests and lint:

1. cd front-startup && npm run lint:fix (auto-fix formatting)
2. cd back-startup && npm run lint:fix (if back-startup in scope)
3. cd front-startup && npm run test
4. cd front-startup && npm run lint (verify lint passes clean)
5. cd back-startup && npm run lint (if back-startup in scope)

Verify all tests and lint pass.

   *Tools:* `Bash`

   *Validations:*
   - npm run test exits with 0
   - npm run lint exits with 0

   *On Failure:* Dispatch test failures to responsible sub-agent, max 3 cycles

7. **MANDATORY: Full Build Verification (Internal Gate: Build)**

   CRITICAL — The FULL STACK must build before returning to APM.
This ensures all applications are always functional and deployable.

NOTE: This is the Frontend Team Lead's internal build gate (corresponds to build verification
requirements in APM Gate 2, 3, and 6). It is NOT APM Gate 4.

ALWAYS run the full 5-step build verification sequence:
1. cd api-startup && npm run build
   → Backend must compile. If it fails, coordinate with Backend Team Lead.
2. cd front-startup && npm run api:local
   → Regenerate TypeScript API services for front-startup.
3. cd front-startup && npm run build
   → Frontend must compile. If it fails, dispatch fixes to responsible sub-agent.
4. cd back-startup && npm run api:local
   → Regenerate TypeScript API services for back-startup (same backend, separate client).
5. cd back-startup && npm run build
   → Back-office must compile. If it fails, dispatch fixes to responsible sub-agent.

Steps 4-5 are MANDATORY when the backend API was modified (always the case after Gate 3 API sync).
They are optional ONLY for front-startup-only changes that did NOT modify the backend.

If any step fails:
1. Read the error output
2. Dispatch fixes to the responsible sub-agent
3. Re-run the FULL relevant sequence
4. Max 3 fix cycles

Create proof files:
- 2-frontend/build-verification-passing.txt (all applicable steps passed)
- 2-frontend/tests-passing.txt

BLOCKS until all applicable build steps succeed. Do NOT return to APM with a broken build.
ALL applications that were modified MUST be deployable at all times.

   *Tools:* `Bash`

   *Validations:*
   - api-startup npm run build exits with 0
   - front-startup npm run api:local completes (if front-startup in scope)
   - front-startup npm run build exits with 0 (if front-startup in scope)
   - back-startup npm run api:local completes (if back-startup in scope)
   - back-startup npm run build exits with 0 (if back-startup in scope)
   - No TypeScript compilation errors in any modified app
   - No as any casts in new/modified code
   - Proof files created

   *On Failure:* Dispatch build failures to responsible sub-agent, max 3 cycles. NEVER return with broken build.

8. **Post-Pipeline: Update Documentation**

   Dispatch process.docs in UPDATE mode:
- domain: the feature/module that was just implemented
- artifacts: list of all created/modified files
- The Docs Agent reads the actual code and creates/updates a resource in agents-system/resources/

This step runs AFTER all gates pass. It is non-blocking — doc failures do not fail the pipeline.

   *Tools:* `Task`

   *Validations:*
   - Docs Agent dispatched with correct artifact list

**Expected Output:** All files created, tests passing, build succeeds, proof files written, docs updated

