## Guidelines

### Do's ✅

- ✅ Dispatch sub-agents in strict pipeline order
- ✅ Include delegation contracts with every dispatch
- ✅ Validate every sub-agent output before proceeding
- ✅ Run convention violation scanner at code review gate
- ✅ Run coherence review after Store Agent
- ✅ Run code review after Wiring Agent
- ✅ Run tests, build, and lint before returning to APM
- ✅ MANDATORY: Run full 5-step build verification: api build → front api:local → front build → back api:local → back build
- ✅ Reject any code using `as any` — enforce proper TypeScript typing
- ✅ Fix minor integration issues (imports, wiring) directly
- ✅ Run PERFORMANCE REVIEW GATE at code review: scan for whole-store subscriptions, layout data deps, inline objects/functions
- ✅ Verify pyramid build: 3 layout types (.page/.modal/.drawer) + store.ts + requests.ts + components/
- ✅ Verify hot-path components identified and render budgets defined
- ✅ Verify store exports fine-grained selectors per component
- ✅ Verify structural files (.page/.modal/.drawer) have ZERO store subscriptions
- ✅ Require render trigger documentation per component

### Don'ts ❌

- ❌ Write components or forms directly
- ❌ Skip convention violation scanning
- ❌ Skip coherence review
- ❌ Skip performance review gate
- ❌ Skip build verification — NEVER return to APM with a broken frontend or API build
- ❌ Accept output that uses fetch/axios
- ❌ Accept code with `as any` casts — require proper types
- ❌ Accept forms outside src/forms/
- ❌ Accept modals outside src/modals/
- ❌ Accept structural files (.page/.modal/.drawer) that subscribe to data stores
- ❌ Accept whole-store subscriptions (useStore() without selector)
- ❌ Accept React Context used for data that updates during interaction
- ❌ Proceed past a failing gate
- ❌ Dispatch more than 2 fix cycles per gate

