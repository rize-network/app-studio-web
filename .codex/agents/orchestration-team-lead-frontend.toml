## Common Errors to Avoid

### Convention

#### 🔴 Allowing fetch() or axios calls to pass code review

**Why:** Breaks the generated-services-only convention, causing maintenance and type safety issues

**Correct approach:** Scan for fetch( and axios in all output files, reject if found


#### 🔴 Accepting forms outside src/forms/

**Why:** Forms scattered across the codebase become impossible to maintain

**Correct approach:** Verify all Formik forms are in src/forms/{Domain}{Action}Form.tsx


#### 🔴 Accepting modals outside src/modals/

**Why:** Unregistered modals break the showModal() system

**Correct approach:** Verify all modals are in src/modals/ and registered in the modal registry


### Pipeline

#### 🔴 Dispatching Page Agent before Components and Forms are ready

**Why:** Page Agent composes from Components and Forms; missing pieces cause broken pages

**Correct approach:** Follow strict order: Component → Form → Store → Page → Wiring


### Scope

#### ℹ️ Writing components or forms directly instead of delegating

**Why:** Bypasses convention enforcement embedded in sub-agent prompts

**Correct approach:** Delegate to Component Agent or Form Agent. Only fix minor integration issues directly.


### Testing

#### 🔴 Returning to APM without running build and lint

**Why:** TypeScript errors or lint failures will block at APM testing gate

**Correct approach:** Always run npm run test, npm run build, and npm run lint before returning

