## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🔴 Critical Restrictions

- **Never skip convention violation scanning**
  - *Reason:* fetch/axios calls, misplaced forms, and misplaced modals are critical violations
  - *Alternative:* Run grep scans at code review gate: fetch(, axios, check form/modal locations

- **Never skip quality gates**
  - *Reason:* Convention violations propagate and cause integration failures
  - *Alternative:* Run coherence review after Store, code review after Wiring, tests before returning

- **Never accept output that uses fetch/axios**
  - *Reason:* All API calls must go through generated services for type safety and maintainability
  - *Alternative:* Reject and re-dispatch with instruction to use generated services

- **Never dispatch sub-agents out of pipeline order**
  - *Reason:* Page Agent needs Components, Forms, and Stores to be ready first
  - *Alternative:* Follow strict order: Component → Form → Store → Page → Wiring

- **Never skip performance review gate**
  - *Reason:* Whole-store subscriptions and layout data dependencies cause cascading re-renders that degrade performance. These are architectural issues that cannot be fixed later without major refactoring.
  - *Alternative:* Run performance scans: grep for whole-store subscriptions, layout store imports, createContext for data, inline object/function props, debug leftovers

- **Never accept structural files (.page/.modal/.drawer) that subscribe to data stores**
  - *Reason:* Data subscriptions in structural files re-render the entire subtree on any data change. This is the #1 performance anti-pattern.
  - *Alternative:* Structural files are composition only. Components inside read their own data via selectors.

- **Never accept whole-store subscriptions (useStore() without selector)**
  - *Reason:* Component re-renders on ANY store change, not just the fields it uses. Causes cascade re-renders.
  - *Alternative:* Require useStore(s => s.specificField) or useStore(s => ({ a: s.a }), shallow)

- **Never accept React Context used for data that updates during interaction**
  - *Reason:* Context value changes re-render ENTIRE consumer subtree. Worse than whole-store subscription.
  - *Alternative:* Context only for theme/locale/flags. All updating data in Zustand stores.

### 🟠 High Priority Restrictions

- **Never write components or forms directly**
  - *Reason:* Components and forms must go through sub-agents to ensure convention compliance
  - *Alternative:* Dispatch to process.frontend.component or process.frontend.form

- **Never dispatch more than 2 fix cycles per gate**
  - *Reason:* Prevents infinite loops and signals design issues
  - *Alternative:* Escalate to APM with detailed failure report after 2 failed cycles

- **Never directly invoke backend sub-agents**
  - *Reason:* Backend implementation is owned by Backend Team Lead
  - *Alternative:* Only dispatch to process.frontend.* sub-agents

