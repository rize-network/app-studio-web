## Conventions

### Pipeline

#### Sub-Agent Execution Order (🔴 Required)

Sub-agents must execute in strict order with gates between stages

**Rule:** Component → Form → Store → [Coherence Review] → Page → Wiring → [Code Review] → [Tests]


### Delegation

#### Delegation Contract Required (🔴 Required)

Every sub-agent dispatch must include a delegation contract

**Rule:** Include: taskId, summary (max 10 lines), priorOutputs, conventions, restrictions, outputFormat, doneCriteria, stopCondition


#### Partial-Completion Status Required (🔴 Required)

When returning from a multi-MF delegation, explicitly list per-MF status

**Rule:** Before returning control to APM (or any caller), produce a completion report listing every delegated MF-ID with its status: "MF-001: done | MF-002: done | MF-003: skipped (reason) | MF-004: blocked (reason)". Never return with silent partial work. If only a subset was completed, say so explicitly so the caller can re-dispatch the pending items.

**✅ Good Examples:**

```
"Completion report: MF-001 done, MF-002 done, MF-003 skipped (async dispatch returned early), MF-004 blocked (awaiting API sync)"
```

**❌ Bad Examples:**

```
"Work complete." (with only 2 of 8 MFs actually done)
```

```
Returning after first MF without mentioning the remainder
```


### API Usage

#### Generated Services Only (🔴 Required)

Frontend must NEVER use fetch() or axios directly

**Rule:** All API calls must go through generated services in src/services/api/. Scan for violations: grep -r "fetch(" and grep -r "axios" in src/

**✅ Good Examples:**

```
import { usersApi } from "src/services/api/users"
```

```
usersApi.createUser(data)
```

**❌ Bad Examples:**

```
fetch("/api/users")
```

```
axios.post("/api/users")
```

```
new XMLHttpRequest()
```


### Forms

#### Form Location (🔴 Required)

ALL forms must be in src/forms/

**Rule:** Forms using Formik must be placed in src/forms/{Domain}{Action}Form.tsx. No forms in components/ or pages/.

**✅ Good Examples:**

```
src/forms/UserCreateForm.tsx
```

```
src/forms/LoginForm.tsx
```

**❌ Bad Examples:**

```
src/components/UserForm.tsx
```

```
src/pages/login/LoginForm.tsx
```


### Modals

#### Modal Location and Registration (🔴 Required)

ALL modals must be in src/modals/ and registered

**Rule:** Modals in src/modals/{ModalName}.tsx, registered in modal registry, invoked via showModal()

**✅ Good Examples:**

```
src/modals/ConfirmDeleteModal.tsx
```

```
showModal("confirmDelete", { id })
```

**❌ Bad Examples:**

```
src/components/DeleteModal.tsx
```

```
<Modal isOpen={show}>...</Modal>
```


### State

#### State Management (🔴 Required)

Zustand for global state, useState for component-local state

**Rule:** Global state: src/stores/use{Domain}Store.ts with Zustand. Local state: React useState. Never Redux or MobX.


#### Store-First State Management (🔴 Required)

Prefer Zustand stores over prop-passing for shared/domain state

**Rule:** Domain data lives in Zustand stores. Pages consume stores via fine-grained selectors. Only use props for component-specific display configuration, not for domain data transport.


#### One Store Per Domain (🔴 Required)

Domain stores map to business domains, not to components or pages

**Rule:** One Zustand store per domain (e.g., useEditorStore, useAuthStore, useWorkflowStore). NEVER create a store per component or per page.

**✅ Good Examples:**

```
useEditorStore, useIdentityStore, useWorkflowStore, useAuthStore, useAppStore
```

**❌ Bad Examples:**

```
useUserCardStore (per-component)
```

```
useSettingsPageStore (per-page)
```


#### No Context for Updating Data (🔴 Required)

Never use React Context for data that updates during interaction

**Rule:** Context is ONLY allowed for: (a) truly ephemeral page-scoped UI state that no store needs, (b) React tree-scoped feature flags, (c) theme/locale injection. All other state goes in Zustand stores. Must be approved in PR review.

**✅ Good Examples:**

```
ThemeContext for light/dark mode
```

```
LocaleContext for i18n
```

**❌ Bad Examples:**

```
EditorContext for cursor position
```

```
SelectionContext for selected items
```


#### createModelStore for Parent-Child Entities (🔴 Required)

Use createModelStore pattern for parent-child entity relationships

**Rule:** When an entity has a parent-child pattern (e.g., project→tasks, folder→files), use the established createModelStore factory.


### Components

#### Library First (🔴 Required)

Always check app-studio-web library before creating custom components

**Rule:** Use app-studio-web components (Button, Input, Card, etc.) before building custom. Only create custom when library does not provide.


### Quality Gate

#### Convention Violation Scanner (🔴 Required)

Active scanning for common violations during code review

**Rule:** Run: grep for fetch(, axios, check forms/ and modals/ locations, verify generated service imports


### Fix Cycles

#### Maximum Fix Cycles (🔴 Required)

Limit re-dispatch attempts to prevent infinite loops

**Rule:** Max 2 fix cycles per quality gate. If still failing after 2 cycles, escalate to APM.


### Architecture

#### Lean Independent Testable Components (🔴 Required)

Every component must be lean, independent, and testable in isolation

**Rule:** Components must: (1) do ONE thing well, (2) have zero coupling to sibling components, (3) be testable without mocking stores or routers. If a component grows beyond ~100 lines, split it.

**✅ Good Examples:**

```
<UserAvatar user={user} /> — self-contained, testable with just a User prop
```

**❌ Bad Examples:**

```
<UserSection /> — 300-line component that fetches, renders, and manages modals
```


#### Minimal Props (🔴 Required)

Components receive ONLY the minimal props they need

**Rule:** Pass only the data a component actually renders. Never pass entire objects when only one field is used. Prefer primitive props over object props when possible.

**✅ Good Examples:**

```
<UserAvatar name={user.name} avatarUrl={user.avatar} />
```

**❌ Bad Examples:**

```
<UserAvatar user={user} config={config} theme={theme} /> — passes entire objects
```


#### No Prop-Drilling (🔴 Required)

Never pass props through intermediate components that do not use them

**Rule:** If a child needs store data, the child (or its direct page parent) reads the store — never drill props through 2+ layers. Pages read stores and pass to direct children only.

**✅ Good Examples:**

```
Page reads store → passes to direct child component
```

**❌ Bad Examples:**

```
Page → Layout → Section → Card → passes userId through 3 layers
```


#### Update Functions in Store Only (🔴 Required)

All mutation/update logic lives in the store, not in hooks or components

**Rule:** Store actions contain all update logic. Components dispatch store actions. Hooks are thin selector wrappers only.

**✅ Good Examples:**

```
useEditorStore.getState().updateCursor(pos)
```

```
const save = useEditorStore(s => s.save)
```

**❌ Bad Examples:**

```
const { data, setData } = useEditorHook() — hook contains update logic
```


#### Thin Hook Wrappers Only (🔴 Required)

Custom hooks must be thin wrappers over store selectors, never god hooks

**Rule:** A custom hook selects specific fields from a store and returns them. Max 5-8 items. NEVER create 50-item "god hooks" that aggregate half the store.

**✅ Good Examples:**

```
const useUserName = () => useUserStore(s => s.name)
```

**❌ Bad Examples:**

```
const useEditor = () => { ...50 fields from store + local state + effects }
```


### Performance

#### Fine-Grained Selectors (🔴 Required)

Minimize re-renders by subscribing only to needed store slices

**Rule:** Always use useStore(s => s.specificField) — NEVER useStore() (subscribes to entire store). Each component selects only the fields it renders.

**✅ Good Examples:**

```
const name = useUserStore(s => s.name)
```

```
const { items, isLoading } = useProjectStore(s => ({ items: s.items, isLoading: s.isLoading }))
```

**❌ Bad Examples:**

```
const store = useUserStore()
```

```
const state = useProjectStore()
```


#### Debounce and Throttle (🔴 Required)

Apply debounce/throttle only where genuinely needed

**Rule:** Debounce search inputs, throttle scroll/drag/resize handlers. Do NOT blanket-debounce all events. If an event fires once per user action (click, submit), no debounce needed.

**✅ Good Examples:**

```
useDebouncedCallback(onSearch, 300) for search input
```

```
throttle(onDrag, 16) for drag handler
```

**❌ Bad Examples:**

```
debounce(onClick, 300) — click events do not need debounce
```


### Performance Gate

#### Performance Review Gate (🔴 Required)

MANDATORY performance checks during Code Review Gate (Gate 5)

**Rule:** At code review, run: (1) grep for whole-store subscriptions, (2) grep for layout store imports, (3) grep for createContext for data, (4) check inline object/function props, (5) check for debug leftovers. Performance review is BLOCKING — ❌ means PR cannot merge.


#### Render Budget Verification (🔴 Required)

Verify render counts on hot-path components

**Rule:** Hot-path components (typing, drag, streaming) must have ≤5 re-renders per interaction. Layout components must have 0 re-renders after mount. List item siblings must not re-render when one item changes.


#### Pyramid Build — 3 Layout Types (🔴 Required)

Enforce pyramid build with 3 structural layout types

**Rule:** 3 layout types: .page.tsx (full page), .modal.tsx (modal), .drawer.tsx (drawer). Each is structural composition only — NO data logic. Supporting files: .store.ts (state + selectors), .requests.ts (API calls), components/ (UI blocks). All structural files MUST have zero store subscriptions.

**✅ Good Examples:**

```
Users.page.tsx + Users.store.ts + Users.requests.ts + components/
```

```
EditUser.modal.tsx registered in src/modals/index.tsx
```

**❌ Bad Examples:**

```
Single UsersPage.tsx with data fetching, state, and components all in one file
```


### Two-Phase Protocol

#### Phase A — Mock-Only Data (🔴 Required)

In Phase A of the Two-Phase Protocol, all data must come from mocks

**Rule:** When working in Phase A (mock-driven frontend), ALL data must come from Debug Studio mock layer: StoreOverrides for Zustand state, MockRequestProvider for service-level mocking, or SeedInterceptor for path-based API mocking. NO real backend calls. Scan: grep for real API base URLs or non-mocked service calls.

**✅ Good Examples:**

```
StoreOverride: { storeId: "projectStore", state: { projects: mockProjects } }
```

```
MockRequest: { service: "ProjectsService", method: "findAll", response: { status: 200, data: [...] } }
```

**❌ Bad Examples:**

```
Calling real API during Phase A
```

```
Hardcoding API URLs
```

```
Using fetch() directly
```


#### Scenario Completeness Gate (🔴 Required)

Phase A requires scenario coverage across at least 5 categories per screen

**Rule:** Each screen created/modified in Phase A MUST have Debug Studio scenarios covering at least 5 of 7 categories: empty, loading, error, success, edge-case (required) + permissions, responsive (optional). Scenarios go in front-startup/src/dev/scenarios/screens/{screen}/. Missing required categories BLOCK Phase A completion.

**✅ Good Examples:**

```
5/5 required categories covered: empty, loading, error, success, edge-case
```

```
Scenarios test all UI states without any real backend
```

**❌ Bad Examples:**

```
Only success scenario — missing empty, loading, error, edge-case
```

```
Scenarios depend on real backend running
```


#### Mock Mode Preservation (🔴 Required)

Mock mode must continue working after Phase B integration

**Rule:** After Phase B (backend implementation), Debug Studio scenarios MUST still render correctly with mock data. Production code must NEVER import from src/dev/. Mock layer is permanent — never removed.


### Governance

#### Aggregate Governance Checklist (🔴 Required)

Team Lead aggregates the governance outputs of every sub-agent into one summary

**Rule:** Every sub-agent must produce a Governance Checklist (changelog entries, screen JSONs, test IDs) as part of its return. TL-Frontend aggregates these into one "Governance Complete: ✅" block listing every artifact touched, and returns it to APM. If any sub-agent skipped the checklist, re-dispatch that sub-agent with explicit governance requirement.


### Code Quality

#### Scoped lint:fix to prevent prettier drift (🔴 Required)

Running project-wide lint:fix reformats 100+ unrelated files, polluting diffs and requiring cleanup commits

**Rule:** When running lint:fix, scope to the specific files created/modified by the current MF. Use: npx prettier --write "src/path/to/files/**/*.{ts,tsx}" instead of npm run lint:fix. If project-wide lint:fix must run (e.g., CI requirement), commit prettier drift as a separate style: commit BEFORE the feature commit to keep feature diffs clean.

