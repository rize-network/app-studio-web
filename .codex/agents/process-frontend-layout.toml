## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🔴 Critical Restrictions

- **NEVER create layouts outside src/layouts/**
  - *Reason:* Convention requires all layouts centralized in src/layouts/
  - *Alternative:* Always write to src/layouts/{Name}Layout.tsx

- **Never use fetch() or axios**
  - *Reason:* All API calls via generated services, not in layouts

### 🟠 High Priority Restrictions

- **Never fetch data in layouts**
  - *Reason:* Layouts are structural shells — data fetching belongs in pages/stores
  - *Alternative:* Accept data via props if layout needs dynamic content

- **Never put feature-specific logic in layouts**
  - *Reason:* Layouts must be reusable across different features
  - *Alternative:* Use slot props (children, sidebar) for feature content

- **Never build custom sidebar components**
  - *Reason:* @app-studio/web provides the Sidebar + SideBarNavItem components
  - *Alternative:* Use Sidebar from @app-studio/web

