## Conventions

### Location

#### Layouts in src/layouts/ ONLY (🔴 Required)

ALL layout components must be placed in src/layouts/

**Rule:** src/layouts/{Name}Layout.tsx or src/layouts/{Name}Layout/ folder

**✅ Good Examples:**

```
src/layouts/AppLayout.tsx
```

```
src/layouts/NavLayout/NavLayout.tsx
```

```
src/layouts/PageLayout.tsx
```

**❌ Bad Examples:**

```
src/components/Layout.tsx
```

```
src/pages/AppLayout.tsx
```


### Library

#### Use app-studio-web layout primitives (🔴 Required)

Use Sidebar, View, Horizontal, Vertical from the library

**Rule:** import { Sidebar } from "@app-studio/web", import { View, Horizontal, Vertical } from "app-studio"


### Structure

#### Slot-based rendering (🔴 Required)

Layouts render content via children or named slot props

**Rule:** Accept children: React.ReactNode and optional slot props (sidebar, header, footer)


### Naming

#### Layout Naming Convention (🔴 Required)

PascalCase with Layout suffix

**Rule:** {Name}Layout.tsx — e.g., AppLayout, NavLayout, DashboardLayout


### Scope

#### Feature-agnostic (🔴 Required)

Layouts are structural shells, not feature containers

**Rule:** No feature-specific logic, data fetching, or state management in layouts

