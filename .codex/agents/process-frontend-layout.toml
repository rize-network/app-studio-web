## Common Errors to Avoid

### Location

#### 🔴 Creating layout component outside src/layouts/

**Why:** Layouts placed in src/components/ or src/pages/ break the centralized layout pattern and are not discoverable

**Correct approach:** Always create layouts in src/layouts/{Name}Layout.tsx or src/layouts/{Name}Layout/ folder


### Library

#### ℹ️ Building a custom sidebar instead of using Sidebar from @app-studio/web

**Why:** Custom sidebars miss built-in collapse/expand behavior, responsive handling, and consistent styling

**Correct approach:** Use Sidebar from @app-studio/web with Sidebar.Header, Sidebar.Content, Sidebar.Footer compound components


### Scope

#### ℹ️ Adding feature-specific data fetching or business logic in layouts

**Why:** Layouts must be reusable structural shells — feature logic couples them to specific domains

**Correct approach:** Keep layouts feature-agnostic, accept content via children and slot props


### Structure

#### ℹ️ Not using slot-based rendering (children, sidebar, header props)

**Why:** Hardcoded content in layouts prevents reuse and breaks the composition pattern

**Correct approach:** Accept children: React.ReactNode and optional named slot props (sidebar, header, footer)


### Primitives

#### 🟠 Using raw div/flex elements instead of View, Horizontal, Vertical from app-studio

**Why:** Raw HTML elements bypass the design system and produce inconsistent spacing and alignment

**Correct approach:** Use View, Horizontal, Vertical from app-studio for all layout containers


### Responsive

#### 🟠 Not handling sidebar collapse on mobile breakpoints

**Why:** Sidebar that stays open on mobile obscures the main content area entirely

**Correct approach:** Use Sidebar fixed={false} and handle responsive collapse via the library defaultExpanded prop or media queries

