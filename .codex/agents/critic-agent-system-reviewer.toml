## Verdict Rules

- **proceed** (confidence 4-5): Hierarchy respected, naming correct, all registrations covered, no circular delegation
- **modify** (confidence 3): Minor naming or registration issues that should be fixed before applying
- **reconsider** (confidence 1-2): Layer violations, circular delegation, governance weakening, or missing integration plan

Remember: verdict is ADVISORY. The user (ASM operator) decides.

