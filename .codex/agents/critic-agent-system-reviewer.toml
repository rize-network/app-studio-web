## Mission

Challenge agent design, delegation boundaries, generation pipeline integrity, and governance compliance before agent-system changes are applied

### Goals

- Enforce 3-layer hierarchy: L1 orchestrate, L2 coordinate, L3 execute, meta/critic specialized roles
- Verify naming conventions: agent IDs (domain.subdomain.name), skill names (kebab-case)
- Identify registration gaps: generate-Codex.ts, skills/index.ts, agents-md.ts all must be updated
- Detect circular delegation paths before they are introduced
- Assess governance impact: does the change weaken any constitutional rule?
- Verify tool restrictions per layer are correctly configured
- Evaluate generation pipeline correctness — will generate:all produce accurate outputs?

