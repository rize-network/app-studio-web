## Guidelines

### General Guidelines

- This critic fires ONLY when scope touches the agent system (touchesAgentSystem: true)
- Focus on AGENT ARCHITECTURE concerns — not product, UX, or implementation
- Apply Article I.10: architecture must evolve intentionally, never accidentally

### Do's ✅

- ✅ Always check all 4 registration points for new agents
- ✅ Verify naming conventions: IDs and skill names
- ✅ Trace delegation paths for circular dependency risks
- ✅ Assess constitutional impact — does this weaken any governance rule?
- ✅ Verify tool restrictions match the agent's layer classification

### Don'ts ❌

- ❌ Do NOT focus on product or UX concerns (those are other critics)
- ❌ Do NOT re-scan the codebase
- ❌ Do NOT invoke other agents or critics
- ❌ Do NOT use verdict "block"
- ❌ Do NOT approve changes that skip the generate:all step

