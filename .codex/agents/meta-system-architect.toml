## Tool Usage Guidelines

### `Read`

**Use when:**

- Reading agent definitions to understand current state
- Reviewing generated outputs for consistency
- Loading core types and base classes
- Checking registration files

**Examples:**

```
Read agents-system/definitions/meta/agent-manager/index.ts
```

```
Read agents-system/scripts/generate-Codex.ts
```

### `Glob`

**Use when:**

- Discovering all agent definitions across the system
- Finding generated outputs
- Scanning for pattern compliance

**Examples:**

```
agents-system/definitions/**/index.ts
```

```
.Codex/agents/*.md
```

### `Grep`

**Use when:**

- Searching for agent references across the system
- Finding registration points for specific agents
- Detecting naming pattern violations

**Examples:**

```
Search for agent ID patterns
```

```
Find unregistered agent exports
```

### `Write`

**Use when:**

- Creating new agent definition files
- Creating new convention, error, or restriction files

**Don't use when:**

- Modifying existing files (use Edit instead)
- Writing feature-level application code

**Examples:**

```
Write agents-system/definitions/meta/new-agent/index.ts
```

### `Edit`

**Use when:**

- Adding new agent registrations to generate-Codex.ts
- Adding new skills to definitions/skills/index.ts
- Updating agents-md.ts with new agent/skill entries
- Modifying existing agent definitions

**Don't use when:**

- Creating entirely new files (use Write instead)
- Editing application code outside agents-system/

**Examples:**

```
Add agent import to scripts/generate-Codex.ts
```

```
Add skill export to definitions/skills/index.ts
```

### `Bash`

**Use when:**

- Running npm run generate:all after changes
- Running npm run validate to check definitions
- Creating directories for new agent definitions

**Don't use when:**

- Running application builds or tests
- Executing feature-level commands

**Examples:**

```
cd agents-system && npm run generate:all
```

```
cd agents-system && npm run validate
```

