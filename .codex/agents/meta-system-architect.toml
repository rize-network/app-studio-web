## Conventions

### Naming

#### Agent ID Format (🔴 Required)

All agent IDs must follow domain.subdomain.name format (lowercase, dots as separators)

**Rule:** meta.agent.manager, not MetaAgentManager or meta_agent_manager


#### Skill Name Format (🔴 Required)

All skill names use lowercase with hyphens

**Rule:** agent-role-manager, not agentRoleManager or agent_role_manager


### Structure

#### Agent Definition Files (🔴 Required)

Each agent lives in its own directory with index.ts, conventions.ts, errors.ts, restrictions.ts

**Rule:** definitions/<category>/<agent-name>/{index,conventions,errors,restrictions}.ts


#### Layer Separation (🔴 Required)

Agents must belong to exactly one layer: orchestration (L1), team-lead (L2), or process (L3)

**Rule:** Never mix layer responsibilities in a single agent


### Architecture

#### Delegation Flow (🔴 Required)

Work flows top-down: APM → Team Leads → Process Sub-Agents. Never skip levels.

**Rule:** APM delegates to Team Leads, Team Leads delegate to Process Sub-Agents


#### Skill Registration (🔴 Required)

Every user-facing agent must have a corresponding skill in definitions/skills/index.ts

**Rule:** Skill must reference agent via createSkillFromAgent()


### Documentation

#### AGENTS.md Sync (🔴 Required)

All agent and skill changes must be reflected in agents-md.ts for AGENTS.md generation

**Rule:** Update agentsMdDefinition after adding/modifying agents or skills


#### Generate After Changes (🔴 Required)

Run npm run generate:all after any agent system modification

**Rule:** Never leave generated files out of sync with definitions


### Evolution

#### Learning Ingestion Protocol (🔴 Required)

Evolution directives from /end must be previewed before applying (Article VI.2)

**Rule:** Always show what will change and get user confirmation before modifying agent definitions. Group related directives. Validate no conflicts with existing rules.


#### Agents Evolve With Code (🔴 Required)

When architecture, patterns, or conventions change in the codebase, affected agent definitions must be updated to stay synchronized

**Rule:** Zero documentation drift — agent knowledge must reflect the actual system state. New patterns get encoded as conventions, mistakes become restrictions, architecture changes update prompts.


### Traceability

#### Codedatabase Changelog After Agent System Evolution (🔴 Required)

After any evolution that modifies agents-system/ files, ASM must create a codedatabase changelog entry file in the relevant feature directory (e.g., codedatabase/features/apm-orchestration/changelog.d/)

**Rule:** Agent system changes are traceable features. Every /asm evolution cycle MUST produce a CLG-{feature-id}-{NNNN}.json entry in codedatabase/features/{relevant-feature}/changelog.d/ with type "refactor" or "enhancement", an accurate summary of what agent definitions changed, and why.


#### Constitution Version Bump Must Be Logged (🔴 Required)

When constitution.ts version is bumped, ASM must include the version change (old version → new version) in the codedatabase changelog summary

**Rule:** Constitution version changes are significant governance events. The changelog summary MUST include the version transition (e.g., "Bumped constitution from v1.2.0 to v1.3.0") alongside the description of what constitutional rules were added, modified, or removed.

