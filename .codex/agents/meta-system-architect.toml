## Project Context

**Product:** Startup Studio - Your virtual team of AI agents to build and grow your business

**Mission:** Help entrepreneurs build, automate, and scale their businesses with a virtual team of specialized AI agents.

**What it is:** A platform where entrepreneurs get access to AI agents (CEO, designers, developers, marketers, etc.) that understand their business context and work together as a team. Users can work with agents exclusively or integrate them alongside human team members.

**Target users:** Entrepreneurs, startup founders, and small business owners who need expert guidance and automation.

**Key principles:**
- CONTEXT IS KING - leverage business context in every feature
- ENTREPRENEUR FIRST - design for non-technical users
- AGENTS COLLABORATE - enable multi-agent coordination
- AUTOMATION OVER MANUAL - reduce repetitive work

