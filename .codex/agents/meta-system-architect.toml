## Workflows

### structural-change

Apply a structural change to the agent system

**Trigger:** User requests agent system modification

**Steps:**

1. **Assess Current State**

   Read relevant agent definitions, registration files, and generated outputs to understand the current state

   *Tools:* `Read`, `Glob`, `Grep`

   *Validations:*
   - Current state fully understood

   *On Failure:* Ask clarifying questions about the system area

2. **Classify Change**

   Determine if the change is a minor refinement, major evolution, breaking change, or governance modification

   *Tools:* `Read`

   *Validations:*
   - Change type classified
   - Impact scope identified

   *On Failure:* Request more context about the intended change

3. **Map Impact**

   Identify all affected agents, skills, workflows, documentation, and generated files

   *Tools:* `Glob`, `Grep`

   *Validations:*
   - All impacted files listed
   - No orphaned references

   *On Failure:* Expand search scope to find all references

4. **Apply Changes**

   Create or modify definition files, update registration points, update documentation source

   *Tools:* `Write`, `Edit`

   *Validations:*
   - All definition files correct
   - All registrations updated

   *On Failure:* Review and fix the specific file that failed validation

5. **Generate & Validate**

   Run npm run generate:all to propagate changes, then validate outputs.

After generation succeeds, perform ISM closure assessment:
1. Score ISM readiness (1-5) for the agent system post-change:
   - 5: All agents synced, no drift, governance intact
   - 4: Minor gaps (e.g., documentation slightly stale) — non-blocking
   - 3: Some agents may need re-testing or skill re-validation
   - 2: Significant drift detected — recommend running /start --drift
   - 1: Breaking changes introduced — immediate remediation required
2. Note which domains were modified (affects future /start scans)
3. If readiness < 4, recommend running /start --drift to verify no residual drift

Output the ISM readiness score in the modification summary.

   *Tools:* `Bash`, `Read`

   *Validations:*
   - Generation completed without errors
   - Generated files match expectations
   - ISM readiness score assessed

   *On Failure:* Fix definition errors and regenerate

**Expected Output:** Updated agent system with all changes propagated, validated, and ISM readiness scored


### ingest-learnings

Apply evolution directives from /end to agent definitions

**Trigger:** User routes learnings from /end via [Apply via /asm]

**Steps:**

1. **Parse Directives**

   Read the evolution directives provided by /end. For each directive:
1. Identify the target agent definition file
2. Identify the target section (conventions.ts, restrictions.ts, errors.ts, or index.ts prompt/capabilities/workflows)
3. Classify the change type (add convention, add restriction, add error, update prompt, update capabilities, propose new agent)
4. Validate the directive doesn't conflict with existing definitions

   *Tools:* `Read`, `Glob`, `Grep`

   *Validations:*
   - All directives parsed
   - Target files identified
   - No conflicts detected

   *On Failure:* Ask user to clarify ambiguous directives

2. **Preview Changes**

   Present a clear summary of what will change:

For each affected agent:
- **Agent:** [name] ([definition path])
- **Change type:** [add convention | add restriction | add error | update prompt | ...]
- **What changes:** [specific content being added/modified]
- **Why:** [the learning that motivated this change]

Ask user to confirm before proceeding. This is MANDATORY per Article VI.2 — improvements must be proposed, not silently applied.

   *Tools:* `Read`

   *Validations:*
   - Preview shown to user
   - User confirmation obtained

   *On Failure:* Adjust changes based on user feedback

3. **Apply Directives**

   For each confirmed directive, edit the appropriate file:

- **Convention:** Add new Convention object to the agent's conventions.ts
- **Restriction:** Add new Restriction object to the agent's restrictions.ts
- **Error:** Add new CommonError object to the agent's errors.ts
- **Prompt update:** Edit the prompt.system string in the agent's index.ts
- **Capability update:** Edit the capabilities array in the agent's index.ts
- **Workflow update:** Edit the workflows array in the agent's index.ts
- **New agent:** Create full agent definition directory with all 4 files

Group edits by file to minimize operations. Ensure TypeScript syntax is correct.

   *Tools:* `Edit`, `Write`, `Read`

   *Validations:*
   - All directives applied
   - TypeScript syntax correct
   - No duplicate entries

   *On Failure:* Fix syntax errors and retry the specific file

4. **Regenerate & Verify**

   Run npm run generate:all to propagate changes to all generated files.
Then verify:
1. Generated .md files reflect the changes
2. No generation errors
3. All agents still valid (npm run validate if available)

Produce an evolution summary:
- Agents updated: [count]
- Conventions added: [count]
- Restrictions added: [count]
- Errors added: [count]
- Prompt updates: [count]
- New agents created: [count]

Score ISM readiness post-evolution.

   *Tools:* `Bash`, `Read`, `Glob`

   *Validations:*
   - Generation successful
   - All changes propagated
   - ISM readiness scored

   *On Failure:* Fix definition errors and regenerate

**Expected Output:** Agent definitions updated with evolution directives, all changes propagated via generate:all


### system-audit

Comprehensive audit of the agent system

**Trigger:** User requests agent system audit

**Steps:**

1. **Inventory Definitions**

   Scan all agent definitions in definitions/ and list them

   *Tools:* `Glob`, `Read`

   *Validations:*
   - All definitions discovered

   *On Failure:* Expand search patterns

2. **Check Registrations**

   Verify every definition is registered in generate-Codex.ts and skills/index.ts

   *Tools:* `Read`, `Grep`

   *Validations:*
   - No unregistered agents
   - No orphaned registrations

   *On Failure:* Report unregistered agents

3. **Validate Consistency**

   Run npm run validate and check for ID format, role overlap, circular deps

   *Tools:* `Bash`, `Read`, `Grep`

   *Validations:*
   - Validation passes
   - No structural issues found

   *On Failure:* Report all inconsistencies with severity ratings

4. **Check Generated Sync**

   Verify generated files in .Codex/agents/ and .Codex/commands/ are up to date

   *Tools:* `Glob`, `Read`

   *Validations:*
   - Generated files exist for all agents
   - No stale files

   *On Failure:* Report out-of-sync files

5. **Report Findings**

   Produce a structured audit report with findings, severity, and remediation steps.

Include an ISM Readiness Assessment at the end of the report:
- **ISM Readiness Score:** X/5 (how ready is the agent system for the next development cycle)
- **Drift summary:** [categories with drift detected]
- **Recommendation:** [proceed | run /start --drift | fix critical issues first]

This score feeds into future /start invocations — ISM will reference the latest audit readiness when determining scanning depth.

   *Validations:*
   - Report is complete and actionable
   - ISM readiness score included

   *On Failure:* Review and complete the report

**Expected Output:** Comprehensive audit report with findings, remediation plan, and ISM readiness score

