## Guidelines

### General Guidelines

- NEVER rush implementations
- ALWAYS design before coding
- Read existing code before making changes
- Follow existing patterns in the codebase
- Operate inside agent-orchestrated system
- Collaborate with Frontend, Infra, QA, and PM agents
- Priority: correctness, safety, clarity, long-term maintainability

### Do's ✅

- ✅ Design schemas before coding
- ✅ Keep Prisma schema readable and documented
- ✅ Use explicit relations and indexes
- ✅ Write safe, reversible migrations
- ✅ Consider data volume and query patterns
- ✅ Validate inputs using DTOs + class-validator
- ✅ Handle partial failures gracefully
- ✅ Use structured error handling
- ✅ Log important events with context
- ✅ Enforce authorization checks
- ✅ Validate ownership and access rights
- ✅ Handle secrets via environment variables
- ✅ Update module documentation after non-trivial tasks
- ✅ Document known failure modes or data risks
- ✅ Create seed data for new features using SeedSpec system (see api-startup/docs/seed.md)
- ✅ Register new seed providers in seed.service.ts and seed.module.ts
- ✅ Use seed.<name>.result.<property> for cross-file references, result.* for same-file steps
- ✅ Match seed params array order to controller/service method parameter order
- ✅ ALWAYS run `cd api-startup && npm run build` after implementation — API MUST compile
- ✅ ALWAYS run `npm run api:local` (from front-startup/) after creating or modifying ANY API endpoint to regenerate frontend API calls
- ✅ ALWAYS run `cd front-startup && npm run build` after api:local to verify frontend still compiles
- ✅ ALWAYS run `npm run seed` after creating or modifying seed files to verify seed data works correctly
- ✅ Treat build verification, API call sync, and seed verification as NON-OPTIONAL steps — never skip them
- ✅ NEVER use `as any` — use proper types, generics, type guards, or `unknown` with narrowing
- ✅ Before returning, run `git diff --name-only` and verify it shows ONLY files on the task's allowlist
- ✅ If auto-format-on-save introduced changes to files outside the allowlist, revert those specific files (git checkout -- <file>) before declaring done

### Don'ts ❌

- ❌ Don't put business logic in controllers
- ❌ Don't use Prisma directly in controllers
- ❌ Don't break existing data without explicit approval
- ❌ Don't trust client input
- ❌ Don't leak internal errors to clients
- ❌ Don't modify shared schemas/configs unless explicitly assigned
- ❌ Don't touch modules owned by other agents
- ❌ Don't create "god tables"
- ❌ Don't skip tests before moving to next gate
- ❌ Don't proceed without story specs (Gate 1)
- ❌ Don't use insecure defaults
- ❌ Don't use `as any` casts — always use proper TypeScript types
- ❌ Don't skip build verification — ALWAYS run `cd api-startup && npm run build` after changes
- ❌ Don't develop or modify API endpoints without running `npm run api:local` afterward to sync frontend calls
- ❌ Don't leave the application in a non-deployable state — both api and front MUST build
- ❌ Don't create or update seed data without running `npm run seed` to verify it works
- ❌ Don't run `npm run lint:fix`, `npm run format`, `prettier --write`, or `eslint --fix` on the whole app unless the task explicitly requests it — it reformats files outside your allowlist
- ❌ Don't run `npm install` / `npm ci` / any lockfile-mutating command unless the task explicitly requests dependency changes

### Best Practices

- One NestJS module per domain
- Controllers handle transport only
- Services contain business logic
- Prisma access isolated in repositories or service layer
- DTOs + validation at the boundary
- APIs must be explicit and predictable
- Use clear HTTP status codes
- Return structured error responses
- Write fewer, meaningful tests over shallow coverage
- Test edge cases: invalid input, missing permissions, concurrency, transactions
- Flag any security risk immediately
- Clarify requirements and assumptions before implementing
- Identify impacted modules, schemas, and endpoints
- Implement incrementally
- Validate with tests or manual checks

