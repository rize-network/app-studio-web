## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🔴 Critical Restrictions

- **Never disable security features**
  - *Reason:* Security features protect the application and user data
  - *Alternative:* Find the root cause and fix it properly

- **Never commit secrets, API keys, or credentials**
  - *Reason:* Exposed secrets can be exploited by attackers
  - *Alternative:* Use environment variables and .env files (add to .gitignore)

- **Never use eval() or Function() constructor with user input**
  - *Reason:* Allows arbitrary code execution
  - *Alternative:* Use safe alternatives like JSON.parse() or specific parsing libraries

- **Never trust user input without validation**
  - *Reason:* Unvalidated input can lead to injection attacks
  - *Alternative:* Always validate using class-validator and DTOs

- **Never expose internal error details to clients**
  - *Reason:* Error messages can reveal system architecture and vulnerabilities
  - *Alternative:* Return generic error messages, log detailed errors server-side

- **Never use raw SQL with string concatenation**
  - *Reason:* Opens door to SQL injection attacks
  - *Alternative:* Use Prisma type-safe queries or parameterized raw queries

- **Never deploy to production without running tests**
  - *Reason:* Can introduce bugs to production
  - *Alternative:* Set up CI/CD pipeline that runs tests automatically

- **Never deploy without environment-specific configuration**
  - *Reason:* Can cause production outages or data leaks
  - *Alternative:* Use environment variables for all environment-specific config

- **Never expose debug endpoints in production**
  - *Reason:* Can leak sensitive information
  - *Alternative:* Disable debug endpoints or protect them with authentication

- **Never return after writing or modifying backend code without producing the Governance Checklist**
  - *Reason:* Article III mandates "No feature without changelog" and Article I.4 requires "Every feature must be traceable". Close Manager repeatedly flags cycles where backend work shipped with no changelog entry, breaking feature traceability.
  - *Alternative:* Before returning, produce a "Governance Complete: ✅" block listing: (1) changelog.d/ entry files created per impacted feature (codedatabase/features/{feature}/changelog.d/CLG-{feature}-{NNNN}.json) with added/changed endpoints under impacted_api, (2) feature.json summary updates if entities/capabilities changed. If truly no feature surface was touched (e.g., pure refactor), say "Governance: N/A" with justification.

- **NEVER run `npm run lint:fix`, `npm run format`, `prettier --write`, `eslint --fix`, or any mass-formatting command unless the task request EXPLICITLY includes it**
  - *Reason:* Phase A MF-005b ran `npm run lint:fix` as a side effect of an .eslintrc.js edit and reformatted 30+ unrelated files plus mutated package-lock.json via `npm install`. APM had to revert twice. The intent of lint:fix looks helpful — the impact is out-of-scope edits that contaminate the PR and risk conflicts with in-flight branches. MF-005a (api-startup side) was spared only because node_modules was not installed in the sandbox; the intent was identical.
  - *Alternative:* Restrict file modifications to the allowlist given in the task. If formatting is truly needed on specific files, run `npx prettier --write <exact files from allowlist>` or `npx eslint --fix <exact files from allowlist>` — never the package.json script. Before returning, run `git diff --name-only` and confirm it matches the allowlist.

- **NEVER run `npm install`, `npm ci`, `pnpm install`, `yarn install`, or any lockfile-mutating command unless the task EXPLICITLY requests dependency changes**
  - *Reason:* Same Phase A incident: `npm install` rewrote package-lock.json (thousands of lines changed). That mutation escaped the task allowlist. Lockfile churn also invalidates CI caches and makes review untrustworthy.
  - *Alternative:* If a dependency is truly missing, STOP and report it — let APM or the user make an explicit decision to add it. Never silently install to unblock your current task.

### 🟠 High Priority Restrictions

- **Never delete data without confirmation or soft delete**
  - *Reason:* Data loss is often irreversible
  - *Alternative:* Implement soft delete with deletedAt field, or require confirmation

- **Never run migrations directly in production without backup**
  - *Reason:* Failed migrations can corrupt production database
  - *Alternative:* Test migrations in staging, backup production before migration

- **Never fetch all records without pagination**
  - *Reason:* Can cause memory issues and slow response times
  - *Alternative:* Always implement pagination with skip/take or cursor-based pagination

- **Never push code without running tests**
  - *Reason:* Breaks CI/CD and may introduce bugs to production
  - *Alternative:* Run npm test before committing, set up pre-commit hooks

- **Never create circular dependencies between modules**
  - *Reason:* Causes import errors and tight coupling
  - *Alternative:* Restructure modules or use forwardRef() as last resort

- **Never change existing API contracts without versioning**
  - *Reason:* Breaks existing clients
  - *Alternative:* Create new API version (v2) or add new optional fields

- **Never return full entities from APIs**
  - *Reason:* May expose sensitive data
  - *Alternative:* Use DTOs to explicitly control response shape

- **Never perform N+1 queries**
  - *Reason:* Causes excessive database load and slow responses
  - *Alternative:* Use Prisma includes or select to fetch related data efficiently

- **Never perform heavy operations synchronously in request handlers**
  - *Reason:* Blocks event loop and makes API unresponsive
  - *Alternative:* Use background jobs (Bull/BullMQ) for heavy operations

- **Never load large files into memory**
  - *Reason:* Can cause out-of-memory errors
  - *Alternative:* Use streams for large file operations

- **Never skip writing tests for critical paths**
  - *Reason:* Increases risk of bugs in production
  - *Alternative:* Write tests for authentication, authorization, payment, data integrity

- **Never deploy database changes without rollback plan**
  - *Reason:* Failed deployments can leave database in inconsistent state
  - *Alternative:* Create rollback migrations, test rollback process

- **Never install packages without checking security**
  - *Reason:* May introduce vulnerabilities
  - *Alternative:* Use npm audit, check package reputation and maintenance status

### 🟡 Medium Priority Restrictions

- **Never expose database IDs that should be private**
  - *Reason:* Sequential IDs can reveal business information
  - *Alternative:* Use UUIDs or CUIDs for public-facing IDs

- **Never use any type unless absolutely necessary**
  - *Reason:* Defeats the purpose of TypeScript type safety
  - *Alternative:* Use proper types, unknown, or create interfaces

- **Never bypass TypeScript errors with @ts-ignore**
  - *Reason:* Hides potential bugs and type issues
  - *Alternative:* Fix the type issue properly or use @ts-expect-error with comment

- **Never use console.log() in production code**
  - *Reason:* Exposes information and clutters logs
  - *Alternative:* Use proper logging library (Winston, Pino) with log levels

- **Never put business logic in controllers**
  - *Reason:* Makes code hard to test and reuse
  - *Alternative:* Move business logic to services

- **Never access database directly from controllers**
  - *Reason:* Violates separation of concerns
  - *Alternative:* Always use services to interact with database

- **Never create God objects/services**
  - *Reason:* Makes code hard to maintain and test
  - *Alternative:* Split large services into smaller, focused services

- **Never use GET requests for state-changing operations**
  - *Reason:* Violates HTTP semantics and can cause issues with caching
  - *Alternative:* Use POST, PUT, PATCH, or DELETE for mutations

- **Never return 200 OK for errors**
  - *Reason:* Confuses clients and violates HTTP standards
  - *Alternative:* Use appropriate error status codes (400, 404, 500, etc.)

- **Never forget to add database indexes**
  - *Reason:* Slow queries on large datasets
  - *Alternative:* Add indexes to frequently queried fields

- **Never share test state between tests**
  - *Reason:* Creates flaky tests
  - *Alternative:* Reset database/state before each test

- **Never write misleading or outdated documentation**
  - *Reason:* Confuses developers and wastes time
  - *Alternative:* Update documentation when code changes, or remove it

- **Never use deprecated packages or APIs**
  - *Reason:* Security vulnerabilities and lack of support
  - *Alternative:* Migrate to supported alternatives

- **Never lock dependency versions too strictly**
  - *Reason:* Prevents security updates
  - *Alternative:* Use ^ for minor/patch updates, test regularly

### ℹ️ Low Priority Restrictions

- **Never commit commented-out code**
  - *Reason:* Clutters codebase and confuses developers
  - *Alternative:* Remove old code, rely on git history if needed

- **Never mix different concerns in the same file**
  - *Reason:* Reduces code maintainability
  - *Alternative:* Follow single responsibility principle, split into multiple files

- **Never expose internal IDs or implementation details in URLs**
  - *Reason:* Creates tight coupling and exposes system internals
  - *Alternative:* Use resource-oriented URLs with meaningful identifiers

- **Never test implementation details**
  - *Reason:* Makes tests brittle and hard to maintain
  - *Alternative:* Test behavior and public interfaces, not internal implementation

- **Never leave TODO comments without creating tickets**
  - *Reason:* TODOs get forgotten
  - *Alternative:* Create tickets for TODOs or fix them immediately

