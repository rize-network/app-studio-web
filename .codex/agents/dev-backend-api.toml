### Environment

#### Env Var Documentation Rule (🔴 Required)

New environment variables must be documented in example.env

**Rule:** Any new ConfigService.getOptional() or ConfigService.get() call for a new env var must be accompanied by an example.env entry in the same commit with a comment explaining its purpose and expected format. This applies especially to security-sensitive keys.

**✅ Good Examples:**

```
// In service: this.configService.get('SESSION_ENCRYPTION_KEY')
// In example.env:
# SESSION_ENCRYPTION_KEY — AES-256 key for session data encryption (base64, 32 bytes)
SESSION_ENCRYPTION_KEY=your-base64-encoded-32-byte-key-here
```

**❌ Bad Examples:**

```
// In service: this.configService.get('SESSION_ENCRYPTION_KEY')
// No example.env entry — other developers don't know the key exists or what format it expects
```


### Tool Context

#### Use BaseTools Context Resolver Helpers (🔴 Required)

When writing tools that extend BaseTools, always use resolver helpers instead of reading ToolContext fields directly

**Rule:** Prefer this.resolveWorkerKey(context), this.resolveActionId(context), and this.resolveWorkflowId(context) over reading context.initiatingWorkerId / context.workerId / context.actionId / context.workflowId directly. The resolvers already traverse the full fallback chain (direct properties, context.metadata.*, context.initiatingWorkerSkill). Reading a single context property and OR-defaulting to "" silently writes empty-but-type-valid strings to downstream create() calls.

**✅ Good Examples:**

```
// ✅ Use the resolver — full fallback chain, no silent empty values
const workerId = this.resolveWorkerKey(context) || '';
if (!workerId) {
  return this.errorResult('Missing workerId in tool context.');
}
```

**❌ Bad Examples:**

```
// ❌ Reading a single context property — misses metadata.*, initiatingWorkerSkill, etc.
const workerId = context?.initiatingWorkerId || '';
// workerId is now '' and will be written to a non-nullable Prisma column.
```


### Architecture

#### Encryption via Prisma Extension (🔴 Required)

Session-related data encryption is handled transparently by the Prisma encryption extension

**Rule:** To encrypt a new JSON field on a Prisma model, add the model/field entry to src/shared/encryption/encrypted-fields.config.ts. Do NOT add manual EncryptionService calls in service methods — the Prisma extension at src/shared/encryption/prisma-encryption.extension.ts handles encryption/decryption automatically.

**✅ Good Examples:**

```
// In encrypted-fields.config.ts — add the model/field:
export const ENCRYPTED_FIELDS: EncryptedFieldsConfig = {
  AdkSession: ['metadata'],
  AdkMessage: ['content', 'toolCalls'],  // ← add new field here
}
// The Prisma extension encrypts on write and decrypts on read automatically.
```

**❌ Bad Examples:**

```
// In a service file — NEVER do this:
const encrypted = await this.encryptionService.encrypt(sensitiveData)
await this.prisma.adkSession.update({ data: { metadata: encrypted } })
// Manual EncryptionService calls bypass the extension and break consistency.
```


### Diagnostics

#### Throw Diagnostic Errors on Empty Upstream Data (🔴 Required)

When a workflow step finds its upstream input empty or malformed, throw an error with the actual shape — never return silently with a zero-count

**Rule:** If a service method depends on data from a prior step and the expected field is missing/empty, throw an Error whose message contains the actual shape of the input (top keys, presence of .json/.output, ResultRef status, AI response preview). Silent empty-returns delay root-cause discovery by days — we observed this in the roadmap workflow where generateKeyResults silently returned count=0 for weeks before diagnostic errors exposed the real bug.

**✅ Good Examples:**

```
if (!objectivesForKR.length) {
  const ms = inputs.generateMilestones as Record<string, unknown> | undefined;
  throw new Error(JSON.stringify({
    reason: 'no objectives received from generateMilestones',
    shape: typeof ms === 'object' ? Object.keys(ms || {}) : typeof ms,
    has_json: !!ms?.json,
    has_output: !!ms?.output,
    is_resultRef: !!ms?.__resultRef,
  }));
}
```

**❌ Bad Examples:**

```
// Silent empty-return hides the real bug:
if (!objectivesForKR.length) {
  this.logger.warn('No objectives');
  return { json: { keyResultsForTasks: [], count: 0 } };
}
```


### TypeScript Safety

#### No as any Casts (🔴 Required)

TypeScript `as any` casts are forbidden in application source code (src/**)

**Rule:** NEVER use `as any` in NestJS services, controllers, DTOs, or modules. Use the actual Prisma model type, the generated DTO, a generic parameter, or `unknown` with a type guard. `as any` hides real type mismatches and propagates unsafety into callers.

**✅ Good Examples:**

```
return result as unknown as ExpectedType  // narrowed with a prior type guard
```

```
const dto = plainToClass(CreateUserDto, body)  // proper typed transformation
```

**❌ Bad Examples:**

```
return result as any  // FORBIDDEN — hides actual type mismatch
```

```
const payload = jwt.verify(token) as any  // FORBIDDEN — use a typed overload or guard
```


