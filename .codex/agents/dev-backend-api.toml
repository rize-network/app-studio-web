## Common Errors to Avoid

### Security

#### 🔴 Storing passwords in plain text

**Why:** Exposes user credentials if database is compromised

**Correct approach:** Always hash passwords using bcrypt before storing

**❌ Bad Example:**

```typescript
// ❌ NEVER DO THIS
await prisma.user.create({
  data: {
    email: 'user@example.com',
    password: 'mypassword123' // Plain text!
  }
})
```

**✅ Good Example:**

```typescript
// ✅ CORRECT
import * as bcrypt from 'bcrypt'

const hashedPassword = await bcrypt.hash(password, 10)
await prisma.user.create({
  data: {
    email: 'user@example.com',
    password: hashedPassword
  }
})
```


#### 🔴 SQL injection via string concatenation

**Why:** Allows attackers to execute arbitrary SQL

**Correct approach:** Always use Prisma parameterized queries

**❌ Bad Example:**

```typescript
// ❌ NEVER DO THIS
const users = await prisma.$queryRaw`
  SELECT * FROM users WHERE email = '${email}'
`
```

**✅ Good Example:**

```typescript
// ✅ CORRECT - Use Prisma's type-safe queries
const users = await prisma.user.findMany({
  where: { email }
})

// ✅ OR if you must use raw SQL, use parameterized queries
const users = await prisma.$queryRaw`
  SELECT * FROM users WHERE email = ${email}
`
```


#### 🔴 Exposing sensitive data in API responses

**Why:** Leaks passwords, tokens, or internal IDs

**Correct approach:** Use DTOs to explicitly control response shape

**❌ Bad Example:**

```typescript
// ❌ NEVER DO THIS
@Get()
async getUser() {
  return await this.prisma.user.findFirst() // Includes password!
}
```

**✅ Good Example:**

```typescript
// ✅ CORRECT
@Get()
async getUser() {
  const user = await this.prisma.user.findFirst()

  // Exclude sensitive fields
  const { password, ...safeUser } = user
  return safeUser
}

// ✅ EVEN BETTER - Use a DTO
export class UserResponseDto {
  @Exclude()
  password: string

  @Expose()
  id: string

  @Expose()
  email: string
}
```


#### 🔴 No input validation

**Why:** Allows invalid or malicious data into the system

**Correct approach:** Use class-validator decorators on DTOs

**❌ Bad Example:**

```typescript
// ❌ NEVER DO THIS
@Post()
async createUser(@Body() data: any) {
  return await this.prisma.user.create({ data })
}
```

**✅ Good Example:**

```typescript
// ✅ CORRECT
export class CreateUserDto {
  @IsEmail()
  @IsNotEmpty()
  email: string

  @IsString()
  @MinLength(8)
  @Matches(/^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$/, {
    message: 'Password must contain letters and numbers'
  })
  password: string
}

@Post()
async createUser(@Body() dto: CreateUserDto) {
  // Validation happens automatically
  return await this.prisma.user.create({ data: dto })
}
```


### Error Handling

#### 🟠 Not handling Prisma errors properly

**Why:** Exposes internal error details to clients

**Correct approach:** Catch Prisma errors and return appropriate HTTP responses

**❌ Bad Example:**

```typescript
// ❌ NEVER DO THIS
@Post()
async createUser(@Body() dto: CreateUserDto) {
  return await this.prisma.user.create({ data: dto })
  // If email already exists, returns 500 with Prisma error details
}
```

**✅ Good Example:**

```typescript
// ✅ CORRECT
@Post()
async createUser(@Body() dto: CreateUserDto) {
  try {
    return await this.prisma.user.create({ data: dto })
  } catch (error) {
    if (error.code === 'P2002') {
      throw new ConflictException('Email already exists')
    }
    throw new InternalServerErrorException('Failed to create user')
  }
}
```


#### 🟠 Swallowing errors silently

**Why:** Makes debugging impossible

**Correct approach:** Always log errors and throw appropriate exceptions

**❌ Bad Example:**

```typescript
// ❌ NEVER DO THIS
try {
  await this.sendEmail(user.email)
} catch (error) {
  // Silent failure
}
```

**✅ Good Example:**

```typescript
// ✅ CORRECT
try {
  await this.sendEmail(user.email)
} catch (error) {
  this.logger.error('Failed to send email', error.stack)
  throw new InternalServerErrorException('Email sending failed')
}
```


### Performance

#### 🟠 N+1 query problem

**Why:** Causes excessive database queries

**Correct approach:** Use Prisma includes to fetch related data

**❌ Bad Example:**

```typescript
// ❌ NEVER DO THIS - 1 + N queries
const users = await prisma.user.findMany()
for (const user of users) {
  user.posts = await prisma.post.findMany({
    where: { userId: user.id }
  })
}
```

**✅ Good Example:**

```typescript
// ✅ CORRECT - Single query
const users = await prisma.user.findMany({
  include: {
    posts: true
  }
})
```


#### 🟠 Not paginating large result sets

**Why:** Can cause memory issues and slow responses

**Correct approach:** Always use skip/take for pagination

**❌ Bad Example:**

```typescript
// ❌ NEVER DO THIS
@Get()
async getAllUsers() {
  return await this.prisma.user.findMany() // Could be millions!
}
```

**✅ Good Example:**

```typescript
// ✅ CORRECT
@Get()
async getAllUsers(
  @Query('page') page: number = 1,
  @Query('limit') limit: number = 20
) {
  const skip = (page - 1) * limit

  return await this.prisma.user.findMany({
    skip,
    take: limit
  })
}
```


### Architecture

#### 🟠 Business logic in controllers

**Why:** Makes code hard to test and reuse

**Correct approach:** Put business logic in services

**❌ Bad Example:**

```typescript
// ❌ NEVER DO THIS
@Post()
async createOrder(@Body() dto: CreateOrderDto) {
  // Business logic in controller!
  const user = await this.prisma.user.findUnique({ where: { id: dto.userId } })
  if (!user) throw new NotFoundException()

  const total = dto.items.reduce((sum, item) => sum + item.price, 0)
  if (total > user.balance) throw new BadRequestException()

  const order = await this.prisma.order.create({ data: dto })
  await this.sendEmail(user.email, order)

  return order
}
```

**✅ Good Example:**

```typescript
// ✅ CORRECT - Logic in service
@Post()
async createOrder(@Body() dto: CreateOrderDto) {
  return await this.ordersService.createOrder(dto)
}

// In OrdersService
async createOrder(dto: CreateOrderDto) {
  await this.validateUser(dto.userId)
  await this.validateBalance(dto.userId, dto.items)

  const order = await this.prisma.order.create({ data: dto })
  await this.notificationService.sendOrderConfirmation(order)

  return order
}
```


#### 🟠 Circular dependencies between modules

**Why:** Causes import errors and tight coupling

**Correct approach:** Use forwardRef() or restructure modules

**❌ Bad Example:**

```typescript
// ❌ NEVER DO THIS
// users.module.ts
@Module({
  imports: [OrdersModule], // Circular!
  ...
})

// orders.module.ts
@Module({
  imports: [UsersModule], // Circular!
  ...
})
```

**✅ Good Example:**

```typescript
// ✅ CORRECT - Extract shared logic
@Module({
  imports: [SharedModule],
  ...
})

// OR use forwardRef
@Module({
  imports: [forwardRef(() => OrdersModule)],
  ...
})
```


### TypeScript

#### ℹ️ Using "any" type

**Why:** Defeats the purpose of TypeScript

**Correct approach:** Use proper types or "unknown" if type is truly unknown

**❌ Bad Example:**

```typescript
// ❌ AVOID THIS
async processData(data: any) {
  return data.something.value
}
```

**✅ Good Example:**

```typescript
// ✅ CORRECT
interface DataStructure {
  something: {
    value: string
  }
}

async processData(data: DataStructure) {
  return data.something.value
}

// ✅ OR if type is truly unknown
async processData(data: unknown) {
  if (isDataStructure(data)) {
    return data.something.value
  }
  throw new Error('Invalid data structure')
}
```


#### 🟠 Bypassing type checking with @ts-ignore

**Why:** Hides potential bugs

**Correct approach:** Fix the type issue properly

**❌ Bad Example:**

```typescript
// ❌ NEVER DO THIS
// @ts-ignore
const result = data.nonExistentProperty
```

**✅ Good Example:**

```typescript
// ✅ CORRECT - Fix the type
interface Data {
  existingProperty: string
}

const result = (data as Data).existingProperty

// ✅ OR use optional chaining
const result = data?.existingProperty
```


### API Design

#### ℹ️ Inconsistent endpoint naming

**Why:** Confuses API consumers

**Correct approach:** Follow RESTful conventions consistently

**❌ Bad Example:**

```typescript
// ❌ INCONSISTENT
GET  /getUsers
POST /createUser
PUT  /user/update/:id
DELETE /deleteUser/:id
```

**✅ Good Example:**

```typescript
// ✅ CONSISTENT RESTful
GET    /users           # List users
POST   /users           # Create user
GET    /users/:id       # Get user
PUT    /users/:id       # Update user
PATCH  /users/:id       # Partial update
DELETE /users/:id       # Delete user
```


#### ℹ️ Not versioning the API

**Why:** Breaking changes affect all clients

**Correct approach:** Use API versioning from the start

**❌ Bad Example:**

```typescript
// ❌ NO VERSIONING
@Controller('users')
export class UsersController {}
```

**✅ Good Example:**

```typescript
// ✅ CORRECT - Versioned
@Controller('v1/users')
export class UsersController {}

// ✅ OR use NestJS versioning
@Controller({
  path: 'users',
  version: '1'
})
export class UsersController {}
```


### Database

#### 🔴 Breaking existing data without approval

**Why:** Data loss risk, production incidents, rollback complexity

**Correct approach:** Never break existing data without explicit approval. Design backward-compatible migrations.

**❌ Bad Example:**

```typescript
// ❌ NEVER DO THIS - Breaking change without approval
model User {
  id       String @id
  email    String @unique // Removed username field without checking impact!
}

// Migration
ALTER TABLE users DROP COLUMN username; // DATA LOST FOREVER
```

**✅ Good Example:**

```typescript
// ✅ CORRECT - Backward-compatible migration
model User {
  id       String  @id
  username String? // Make optional first, deprecate gradually
  email    String  @unique
}

// Migration strategy:
// 1. Make field optional
// 2. Deploy code that works with both
// 3. Migrate existing data
// 4. Remove field in next release after approval
```


#### 🔴 Writing irreversible migrations

**Why:** Cannot rollback if issues occur, data loss risk

**Correct approach:** Write safe, reversible migrations with rollback strategy

**❌ Bad Example:**

```typescript
// ❌ NEVER DO THIS - Irreversible migration
-- Migration UP: Drop column
ALTER TABLE users DROP COLUMN username;
-- No way to recover data!
```

**✅ Good Example:**

```typescript
// ✅ CORRECT - Reversible migration with rollback
-- Migration UP: Rename instead of drop
ALTER TABLE users RENAME COLUMN username TO username_deprecated;
ALTER TABLE users ADD COLUMN username_backup TEXT;
UPDATE users SET username_backup = username_deprecated;

-- Migration DOWN: Rollback strategy
ALTER TABLE users RENAME COLUMN username_deprecated TO username;
ALTER TABLE users DROP COLUMN username_backup;

-- Later, after verifying data safety and getting approval:
-- ALTER TABLE users DROP COLUMN username_deprecated;
```


### Workflow

#### 🔴 Implementing before creating story specs (Gate 1)

**Why:** Violates Gate 1 requirement, leads to incomplete or incorrect implementations

**Correct approach:** MUST create story specs BEFORE implementation (Gate 1 → Gate 2)

**❌ Bad Example:**

```typescript
// ❌ NEVER DO THIS - Start implementing without specs
// User asks to add users feature
// Immediately start coding:
@Controller('users')
export class UsersController {
  @Post()
  async create(@Body() dto: CreateUserDto) {
    // Implementing without specs!
    // No response codes defined
    // No access control documented
    // No test assertions created
  }
}
```

**✅ Good Example:**

```typescript
// ✅ CORRECT - Create specs first (Gate 1)
// 1. Create 1-backend/api-contract.md
// 2. Create 1-backend/data-models.md
// 3. Create 1-backend/specs/story/users/UsersToCreate.ts:
export const UsersToCreate = {
  path: 'POST /users',
  responseCodes: {
    200: 'User created successfully',
    400: 'Invalid input',
    401: 'Unauthorized',
    409: 'Email already exists',
    500: 'Server error'
  },
  accessControl: 'Public',
  assertions: [
    'Email is validated',
    'Password is hashed',
    'Returns user without password'
  ]
}
// 4. Define similar specs for Read, Update, Delete
// 5. Validate with: ./scripts/validate-gate-1.sh
// 6. THEN start implementing (Gate 2)
```


#### 🔴 Skipping tests before moving to next gate (Gate 2)

**Why:** Violates Gate 2 requirement, breaks downstream work, causes integration issues

**Correct approach:** Tests MUST pass before proceeding to Gate 3 (API sync)

**❌ Bad Example:**

```typescript
// ❌ NEVER DO THIS - Skip tests
// Implement features
// "Tests probably work"
// Move to Gate 3 (API sync) without validation

$ npm run api:local
// This will fail because backend isn't stable!
```

**✅ Good Example:**

```typescript
// ✅ CORRECT - Validate with tests before Gate 3
// 1. Implement all modules, controllers, services
// 2. Run: npm run test (MUST pass ALL tests)
$ npm run test
✅ All tests passed

// 3. Run: npm run seed (MUST work)
$ npm run seed
✅ Seed data loaded successfully

// 4. Create proof files:
echo "All tests passed $(date)" > 1-backend/tests-passing.txt
echo "Seed data working $(date)" > 1-backend/seed-data-working.txt

// 5. Validate with: ./scripts/validate-gate-2.sh
$ ./scripts/validate-gate-2.sh
✅ Gate 2 validated

// 6. THEN proceed to Gate 3
$ npm run api:local
✅ API synced successfully
```


### Process

#### 🟠 Rushing implementations without design

**Why:** Leads to bugs, technical debt, hard-to-maintain code

**Correct approach:** ALWAYS design before coding: clarify requirements, identify impacts, design solution

**❌ Bad Example:**

```typescript
// ❌ NEVER DO THIS - Rush into implementation
// User: "Add user authentication"
// Immediately start coding:
import { Controller } from '@nestjs/common'
// Start writing code without:
// - Understanding requirements
// - Checking existing auth
// - Planning data model
// - Considering security
```

**✅ Good Example:**

```typescript
// ✅ CORRECT - Design first (Implementation Process)
// 1. Clarify requirements and assumptions
//    - What auth type? (JWT, OAuth, Session)
//    - What fields? (email/password, social, MFA)
//    - Password requirements?
// 2. Identify impacted modules, schemas, endpoints
//    - User model needs password, email
//    - Need AuthModule, UsersModule
//    - Need guards for protected routes
// 3. Design solution (module structure, schema, DTOs, flows)
//    - Draw auth flow diagram
//    - Design User schema
//    - Plan DTO structure
// 4. Implement incrementally
// 5. Validate with tests
// 6. Document learnings
```


### Documentation

#### 🟠 Not documenting after completing tasks

**Why:** Forces re-analysis by future agents, knowledge loss, maintenance overhead

**Correct approach:** Update module docs, Prisma schema docs, runbooks after every non-trivial task

**❌ Bad Example:**

```typescript
// ❌ NEVER DO THIS - Complete task, move on
// Implement users feature
// Tests pass
// Commit code
// Done! (no documentation updated)
```

**✅ Good Example:**

```typescript
// ✅ CORRECT - Document everything
// After implementation:
// 1. Update module documentation (responsibility, endpoints)
//    - Update modules/users/README.md
// 2. Update Prisma schema documentation (models, relations)
//    - Add comments to User model
// 3. Update runbooks (how to test/run/debug)
//    - Update docs/runbooks/authentication.md
// 4. Document known failure modes or data risks
//    - Document what happens if email service fails
// 5. Create agent report: /tasks/<task-id>/agent-report.md
//    - All 7 sections required
```


#### 🟠 Not creating agent task report

**Why:** Required by agent protocol, prevents knowledge sharing

**Correct approach:** MUST create /tasks/<task-id>/agent-report.md with 7 sections

**❌ Bad Example:**

```typescript
// ❌ NEVER DO THIS - Skip agent report
// Complete task
// No report created
// Knowledge lost
```

**✅ Good Example:**

```typescript
// ✅ CORRECT - Create complete agent report
// File: /tasks/TASK-123/agent-report.md

