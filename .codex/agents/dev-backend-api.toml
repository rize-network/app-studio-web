### Workflow i18n

#### Workflow Action i18n Keys (🔴 Required)

Every i18n key used in workflow action.ts files MUST exist in both en.ts and fr.ts locale files

**Rule:** When creating or modifying a workflow action.ts file, add ALL referenced i18n keys to api-startup/src/locales/en.ts and api-startup/src/locales/fr.ts. Keys follow dot-notation: domain.subDomain.category.keyName (e.g., ads.steps.createAds.title). Every key referenced via t?.("key") or this.i18n.t("key") MUST have a corresponding entry.

**✅ Good Examples:**

```
// In action.ts:
name: t?.('ads.strategy.action.name') || 'Ad Campaign Strategy',
steps: [{
  title: t?.('ads.strategy.steps.generateApproach.title') || 'Generate Approach',
  description: t?.('ads.strategy.steps.generateApproach.description') || 'Create campaign approaches',
}]

// In en.ts — MUST have matching keys:
ads: {
  strategy: {
    action: { name: 'Ad Campaign Strategy' },
    steps: {
      generateApproach: {
        title: 'Generate Approach',
        description: 'Create campaign approaches',
      },
    },
  },
}

// In fr.ts — MUST also have matching keys:
ads: {
  strategy: {
    action: { name: 'Stratégie de campagne publicitaire' },
    steps: {
      generateApproach: {
        title: 'Générer une approche',
        description: 'Créer des approches de campagne',
      },
    },
  },
}
```

**❌ Bad Examples:**

```
// In action.ts — uses i18n keys:
name: t?.('ads.strategy.action.name') || 'Ad Campaign Strategy',

// In en.ts — NO ads section exists!
// Result: "No translation found for key ads.strategy.action.name in fallback locale en"
```


### Workflow Item Persistence

#### Use CommonService for Item Writes (🔴 Required)

Workflow services MUST use CommonService methods for writing Items and ItemJsons instead of raw Prisma creates

**Rule:** NEVER use prisma.item.create(), prisma.itemText.create(), or prisma.itemJson.create() directly in workflow services. Use CommonService methods: handleTextItem(), handleJsonItem(), handleItemWithJsons(). These handle upsert logic (find-existing → update if exists, create if not), preventing ConflictException errors during re-runs and reseeds.

**✅ Good Examples:**

```
// ✅ CORRECT — Use CommonService for text items
await this.commonService.handleTextItem({
  userId, projectId, taskId,
  name: 'strategyReport',
  view: 'markdown',
  title: 'Strategy Report',
  text: generatedContent,
});

// ✅ CORRECT — Use CommonService for JSON items
await this.commonService.handleJsonItem({
  userId, projectId, taskId,
  name: 'campaignCalendar',
  view: 'calendar',
  title: 'Campaign Calendar',
  content: calendarData,
});
```

**❌ Bad Examples:**

```
// ❌ NEVER DO THIS — Raw Prisma creates in workflow services
const item = await this.prisma.item.create({
  data: { view: 'text', itemType: 'workflow', ownerId: projectId, ... }
});
await this.prisma.itemText.create({
  data: { itemId: item.id, text: content, ... }
});
// Throws ConflictException on re-run if item already exists!

// ❌ NEVER DO THIS — Raw ItemJson creates
await this.prisma.itemJson.create({
  data: { itemId: item.id, content: jsonData, ... }
});
// Fails on re-run with duplicate key constraint!
```


