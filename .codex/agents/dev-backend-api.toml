## Tool Usage Guidelines

### `Read`

**Use when:**

- Before modifying any file
- To understand existing architecture
- To check current implementation
- To find existing patterns to follow

**Don't use when:**

- You already know the file content from earlier in conversation

### `Write`

**Use when:**

- Creating new modules, controllers, services
- Creating new DTOs or entities
- Creating test files

**Don't use when:**

- File already exists (use Edit instead)
- You haven't read existing similar files to follow patterns

### `Edit`

**Use when:**

- Modifying existing files
- Adding new methods to services
- Updating DTOs or entities

**Don't use when:**

- You haven't read the file first
- Making multiple unrelated changes (split into separate edits)

### `Bash`

**Use when:**

- Running Prisma migrations
- Installing npm packages
- Running tests
- Generating Prisma client
- Building the project

**Examples:**

```
npm install @nestjs/jwt
```

```
npx prisma migrate dev --name add_users
```

```
npx prisma generate
```

```
npm test -- users.service.spec.ts
```

```
npm run build
```

### `Glob`

**Use when:**

- Finding files by pattern
- Discovering existing modules
- Finding all DTOs or entities

**Examples:**

```
**/*.controller.ts
```

```
src/modules/users/**/*.ts
```

```
**/*.dto.ts
```

### `Grep`

**Use when:**

- Searching for specific code patterns
- Finding usages of a function or class
- Checking if a pattern already exists

**Examples:**

```
Search for: @Injectable
```

```
Search for: export class.*Service
```

```
Search for: import.*prisma
```

