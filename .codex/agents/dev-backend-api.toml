### Artifact Generation Rules

#### Input Validation Before Generation (🔴 Required)

Every artifact generation must validate its inputs first

**Rule:** Every artifact generation MUST validate inputs before generating. Never generate an artifact from unvalidated or missing input.

**✅ Good Examples:**

```
Validate prompt length, required fields, and format before calling generation
```

```
Return clear validation error messages when inputs are invalid
```

**❌ Bad Examples:**

```
Passing raw user input directly to generation without validation
```

```
Silently ignoring missing required fields
```


#### Quality Metadata on Delivery (🔴 Required)

Every artifact must include quality metadata when delivered

**Rule:** Every artifact MUST include quality metadata (quality score, quality status, tier used) on delivery

**✅ Good Examples:**

```
Attach qualityScore, qualityStatus, and qualityTier to the artifact response
```

**❌ Bad Examples:**

```
Delivering an artifact without any quality metadata
```

```
Delivering with quality metadata only in logs but not in the response
```


#### No Auto-Injected Enterprise Context (🔴 Required)

Tools must not auto-inject enterprise context; agents provide it via parameters

**Rule:** Tools must NOT auto-inject enterprise context (project info, brand guidelines, etc.). Agents provide all necessary context explicitly via tool parameters.

**✅ Good Examples:**

```
Tool receives brandGuidelines as a parameter from the agent
```

```
Agent explicitly passes projectContext to the tool call
```

**❌ Bad Examples:**

```
Tool fetches enterprise context from DB on its own
```

```
Tool has hardcoded enterprise defaults
```


#### One Artifact Per Tool Call (🔴 Required)

Each tool call produces exactly one artifact unless explicitly batched

**Rule:** One artifact per tool call unless explicitly batched. Do not combine unrelated artifact generations into a single call.

**✅ Good Examples:**

```
generateImage({ prompt: "hero banner" }) — produces one image
```

```
generateBatch({ items: [...] }) — explicitly batched
```

**❌ Bad Examples:**

```
generateImage({ prompt: "hero banner AND also a logo" }) — two artifacts in one call
```


#### Use Existing Tool Patterns (🔴 Required)

New tools must follow the established BaseTools + @Tool decorator pattern

**Rule:** New tools MUST extend BaseTools and use the @Tool decorator. Follow the patterns established in existing tool files.

**✅ Good Examples:**

```
export class MyTools extends BaseTools { @Tool(...) async myMethod() { ... } }
```

**❌ Bad Examples:**

```
export function myTool() { ... } — standalone function without BaseTools
```

```
Creating a new tool base class instead of using the existing one
```


#### Media Generation Pipeline (🔴 Required)

Media generation must follow the full security and quality pipeline

**Rule:** Media generation (images, videos) must go through the full pipeline: prompt sanitization → content moderation → credit check → generation → storage

**✅ Good Examples:**

```
sanitizePrompt(input) → moderateContent(sanitized) → checkCredits(user) → generate(moderated) → store(result)
```

**❌ Bad Examples:**

```
Calling generation API directly without sanitization
```

```
Skipping content moderation step
```

```
Generating without credit check
```


### Workflow Conventions

#### Event-Driven Workflow Pattern (🔴 Required)

Workflow services use event-driven pattern with @OnEvent decorator

**Rule:** Workflow services MUST extend the event-driven pattern and use @OnEvent decorator for step transitions

**✅ Good Examples:**

```
@OnEvent('workflow.step.completed')
async handleStepCompleted(payload: StepCompletedPayload) { ... }
```

**❌ Bad Examples:**

```
Using direct method calls between workflow steps instead of events
```

```
Polling for step completion instead of using event-driven pattern
```


#### Task Dependencies via Connect (🔴 Required)

Workflow tasks define dependencies using the connect object

**Rule:** Workflow tasks MUST define their dependencies via the `connect` object so the coordinator can resolve execution order


#### Progress Tracking via Task Entity (🔴 Required)

Workflow progress is tracked via the Task entity

**Rule:** Workflow progress MUST be tracked via the Task entity using status, progress (0-100), and progressMessage fields

**✅ Good Examples:**

```
await this.updateTask(taskId, { status: 'in_progress', progress: 50, progressMessage: 'Generating image...' })
```

**❌ Bad Examples:**

```
Using console.log for progress tracking
```

```
Not updating progress during long-running operations
```


#### Page Workflow Interface (🔴 Required)

Page workflows implement IPageWorkflowSteps

**Rule:** Page-level workflows (multi-step user-facing flows) MUST implement the IPageWorkflowSteps interface


#### Action Workflow Interface (🔴 Required)

Action workflows implement IWorkflowServiceSteps

**Rule:** Action-level workflows (single-action operations) MUST implement the IWorkflowServiceSteps interface


#### Visible Quality Checks (🔴 Required)

Quality checks should be visible workflow steps, not hidden

**Rule:** Quality checks MUST be visible workflow steps with progress tracking so users can see quality validation happening. Do not hide quality checks in background processes.

**✅ Good Examples:**

```
Step 4 of 6: 'Reviewing artifact quality...' (progress: 67%)
```

**❌ Bad Examples:**

```
Running quality check silently after delivery
```

```
Hiding quality validation from the user
```


### Artifact Quality

#### Quality Log Entity (🔴 Required)

Quality logs are stored in the artifactQualityLog entity

**Rule:** All artifact quality assessments MUST be stored in the artifactQualityLog entity. See codedatabase/features/artifact-quality-workflow/ for the feature spec.


#### Three Quality Tiers (🔴 Required)

Artifacts are processed through one of three quality tiers based on risk level

**Rule:** Every artifact MUST be assigned a quality tier: fast (low risk), standard (medium risk), or production (high risk). The tier determines the quality pipeline stages.

**✅ Good Examples:**

```
Internal draft image → fast tier
```

```
Customer-facing landing page → standard tier
```

```
Production marketing video → production tier
```

**❌ Bad Examples:**

```
Using the same quality pipeline for all artifacts regardless of risk
```

```
Skipping tier assignment
```


#### Fast Tier Pipeline (🔴 Required)

Fast tier (low risk): 3 stages

**Rule:** Fast tier pipeline: validate → generate → deliver. Use for low-risk, internal, or draft artifacts.


#### Standard Tier Pipeline (🔴 Required)

Standard tier (medium risk): 5 stages

**Rule:** Standard tier pipeline: validate → guidelines check → generate → quick review → deliver. Use for medium-risk, user-facing artifacts.


#### Production Tier Pipeline (🔴 Required)

Production tier (high risk): 6 stages

**Rule:** Production tier pipeline: validate → guidelines check → criteria check → generate → full review → deliver. Use for high-risk, production-grade artifacts.


#### Quality Score Range (🔴 Required)

Quality scores use a 0-100 scale

**Rule:** Quality score MUST be in the range 0-100


#### Quality Status Thresholds (🔴 Required)

Quality status is derived from the quality score

**Rule:** Quality status thresholds: pass (score >= 80), pass_with_warnings (score 60-79), fail (score < 60)

**✅ Good Examples:**

```
score: 85 → status: 'pass'
```

```
score: 72 → status: 'pass_with_warnings'
```

```
score: 45 → status: 'fail'
```


#### Failed Quality Blocks Delivery (🔴 Required)

Artifacts with fail quality status must not be delivered without user override

**Rule:** Artifacts with quality status "fail" (score < 60) MUST NOT be delivered without explicit user override. Prompt the user with the quality report and ask for confirmation.

**✅ Good Examples:**

```
Quality score: 45/100 (fail). Showing quality report to user and asking for override confirmation.
```

**❌ Bad Examples:**

```
Delivering a failed-quality artifact silently
```

```
Auto-retrying without telling the user about the quality failure
```


### Artifact Type Conventions

#### Code Artifacts: Repo Conventions (🔴 Required)

Code artifacts must follow the repository conventions for their target

**Rule:** Code artifacts MUST follow repo conventions: backend code follows NestJS patterns (modules, controllers, services, DTOs, Prisma); frontend code follows React/TypeScript patterns (components, hooks, stores, generated services)


#### Code Artifacts: Minimal Tests (🔴 Required)

Code artifacts should include minimal tests when relevant

**Rule:** Code artifacts MUST include minimal tests when the generated code includes business logic or API endpoints. Tests are not required for trivial boilerplate.

**✅ Good Examples:**

```
Generated service with a unit test for the core logic
```

```
Generated controller with a story spec for the endpoint
```

**❌ Bad Examples:**

```
Generated complex service with no tests at all
```

```
Writing exhaustive tests for trivial getter methods
```


#### Code Artifacts: No Overengineering (🟡 Recommended)

Code artifacts must avoid overengineering

**Rule:** Code artifacts MUST avoid overengineering. Generate the simplest solution that meets the requirements. Do not add abstractions, patterns, or features that are not needed.


#### Code Artifacts: Frontend Constraints (🔴 Required)

Frontend code artifacts have specific structural constraints

**Rule:** Frontend code artifacts: NO fetch/axios (use generated services only), forms MUST go in src/forms/, modals MUST go in src/modals/ and be registered in src/modals/index.tsx

**✅ Good Examples:**

```
import { UsersService } from "src/services/api"
```

```
src/forms/CreateProjectForm.tsx
```

```
src/modals/ConfirmDeleteModal.tsx + registered in src/modals/index.tsx
```

**❌ Bad Examples:**

```
await fetch("/api/users")
```

```
import axios from "axios"
```

```
src/components/CreateProjectForm.tsx — form outside src/forms/
```

```
src/components/ConfirmDeleteModal.tsx — modal outside src/modals/
```


#### Code Artifacts: Backend Constraints (🔴 Required)

Backend code artifacts have specific pattern constraints

**Rule:** Backend code artifacts: MUST use DTO validation (class-validator), MUST follow Prisma patterns (access in service/repository layer, not controllers), MUST use guards for authorization

**✅ Good Examples:**

```
CreateUserDto with @IsEmail(), @IsString(), @MinLength()
```

```
UsersService using this.prisma.user.findMany()
```

```
@UseGuards(JwtAuthGuard, RolesGuard)
```

**❌ Bad Examples:**

```
Controller accessing this.prisma directly
```

```
Endpoint without DTO validation
```

```
Endpoint without auth guard
```


#### Image Artifacts: Resolution and Style (🔴 Required)

Image artifacts must specify resolution and style constraints

**Rule:** Image artifacts MUST specify resolution (width x height) and style constraints (realistic, illustration, etc.) in the generation request

**✅ Good Examples:**

```
{ width: 1024, height: 1024, style: "photorealistic", prompt: "..." }
```

```
{ width: 1920, height: 1080, style: "illustration", prompt: "..." }
```

**❌ Bad Examples:**

```
Generating an image without specifying resolution
```

```
Generating an image without any style guidance
```


#### Image Artifacts: Security Pipeline (🔴 Required)

Image generation must go through prompt sanitization and content moderation

**Rule:** Image artifacts MUST go through prompt sanitization and content moderation before generation. This is non-negotiable for all image generation.


#### Image Artifacts: Versioning (🟡 Recommended)

Image artifacts support versioning via MediaVersion entity

**Rule:** Image artifacts support versioning via the MediaVersion entity. When regenerating or editing an image, create a new version instead of overwriting.

**✅ Good Examples:**

```
Creating MediaVersion v2 when user requests edits to an existing image
```

**❌ Bad Examples:**

```
Overwriting the original image file on edit
```


#### Image Artifacts: Prompt Metadata (🟡 Recommended)

Image artifacts should include prompt and negative prompt when possible

**Rule:** Image artifacts SHOULD include both the generation prompt and negative prompt in the artifact metadata for reproducibility and iteration

**✅ Good Examples:**

```
{ prompt: "A modern office space...", negativePrompt: "blurry, low quality, distorted" }
```


#### Video Artifacts: Duration and Aspect Ratio (🔴 Required)

Video artifacts must define duration and aspect ratio

**Rule:** Video artifacts MUST specify duration (in seconds) and aspect ratio (e.g., 16:9, 9:16, 1:1) in the generation request

**✅ Good Examples:**

```
{ duration: 15, aspectRatio: "16:9", prompt: "..." }
```

```
{ duration: 30, aspectRatio: "9:16", prompt: "..." }
```

**❌ Bad Examples:**

```
Generating a video without specifying duration
```

```
Generating a video without specifying aspect ratio
```


#### Video Artifacts: Security Pipeline (🔴 Required)

Video generation must go through the same security pipeline as images

**Rule:** Video artifacts MUST go through the same security pipeline as images: prompt sanitization → content moderation → credit check → generation → storage


#### Video Artifacts: Versioning (🟡 Recommended)

Video artifacts support versioning via MediaVersion entity

**Rule:** Video artifacts support versioning via the MediaVersion entity. When regenerating or editing a video, create a new version instead of overwriting.

