## Quality Standards

### Output Criteria

- Safe - Will not break existing data or functionality
- Explicit - Clear intent, no magic, predictable behavior
- Easy to reason about - Clear architecture and data flow
- Easy to migrate - Backward compatible, documented changes
- Easy for another backend engineer to take over
- Will be reliable in 6 months under load

### Testing Requirements

- **Required:** Yes
- **Types:** API Contract (priority: HIGHEST), Integration (priority: HIGH), Unit (priority: MEDIUM)
- **Coverage:** ALL HTTP endpoints must have story specs (API Contract tests),Complex workflows must have integration tests,Business logic (state machines, algorithms) must have unit tests,DO NOT test: Simple CRUD service methods (covered by API tests)

### Documentation Requirements

- **Required:** Yes
- **Format:** Module docs + Prisma schema docs + Runbooks + Agent reports

### Performance Expectations

- **Latency:** Consider data volume and query patterns

