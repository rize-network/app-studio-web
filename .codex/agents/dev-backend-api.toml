### Feature Documentation

#### 🟠 Modified existing feature without checking KB

**Why:** Missing context leads to breaking changes, regression, inconsistent implementations

**Correct approach:** Always read feature.json before modifying documented features

**❌ Bad Example:**

```typescript
// ❌ User asks to add 2FA to login
Assistant: Let me implement 2FA...
[Implements without reading auth-001 feature.json]
```

**✅ Good Example:**

```typescript
// ✅ User asks to add 2FA to login
Assistant: Let me first check the existing auth feature
Read /codedatabase/features/auth-001/feature.json
[Reads current implementation, dependencies, edge cases]
Assistant: Now I'll implement 2FA with these considerations...
```


#### ℹ️ Implemented feature but did not update KB

**Why:** KB becomes outdated, other agents lack context, duplicate work happens

**Correct approach:** Always update/create feature.json after implementing changes

**❌ Bad Example:**

```typescript
// ❌ Implements new password reset feature
[Commits code]
// Feature KB not updated - other agents unaware
```

**✅ Good Example:**

```typescript
// ✅ Implements new password reset feature
Edit /codedatabase/features/auth-001/feature.json
// Update backend.endpoints, workflows, tests, edgeCases
npm run codebase:validate auth-001
[Commits code with KB update]
```


#### ℹ️ Did not validate feature spec after update

**Why:** Invalid or incomplete specs cause confusion, validation errors in CI/CD

**Correct approach:** Always run codebase:validate after creating/updating feature.json

**❌ Bad Example:**

```typescript
// ❌ Edit feature without validation
Edit /codedatabase/features/auth-001/feature.json
[Commits without validation]
// CI fails - missing required fields
```

**✅ Good Example:**

```typescript
// ✅ Edit and validate
Edit /codedatabase/features/auth-001/feature.json
npm run codebase:validate auth-001
// ✓ Validation passed
[Commits]
```


#### 🟠 Did not run impact analysis before refactoring

**Why:** Breaking changes to dependent features, coordination failures, production issues

**Correct approach:** Always run codebase:impact before major refactoring

**❌ Bad Example:**

```typescript
// ❌ Refactor without checking impact
[Makes breaking changes to auth service]
// 5 features break in production
```

**✅ Good Example:**

```typescript
// ✅ Check impact first
npm run codebase:impact api-startup/src/modules/auth/auth.service.ts
// Shows 5 affected features
// Coordinate with teams, plan migration
[Makes safe, coordinated changes]
```


### Workflow i18n

#### 🔴 Missing i18n translation keys for workflow actions

**Why:** Produces "No translation found" warnings at runtime for every missing key in both en and fr locales. Hundreds of warnings pollute logs and indicate untranslated UI text.

**Correct approach:** When creating/modifying a workflow action.ts file, add ALL referenced i18n keys to both api-startup/src/locales/en.ts and api-startup/src/locales/fr.ts

**❌ Bad Example:**

```typescript
// ❌ action.ts references keys that don't exist in locale files
const action = {
  name: t?.('myDomain.myAction.action.name') || 'My Action',
  steps: [{
    title: t?.('myDomain.myAction.steps.build.title') || 'Build',
    description: t?.('myDomain.myAction.steps.build.description') || 'Build something',
  }],
  timeline: [{
    name: t?.('myDomain.timeline.generatePlan') || 'Generate Plan',
  }],
};
// en.ts has NO "myDomain" section → runtime warnings:
// "No translation found for key myDomain.myAction.action.name in fallback locale en"
```

**✅ Good Example:**

```typescript
// ✅ action.ts references keys AND they exist in both locale files
// 1. In action.ts:
const action = {
  name: t?.('myDomain.myAction.action.name') || 'My Action',
  steps: [{
    title: t?.('myDomain.myAction.steps.build.title') || 'Build',
  }],
};

// 2. In en.ts — add the domain section:
myDomain: {
  myAction: {
    action: { name: 'My Action' },
    steps: { build: { title: 'Build' } },
  },
}

// 3. In fr.ts — add French translations:
myDomain: {
  myAction: {
    action: { name: 'Mon Action' },
    steps: { build: { title: 'Construire' } },
  },
}
```


### Workflow Item Persistence

#### 🔴 Using raw Prisma creates instead of CommonService in workflow services

**Why:** Raw prisma.item.create() / prisma.itemJson.create() throws ConflictException on re-runs, reseeds, or retries when the item already exists. CommonService handles upsert (find → update or create) automatically.

**Correct approach:** Use CommonService.handleTextItem(), handleJsonItem(), or handleItemWithJsons() for all Item/ItemText/ItemJson writes in workflow services

**❌ Bad Example:**

```typescript
// ❌ Raw Prisma creates in workflow service — WILL FAIL on re-run
async executeStep(params) {
  const item = await this.prisma.item.create({
    data: { view: 'text', itemType: 'workflow', ownerId: projectId, ownerType: 'project', userId }
  });
  await this.prisma.itemText.create({
    data: { itemId: item.id, title: 'Report', text: content, userId }
  });
  // Second run: "Unique constraint failed on the fields: ..."
}
```

**✅ Good Example:**

```typescript
// ✅ CommonService handles upsert — safe for re-runs
async executeStep(params) {
  await this.commonService.handleTextItem({
    userId, projectId, taskId,
    name: 'report',
    view: 'markdown',
    title: 'Report',
    text: content,
  });
  // First run: creates item + itemText
  // Re-run: finds existing, updates content
}
```


### Seed Data

#### 🔴 Missing .result in seed references

**Why:** Seed data structure is { params, result } - accessing seed.name.id fails

**Correct approach:** Always use seed.<name>.result.<property> when referencing other seeds

**❌ Bad Example:**

```typescript
// ❌ NEVER DO THIS - Will fail with "myEntity.id doesn't exist"
export const childToSeed: SeedSpec = [
  {
    provider: 'ChildController',
    action: 'create',
    params: [
      'auth.user',
      {
        parentId: 'seed.myParent.id',        // Missing .result!
        projectId: 'seed.myProject.id',      // Missing .result!
      },
    ],
  },
];
```

**✅ Good Example:**

```typescript
// ✅ CORRECT - Include .result in the path
export const childToSeed: SeedSpec = [
  {
    provider: 'ChildController',
    action: 'create',
    params: [
      'auth.user',
      {
        parentId: 'seed.myParent.result.id',    // Correct!
        projectId: 'seed.myProject.result.id',  // Correct!
      },
    ],
  },
];

// Seed data structure:
// seedData[name] = { params: {...}, result: {...} }
// So seed.myParent.result.id accesses the id from the result object
```


#### 🔴 Using seed.* prefix within same seed file

**Why:** Creates circular dependency, seed tries to reference itself

**Correct approach:** Use result.* for sequential steps in the same seed file

**❌ Bad Example:**

```typescript
// ❌ NEVER DO THIS - Creates circular dependency
export const parentToSeed: SeedSpec = [
  {
    provider: 'ParentController',
    action: 'create',
    params: ['auth.user', { name: 'Parent' }],
    saveAs: 'myParent',
  },
  {
    provider: 'ChildController',
    action: 'create',
    params: [
      'auth.user',
      { parentId: 'seed.myParent.result.id' },  // Wrong! Uses seed.*
    ],
  },
];
```

**✅ Good Example:**

```typescript
// ✅ CORRECT - Use result.* for same-file sequential steps
export const parentToSeed: SeedSpec = [
  {
    provider: 'ParentController',
    action: 'create',
    params: ['auth.user', { name: 'Parent' }],
    saveAs: 'myParent',
  },
  {
    provider: 'ChildController',
    action: 'create',
    params: [
      'auth.user',
      { parentId: 'result.id' },  // Correct! Uses previous step's result
    ],
  },
];
```


#### 🔴 Wrong parameter order in seed params

**Why:** Controller expects params in specific order based on decorator sequence

**Correct approach:** Match seed params array to controller method parameter decorators

**❌ Bad Example:**

```typescript
// ❌ Controller signature:
// async publish(@Param('id') id: string, @ReqUser() user: User)
// Wrong seed params order:
{
  provider: 'MyController',
  action: 'publish',
  params: ['auth.user', 'result.id'],  // Wrong order! user before id
}
```

**✅ Good Example:**

```typescript
// ✅ Controller signature:
// async publish(@Param('id') id: string, @ReqUser() user: User)
// Correct seed params order:
{
  provider: 'MyController',
  action: 'publish',
  params: ['result.id', 'auth.user'],  // Correct! id first, then user
}

// Match params array to decorator order:
// @Param('id') → params[0]
// @ReqUser()   → params[1]
// @Body()      → params[2]
```


#### 🟠 Controller not registered in SeedService

**Why:** Seed cannot call controller methods if not injected

**Correct approach:** Add controller to SeedService constructor and imports

**❌ Bad Example:**

```typescript
// ❌ Using controller not in SeedService
{
  provider: 'NewFeatureController',  // Not in SeedService!
  action: 'create',
  params: [...],
}
// Error: Can't load provider: [newFeatureController]
```

**✅ Good Example:**

```typescript
// ✅ Add controller to SeedService first
// In src/modules/seed/seed.service.ts:
@Injectable()
export class SeedService {
  constructor(
    // ... existing controllers ...
    private readonly newFeatureController: NewFeatureController,  // Add here
  ) {}
}

// In src/modules/seed/seed.module.ts:
@Module({
  imports: [
    // ... existing modules ...
    NewFeatureModule,  // Import the module
  ],
})

// Then use in seed:
{
  provider: 'NewFeatureController',
  action: 'create',
  params: [...],
}
```


### Refactoring

#### ℹ️ Stale guard around an extended helper function

**Why:** When a pure helper has its capability extended (e.g., resolveInputRefs now also unwraps envelopes, not just refs), existing callsite guards that filter on the old condition (e.g., `if (refs.length > 0)`) prevent the helper from exercising its new capability. The fix becomes dead code. Multiple deploy cycles are then wasted re-discovering the issue. Observed in the ResultRef resolution series (CLG-0006 through CLG-0011).

**Correct approach:** When extending a helper's capabilities, audit every callsite's guards in the same commit. Prefer calling idempotent helpers unconditionally over guarding them — a guard that filters on condition X will silently block capability Y added later.

**❌ Bad Example:**

```typescript
// ❌ Guard filters on ref presence only
if (refs.length > 0) {
  inputs = await resolveInputRefs(inputs);  // Also unwraps envelopes, but never reached when refs.length === 0
}
```

**✅ Good Example:**

```typescript
// ✅ Helper is idempotent and cheap — call unconditionally
inputs = await resolveInputRefs(inputs);
// Logs only when work was done:
if (refCount > 0 || envelopeCount > 0) {
  this.logger.log(`[INPUT-REFS] refs=${refCount} envelopes=${envelopeCount}`);
}
```

