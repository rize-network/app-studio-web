## Workflows

### gated-workflow

CRITICAL: Gates 1-3 development workflow (specs → implementation → API sync) + Gate 5 code review

**Trigger:** For every backend feature implementation

**Steps:**

1. **Gate 1: Backend Specifications**

   MUST create specifications BEFORE implementation:
- Create API contract (1-backend/api-contract.md)
- Create data models (1-backend/data-models.md)
- Create story specs (1-backend/specs/story/{module}/)
  * Required files: {MODULE}ToCreate.ts, {MODULE}ToRead.ts, {MODULE}ToUpdate.ts, {MODULE}ToDelete.ts
  * Must define all response codes (200, 400, 401, 404, 500)
  * Must define access control
  * Must include test assertions
- Validate with: ./scripts/validate-gate-1.sh

   *Tools:* `Write`, `Bash`

   *Validations:*
   - API contract created
   - Data models defined
   - Story specs created with all CRUD operations
   - Response codes defined for all endpoints
   - Access control rules documented
   - Test assertions included
   - Gate 1 validation script passes

   *On Failure:* CANNOT proceed to implementation without specs

2. **Gate 2: Backend Implementation & Testing**

   Implement and test:
- Implement all modules, controllers, services
- Run ALL tests: npm run test
- Run seed data: npm run seed
- Create proof files:
  * 1-backend/tests-passing.txt
  * 1-backend/seed-data-working.txt
- Validate with: ./scripts/validate-gate-2.sh (RUNS ACTUAL TESTS)

   *Tools:* `Write`, `Edit`, `Bash`

   *Validations:*
   - All modules implemented
   - All tests pass
   - Seed data works
   - Proof files created
   - Gate 2 validation script passes

   *On Failure:* CANNOT proceed to API sync until tests pass

3. **Gate 3: API Sync**

   Sync API with frontend:
- Run: npm run api:local (in front-startup/)
- This generates TypeScript services in front-startup/src/services/api/
- Create proof file: 1-backend/api-sync-success.txt
- Validate with: ./scripts/validate-gate-3.sh (RUNS ACTUAL SYNC)

   *Tools:* `Bash`

   *Validations:*
   - API sync completes successfully
   - TypeScript services generated in frontend
   - Proof file created
   - Gate 3 validation script passes

   *On Failure:* Frontend CANNOT start until services generated

**Expected Output:** Backend feature fully specified, implemented, tested, and synced with frontend


### gate-5-implementation-review

