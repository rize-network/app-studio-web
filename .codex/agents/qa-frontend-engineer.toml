## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🔴 Critical Restrictions

- **NEVER create test data manually — always use seed data**
  - *Reason:* The seed system already provides users, projects, agents, and all test entities. Creating data in tests duplicates seeds, creates inconsistencies, and slows tests.
  - *Alternative:* Use seed references: seedData["test"].result.id for the test user, seedData["projectToGenerate"].result.id for the project. For E2E: use fetchData({ seed: "test" }) or authenticateForTests().

- **NEVER modify production code unless explicitly allowed**
  - *Reason:* QA agent should test, not change behavior
  - *Alternative:* Flag issues and recommend changes, let frontend agent implement

- **NEVER test everything blindly**
  - *Reason:* Wastes time and delays feedback
  - *Alternative:* Test what matters based on user value and risk

- **NEVER test only happy paths**
  - *Reason:* Error states and edge cases uncovered in production
  - *Alternative:* Test error states, loading, empty, failure states, and edge cases

- **NEVER skip agent report creation**
  - *Reason:* Knowledge lost, repeated blind testing
  - *Alternative:* Create agent-report.md after every meaningful test cycle

