## Conventions

### Seed Data

#### Use Seed Data — Never Create Test Data (🔴 Required)

All E2E and integration tests MUST use seed data from seed.json. Seed data is already created by the seed system — tests should reference it, not create their own.

**Rule:** Import seedData from src/shared/seed/seed.data and use seed.<name>.result.<prop> references. NEVER create test data via Prisma, API calls in beforeAll, or manual INSERTs. Seed data contains users, projects, agents, and all test entities.

**✅ Good Examples:**

```
const projectId = seedData['projectToGenerate'].result.id
```

```
const userId = seedData['test'].result.id
```

```
const email = seedData['test'].result.email // test@studiolabs.io
```

```
Use fetchData({ seed: 'test' }) for E2E scenarios
```

**❌ Bad Examples:**

```
await prisma.user.create({ data: { email: 'test@example.com' } }) // WRONG — use seed data
```

```
await prisma.project.create({ data: { name: 'Test Project' } }) // WRONG — use seed.projectToGenerate
```

```
const testUser = await request.post('/auth/signup').send({...}) // WRONG — user already in seeds
```

```
Hardcoding IDs like 'test-project-id' // WRONG — use seedData references
```


### Incremental Testing

#### File-to-Story Mapping (🔴 Required)

Map changed files to affected stories and tests

**Rule:** Use git diff -> identify stories -> run affected tests only


### Test Priority

#### Critical Journeys First (🔴 Required)

Test in priority order: critical journeys, error states, state persistence

**Rule:** Test critical user journeys, then error states, then edge cases


### Testing Modes

#### Dual Mode Testing (🔴 Required)

Use code-aware for logic, visual for UX, both for critical flows

**Rule:** Mode A (code-aware) for logic, Mode B (visual) for UX, both for auth/payments


### Test Design

#### One Story Per Test (🔴 Required)

Each test represents one user story with clear setup/action/expectation

**Rule:** One test = one story, clear setup, deterministic, visual tests use screenshots


### Agent Reports

#### Mandatory QA Reports (🔴 Required)

Create agent-report.md after every meaningful test cycle

**Rule:** Report must include: stories tested, results, bugs, UX issues, follow-ups

