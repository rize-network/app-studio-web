## Workflows

### generate-feature-scenario

Generate WDIO scenario for a feature

**Trigger:** When a new feature needs E2E test coverage

**Steps:**

1. **Analyze Feature Implementation**

   Read the feature implementation to understand:
- Pages involved (src/pages/)
- Forms used (src/forms/)
- Modals triggered (src/modals/)
- API services called (src/services/api/)
- Element IDs and classes
- User flow and navigation

   *Tools:* `Read`, `Grep`, `Glob`

   *Validations:*
   - Feature pages identified
   - Element IDs extracted
   - User flow mapped
   - API endpoints identified (if needed)

2. **Select Scenario Template**

   Choose appropriate template:
- navigation: Simple page navigation
- form: Form submission and validation
- modal: Modal interaction (open, interact, close)
- api-dependent: Requires API data fetching
- error-state: Tests error handling

   *Tools:* `Read`

   *Validations:*
   - Template selected
   - Template matches feature type

3. **Generate Scenario File**

   Create test scenario file in front-startup/tests/{category}/{feature}.test.js:
- Write clear story description
- Set useApi flag correctly
- Define test steps using actual element IDs
- Add appropriate wait times
- Include assertions via navigation verification
- Follow module.exports pattern

   *Tools:* `Write`

   *Validations:*
   - File created in correct location
   - Story description clear
   - All element IDs valid
   - Steps logically ordered
   - Module exports correctly

4. **Validate Scenario**

   Validate the generated scenario:
- Check element IDs exist in codebase
- Verify API endpoints are correct
- Test scenario manually
- Ensure video capture works

   *Tools:* `Grep`, `Bash`

   *Validations:*
   - Element IDs verified
   - API endpoints checked
   - Test executes successfully
   - Video captured


### batch-scenario-generation

Generate scenarios for multiple features

**Trigger:** When multiple features need E2E coverage

**Steps:**

1. **Identify Features**

   List all features needing E2E tests:
- Check front-startup/src/pages/ for new pages
- Review git diff for recent changes
- Identify critical user journeys
- Prioritize based on business value

   *Tools:* `Glob`, `Bash`, `Read`

   *Validations:*
   - Features listed
   - Priority assigned
   - Journeys identified

2. **Generate Scenarios**

   For each feature:
- Follow generate-feature-scenario workflow
- Organize by category (auth, project, finance, etc.)
- Use consistent naming conventions
- Reuse utility functions

   *Tools:* `Write`, `Read`

   *Validations:*
   - All scenarios generated
   - Organized by category
   - Naming consistent

3. **Validate Batch**

   Run all generated scenarios:
- Execute: npm run wdio
- Check all tests pass
- Review video recordings
- Document any issues

   *Tools:* `Bash`

   *Validations:*
   - All tests executed
   - Pass rate acceptable
   - Videos reviewed


### scenario-validation

Validate generated scenarios

**Trigger:** After scenario generation or modification

**Steps:**

1. **Static Validation**

   Validate scenario structure:
