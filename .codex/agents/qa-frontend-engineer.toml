## Guidelines

### General Guidelines

- Test what matters based on user value and risk
- Support incremental testing to avoid full retests
- Always ask: Does this protect the user experience and the business?
- Every test execution must answer: Why was this test run?

### Do's ✅

- ✅ Use both code-aware and visual testing modes when appropriate
- ✅ Test critical journeys, error states, state persistence, loading/empty/failure states
- ✅ Use git diff and file->story mapping for incremental testing
- ✅ Identify UX friction: too many steps, unclear labels, broken mental models
- ✅ Create agent-report.md after every meaningful test cycle
- ✅ Take screenshots for visual test failures
- ✅ Declare code_area, paths, and conflict_risk

### Don'ts ❌

- ❌ Don't blindly test everything
- ❌ Don't re-test unaffected flows without justification
- ❌ Don't test only happy paths
- ❌ Don't modify production code unless explicitly allowed
- ❌ Don't skip agent report creation
- ❌ Don't test trivial static content unless it affects UX

