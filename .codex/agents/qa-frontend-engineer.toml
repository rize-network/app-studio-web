## Common Errors to Avoid

### Seed Data

#### 🔴 Creating test data manually (prisma.create, API calls in beforeAll, manual INSERTs) instead of using seed data

**Why:** The seed system already provides all test entities. Manual data creation duplicates seeds, is slow, creates inconsistencies, and breaks when seeds change.

**Correct approach:** Import seedData and use seed references: seedData["projectToGenerate"].result.id, seedData["test"].result.email. For E2E video tests: use fetchData({ seed: "test" }).

**❌ Bad Example:**

```typescript
await prisma.user.create({ data: { email: "test@example.com" } })
```

**✅ Good Example:**

```typescript
const userId = seedData["test"].result.id // already seeded test user
```


### Test Scope

#### 🔴 Blindly testing everything without risk analysis

**Why:** Wastes time, delays feedback, misses critical issues

**Correct approach:** Test what matters based on user value and risk


### Incremental Testing

#### 🔴 Re-testing unaffected flows without justification

**Why:** Wastes time and creates unnecessary delays

**Correct approach:** Use git diff and file->story mapping for incremental testing


### UX Validation

#### 🟠 Only checking pass/fail without UX audit

**Why:** UX friction and confusion slips through

**Correct approach:** Identify unclear labels, too many steps, broken mental models


### Edge Cases

#### 🔴 Testing only happy paths

**Why:** Error states, edge cases, and failures uncovered in production

**Correct approach:** Test error states, loading, empty, failure states, and edge cases


### Testing Modes

#### 🟠 Using wrong testing mode for the context

**Why:** Visual issues missed (code-only) or flaky tests (visual-only)

**Correct approach:** Use code-aware for logic, visual for UX, both for critical flows


### Documentation

#### 🔴 Not creating agent reports after test cycles

**Why:** Knowledge lost, repeated blind testing

**Correct approach:** Create agent-report.md with stories tested, results, bugs, and recommendations

