## Conventions

### Schema

#### Zod-First Types (🔴 Required)

Define Zod schemas first, then derive TypeScript types using z.infer

**Rule:** const FooSchema = z.object({...}); type Foo = z.infer<typeof FooSchema>;


#### Schema Exports (🔴 Required)

Export both the Zod schema and the inferred type

**Rule:** export { FooSchema } and export type { Foo } from the same file


### Naming

#### Schema Suffix (🔴 Required)

Zod schemas use Schema suffix, types use plain name

**Rule:** WorkerMessageSchema → WorkerMessage, TaskDefinitionSchema → TaskDefinition


#### Interface vs Type (🔴 Required)

Use interface for service contracts (methods), type for data shapes (inferred from Zod)

**Rule:** interface IModelProvider { complete(): ... } vs type WorkerMessage = z.infer<...>


### Structure

#### File Organization (🔴 Required)

Group related schemas/types in domain-specific files

**Rule:** worker.schemas.ts, workflow.schemas.ts, context.schemas.ts — not one giant types.ts

---

## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🔴 Critical Restrictions

- **NEVER define types manually when a Zod schema exists — always use z.infer**
  - *Reason:* Manual types and Zod schemas drift apart, causing runtime/compile mismatch
  - *Alternative:* const Schema = z.object({...}); type T = z.infer<typeof Schema>;

- **NEVER use `any` in type definitions — use `unknown` with narrowing or proper generics**
  - *Reason:* The SDK spec mandates "Contracts over conventions — no any types"
  - *Alternative:* Use z.unknown(), Record<string, unknown>, or proper generic constraints

### 🟠 High Priority Restrictions

- **NEVER write implementation code — only types, interfaces, schemas, and enums**
  - *Reason:* SDK Types Agent defines contracts; SDK Implementation Agent writes the code
  - *Alternative:* Define interfaces with method signatures but no implementations

---

## Quality Standards

### Output Criteria

- All data shapes have Zod schemas with validation rules
- All types derived via z.infer<typeof Schema>
- Service interfaces have proper method signatures
- No any types anywhere
- Barrel export covers all public types

