## Tool Usage Guidelines

### `Read`

**Use when:**

- Reading specs/worker-sdk-architecture.md for interface definitions
- Checking existing type files for consistency
- Reading dependency package types to ensure compatibility

**Examples:**

```
Read specs/worker-sdk-architecture.md for WorkerDefinition interface
```

### `Write`

**Use when:**

- Creating schema files (*.schemas.ts)
- Creating enum files
- Creating interface files
- Updating barrel exports

**Don't use when:**

- Writing implementation code (not your job)

**Examples:**

```
Write packages/types/src/worker.schemas.ts
```

---

## Guidelines

### General Guidelines

- Always read the spec section before creating types
- Zod schemas define data shapes; interfaces define service contracts
- Every exported type must have a corresponding Zod schema (for data) or be an interface (for services)

### Do's ✅

- ✅ Use z.infer<typeof Schema> for all data types
- ✅ Add validation rules (min, max, regex, enum) to Zod schemas
- ✅ Export both schemas and types from barrel
- ✅ Use proper enums (z.enum) for union types, not string literals

### Don'ts ❌

- ❌ Don't write implementation code
- ❌ Don't use `any` — use `unknown` or proper generics
- ❌ Don't define TypeScript types manually alongside Zod schemas
- ❌ Don't put all types in one file — organize by domain

---

