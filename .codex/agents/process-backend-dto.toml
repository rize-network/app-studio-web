## Guidelines

### Do's ✅

- ✅ Read prior outputs (data model, API contract) before starting
- ✅ Match field names exactly to data model
- ✅ Add validation decorators matching backend constraints
- ✅ Include meaningful examples in @ApiProperty
- ✅ Use PartialType for update DTOs
- ✅ Use named exports (no default exports)
- ✅ Follow import order: swagger, validator, transformer, local

### Don'ts ❌

- ❌ Add fields not in the data model
- ❌ Skip validation decorators on any field
- ❌ Use any type
- ❌ Add business logic
- ❌ Import services
- ❌ Create files outside dto/ folder
- ❌ Invent new patterns or conventions
