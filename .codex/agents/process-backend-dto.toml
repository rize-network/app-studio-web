## Conventions

### Naming

#### File Naming (🔴 Required)

DTO files use kebab-case with operation prefix

**Rule:** dto/{operation}-{domain}.dto.ts

**✅ Good Examples:**

```
dto/create-user.dto.ts
```

```
dto/update-user.dto.ts
```

```
dto/user-response.dto.ts
```

**❌ Bad Examples:**

```
dto/CreateUser.dto.ts
```

```
dto/userDto.ts
```

```
CreateUserDto.ts
```


#### Class Naming (🔴 Required)

DTO classes use PascalCase with Dto suffix (not DTO)

**Rule:** {Operation}{Domain}Dto

**✅ Good Examples:**

```
CreateUserDto
```

```
UpdateUserDto
```

```
UserResponseDto
```

```
UserFilterDto
```

**❌ Bad Examples:**

```
CreateUserDTO
```

```
createUserDto
```

```
UserCreateDto
```

```
User_Dto
```


### Validation

#### Required Decorators (🔴 Required)

Every request DTO field must have validation + Swagger decorators

**Rule:** @ApiProperty() + @Is{Type}() + @IsNotEmpty()/@IsOptional() on every field

**✅ Good Examples:**

```
@ApiProperty({ description: "User email" }) @IsEmail() @IsNotEmpty() email: string
```

**❌ Bad Examples:**

```
email: string (no decorators)
```

```
@ApiProperty() email: string (missing validator)
```


### Pattern

#### Update DTO Pattern (🔴 Required)

Update DTOs must extend PartialType of Create DTO

**Rule:** export class Update{Domain}Dto extends PartialType(Create{Domain}Dto) {}

**✅ Good Examples:**

```
export class UpdateUserDto extends PartialType(CreateUserDto) {}
```

**❌ Bad Examples:**

```
export class UpdateUserDto { @IsOptional() email?: string }
```


#### Response DTO Pattern (🔴 Required)

Response DTOs have @ApiProperty but NO validation decorators

**Rule:** Only @ApiProperty on response fields, never @IsString/@IsEmail etc.


### Imports

#### Import Order (🔴 Required)

Consistent import ordering in DTO files

**Rule:** 1. @nestjs/swagger 2. class-validator 3. class-transformer 4. local types


### Types

#### No Any Types (🔴 Required)

Never use any type in DTOs

**Rule:** All fields must have explicit TypeScript types


### Exports

#### Named Exports Only (🔴 Required)

Use named exports, never default exports

**Rule:** export class {Name}Dto, not export default class {Name}Dto


### Swagger

#### No Default in ApiPropertyOptional for Query DTOs (🔴 Required)

Never use default values in @ApiPropertyOptional for query/filter DTOs (limit, offset, etc.)

**Rule:** Use @ApiPropertyOptional({ minimum, maximum }) without default. Set TypeScript class-level defaults instead: limit?: number = 20

**✅ Good Examples:**

```
@ApiPropertyOptional({ minimum: 1, maximum: 100 }) @IsOptional() limit?: number = 20
```

**❌ Bad Examples:**

```
@ApiPropertyOptional({ default: 20 }) @IsOptional() limit?: number = 20
```

