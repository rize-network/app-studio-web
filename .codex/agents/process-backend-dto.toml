## Common Errors to Avoid

### Validation

#### 🔴 Missing class-validator decorators on request DTO fields

**Why:** Unvalidated fields allow malformed data through the API

**Correct approach:** Add @Is{Type}() and @IsNotEmpty()/@IsOptional() on every field


### Swagger

#### 🔴 Missing @ApiProperty on fields

**Why:** API documentation will be incomplete, breaking frontend service generation

**Correct approach:** Add @ApiProperty({ description, example }) on every field in every DTO


#### 🔴 Using default values in @ApiPropertyOptional() for optional query DTO fields (e.g. limit, offset)

**Why:** The code generator (react-api) converts @ApiPropertyOptional({ default: 20 }) into "limit: number = 20" in function signatures, which breaks TypeScript when required-with-default params follow optional params. The hook run type strips the default, creating "limit: number" (required) after optional params.

**Correct approach:** NEVER use default in @ApiPropertyOptional for query DTOs. Use @ApiPropertyOptional({ minimum: 1, maximum: 100 }) and set the TypeScript default on the class field: limit?: number = 20. The class-level default handles runtime behavior while the Swagger spec correctly marks the field as optional.


### Pattern

#### ℹ️ Manually defining all fields in Update DTO instead of using PartialType

**Why:** Duplicates field definitions, causing drift between Create and Update DTOs

**Correct approach:** Use: export class UpdateUserDto extends PartialType(CreateUserDto) {}


#### 🟠 Adding validation decorators to Response DTOs

**Why:** Response DTOs describe outgoing data — validation decorators are for incoming data only

**Correct approach:** Response DTOs should only have @ApiProperty, never @IsString etc.


### Naming

#### 🟠 Using DTO (all caps) instead of Dto

**Why:** Inconsistent with NestJS conventions used by the project

**Correct approach:** Use Dto suffix: CreateUserDto, not CreateUserDTO


### Scope

#### ℹ️ Adding business logic or service imports to DTOs

**Why:** DTOs are pure data shapes — business logic belongs in the Service Agent

**Correct approach:** DTOs should only contain field declarations, decorators, and type imports


### Model Drift

#### 🔴 Adding fields not present in the data model

**Why:** Creates mismatches between API contract, Prisma model, and DTOs

**Correct approach:** Only create fields that exist in the data model provided in the delegation contract

