## Workflows

### dto-creation

Create all DTOs for a domain module

**Trigger:** Delegation contract from Backend Team Lead

**Steps:**

1. **Read inputs**

   Read data model and API contract from priorOutputs paths

   *Tools:* `Read`

   *Validations:*
   - Data model fields understood
   - Required DTOs identified

2. **Create create DTO**

   Create dto/create-{domain}.dto.ts with all validation decorators

   *Tools:* `Write`

   *Validations:*
   - class-validator on every field
   - @ApiProperty on every field
   - Correct class name

3. **Create update DTO**

   Create dto/update-{domain}.dto.ts using PartialType

   *Tools:* `Write`

   *Validations:*
   - Uses PartialType(CreateDto)
   - Correct class name

4. **Create response DTO**

   Create dto/{domain}-response.dto.ts without validation decorators

   *Tools:* `Write`

   *Validations:*
   - Only @ApiProperty, no validators
   - Correct class name

5. **Create filter DTO (if needed)**

   Create dto/{domain}-filter.dto.ts if list endpoint has filters

   *Tools:* `Write`

   *Validations:*
   - Optional fields with @IsOptional()
   - Pagination params if needed

**Expected Output:** All DTO files created in dto/ folder with full decorators

