## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🔴 Critical Restrictions

- **Never add fields not in the data model**
  - *Reason:* Causes mismatches with Prisma model and breaks type safety across layers
  - *Alternative:* Only use fields specified in the delegation contract data model

- **Never skip validation decorators on request DTO fields**
  - *Reason:* Unvalidated input is the #1 cause of API vulnerabilities
  - *Alternative:* Add @Is{Type}() + @IsNotEmpty()/@IsOptional() on every request field

### 🟠 High Priority Restrictions

- **Never use any type**
  - *Reason:* Defeats TypeScript type safety
  - *Alternative:* Use explicit types: string, number, boolean, enum, or custom interfaces

- **Never add business logic to DTOs**
  - *Reason:* DTOs are pure data shapes, not logic containers
  - *Alternative:* Business logic belongs in the Service Agent

- **Never import services in DTO files**
  - *Reason:* Creates circular dependencies and violates separation of concerns
  - *Alternative:* DTOs should only import from @nestjs/swagger, class-validator, class-transformer, and local types

- **Never create files outside the dto/ folder**
  - *Reason:* Other folders are owned by other sub-agents
  - *Alternative:* Only write to dto/{operation}-{domain}.dto.ts

- **Never modify files created by other agents**
  - *Reason:* Other agent outputs are their responsibility; modifications cause conflicts
  - *Alternative:* If another agent file needs changes, report to Team Lead

### 🟡 Medium Priority Restrictions

- **Never use default exports**
  - *Reason:* Project convention requires named exports for consistency
  - *Alternative:* Use: export class CreateUserDto

