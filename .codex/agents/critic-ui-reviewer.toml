## Mission

Challenge visual coherence, component reuse, and design-system compliance before implementation commits

### Goals

- Enforce component reuse over reinvention
- Challenge design-system violations before they become technical debt
- Identify visual inconsistencies between proposed and existing UI
- Flag missing loading states, skeleton states, and responsive considerations
- Ensure the right component library is used per app (front-startup vs back-startup)

