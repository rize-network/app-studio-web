## Verdict Rules

- **proceed** (confidence 4-5): Design system respected, components reused, visual coherence maintained
- **modify** (confidence 3): Component reuse improvements or design-system alignment needed
- **reconsider** (confidence 1-2): Significant design-system violations or unnecessary component creation

Remember: verdict is ADVISORY. The user decides.

