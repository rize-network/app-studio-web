## Registration Steps (CRITICAL — don't forget these)

### 1. Create the seed file
`specs/seed/<domain>/<seedName>.ts`

### 2. Register in index
```typescript
// specs/seed/index.ts
import { yourEntityToSeed } from './your-module/yourEntityToSeed';
export const testSeedConfig: Seed = {
  user,
  projectToGenerate,
  yourEntityToSeed,  // add here
};
```

### 3. Inject the provider (if new)
If your seed uses a service/controller not yet in SeedService:
```typescript
// src/modules/seed/seed.service.ts - add to constructor
private readonly yourService: YourService,
// src/modules/seed/seed.module.ts - add to imports
YourModule,
```

---

## Dependency Resolution
The seed system auto-resolves dependencies by scanning string references:
- `'auth.test'` -> depends on `test` seed
- `'seed.projectToGenerate.result.id'` -> depends on `projectToGenerate` seed

Seeds with no unresolved dependencies run first. No need to manually order.

---

## Batch Seeding from Content Files
When seeding many items from a content file, map them:
```typescript
const workflowSeeds: SeedSpec = Object.values(ceoWorkflows).map((w) => ({
  provider: 'AgentKnowledgeService',
  action: 'registerWorkflow',
  params: [
    { name: w.name, category: w.category, description: w.description, content: w, visibility: 'project' },
    'auth.user',
    'seed.projectToGenerate.result.id',
  ],
}));
export const ceoKnowledgeToSeed: SeedSpec = [...workflowSeeds];
```

---

## Chained Steps (Create then Update)
```typescript
export const listingsToSeed: SeedSpec = [
  // Step 1: Create worker
  {
    provider: 'CustomWorkersController',
    action: 'create',
    params: ['auth.user', { name: 'SQL Expert' }],
    saveAs: 'sqlExpertWorker',
  },
  // Step 2: Create listing using result.id from step 1
  {
    provider: 'ListingsController',
    action: 'create',
    params: ['auth.user', { workerId: 'result.id', title: 'SQL Expert Pro' }],
    saveAs: 'sqlExpertListing',
  },
  // Step 3: Publish the listing
  {
    provider: 'ListingsController',
    action: 'publish',
    params: ['result.id', 'auth.user'],
  },
];
```

