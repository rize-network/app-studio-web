```

## Troubleshooting
| Error | Cause | Fix |
|-------|-------|-----|
| `seed.myEntity.id doesn't exist` | Missing `.result` | Use `seed.myEntity.result.id` |
| `Can't load provider: [yourService]` | Not injected | Add to seed.service.ts constructor + seed.module.ts imports |
| `Cannot read properties of undefined (reading 'id')` | `@Req()` needs wrapping | Use `{ user: 'auth.test' }` instead of `'auth.test'` |
| `mock.XXX doesn't exist` | Invalid mock name | Check `src/mock/mock.utils.ts` |
| `user XXX doesn't exist` | Auth seed hasn't run | Ensure seed is in testSeedConfig |

