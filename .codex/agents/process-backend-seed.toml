```
specs/seed/
  index.ts                              # testSeedConfig - all seeds registered here
  auth/user/user.ts                     # Default user (email: user@studiolabs.io)
  auth/user/test.ts                     # Secondary test user
  ai/project/projectToGenerate.ts       # Default project
