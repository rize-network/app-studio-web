## Common Errors to Avoid

### Format

#### 🔴 Using raw Prisma inserts (createMany, create, $queryRaw) instead of SeedSpec format

**Why:** This project uses SeedSpec (service/controller method calls). Raw Prisma bypasses business logic, validation, and the seed dependency system.

**Correct approach:** Use SeedSpec: { provider: "YourService", action: "method", params: [...] }. Prefer services over controllers.

**❌ Bad Example:**

```typescript
prisma.user.createMany({ data: [{ email: "test@test.com" }] })
```

**✅ Good Example:**

```typescript
{ provider: "AuthUserController", action: "signUp", params: [{ email: "alice@example.com", password: "mock.password" }, "fr"] }
```


### References

#### 🔴 Missing .result in cross-seed references (seed.<name>.id instead of seed.<name>.result.id)

**Why:** Seed data is stored as { params, result }. Without .result, the reference resolves to undefined.

**Correct approach:** Always use seed.<name>.result.<prop> for cross-seed references

**❌ Bad Example:**

```typescript
projectId: 'seed.projectToGenerate.id'
```

**✅ Good Example:**

```typescript
projectId: 'seed.projectToGenerate.result.id'
```


#### 🔴 Hardcoding IDs instead of using seed references

**Why:** Hardcoded IDs break when seeds regenerate. Tests and seeds become fragile.

**Correct approach:** Use seed.<name>.result.id or result.id to dynamically reference IDs

**❌ Bad Example:**

```typescript
projectId: 'test-project-id-123'
```

**✅ Good Example:**

```typescript
projectId: 'seed.projectToGenerate.result.id'
```


### Registration

#### 🔴 Forgetting to register seed in specs/seed/index.ts or inject provider in SeedService

**Why:** Unregistered seeds never run. Missing providers cause "Can't load provider" errors.

**Correct approach:** 1) Add to testSeedConfig in specs/seed/index.ts. 2) If new provider: add to seed.service.ts constructor + seed.module.ts imports.


### Auth Wrapping

#### 🔴 Passing auth.user directly to @Req() controllers instead of wrapping it

**Why:** @Req() controllers access req.user.id. Passing the raw user object makes req = user instead of req.user = user.

**Correct approach:** For @Req() controllers: wrap as { user: "auth.test" }. For @ReqUser() controllers: pass "auth.user" directly.

**❌ Bad Example:**

```typescript
// @Req() controller: params: ["auth.test", { ... }]
```

**✅ Good Example:**

```typescript
// @Req() controller: params: [{ user: "auth.test" }, { ... }]
```


### Data Creation

#### 🔴 Manually INSERTing test data in reset-db scripts, migration scripts, or test setup

**Why:** Manual INSERTs bypass the seed system, create untracked data, and duplicate what seeds already provide.

**Correct approach:** Create a SeedSpec file in specs/seed/<domain>/ and register it in index.ts.

**❌ Bad Example:**

```typescript
await pg.query("INSERT INTO Project (id, name) VALUES (...)");
```

**✅ Good Example:**

```typescript
Create specs/seed/projects/projectToTest.ts with a SeedSpec
```


### Data Quality

#### ℹ️ Using placeholder data like "test1", "foo", "asdf" instead of realistic values

**Why:** Unrealistic data makes demos look unprofessional and hides real bugs

**Correct approach:** Use realistic names, emails, dates

