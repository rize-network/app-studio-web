## Conventions

### Format

#### SeedSpec Format Only (🔴 Required)

Seeds MUST use the SeedSpec format — service or controller method calls with seed references

**Rule:** Export a named SeedSpec array that calls service/controller methods. Prefer services (plain params). Use controllers when method only exists there. Never use raw Prisma inserts.

**✅ Good Examples:**

```
{ provider: "AgentKnowledgeService", action: "registerWorkflow", params: [dto, "auth.user", "seed.projectToGenerate.result.id"] }
```

```
{ provider: "CustomAgentsController", action: "create", params: ["auth.user", { name: "My Agent" }] }
```

**❌ Bad Examples:**

```
prisma.myEntity.createMany({ data: [...] })
```

```
prisma.$queryRaw`INSERT INTO ...`
```


### References

#### Seed Reference Patterns (🔴 Required)

4 ways to reference dynamic data in params — the system resolves these at runtime

**Rule:** result.<prop> = previous step. seed.<name>.result.<prop> = cross-file (via saveAs). auth.<seedName> = user object. mock.<fn> = fake data. ALWAYS include .result. in cross-seed references.

**✅ Good Examples:**

```
seed.projectToGenerate.result.id (cross-file — .result is REQUIRED)
```

```
result.id (previous step in same seed file)
```

```
auth.test / auth.user / auth.creatorEvent (user object from named seed)
```

```
mock.password / mock.email / mock.integer(1,100) (fake data)
```

**❌ Bad Examples:**

```
seed.myEntity.id (WRONG — missing .result — stored as { params, result })
```

```
'abc-123' (WRONG — never hardcode IDs, use seed references)
```


### Provider

#### Service vs Controller Auth Patterns (🔴 Required)

How to pass auth depends on whether using a service or controller and which decorator it uses

**Rule:** @ReqUser() controllers: pass auth.user directly. @Req() controllers: wrap as { user: "auth.test" }. Services: pass plain params (no wrapping).

**✅ Good Examples:**

```
// @ReqUser() controller: params: ["auth.user", { title: "My Item" }]
```

```
// @Req() controller: params: [{ user: "auth.test" }, { listingId: "seed.listing.result.id" }]
```

```
// @Param() controller: params: ["auth.user", "seed.listing.result.id", { accessType: "INSTALL" }]
```

```
// Service: params: [dto, "auth.user", "seed.projectToGenerate.result.id"]
```

**❌ Bad Examples:**

```
// @Req() controller without wrapping: params: ["auth.test", ...] — will fail, needs { user: "auth.test" }
```


### Registration

#### Register Seed and Inject Provider (🔴 Required)

New seeds must be registered in index.ts. New providers must be injected in SeedService.

**Rule:** 1) Add import + entry in specs/seed/index.ts (testSeedConfig). 2) If provider is new: add to seed.service.ts constructor + seed.module.ts imports. Provider resolves via camelCase: "YourService" -> this.yourService.


### Data

#### Realistic Seed Data (🔴 Required)

Seed data must look like real production data

**Rule:** Use real names, emails, dates — never "test1", "foo", "asdf"

**✅ Good Examples:**

```
{ name: "Customer Support Agent", description: "Handles customer inquiries" }
```

**❌ Bad Examples:**

```
{ name: "test1", description: "foo" }
```


### Dependencies

#### Use Existing Seed Data (🔴 Required)

Reference existing seed data via saveAs instead of creating duplicates or hardcoding IDs

**Rule:** If a user/project/entity already exists in seeds, reference it via seed.<name>.result.<prop>. Use saveAs to expose results for other seeds. Never manually INSERT rows.

**✅ Good Examples:**

```
projectId: 'seed.projectToGenerate.result.id' (references existing project seed)
```

```
{ ..., saveAs: 'myEntity' } (expose result for other seeds to reference)
```

**❌ Bad Examples:**

```
Creating a new project seed when projectToGenerate already exists
```

```
Hardcoding IDs that may change when seeds regenerate
```

```
Using INSERT INTO to manually create test data in scripts
```


### Location

#### Seed File Location (🔴 Required)

Seed files live in specs/seed/<domain>/ with proper naming

**Rule:** File: specs/seed/<domain>/<seedName>.ts. Export: export const <seedName>: SeedSpec = [...]. Naming: <entity>To<Action> or <entity>ToSeed.

**✅ Good Examples:**

```
specs/seed/custom-workers/customWorkerToRead.ts
```

```
specs/seed/ai/project/projectToGenerate.ts
```

```
specs/seed/agent-knowledge/ceoKnowledgeToSeed.ts
```

**❌ Bad Examples:**

```
prisma/seed.ts (wrong location and wrong format)
```

