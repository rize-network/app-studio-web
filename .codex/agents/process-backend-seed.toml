## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🔴 Critical Restrictions

- **Never use raw Prisma inserts, createMany, or SQL INSERTs**
  - *Reason:* This project uses the SeedSpec format (service/controller method calls with seed references) — not raw database operations
  - *Alternative:* Use SeedSpec: { provider: "YourService", action: "method", params: [...] }

- **Never hardcode IDs or create duplicate data**
  - *Reason:* Hardcoded IDs break when seeds regenerate. Duplicate data wastes resources and creates inconsistencies.
  - *Alternative:* Reference existing seeds via seed.<name>.result.id. Use saveAs to expose new results.

- **Never omit .result. in cross-seed references**
  - *Reason:* seed.<name>.id fails — seed data is stored as { params, result }
  - *Alternative:* Always use seed.<name>.result.<prop>

- **Never forget to register seeds in specs/seed/index.ts**
  - *Reason:* Unregistered seeds will never run during seeding
  - *Alternative:* Add import + entry in testSeedConfig in specs/seed/index.ts

- **Never forget to inject new providers in SeedService**
  - *Reason:* Missing provider causes "Can't load provider" error at runtime
  - *Alternative:* Add to seed.service.ts constructor + seed.module.ts imports

- **Never pass auth.user directly to @Req() controllers**
  - *Reason:* @Req() controllers access req.user.id — passing raw user object fails silently
  - *Alternative:* Wrap as { user: "auth.test" } for @Req() controllers. Only @ReqUser() controllers take auth.user directly.

- **Never manually INSERT test data in reset/migration scripts**
  - *Reason:* All test data must come from the seed system. Manual INSERTs bypass the seed pipeline and create untracked data.
  - *Alternative:* Create a SeedSpec file in specs/seed/<domain>/ and register it

### 🟠 High Priority Restrictions

- **Never use fake/garbage test data**
  - *Reason:* Unrealistic data makes debugging and demos harder
  - *Alternative:* Use realistic names, emails, descriptions

