## Common Errors to Avoid

### HTTP

#### 🔴 Making real HTTP calls in tests instead of mocking API services

**Why:** Real HTTP calls make tests slow, flaky, and dependent on external services

**Correct approach:** Use vi.mock("../services/api/{domain}") to mock all API service methods


### Pattern

#### ℹ️ Testing implementation details (internal state, private methods) instead of behavior

**Why:** Implementation tests break on refactors even when behavior is unchanged

**Correct approach:** Test user-visible behavior: render, query DOM with screen.getBy*, assert visible output


### Coverage

#### ℹ️ Only testing the happy path, skipping error and empty states

**Why:** Error and empty states are critical UX — untested paths cause silent failures

**Correct approach:** Test all 4 states: loading, error (with retry), empty (with action), data


### Scope

#### 🔴 Modifying production source files to make them "testable"

**Why:** Test Agent writes tests only — source changes are other agents responsibility

**Correct approach:** Report source issues to Team Lead for re-dispatch to the appropriate agent


### Forms

#### ℹ️ Not testing form validation with invalid inputs

**Why:** Validation errors are a key UX feature — untested validation can silently pass bad data

**Correct approach:** Test both valid submission and invalid input (trigger validation, assert error messages)


### Stores

#### ℹ️ Not resetting store state between tests

**Why:** Shared state between tests causes flaky, order-dependent test results

**Correct approach:** Use beforeEach to reset store: useStore.setState({ ...initialState })

---

## Conventions

### Location

#### Test File Colocation (🔴 Required)

Tests colocated with source files

**Rule:** {Source}.test.tsx next to {Source}.tsx

**✅ Good Examples:**

```
UserCard.test.tsx next to UserCard.tsx
```

```
useUserStore.test.ts next to useUserStore.ts
```

**❌ Bad Examples:**

```
__tests__/UserCard.test.tsx (separate folder)
```


### Library

#### Testing Library + Vitest (🔴 Required)

Use @testing-library/react for rendering and vitest for assertions

**Rule:** import { render, screen } from "@testing-library/react"; import { vi } from "vitest"


### Pattern

#### Behavior Testing (🔴 Required)

Test behavior, not implementation details

**Rule:** Test what the user sees and does, not internal state or method calls


### Mocking

#### Mock API Services (🔴 Required)

Mock generated API services, never make real HTTP calls

**Rule:** vi.mock("../services/api/{domain}") — mock the generated service


### Coverage

#### State Coverage (🔴 Required)

Test all visual states for components and pages

**Rule:** Test: loading, error, empty, data states. Test: valid + invalid form input.

---

## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🔴 Critical Restrictions

- **Never make real HTTP calls in tests**
  - *Reason:* Tests must be fast, deterministic, and offline-capable
  - *Alternative:* Mock API services with vi.mock()

- **Never modify source files**
  - *Reason:* Test Agent writes tests, not production code
  - *Alternative:* Report source issues to Team Lead for re-dispatch

- **Never use jest globals — this project uses vitest**
  - *Reason:* The project uses vitest 1.6.1 which does NOT expose jest as a global. Using jest.spyOn, jest.fn, jest.mock, jest.restoreAllMocks etc. causes ReferenceError at runtime and all tests fail silently.
  - *Alternative:* Always import { describe, it, expect, vi, beforeEach, afterEach } from "vitest". Use vi.spyOn, vi.fn, vi.mock, vi.restoreAllMocks instead of jest equivalents.

### 🟠 High Priority Restrictions

- **Never test implementation details**
  - *Reason:* Implementation detail tests are brittle and break on refactors
  - *Alternative:* Test user-visible behavior via @testing-library/react

- **Never skip error path testing**
  - *Reason:* Error handling is critical UX — untested errors cause crashes

---

