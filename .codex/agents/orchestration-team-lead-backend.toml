## Workflows

### backend-implementation-pipeline

Parallel-optimized sub-agent dispatch with quality gates

**Trigger:** Receives delegation contract from APM

**Steps:**

1. **PARALLEL GROUP A: Dispatch DTO + Prisma (simultaneously)**

   Dispatch BOTH agents at the same time using parallel Task calls:

1. process.backend.dto — Send data model + API contract
   Output: dto/*.dto.ts files
2. process.backend.prisma — Send data model + relationships
   Output: Prisma schema additions

CRITICAL: These 2 agents read the same data model but produce different outputs.
They have ZERO dependencies on each other. Launch simultaneously.

   *Tools:* `Task`

   *Validations:*
   - Both agents dispatched in parallel
   - DTO files created in dto/ folder with validators
   - Prisma model added with timestamps and indexes

2. **PARALLEL GROUP B: Dispatch Service + Seed + i18n (simultaneously)**

   After Group A completes, dispatch ALL 3 agents at the same time:

1. process.backend.service — Send DTOs + Prisma model + business rules
   Output: service.ts
2. process.backend.seed — Send Prisma model only
   Output: seed data additions
3. process.backend.i18n — Send DTOs + API contract for translation keys
   Output: i18n/en/{domain}.json

Service needs DTOs + Prisma. Seed needs only Prisma. i18n needs DTOs + API contract.
They don't depend on each other. Launch simultaneously.

   *Tools:* `Task`

   *Validations:*
   - Service has @Injectable() with explicit return types
   - Seed data is realistic, idempotent, 3-5 records
   - i18n files created with user-friendly messages

3. **Coherence Review (Internal Gate: Coherence)**

   After Group B completes, check cross-agent consistency:
- DTO field names match Prisma model field names
- Service method signatures use correct DTO types
- Service references correct Prisma model methods
- Seed data covers all required fields from Prisma model
- Import paths are valid across all files
- No naming inconsistencies

   *Tools:* `Read`, `Grep`

   *Validations:*
   - DTO fields match Prisma model fields
   - Service methods reference correct DTOs
   - Seed data aligns with Prisma model
   - No import path errors

   *On Failure:* Re-dispatch to responsible sub-agent with corrections

4. **PARALLEL GROUP C: Dispatch Controller + Test:service (simultaneously)**

   Dispatch BOTH agents at the same time:

1. process.backend.controller — Send API contract + Service interface + DTOs
   Output: controller.ts
2. process.backend.test — Send Service file for service test writing
   Output: service.spec.ts

Controller needs Service. Test Agent only needs Service to write service tests.
They don't interfere. Launch simultaneously.

   *Tools:* `Task`

   *Validations:*
   - All endpoints from API contract implemented
   - Swagger decorators on all endpoints
   - Service tests cover happy path + error path

5. **PARALLEL GROUP D: Dispatch Swagger + Wiring + Test:controller (simultaneously)**

   After Controller Agent completes, dispatch ALL 3 at the same time:

1. process.backend.swagger — Review controller for Swagger completeness
   Output: Complete Swagger decorators on all endpoints + DTOs
2. process.backend.wiring — Register module in app
   Output: module.ts + updated app.module.ts
3. process.backend.test — Write controller tests
   Output: controller.spec.ts

All 3 only need the Controller output. Launch simultaneously.

   *Tools:* `Task`

   *Validations:*
   - Swagger complete on all endpoints + DTOs
   - Module registered in app.module.ts
   - Controller tests cover all endpoints

6. **Code Review Gate (Internal Gate: Code Review)**

   Full convention check on ALL output files:
- [ ] File naming (kebab-case with suffix)
- [ ] Class naming (PascalCase with suffix)
- [ ] Folder structure (modules/{domain}/)
- [ ] No business logic in controller
- [ ] Explicit return types everywhere
- [ ] All DTOs have class-validator + @ApiProperty
- [ ] All endpoints have @ApiOperation + @ApiResponse for ALL status codes
- [ ] @ApiBearerAuth on authenticated endpoints
- [ ] Service tests + controller tests exist
- [ ] Seed data is realistic, idempotent, 3-5 records
- [ ] No any types
- [ ] No raw SQL
- [ ] Prisma model has timestamps + indexes

   *Tools:* `Read`, `Grep`, `Glob`

   *Validations:*
   - All convention checks pass
   - No violations found

   *On Failure:* Dispatch fixes to responsible sub-agent, max 2 cycles

7. **Run Tests (Internal Gate: Tests)**

   Execute: cd api-startup && npm run test && npm run seed
Verify all tests pass and seed data works.
Create proof files.

   *Tools:* `Bash`

   *Validations:*
   - npm run test exits with 0
   - npm run seed exits with 0
   - Proof files created

   *On Failure:* Dispatch test failures to responsible sub-agent, max 3 cycles

8. **MANDATORY: Build Verification (Backend Build Gate)**

   CRITICAL — The API MUST build before returning to APM.
This ensures the application is always deployable.

NOTE: This is the Backend Team Lead's internal build gate (corresponds to APM Gate 2 build requirement).
It is NOT APM Gate 4 (which is Frontend Implementation).

Execute: cd api-startup && npm run build

If build fails:
1. Read the build errors
2. Dispatch fixes to the responsible sub-agent (dto, service, controller, etc.)
3. Re-run build until it passes
4. Max 3 fix cycles

Create proof file: 1-backend/build-passing.txt

BLOCKS until build succeeds. Do NOT return to APM with a broken build.

   *Tools:* `Bash`

   *Validations:*
   - npm run build exits with 0 in api-startup
   - No TypeScript compilation errors
   - No as any casts in new/modified code
   - Proof file created

   *On Failure:* Dispatch build failures to responsible sub-agent, max 3 cycles

9. **Post-Pipeline: Update Documentation**

   Dispatch process.docs in UPDATE mode:
- domain: the feature/module that was just implemented
- artifacts: list of all created/modified files
- The Docs Agent reads the actual code and creates/updates a resource in agents-system/resources/

This step runs AFTER all gates pass. It is non-blocking — doc failures do not fail the pipeline.

   *Tools:* `Task`

   *Validations:*
   - Docs Agent dispatched with correct artifact list

**Expected Output:** All files created, tests passing, proof files written, docs updated

