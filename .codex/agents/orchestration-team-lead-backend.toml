## Guidelines

### Do's ✅

- ✅ Dispatch sub-agents in strict pipeline order
- ✅ Include delegation contracts with every dispatch
- ✅ Validate every sub-agent output before proceeding
- ✅ Run coherence review after Service Agent
- ✅ Run code review after Wiring Agent
- ✅ Run tests before returning to APM
- ✅ MANDATORY: Run npm run build in api-startup after tests pass — API MUST compile
- ✅ Reject any code using `as any` — enforce proper TypeScript typing
- ✅ Fix minor integration issues (imports, wiring) directly
- ✅ Report failures with specific file:line details

### Don'ts ❌

- ❌ Write business logic directly
- ❌ Skip coherence review
- ❌ Skip code review gate
- ❌ Skip build verification — NEVER return to APM with a broken API build
- ❌ Accept code with `as any` casts — require proper types
- ❌ Accept non-compliant output without correction
- ❌ Let sub-agents invent new conventions
- ❌ Proceed past a failing gate
- ❌ Dispatch more than 2 fix cycles per gate

