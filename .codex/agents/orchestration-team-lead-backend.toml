## Conventions

### Pipeline

#### Sub-Agent Execution Order (🔴 Required)

Sub-agents must execute in strict order with gates between stages

**Rule:** DTO → Repository → Service → [Coherence Review] → Controller → Wiring → [Code Review] → [Tests]


### Delegation

#### Delegation Contract Required (🔴 Required)

Every sub-agent dispatch must include a delegation contract

**Rule:** Include: taskId, summary (max 10 lines), priorOutputs, conventions, restrictions, outputFormat, doneCriteria, stopCondition

**✅ Good Examples:**

```
taskId: AUTH-L3-DTO-01, summary: "Create register/login DTOs", priorOutputs: [data-models.md], conventions: [class-validator, @ApiProperty], outputFormat: { files: [dto/register.dto.ts] }
```

**❌ Bad Examples:**

```
Dispatching without a contract
```

```
Dispatching with vague instructions like "create the DTOs"
```


### Validation

#### Post-Output Validation (🔴 Required)

Validate every sub-agent output before proceeding to next step

**Rule:** Read output files, check naming, check decorators, check types, reject non-compliant output


### Naming

#### File Naming Enforcement (🔴 Required)

All backend files must use kebab-case with type suffixes

**Rule:** Pattern: {domain}.{type}.ts where type is controller|service|module|repository

**✅ Good Examples:**

```
users.controller.ts
```

```
users.service.ts
```

```
create-user.dto.ts
```

**❌ Bad Examples:**

```
UsersController.ts
```

```
users_service.ts
```

```
createUser.dto.ts
```


#### Class Naming Enforcement (🔴 Required)

All classes must use PascalCase with type suffixes

**Rule:** Pattern: {Domain}{Type} where Type is Controller|Service|Module|Dto|Entity

**✅ Good Examples:**

```
UsersController
```

```
UsersService
```

```
CreateUserDto
```

**❌ Bad Examples:**

```
usersController
```

```
UsersServiceClass
```

```
CreateUserDTO
```


### Structure

#### Module Folder Structure (🔴 Required)

Each domain module must follow standard NestJS layout

**Rule:** modules/{domain}/ with dto/ and entities/ subdirectories

**✅ Good Examples:**

```
modules/auth/auth.controller.ts, modules/auth/auth.service.ts, modules/auth/dto/login.dto.ts
```

**❌ Bad Examples:**

```
src/auth-controller.ts (flat structure)
```

```
modules/auth/dtos/ (wrong folder name)
```


### Quality Gate

#### Coherence Review Checklist (🔴 Required)

Mid-pipeline check after Service Agent completes

**Rule:** Check: DTO fields match Prisma model, Service uses correct DTOs, import paths valid, no naming conflicts


#### Code Review Gate Checklist (🔴 Required)

Pre-test check after Wiring Agent completes

**Rule:** Check: all files named correctly, no business logic in controllers, explicit return types, validators on DTOs, Swagger on endpoints, no any types, no raw SQL


#### Content Output Registry Enforcement (🔴 Required)

During the Code Review Gate, verify that every new content output type produced by a service is registered in the Content Output Registry

**Rule:** In the post-Wiring code review checklist, add a check: "Does any new service method produce an email, PDF, notification, or webhook payload? If yes, confirm it is registered in src/shared/content-output/content-output.registry.ts." Reject the output and re-dispatch to Service Agent if the registration is missing.

**✅ Good Examples:**

```
Code review passes: billing.service.ts sends invoice email, registry entry confirmed for "invoice-email" output ID.
```

**❌ Bad Examples:**

```
Code review misses: notification.service.ts sends push notifications with no registry entry — accepted without check.
```


### Fix Cycles

#### Maximum Fix Cycles (🔴 Required)

Limit re-dispatch attempts to prevent infinite loops

**Rule:** Max 2 fix cycles per quality gate. If still failing after 2 cycles, escalate to APM with detailed failure report.


### Code Quality

#### Scoped lint:fix to prevent prettier drift (🔴 Required)

Running project-wide lint:fix reformats many unrelated files, polluting diffs and requiring cleanup commits

**Rule:** When running lint:fix, scope to the specific files created/modified by the current MF. Use: npx prettier --write "src/path/to/files/**/*.{ts,tsx}" instead of npm run lint:fix. If project-wide lint:fix must run, commit prettier drift as a separate style: commit BEFORE the feature commit.

