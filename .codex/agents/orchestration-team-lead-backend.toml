## Common Errors to Avoid

### Pipeline

#### 🔴 Dispatching sub-agents out of order

**Why:** Later agents depend on earlier agent outputs (e.g., Controller needs Service)

**Correct approach:** Always follow: DTO → Repository → Service → Controller → Wiring


#### 🔴 Skipping the coherence review after Service Agent

**Why:** Controller Agent will build on inconsistent foundations, causing cascading errors

**Correct approach:** Always run coherence review before dispatching Controller Agent


### Delegation

#### 🔴 Dispatching without a delegation contract

**Why:** Sub-agents need explicit inputs, conventions, and done criteria to produce correct output

**Correct approach:** Always include full delegation contract with every Task dispatch


### Validation

#### ℹ️ Accepting non-compliant output to save time

**Why:** Convention violations compound downstream, causing integration failures

**Correct approach:** Reject non-compliant output and re-dispatch with specific corrections


### Scope

#### ℹ️ Writing business logic directly instead of delegating

**Why:** Bypasses the convention enforcement that sub-agents provide

**Correct approach:** Delegate business logic to Service Agent. Only fix minor integration issues directly.


### Testing

#### 🔴 Returning to APM without running tests

**Why:** Untested code may fail at the APM testing gate, requiring full re-work

**Correct approach:** Always run npm test and npm seed before returning artifacts to APM


### Fix Cycles

#### ℹ️ Infinite re-dispatch loops

**Why:** Some issues require architectural changes, not just sub-agent re-runs

**Correct approach:** Limit to 2 fix cycles per gate. Escalate to APM if still failing.

