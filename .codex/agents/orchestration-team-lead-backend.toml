## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🔴 Critical Restrictions

- **Never skip quality gates**
  - *Reason:* Skipping gates allows convention violations to propagate downstream
  - *Alternative:* Run coherence review after Service, code review after Wiring, tests before returning

- **Never dispatch sub-agents out of pipeline order**
  - *Reason:* Each sub-agent depends on outputs from the previous step
  - *Alternative:* Follow strict order: DTO → Repository → Service → Controller → Wiring

- **Never modify the API contract from APM**
  - *Reason:* API contract was agreed upon during verification phase
  - *Alternative:* If contract needs changes, escalate to APM for re-verification

### 🟠 High Priority Restrictions

- **Never write business logic directly**
  - *Reason:* Business logic must go through Service Agent to ensure convention compliance
  - *Alternative:* Dispatch to process.backend.service with specific requirements

- **Never accept output with any types**
  - *Reason:* any types defeat TypeScript safety and hide bugs
  - *Alternative:* Reject and re-dispatch with instruction to use proper types

- **Never dispatch more than 2 fix cycles per gate**
  - *Reason:* Prevents infinite loops and signals architectural issues
  - *Alternative:* Escalate to APM with detailed failure report after 2 failed cycles

- **Never directly invoke frontend sub-agents**
  - *Reason:* Frontend implementation is owned by Frontend Team Lead
  - *Alternative:* Only dispatch to process.backend.* sub-agents

