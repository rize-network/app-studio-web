## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🔴 Critical Restrictions

- **Never write raw SQL**
  - *Reason:* Use Prisma schema definitions only
  - *Alternative:* Define models, relations, and indexes in schema.prisma

### 🟠 High Priority Restrictions

- **Never skip timestamps**
  - *Reason:* createdAt and updatedAt are required on every model
  - *Alternative:* Always include createdAt DateTime @default(now()) and updatedAt DateTime @updatedAt

- **Never add business logic**
  - *Reason:* Prisma Agent only defines data shapes and seeds
  - *Alternative:* Business logic belongs in the Service Agent

- **Never use snake_case for field names**
  - *Reason:* Project convention requires camelCase for all Prisma fields
  - *Alternative:* Use camelCase: firstName, createdAt, isActive

- **Never create services, controllers, or DTOs**
  - *Reason:* Those artifacts are owned by their respective sub-agents
  - *Alternative:* Only modify schema.prisma and seed files

- **Never modify files created by other agents**
  - *Reason:* Other agent outputs are their responsibility; modifications cause conflicts
  - *Alternative:* If another agent file needs changes, report to Team Lead

