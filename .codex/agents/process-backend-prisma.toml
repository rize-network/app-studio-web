## Conventions

### Schema

#### Model Naming (🔴 Required)

Prisma models use PascalCase singular

**Rule:** model User {}, model Order {}, model OrderItem {}

**✅ Good Examples:**

```
model User {}
```

```
model OrderItem {}
```

**❌ Bad Examples:**

```
model users {}
```

```
model order_item {}
```

```
model Orders {}
```


#### Mandatory Timestamps (🔴 Required)

Every model must have createdAt and updatedAt

**Rule:** createdAt DateTime @default(now()), updatedAt DateTime @updatedAt

**✅ Good Examples:**

```
createdAt DateTime @default(now())
```

```
updatedAt DateTime @updatedAt
```

**❌ Bad Examples:**

```
created_at DateTime
```

```
No timestamp fields at all
```


#### ID Fields (🔴 Required)

Every model must use cuid as default ID

**Rule:** id String @id @default(cuid())

**✅ Good Examples:**

```
id String @id @default(cuid())
```

**❌ Bad Examples:**

```
id Int @id @default(autoincrement())
```

```
id String @id (no default)
```


#### Field Naming (🔴 Required)

All field names use camelCase

**Rule:** camelCase for fields: createdAt, updatedAt, isActive, firstName

**✅ Good Examples:**

```
isActive
```

```
firstName
```

```
createdAt
```

**❌ Bad Examples:**

```
is_active
```

```
first_name
```

```
created_at
```


#### Relations (🔴 Required)

Use explicit @relation with fields and references

**Rule:** @relation(fields: [foreignKeyId], references: [id]) on every relation


#### Enums (🔴 Required)

Enum names PascalCase, values UPPER_CASE

**Rule:** enum OrderStatus { PENDING, PROCESSING, COMPLETED }

**✅ Good Examples:**

```
enum OrderStatus { PENDING COMPLETED }
```

**❌ Bad Examples:**

```
enum orderStatus { pending completed }
```


#### Indexes (🔴 Required)

Add indexes on frequently queried fields

**Rule:** @@index([field]) on fields used in WHERE, ORDER BY, or JOIN conditions


#### Action vs Workflow Ownership Asymmetry (🔴 Required)

Action and Workflow models intentionally expose ownership fields differently — do not add an ownerType column to Action without ASM approval

**Rule:** The Workflow model has both `ownerId` (non-null) and `ownerType` (non-null). The Action model has only `ownerId` (nullable) and NO `ownerType` column. Action ownership is expressed via mandatory `workerId` (the agent reference) + optional `ownerId` that defaults to `projectId` at creation time. When reviewing or designing new ownership fields on Action, do NOT add `ownerType` to bring parity with Workflow — this asymmetry is by design. Document the convention in any PR that adds ownership semantics to Action-related data.

**✅ Good Examples:**

```
// ✅ Action ownership — workerId mandatory, ownerId defaults to projectId, no ownerType
model Action {
  id       String  @id @default(cuid())
  workerId String  @db.VarChar(150)  // mandatory — the agent/worker reference
  projectId String @db.VarChar(36)
  ownerId  String? @db.VarChar(36)   // nullable — defaults to projectId in service layer
  // NO ownerType column — do not add one
}
```

**❌ Bad Examples:**

```
// ❌ Do not "fix" the asymmetry by copying the Workflow shape onto Action
model Action {
  ownerId   String @db.VarChar(36)   // changed to non-nullable
  ownerType String @db.VarChar(50)   // added to match Workflow — violates the design
}
```


#### Encrypted Fields Consultation (🔴 Required)

When adding Json fields to session-related models, check if at-rest encryption is required

**Rule:** When adding new Json fields to session-related models (AdkSession, AdkMessage, SessionInteraction, AdkMemory), consult src/shared/encryption/encrypted-fields.config.ts to determine if the field should be encrypted at rest. If it contains PII, secrets, or sensitive AI output, add it to the config. The Prisma extension auto-handles encryption/decryption.

**✅ Good Examples:**

```
// New Json field on AdkMessage — contains sensitive AI tool calls
// 1. Add field to schema:
model AdkMessage {
  toolCalls Json?
}
// 2. Register in encrypted-fields.config.ts:
AdkMessage: ['content', 'toolCalls'],
// The Prisma extension encrypts on write and decrypts on read automatically.
```

**❌ Bad Examples:**

```
// New Json field on AdkSession — skipped encryption check
model AdkSession {
  userSecrets Json?  // ← PII stored in plaintext — NEVER skip the config check
```


#### Enum Values Are Authoritative — Document for Downstream Agents (🔴 Required)

When defining or modifying a Prisma enum, the exact member names (e.g., WORKER vs AGENT, ACTIVE vs ENABLED) are the single source of truth

**Rule:** When creating or changing an enum in schema.prisma, pick names that match existing codebase terminology (search first). When reviewing service code that references an enum value, verify the value against schema.prisma — never assume from English synonyms. Service agents MUST read the schema before writing create/update calls that reference enum fields; this convention exists to catch mismatches before they reach runtime.

**✅ Good Examples:**

```
enum AssigneeType {
  TEAM_MEMBER
  WORKER  // ← chosen to match existing "worker" terminology across the codebase
}
// Service code:
await this.prisma.kanbanTask.create({
  data: { assigneeType: task.isAgent ? 'WORKER' : 'TEAM_MEMBER' },
});
```

**❌ Bad Examples:**

```
enum AssigneeType { TEAM_MEMBER, WORKER }
// Service assumes English — rejected at runtime:
await this.prisma.kanbanTask.create({
  data: { assigneeType: 'AGENT' },  // ← Invalid value for argument assigneeType. Expected AssigneeType.
});
```

