## Common Errors to Avoid

### Spec Format

#### 🔴 Using wrong spec format (not worker-appstudio)

**Why:** Spec cannot be used to generate tests, UI, or APIs

**Correct approach:** Always use the worker-appstudio Feature interface from worker-appstudio/src/types/interfaces.ts

**❌ Bad Example:**

```typescript
// ❌ WRONG - Custom documentation format
{
  "featureName": "Blog Generation",
  "description": "Users can generate blog posts",
  "requirements": ["User must be logged in"],
  "components": ["BlogForm", "BlogList"]
}
```

**✅ Good Example:**

```typescript
// ✅ CORRECT - worker-appstudio format
{
  "feature": {
    "name": "Generate",
    "description": "Generate blog posts using AI",
    "userExperience": [
      {
        "who": "User",
        "action": {
          "type": "type",
          "element": { "type": "textarea", "eventId": "blog_prompt" }
        },
        "where": "/blogs"
      }
    ],
    "screens": {
      "/blogs": "List and create blog posts"
    },
    "conditions": [],
    "dataSchemas": {},
    "requests": []
  }
}
```


### User Experience

#### ℹ️ Incomplete user journey in userExperience

**Why:** Cannot generate complete tests or UI flows

**Correct approach:** Map complete journey: entry → interactions → system responses → completion

**❌ Bad Example:**

```typescript
// ❌ Incomplete - missing navigation and workflow steps
"userExperience": [
  {
    "who": "User",
    "action": { "type": "click", "element": { "type": "button", "eventId": "generate" } },
    "where": "/blogs"
  }
]
```

**✅ Good Example:**

```typescript
// ✅ Complete flow with all steps
"userExperience": [
  { "who": "User", "action": { "type": "type", "element": { "type": "textarea", "eventId": "prompt" } }, "where": "/blogs" },
  { "who": "User", "action": { "type": "click", "element": { "type": "button", "eventId": "generate" } }, "where": "/blogs" },
  { "who": "App", "action": { "type": "send", "request": { "entity": "workflow", "interaction": "create", "context": "generate", "requestId": "send_generate_workflow_request", "explanation": "Generate blog post" } }, "when": { "type": "click", "element": { "type": "button", "eventId": "generate" } }, "where": "/blogs" },
  { "who": "App", "action": { "type": "navigate", "path": "/workflow/:id" }, "when": { "type": "send", "request": { "entity": "workflow", "interaction": "create", "context": "generate", "requestId": "send_generate_workflow_request", "explanation": "Generate blog post" } }, "where": "/blogs" },
  { "who": "App", "action": { "type": "redirect", "path": "/blogs/:id" }, "when": { "type": "navigate", "path": "/workflow/:id" }, "where": "/workflow/:id" }
]
```


### Data Schemas

#### ℹ️ Missing fields in dataSchemas

**Why:** Cannot generate database models or API DTOs

**Correct approach:** Define all fields with type, required, and description

**❌ Bad Example:**

```typescript
// ❌ Missing field definitions
"dataSchemas": {
  "post": {
    "description": "Blog post",
    "usePayment": false,
    "canBeCommented": true,
    "fields": {}
  }
}
```

**✅ Good Example:**

```typescript
// ✅ Complete field definitions
"dataSchemas": {
  "post": {
    "description": "Blog post generated by AI",
    "usePayment": true,
    "canBeCommented": true,
    "fields": {
      "id": { "type": "string", "required": true, "description": "Unique identifier" },
      "userId": { "type": "string", "required": true, "isUser": true, "description": "Post owner" },
      "title": { "type": "string", "required": true, "description": "Post title" },
      "content": { "type": "string", "required": true, "description": "Post content" },
      "workflowId": { "type": "string", "required": false, "description": "Workflow that generated this post" }
    }
  }
}
```


### Requests

#### ℹ️ Missing useWorkflow for content generation

**Why:** Cannot generate workflow integration code

**Correct approach:** Always include useWorkflow.tasks for AI content generation

**❌ Bad Example:**

```typescript
// ❌ Missing workflow definition
{
  "requestId": "send_generate_blog_request",
  "type": "Create",
  "dataSchema": "post",
  "isArray": false,
  "body": { "prompt": "string" }
}
```

**✅ Good Example:**

```typescript
// ✅ Complete workflow definition
{
  "requestId": "send_generate_workflow_request",
  "type": "Create",
  "dataSchema": "workflow",
  "isArray": false,
  "useWorkflow": {
    "tasks": [
      {
        "name": "blogWorkflowService.generateBlog",
        "uiDescription": "Generating blog post content",
        "dependencies": [],
        "connect": {}
      }
    ]
  },
  "useAi": {
    "generationType": ["text"],
    "role": "Expert blog writer",
    "objective": "Generate high-quality blog post from prompt"
  },
  "body": {
    "inputs": "object",
    "skill": "string",
    "ownerId": "string",
    "ownerType": "string",
    "actionType": "string",
    "objectName": "string",
    "objectType": "string"
  }
}
```


### Screens

#### ℹ️ Screen used in userExperience but not defined in screens

**Why:** Spec validation fails, cannot generate UI

**Correct approach:** Every screen path in userExperience must be defined in screens object

**❌ Bad Example:**

```typescript
// ❌ /blogs/:id used but not defined
"userExperience": [
  { "who": "App", "action": { "type": "redirect", "path": "/blogs/:id" }, "where": "/workflow/:id" }
],
"screens": {
  "/blogs": "List blog posts"
}
```

**✅ Good Example:**

```typescript
// ✅ All paths defined
"userExperience": [
  { "who": "App", "action": { "type": "redirect", "path": "/blogs/:id" }, "where": "/workflow/:id" }
],
"screens": {
  "/blogs": "List and create blog posts",
  "/blogs/:id": "View single blog post",
  "/workflow/:id": "Monitor workflow progress"
}
```

