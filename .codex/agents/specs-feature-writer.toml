## Conventions

### Spec Format

#### Use worker-appstudio Feature interface (🔴 Required)

All specs must match the Feature interface from worker-appstudio

**Rule:** Always use the exact structure defined in worker-appstudio/src/types/interfaces.ts

**✅ Good Examples:**

```
Read worker-appstudio/src/types/interfaces.ts before writing
```

```
Validate spec matches TypeScript types
```

```
Include all required fields: name, description, userExperience, screens, conditions, dataSchemas, requests
```

**❌ Bad Examples:**

```
Creating custom documentation format
```

```
Skipping required fields
```

```
Adding non-standard fields to root
```


### User Experience

#### Complete user journeys (🔴 Required)

Map full flow from entry to completion

**Rule:** Include all User and App actions in sequence

**✅ Good Examples:**

```
User enters screen → User interacts → App sends request → App navigates → App redirects
```

```
Include "when" for conditional actions
```

```
Map every action to a screen path
```

**❌ Bad Examples:**

```
Skipping navigation steps
```

```
Missing App responses to User actions
```

```
Incomplete workflows
```


### Workflow Integration

#### Use workflow for content generation (🔴 Required)

All AI content generation must go through workflow system

**Rule:** Never create resources directly - always use workflow with tasks

**✅ Good Examples:**

```
requestId: send_generate_workflow_request
```

```
dataSchema: "workflow"
```

```
useWorkflow with tasks array
```

```
Navigate to /workflow/:id after sending
```

**❌ Bad Examples:**

```
Direct resource creation without workflow
```

```
Missing useWorkflow.tasks
```

```
Skipping /workflow/:id navigation
```


### Data Schemas

#### Define complete entity schemas (🔴 Required)

All entities must have fields with types and descriptions

**Rule:** Every entity needs: description, usePayment, canBeCommented, fields

**✅ Good Examples:**

```
Define all required fields (id, userId, createdAt)
```

```
Include field types (string, number, boolean, Date)
```

```
Mark isUser for owner fields
```

**❌ Bad Examples:**

```
Empty fields object
```

```
Missing field descriptions
```

```
Wrong field types
```


### Screens

#### Define all screens used in flow (🔴 Required)

Every path in userExperience must be in screens object

**Rule:** Map route path → purpose for all screens

**✅ Good Examples:**

```
"/blogs": "List and create blog posts"
```

```
"/blogs/:id": "View single blog post"
```

```
"/workflow/:id": "Monitor workflow progress"
```

**❌ Bad Examples:**

```
Using paths not defined in screens
```

```
Missing screen purposes
```

```
Generic descriptions
```


### Requests

#### Complete request specifications (🔴 Required)

All requests must have requestId, type, and proper body

**Rule:** Define CRUD operations with full details

**✅ Good Examples:**

```
requestId: "action_interaction_entity_context"
```

```
type: "Read" | "Find" | "Create" | "Update" | "Delete"
```

```
body with all required fields
```

```
useAi for AI operations
```

**❌ Bad Examples:**

```
Missing requestId
```

```
Wrong type values
```

```
Incomplete body definition
```


### AI Operations

#### Define AI configuration (🔴 Required)

All AI operations need generationType and objectives

**Rule:** Include useAi with generationType, role, and objective for text generation

**✅ Good Examples:**

```
generationType: ["text"]
```

```
role: "Expert blog writer"
```

```
objective: "Generate high-quality blog post"
```

**❌ Bad Examples:**

```
Missing useAi for AI operations
```

```
No generationType specified
```

```
Missing role or objective for text
```

