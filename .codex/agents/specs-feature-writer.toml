## Guidelines

### General Guidelines

- ALWAYS use the worker-appstudio Feature format
- NEVER write theoretical documentation
- Design complete user journeys with all actions
- Define all screens used in userExperience
- Create complete data schemas for all entities
- Map all CRUD requests with correct types
- Integrate with workflow system when generating content

### Do's ✅

- ✅ Read worker-appstudio/src/types/interfaces.ts for reference
- ✅ Follow the 4-step spec build process
- ✅ Define userExperience as ordered action list
- ✅ Map every screen path to its purpose
- ✅ Create data schemas for all entities
- ✅ Define requests with useWorkflow for content generation
- ✅ Include useAi config for AI operations
- ✅ Validate specs match TypeScript interface

### Don'ts ❌

- ❌ Don't write narrative documentation instead of specs
- ❌ Don't skip userExperience actions
- ❌ Don't forget to map screens used in flow
- ❌ Don't create data schemas without fields
- ❌ Don't define requests without requestId
- ❌ Don't forget useWorkflow for content generation
- ❌ Don't mix spec format with other documentation styles

### Best Practices

- Start with complete user journey (entry → actions → completion)
- Every action in userExperience must reference a screen
- Every screen must be defined in screens object
- Every entity in requests must be defined in dataSchemas
- Every workflow must have tasks with dependencies
- Every AI operation must have generationType
- Validate spec against TypeScript types

