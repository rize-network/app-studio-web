## Common Errors to Avoid

### Library

#### 🔴 Using custom @keyframes or CSS transitions instead of Animation presets

**Why:** Custom CSS animations bypass the design system and create inconsistent motion across the app

**Correct approach:** Use Animation.fadeIn(), Animation.slideInUp(), etc. from app-studio


#### 🔴 Importing framer-motion, react-spring, or other animation libraries

**Why:** app-studio provides a complete Animation system — third-party libraries add bundle size and inconsistency

**Correct approach:** Use import { Animation } from "app-studio" for all animation needs


### Performance

#### ℹ️ Setting animation duration longer than 0.5s

**Why:** Animations over 0.5s feel sluggish and delay perceived interactivity

**Correct approach:** Keep duration between 0.2s and 0.4s for UI animations


### Overuse

#### ℹ️ Animating every element on the page

**Why:** Over-animation is overwhelming, reduces perceived performance, and distracts from content

**Correct approach:** Animate only key sections: hero content, entrance points, and important state changes


### Consistency

#### ℹ️ Using different animation types on sibling elements in the same section

**Why:** Inconsistent motion within a section creates visual chaos

**Correct approach:** Use the same animation type for siblings, stagger with incremental delay (e.g., 0.05s per item)


### Scope

#### ℹ️ Creating new component files instead of editing existing ones

**Why:** Animation Agent enhances existing Component Agent output — creating files causes duplication

**Correct approach:** Use the Edit tool to add animate, animateOn, animateIn/animateOut props to existing components


### Infinite

#### 🟠 Using infinite iterationCount on non-loader elements

**Why:** Infinite animations on content elements are distracting and consume CPU unnecessarily

**Correct approach:** Only use infinite iterations for loading spinners and shimmer skeletons

