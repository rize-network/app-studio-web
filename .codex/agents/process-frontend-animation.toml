## Conventions

### Library

#### Animation presets only (🔴 Required)

Use ONLY Animation presets from app-studio, never custom CSS

**Rule:** import { Animation } from "app-studio" — use Animation.fadeIn(), Animation.slideInUp(), etc.

**✅ Good Examples:**

```
<View animate={Animation.fadeIn({ duration: "0.3s" })} />
```

```
<View animate={Animation.slideInUp()} animateOn="View" />
```

**❌ Bad Examples:**

```
@keyframes fadeIn { ... }
```

```
transition: opacity 0.3s
```

```
import { motion } from "framer-motion"
```


### Performance

#### Duration limits (🔴 Required)

Keep animations fast and purposeful

**Rule:** duration <= 0.5s for UI animations, infinite only for loaders


### Consistency

#### Animation consistency (🔴 Required)

Sibling elements use the same animation type with staggered delays

**Rule:** Use consistent animation type per section, stagger with delay increments


### Purpose

