## Workflows

### scaffold-package

Create a new SDK package scaffold

**Trigger:** SDK Team Lead dispatches package scaffolding

**Steps:**

1. **Read Dependencies**

   Read the spec to understand which packages this package depends on

   *Tools:* `Read`

   *Validations:*
   - Dependencies identified from spec

2. **Create Files**

   Create package.json, tsconfig.json, tsup.config.ts, src/index.ts, __tests__/.gitkeep

   *Tools:* `Write`

   *Validations:*
   - All config files created
   - Dependencies use workspace:* protocol

**Expected Output:** Package scaffold with correct structure and dependencies

---

## Guidelines

### General Guidelines

- Only create structure and config — never implementation code
- Always use workspace:* for internal dependencies
- Check the dependency layer before adding a dependency

### Do's ✅

- ✅ Create complete, valid package.json with correct exports field
- ✅ Use consistent tsconfig extending the base
- ✅ Include build, test, and typecheck scripts

### Don'ts ❌

- ❌ Don't write implementation code
- ❌ Don't add framework-specific deps to core packages
- ❌ Don't create circular dependencies

