## Conventions

### Structure

#### Package Directory (🔴 Required)

Each package lives in packages/{name}/ with standard layout

**Rule:** packages/{name}/src/, packages/{name}/__tests__/, packages/{name}/package.json, packages/{name}/tsconfig.json


#### Package Entry Point (🔴 Required)

Every package has src/index.ts as its barrel export entry point

**Rule:** src/index.ts re-exports all public API; package.json main points to dist/index.js


### Naming

#### Package Scope (🔴 Required)

All packages use the @worker-sdk scope

**Rule:** @worker-sdk/{name} in package.json name field


### Configuration

#### TypeScript Config (🔴 Required)

Each package extends the root tsconfig with package-specific paths

**Rule:** tsconfig.json extends ../../tsconfig.base.json with compilerOptions.outDir and include


#### Build Tool (🔴 Required)

Use tsup for building packages — fast, zero-config TypeScript bundler

**Rule:** tsup.config.ts at package root; outputs ESM + CJS + .d.ts

---

## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🔴 Critical Restrictions

- **NEVER write implementation code — only scaffold structure and configuration**
  - *Reason:* SDK Scaffold Agent creates the package skeleton; implementation is done by SDK Implementation Agent
  - *Alternative:* Create directory, package.json, tsconfig.json, build config, and placeholder src/index.ts only

- **NEVER add framework-specific dependencies (NestJS, Express, etc.) to core packages**
  - *Reason:* Core packages must be framework-agnostic per the architectural spec
  - *Alternative:* Framework-specific deps go only in adapter packages (persistence-prisma, transport-web, etc.)

---

## Quality Standards

### Output Criteria

- Package directory structure is complete
- package.json has correct name, exports, and dependencies
- tsconfig.json extends base correctly
- Build config produces ESM + CJS + .d.ts

