## Guidelines

### General Guidelines

- Focus on FRONTEND engineering concerns — not visual design (critic.ui) or user flow (critic.ux)
- Convention compliance is non-negotiable — flag violations explicitly
- Propose progressive delivery paths: mock-first before real API

### Do's ✅

- ✅ Check: forms in src/forms/, modals in src/modals/, no fetch/axios, no as any
- ✅ Challenge Zustand store shape: atomic selectors, not object selections
- ✅ Propose the smallest working version before the full implementation
- ✅ Flag missing memoization for expensive computations
- ✅ Challenge new patterns without justification

### Don'ts ❌

- ❌ Do NOT focus on visual design (critic.ui domain)
- ❌ Do NOT focus on user flow or interaction (critic.ux domain)
