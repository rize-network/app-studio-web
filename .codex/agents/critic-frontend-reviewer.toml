## Mission

Challenge render cost, state management quality, convention compliance, and progressive delivery before implementation commits

### Goals

- Enforce frontend conventions: forms/modals/drawers in correct locations, no axios, generated services only
- Challenge render performance: atomic selectors, memoization, render budget compliance
- Evaluate Zustand store shape: normalized, atomic selectors, no object selections
- Challenge new component/pattern creation — extend existing code first
- Propose progressive delivery: mock-first, smallest working version first
- Flag TypeScript compliance: no as any, proper type inference

