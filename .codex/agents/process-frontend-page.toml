## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🔴 Critical Restrictions

- **Never create forms inline in pages**
  - *Reason:* Forms are owned by Form Agent in src/forms/
  - *Alternative:* Import from src/forms/

- **Never call APIs directly**
  - *Reason:* API calls go through stores which use generated services
  - *Alternative:* Call store actions which internally call API services

- **Never use fetch() or axios**
  - *Reason:* All API calls via stores → generated services

- **Never use useStore() without a selector**
  - *Reason:* Whole-store subscription causes unnecessary re-renders on every state change
  - *Alternative:* Always use useStore(s => s.specificField)

- **Never use React Context for data that changes during interaction**
  - *Reason:* Context re-renders all consumers on every update. Zustand selectors re-render only affected subscribers.
  - *Alternative:* Use Zustand stores. Context only for theme/locale.

- **Never return after writing or modifying a page without producing the Governance Checklist**
  - *Reason:* Article III mandates "No feature without changelog" and "No UI change without screen registry update". Close Manager repeatedly flags cycles where pages shipped with no changelog entry, no screen JSON update, and unregistered test IDs — creating governance debt that compounds across cycles.
  - *Alternative:* Before returning, produce a "Governance Complete: ✅" block listing: (1) changelog.d/ entry files created per impacted feature (codedatabase/features/{feature}/changelog.d/CLG-{feature}-{NNNN}.json), (2) screen JSONs updated or created for the page (codedatabase/screens/pages/<Name>.screen.json), (3) new data-testid values registered in codedatabase/testids.registry.json. If truly no feature surface was touched, say "Governance: N/A" with justification.

### 🟠 High Priority Restrictions

- **Never create components inline in pages**
  - *Reason:* Components are owned by Component Agent
  - *Alternative:* Import from components/{Domain}/

- **Never skip page state handling**
  - *Reason:* Pages without loading/error/empty states have broken UX
  - *Alternative:* Always handle: loading, error, empty, data states

- **Never drill props through 2+ component layers**
  - *Reason:* Prop-drilling creates tight coupling and makes components untestable in isolation
  - *Alternative:* Deep children read from Zustand stores directly, or Page composes them with minimal props

- **Never put mutation logic in the page component body**
  - *Reason:* Data mutations belong in store actions for predictable state flow
  - *Alternative:* Call store actions: useStore.getState().action() or const action = useStore(s => s.action)

---

## Quality Standards

### Output Criteria

- Composes from existing components/forms/stores
- All 4 page states handled (loading/error/empty/data)
- Data flows through stores, not direct API calls
- Modals use showModal()
- No inline components or forms
- Components read own data via selectors (structural files pass no data)
- Stable callback references (store actions, not inline functions)
- ZERO data subscriptions in structural files (.page/.modal/.drawer)
- Render flow documented at top of structural file
- Pyramid build followed — 3 layout types + store + requests + components

