## Common Errors to Avoid

### Composition

#### 🔴 Inlining form components or data tables directly in page files

**Why:** Components and forms are owned by their respective agents — inlining causes duplication and drift

**Correct approach:** Import from src/forms/ and src/components/ — compose, never recreate


### API

#### 🔴 Calling fetch() or API services directly from page components

**Why:** Data flow must go through Zustand stores for consistent state management

**Correct approach:** Call store actions (e.g., store.fetchAll()) which internally call API services


### States

#### ℹ️ Missing loading, error, or empty state handling in pages

**Why:** Pages without all 4 states (loading/error/empty/data) have broken UX

**Correct approach:** Always render: loading skeleton, error with retry, empty with action, then data content


### Data Flow

#### ℹ️ Passing store directly to children instead of extracting props

**Why:** Components should receive plain props, not depend on specific store shape

**Correct approach:** Destructure store in page: const { items, isLoading } = useStore(); pass as props


### Modals

#### ℹ️ Creating inline modals instead of using showModal() system

**Why:** The project uses a centralized modal registry — inline modals bypass it

**Correct approach:** Use showModal() from src/modals/ to trigger modals


### Side Effects

#### ℹ️ Forgetting useEffect for initial data fetch on page mount

**Why:** Without useEffect, the page renders empty and never loads data

**Correct approach:** Add useEffect(() => { fetchAll() }, [fetchAll]) for initial data loading

---

## Conventions

### Location

#### Pages in src/pages/ (🔴 Required)

All page components in src/pages/{domain}/

**Rule:** src/pages/{domain}/{PageName}.tsx

**✅ Good Examples:**

```
src/pages/users/UsersPage.tsx
```

```
src/pages/auth/LoginPage.tsx
```

**❌ Bad Examples:**

```
src/components/UsersPage.tsx
```

```
src/UsersPage.tsx
```


### Composition

#### Compose, Don't Inline (🔴 Required)

Pages import and compose — they don't recreate components or forms

**Rule:** Import from components/, forms/, stores/ — never duplicate their code in pages


### Data Flow

#### Store → Props Pattern (🔴 Required)

Pages read from stores and pass data as props to components

**Rule:** const { items, isLoading } = useStore(); <Component items={items} />


### States

#### Mandatory Page States (🔴 Required)

Every page handles loading, error, empty, and data states

**Rule:** if (isLoading) → skeleton; if (error) → error+retry; if (empty) → empty+action; else → content


### Modals

#### Use showModal() (🔴 Required)

Trigger modals via showModal() system

**Rule:** import { showModal } from "src/modals/" — never create inline modals


### Architecture

#### Store-First Data Access (🔴 Required)

Pages read domain data from stores, not from prop chains

**Rule:** Pages call useStore(s => s.field) with fine-grained selectors. Pass only minimal, direct props to child components. Never drill store data through 2+ layers.

**✅ Good Examples:**

```
const items = useProjectStore(s => s.items); return <ItemList items={items} />
```

**❌ Bad Examples:**

```
Pass userId → Layout → Section → Card (3-layer prop drill)
```


#### No Prop-Drilling (🔴 Required)

Never pass props through components that do not use them

**Rule:** If a deeply nested child needs domain data, it should read from the store directly (or be composed by Page). Max 1 level of prop passing from Page to direct children.


#### Dispatch Store Actions for Updates (🔴 Required)

Pages trigger mutations via store actions, never via local state or hooks

**Rule:** All data updates go through store actions: useStore.getState().action() or const action = useStore(s => s.action). Pages orchestrate, stores mutate.

**✅ Good Examples:**

```
const save = useProjectStore(s => s.saveProject); onClick={() => save(data)}
```

**❌ Bad Examples:**

```
const [data, setData] = useState(); handleSave(() => api.save(data)) — local state + direct API
```


### Performance

#### Fine-Grained Store Selectors (🔴 Required)

Select only the specific fields the page needs

**Rule:** Always useStore(s => s.field) — NEVER useStore() without a selector. Destructure at selector level, not at store level.

**✅ Good Examples:**

```
const { items, isLoading } = useProjectStore(s => ({ items: s.items, isLoading: s.isLoading }))
```

**❌ Bad Examples:**

```
const store = useProjectStore()
```

```
const { items } = useProjectStore()
```


### State

#### Context Restrictions (🔴 Required)

React Context is only allowed for specific narrow use cases

**Rule:** Context ONLY for: (a) truly ephemeral page-scoped UI state no store needs, (b) React tree-scoped feature flags, (c) theme/locale injection. Everything else goes in Zustand stores.

**✅ Good Examples:**

```
<ThemeContext.Provider value={theme}>
```

```
<FeatureFlagContext.Provider>
```

**❌ Bad Examples:**

```
<EditorContext.Provider value={{ cursor, selection, ... }}> — use store
```


### Filtering

#### No View-Type Filters in Pages (🔴 Required)

Pages must not filter or transform store data by view-type flags (e.g. isArchived, status, type) — that logic belongs in the store or a dedicated selector

**Rule:** Never do items.filter(i => i.status === "active") inside a page. Instead, expose a dedicated store selector (e.g. useProjectStore(s => s.activeItems)) that encapsulates the filter. Pages receive already-filtered data.

**✅ Good Examples:**

```
const activeItems = useProjectStore(s => s.activeItems); // selector owns the filter
```

**❌ Bad Examples:**

```
const { items } = useProjectStore(s => s); const active = items.filter(i => !i.archived); // filtering in page
```


### Data Refresh

#### Status Transition Refetch (🔴 Required)

After any action that changes an entity's status or view-membership (archive, publish, delete, move), pages must trigger a refetch via the request hook to keep displayed data consistent

**Rule:** On success of archive/delete/publish/move actions, chain the listXRequest.run() call inside the mutation request's onSuccess callback (or call it from the page after the mutation completes). Never rely on optimistic local store updates alone when the backend drives view membership.

**✅ Good Examples:**

```
const archiveProjectRequest = ProjectsService.useProjectsControllerArchiveService({ onSuccess: () => listProjectsRequest.run() })  // refetch inside onSuccess
```

```
await archiveProjectRequest.run(id); listProjectsRequest.run();  // refetch after mutation
```

**❌ Bad Examples:**

```
await fetchProjects()  // FORBIDDEN — stores have no fetchProjects action
```

```
await archiveProject(id); setItems(items.filter(i => i.id !== id));  // optimistic-only, stale on failure
```


### API Integration

#### Pages Own a {page}.request.ts (MANDATORY) — Hook Is the Source of Truth (🔴 Required)

Every page that loads or mutates backend data MUST own a {page}.request.ts file. The page reads data, loading, and error DIRECTLY from the request hook — not from a store.

**Rule:** src/pages/{page}/{page}.request.ts exports a useXxxRequests() hook that wraps all generated useXxxControllerYyyService hooks the page needs. DEFAULT pattern: the page destructures the request hooks, calls request.run() in a useEffect or event handler, and reads DATA from request.data, LOADING from request.loading, ERROR from request.error. Do NOT create a Zustand store just to re-expose the request data — that is a useless middleman. A store is introduced ONLY when the "Do I Need a Store?" checklist passes (cross-page sharing, persistence across route changes, real-time subscription target, multi-hook orchestration). When a store IS justified, the request-hook onSuccess calls store setters (setX/upsertX/removeX) and the page may read from store selectors for the portion that is shared. When multiple pages share a directory, they share one request file. Forms inside the page use useXxxControllerYyyService hooks directly — they do NOT import useXxxRequests() (isolation rule).

**✅ Good Examples:**

```
// ✅ DEFAULT — no store
// src/pages/users/users.page.tsx:
  const { listUsersRequest, deleteUserRequest } = useUsersRequests()
  useEffect(() => { listUsersRequest.run() }, [])
  if (listUsersRequest.loading) return <Loader />
  if (listUsersRequest.error) return <ErrorState message={listUsersRequest.error.message} />
  const users = listUsersRequest.data ?? []   // ← read from HOOK
  return <UserList users={users} onDelete={(id) => deleteUserRequest.run(id)} />
```

```
// ✅ EXCEPTION — store justified (activeCompany shared by NavLayout + 5 pages)
// The request hook onSuccess calls useCompanyStore.setCompanies, and NavLayout reads the store selector.
```

```
Reference: src/pages/worker/tasks/tasks.request.ts (gold standard — no redundant store)
```

**❌ Bad Examples:**

```
// ❌ NOT JUSTIFIED — creating a store that only one page reads
// src/stores/useUsersStore.ts (only users.page reads it)
// → Delete the store. Read listUsersRequest.data directly in users.page.
```

```
Page calls a store fetch action: useUsersStore(s => s.fetchUsers)()  // FORBIDDEN — stores have no fetch actions
```

```
Page calls the direct service function: await usersControllerFindAll()  // FORBIDDEN — use the generated hook wrapper in a *.request.ts
```

```
Page reads loading from a store: const isLoading = useUsersStore(s => s.isLoading)  // FORBIDDEN — read request.loading
```

