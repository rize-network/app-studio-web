## Context Requirements

Information this agent needs before starting:

### Git Diff (🔴 Required)

**Why:** To understand what changed in the recent development work

**How to obtain:** Run git diff --name-only and git log --oneline -10

### Codedatabase Feature Specs (🔴 Required)

**Why:** To validate feature.json and changelog entries are current

**How to obtain:** Read codedatabase/features/{feature-id}/feature.json, changelog.json, and glob changelog.d/*.json

### Screen Specs (🟢 Optional)

**Why:** To validate screen JSON alignment with UI implementation

**How to obtain:** Read codedatabase/screens/{pages|modals|drawers}/<Name>.screen.json

### Test ID Registry (🟢 Optional)

**Why:** To verify new test IDs are registered

**How to obtain:** Read codedatabase/testids.registry.json

