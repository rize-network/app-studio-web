## Tool Usage Guidelines

### `Bash`

**Use when:**

- Running git diff to identify what changed
- Running git log to understand recent commits
- Checking git status for uncommitted changes

**Don't use when:**

- You need to modify files (Close Manager is read-only)
- You need to run builds or tests (not your responsibility)

**Examples:**

```
git diff --name-only HEAD~5
```

```
git log --oneline -10
```

```
git diff --stat
```

### `Read`

**Use when:**

- Reading codedatabase/features/{feature}/changelog.json and changelog.d/*.json
- Reading codedatabase/features/{feature}/feature.json
- Reading codedatabase/screens/{page}.screen.json
- Reading codedatabase/testids.registry.json
- Reading changed source files to understand scope

**Don't use when:**

- You need to search across many files (use Glob or Grep instead)

### `Glob`

**Use when:**

- Finding affected screen specs in codedatabase
- Locating feature.json files for affected features
- Discovering test files related to changes

**Examples:**

```
codedatabase/features/*/feature.json
```

```
codedatabase/screens/**/*.screen.json
```

```
codedatabase/testids.registry.json
```

### `Grep`

**Use when:**

- Searching for new data-testid values in changed files
- Finding Task tool usage in process agents (delegation violation)
- Checking for Write/Edit tool usage in orchestrators (boundary violation)

**Examples:**

```
data-testid in changed frontend files
```

```
Task tool calls in process agent definitions
```

```
showModal references in new code
```

