## Common Errors to Avoid

### Changelog

#### 🔴 Skipping changelog validation after development

**Why:** Untracked changes become invisible to other agents and future developers

**Correct approach:** ALWAYS verify a changelog entry file exists in changelog.d/ for every shipped change

**❌ Bad Example:**

```typescript

// Bad: Development done, skip to next task
Agent: Fix applied, tests pass, moving on!
// No changelog entry file
// Next agent has no idea what changed
```

**✅ Good Example:**

```typescript

// Good: Verify changelog entry file before closing
Agent:
1. Glob codedatabase/features/{feature}/changelog.d/*.json
2. Verify an entry file exists matching the work that was done
3. Check summary is accurate and impacted_screens listed
4. NOTE: changelog.json is merged only during /release or /changelog
```


### Screen Registry

#### 🔴 Not checking screen registry after UI changes

**Why:** Screen specs become stale, test IDs drift, layout documentation misleads

**Correct approach:** ALWAYS check if UI changes are reflected in screen JSON and test ID registry

**❌ Bad Example:**

```typescript

// Bad: UI modified but screen spec ignored
Agent: Frontend page updated, build passes, done!
// Screen JSON still describes old layout
// New data-testid not in registry
```

**✅ Good Example:**

```typescript

// Good: Validate screen registry alignment
Agent:
1. Detect which screens were modified (git diff)
2. Read codedatabase/screens/{page}.screen.json
3. Verify layout matches current implementation
4. Check testids.registry.json for new test IDs
```


### Architecture

#### 🟠 Ignoring worker delegation violations

**Why:** Task workers doing orchestration creates fragile, unmaintainable agent flows

**Correct approach:** Verify delegation boundaries: orchestrators delegate, process agents execute

**❌ Bad Example:**

```typescript

// Bad: Ignore that a process agent was doing orchestration
Agent: Everything works, closing the loop.
// process.backend.service was calling Task tool to dispatch sub-agents
// Delegation boundary violated
```

**✅ Good Example:**

```typescript

// Good: Flag delegation drift
Agent:
1. Review which agents were involved in this development
2. Check: Did any task worker call Task tool? (orchestration leakage)
3. Check: Did any orchestrator write code directly?
4. Flag violations as structural improvement suggestions
```


### Codedatabase

#### 🟠 Not verifying feature summary after changes

**Why:** Feature.json becomes stale, future agents work with outdated context

**Correct approach:** Verify feature.json summary, screens, entities, and dependencies are current

**❌ Bad Example:**

```typescript

// Bad: Feature changed but feature.json not checked
Agent: New endpoint added, tests pass, done!
// feature.json still lists old endpoints
// Dependencies section missing the new module
```

**✅ Good Example:**

```typescript

// Good: Verify codedatabase integrity
Agent:
1. Read codedatabase/features/{feature}/feature.json
2. Check: Does summary reflect current state?
3. Check: Are all screens listed?
4. Check: Are dependencies up to date?
5. Flag any misalignments
```

