## Conventions

### Close Process

#### Sequential Closure Flow (🔴 Required)

STATE: CHANGES_REVIEWED
  git diff reviewed, changed files identified
  development context understood

STATE: GOVERNANCE_VALIDATED
  Changelog entry verified
  Screen registry checked (if UI changed)
  Feature summary validated
  Test IDs aligned

STATE: ARCHITECTURE_CHECKED
  Worker delegation verified
  No orchestration leakage
  Review stages not skipped

STATE: IMPROVEMENTS_ASSESSED
  Structural weaknesses identified (if any)
  Suggestions provided with actionable options

STATE: LEARNINGS_CAPTURED
  Mistakes, patterns, and conventions extracted
  Evolution directives produced for affected agents
  Action recommended (apply via /asm, defer, or no action)

STATE: LOOP_CLOSED
  All governance artifacts validated
  Integrity confirmed
  Development loop officially closed

**Rule:** CHANGES_REVIEWED -> GOVERNANCE_VALIDATED -> ARCHITECTURE_CHECKED -> IMPROVEMENTS_ASSESSED -> LEARNINGS_CAPTURED -> LOOP_CLOSED (no skipping)


### Changelog

#### Changelog Completeness Check (🔴 Required)

Check:
1. Does changelog.d/ have an entry file for THIS change? (glob codedatabase/features/{feature-id}/changelog.d/*.json)
2. Is the type correct (feature, fix, enhancement, refactor)?
3. Does the summary accurately describe what was done?
4. Are impacted_screens listed?
5. Are impacted_api endpoints listed?
NOTE: changelog.json is NOT modified during development — entries are merged only during /release or /changelog.

**Rule:** Every shipped change MUST have a corresponding changelog entry file in changelog.d/ with accurate summary, type, and impacted screens


### Screen Registry

#### Screen Spec Alignment (🔴 Required)

If git diff shows changes to:
- src/pages/*.tsx
- src/modals/*.tsx
- src/drawers/*.tsx
- src/components/*.tsx (layout-affecting)

Then verify:
1. codedatabase/screens/{pages|modals|drawers}/<Name>.screen.json updated
2. codedatabase/testids.registry.json includes any new data-testid values
3. Layout changes documented in screen spec

**Rule:** Any UI modification MUST be reflected in the corresponding screen JSON and test ID registry


### Architecture

#### Worker Delegation Integrity (🔴 Required)

Valid delegation:
  APM -> tl-backend -> proc-be-service (writes code)
  Fix Manager -> dev-front (writes code)

Invalid delegation:
  proc-be-service -> Task tool (process agent orchestrating!)
  APM -> Write/Edit tool (orchestrator writing code!)
  tl-frontend -> direct Bash execution (team lead executing!)

**Rule:** Orchestrators delegate, process agents execute. No boundary crossing.


#### Agent System Changelog Traceability (🔴 Required)

If git diff shows changes to:
- agents-system/definitions/**/*.ts
- agents-system/core/**/*.ts
- agents-system/generators/**/*.ts
- .Codex/agents/*.md
- .Codex/commands/*.md

Then verify:
1. A changelog entry file exists in codedatabase/features/{relevant-feature}/changelog.d/
2. The entry type is "refactor" or "enhancement"
3. The summary describes what agent definitions were modified
4. If no entry exists: FLAG as MISSING CHANGELOG ENTRY (agent system) — critical

Rationale: Agent system changes are architectural changes that must be traceable per Article I.4.

**Rule:** When agents-system/ paths appear in the git diff, Close Manager MUST check whether a codedatabase changelog entry exists for the agent system change. If no changelog entry is found in codedatabase/features/ for this evolution, flag it as MISSING CHANGELOG ENTRY (agent system) — critical.


#### Constitution Version Change Traceability (🔴 Required)

If git diff shows changes to:
- agents-system/core/governance/constitution.ts

Then check:
1. Was the version field bumped (e.g., "1.2.0" → "1.3.0")?
2. If YES: verify a changelog entry exists in codedatabase/features/ that mentions the version change
3. If no changelog entry with version transition exists: FLAG as CONSTITUTION VERSION CHANGE NOT LOGGED — critical

The changelog summary MUST explicitly state the version transition (e.g., "Bumped constitution from v1.2.0 to v1.3.0") to ensure governance evolution is fully traceable per Article I.4.

**Rule:** When agents-system/core/governance/constitution.ts appears in the git diff and its version field has changed, flag the absence of a changelog entry as a critical traceability violation


### Learnings

#### Structured Learning Capture (🔴 Required)

LEARNING: Service agent created forms inline instead of in src/forms/
CATEGORY: convention
SEVERITY: medium
DESCRIPTION: proc-be-service agent generated a React form inside a page component instead of src/forms/
AFFECTED_AGENTS: process.frontend.form, process.frontend.page
EVOLUTION_DIRECTIVE: Add explicit restriction to page agent: "NEVER create form elements — delegate to Form Agent"

**Rule:** Every development cycle must produce structured learnings with concrete evolution directives targeting specific agent definitions. Learnings are about agent behavior and process, not codebase improvements.


### Improvements

#### Structured Improvement Suggestions (🟡 Recommended)

Improvement Detected:
  "The error handling pattern in AuthService is duplicated across 4 services"

Options:
  [1] Ignore - Not critical, track for later
  [2] Create task - Add to backlog as refactoring task
  [3] Escalate - Flag for system-level review

Never force improvements. Always let user decide.

**Rule:** Improvement suggestions must be actionable with clear ignore/create-task/escalate options

