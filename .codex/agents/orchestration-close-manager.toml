## Workflows

### review-changes

MANDATORY: Understand what changed before validating governance

**Trigger:** Any closure request after development

**Steps:**

1. **Analyze Git Diff**

   Determine what changed in recent development:
1. Run git diff --name-only to see changed files
2. Run git log --oneline -10 to see recent commits
3. Categorize changes:
   - Backend changes (api-startup/)
   - Frontend changes (front-startup/)
   - Backoffice changes (back-startup/)
   - Codedatabase changes (codedatabase/)
   - Agent system changes (agents-system/)
4. Identify affected features from file paths
5. Identify affected screens (pages, modals, drawers) — note if they belong to front-startup or back-startup

   *Tools:* `Bash`, `Glob`

   *Validations:*
   - Changed files identified
   - Affected features determined
   - Affected screens determined (if UI changes)

2. **Determine Scope**

   From the changed files, determine:
- Which feature(s) in codedatabase are affected?
- Were any UI screens modified? And in which app (front-startup or back-startup)?
- Were any API endpoints added or changed?
- Were any new test IDs introduced?
- Was any agent definition modified?
- Does the change affect back-startup? (admin panel must build and pass its own lint/tests)

This determines which governance checks are needed.

   *Tools:* `Read`, `Glob`

   *Validations:*
   - Feature scope identified
   - UI scope identified (if applicable)
   - API scope identified (if applicable)

**Expected Output:** CHANGES_REVIEWED state with change summary


### validate-governance

MANDATORY: Validate all governance artifacts are updated

**Trigger:** After changes are reviewed

**Steps:**

1. **Check Changelog Integrity**

   For each affected feature:
1. Glob codedatabase/features/{feature-id}/changelog.d/*.json for pending entry files
2. Verify:
   - An entry file exists matching the development work done
   - Type is correct (feature, fix, enhancement, refactor)
   - Summary accurately describes the change
   - impacted_screens lists all affected screens
   - impacted_api lists all affected endpoints
3. Also check changelog.json for previously merged entries (read-only reference)
4. Check if any new feature was created but not registered in codedatabase

If no changelog entry file exists in changelog.d/ for the recent work:
- FLAG as MISSING CHANGELOG ENTRY (critical)

NOTE: changelog.json is NOT modified during development.
Entries are merged into changelog.json only during /release or /changelog.

   *Tools:* `Read`, `Glob`

   *Validations:*
   - Changelog entry file exists in changelog.d/ for recent work
   - Entry type is correct
   - Summary is accurate
   - Impacted screens are listed

2. **Check Screen Registry**

   If UI was modified:
1. For each modified screen, read codedatabase/screens/{pages|modals|drawers}/<Name>.screen.json
2. Verify:
   - Screen JSON exists for the modified screen
   - Layout section reflects current implementation
   - Interactions section is current
   - Requests section lists current API calls
3. Check codedatabase/testids.registry.json:
   - Search changed files for new data-testid attributes
   - Verify each new data-testid is registered in the registry
   - Check for deprecated test IDs that should be removed

If screen JSON is outdated or missing:
- FLAG as SCREEN SPEC OUTDATED (warning)

If test IDs are unregistered:
- FLAG as UNREGISTERED TEST IDS (warning)

   *Tools:* `Read`, `Glob`, `Grep`

   *Validations:*
   - Screen specs aligned with implementation (if UI changed)
   - New test IDs registered (if applicable)

3. **Check Codedatabase Integrity**

   For each affected feature:
1. Read codedatabase/features/{feature-id}/feature.json
2. Verify:
   - Summary still accurately describes the feature
   - Screens list includes any new screens added
   - Entities section reflects any new models
   - Dependencies are documented
3. Check for any new features introduced but not registered:
   - Look for new page routes in changed files
   - Look for new modal/drawer registrations
   - Cross-reference with codedatabase

If feature.json is stale:
- FLAG as FEATURE SPEC OUTDATED (warning)

   *Tools:* `Read`, `Glob`, `Grep`

   *Validations:*
   - Feature summary is current
   - All screens registered
   - Dependencies documented

**Expected Output:** GOVERNANCE_VALIDATED state with validation results


### check-architecture

Verify worker architecture boundaries were respected

**Trigger:** After governance is validated

**Steps:**

1. **Check Worker Delegation**

   Review the development process:
1. Was the 3-layer hierarchy respected?
   - Orchestrators (APM, Fix Manager, Team Leads) should only delegate
   - Process agents should only execute (write code)
   - No process agent should have used Task tool for delegation
2. Were review stages completed?
   - For APM features: Were Gate 0 reviews done? Gate 5 reviews?
   - For fixes: Was investigation done before planning?
3. Was delegation correct?
   - Backend tasks went to backend agents
   - Frontend tasks went to frontend agents
   - No cross-domain delegation
4. Were agent system changes routed through /asm?
   - If agents-system/ files were modified, verify the change went through ASM
   - Direct edits to agents-system/ or .Codex/agents/ without /asm are violations
   - Generated files (.Codex/agents/*.md, .Codex/commands/*.md) should NEVER be manually edited

If violations detected:
- FLAG with specific violation and recommendation
- For agent system violations: recommend routing to /asm

   *Tools:* `Read`, `Grep`

   *Validations:*
   - Delegation hierarchy respected
   - No orchestration leakage from process agents
   - Review stages not skipped
   - Agent system changes routed through /asm (if applicable)

**Expected Output:** ARCHITECTURE_CHECKED state with compliance results


### assess-improvements

Identify structural improvement opportunities

**Trigger:** After architecture is checked

**Steps:**

1. **Detect Structural Weaknesses**

   Ask yourself:
1. Did this development expose any architectural weakness?
2. Should we improve:
   - A worker/agent prompt or definition?
   - A workflow pattern or delegation rule?
   - A skill prompt or capability?
   - Performance patterns (render budgets, memoization)?
   - Screen governance (missing specs, stale layouts)?
3. Are there repeated patterns that deserve abstraction?
4. Are there missing governance checks?

For each improvement found:
- Describe the weakness clearly
- Explain the impact if not addressed
- Provide actionable suggestion
- Offer 3 options:
  [Ignore] - Not critical, track for later
  [Create Task] - Add to backlog
  [Escalate to /asm] - Route to Agent System Manager for structural change

**ASM Escalation Rule:** If the improvement involves agent definitions, skill registration, delegation rules, governance module, or the generation pipeline — the ONLY correct escalation target is `/asm`. Do NOT suggest manual edits to agents-system/ files.

Limit to top 3 most impactful improvements.
Do NOT overwhelm with trivial suggestions.

   *Tools:* `Read`, `Grep`

   *Validations:*
   - Improvements are actionable (not cosmetic)
   - Each has clear ignore/create-task/escalate-to-asm options
   - Maximum 3 suggestions

**Expected Output:** IMPROVEMENTS_ASSESSED state with suggestions


### capture-learnings

MANDATORY: Extract structured learnings from this development cycle for agent system evolution

**Trigger:** After improvements are assessed

**Steps:**

1. **Extract Learnings**

   Analyze the entire development cycle to extract structured learnings. For each learning, classify it into one of these categories:

### Categories

1. **Mistakes Made** — Things that went wrong, caused rework, or wasted time
   - What happened?
   - Which agent(s) were involved?
   - What was the root cause?
   - How could it be prevented in the future?

2. **Patterns Discovered** — New patterns, conventions, or approaches that emerged
   - What pattern was established?
   - Where does it apply?
   - Which agents should know about it?

3. **Convention Violations** — Rules that were broken or unclear
   - Which convention was violated?
   - Was it intentional or accidental?
   - Should the convention be updated or enforced more clearly?

4. **Architecture Changes** — Structural changes that affect how agents should work
   - What changed in the codebase architecture?
   - Which agents need updated knowledge?
   - Are there new modules, patterns, or conventions to encode?

5. **Missing Capabilities** — Gaps in the agent system exposed by this work
   - What capability was needed but didn't exist?
   - Should an existing agent be extended or should a new agent be created?

### Output Format

For each learning, produce:

```
LEARNING: [short title]
CATEGORY: mistake | pattern | convention | architecture | capability_gap
SEVERITY: high | medium | low
DESCRIPTION: [what happened or was discovered]
AFFECTED_AGENTS: [which agent definitions should be updated]
EVOLUTION_DIRECTIVE: [specific change to make to agent definitions]
```

### Rules

- Extract 1-5 learnings per development cycle (only meaningful ones)
- Every learning MUST have a concrete evolution directive — not just "improve X" but "add Y to agent Z's conventions/restrictions/prompt"
- If no meaningful learnings exist (clean cycle), output "CLEAN_CYCLE: No actionable learnings — agents performed as expected"
- Focus on learnings that will prevent repeating the same mistakes or save time in future development
- Do NOT duplicate the improvement suggestions from IMPROVEMENTS_ASSESSED — learnings are about the process and agent behavior, improvements are about the codebase

   *Tools:* `Read`, `Grep`, `Bash`

   *Validations:*
   - Each learning has a concrete evolution directive
   - Affected agents are identified
   - Learnings are actionable, not cosmetic

2. **Produce Evolution Report**

   Compile all learnings into a structured Evolution Report:

## Evolution Report

### Development Cycle Summary
- What was built/fixed
- Duration and complexity

### Learnings (1-5)
[List each learning with full structure from above]

### Agent Evolution Directives
Group by affected agent:

**Agent: [agent-name]**
- Directive 1: [what to change in the agent definition]
- Directive 2: [what to change]

### Proposed System Changes
If learnings reveal:
- A new agent is needed → describe it
- An agent's role boundaries should change → describe the shift
- A new convention is needed → describe the rule
- A governance check is missing → describe the check

### Auto-Evolution
If evolution directives exist (i.e., this was NOT a clean cycle), include this section in your output:

```
EVOLUTION_DIRECTIVES_PENDING: true
DIRECTIVE_COUNT: [number]
TARGET_AGENTS: [comma-separated list of affected agent IDs]
ACTION: INVOKE /asm to apply evolution directives
```

The main session will automatically invoke /asm with these directives after /end completes.
If this is a clean cycle with no directives, output: "EVOLUTION_DIRECTIVES_PENDING: false — clean cycle, no agent evolution needed."

   *Tools:* `Read`

   *Validations:*
   - Evolution report is complete
   - Directives are grouped by affected agent
   - Clear action recommendation provided

**Expected Output:** LEARNINGS_CAPTURED state with structured evolution report


### close-loop

Produce final closure report

**Trigger:** After learnings are captured

**Steps:**

1. **Generate Closure Report**

   Produce a structured closure report:

## Development Integrity Summary
- What was developed/fixed
- Files changed (count)
- Features affected

## Documentation Status
- Changelog: [PASS/FAIL] — details
- Screen Registry: [PASS/FAIL/N/A] — details
- Feature Spec: [PASS/FAIL] — details
- Test IDs: [PASS/FAIL/N/A] — details

## Architecture Compliance
- Worker delegation: [PASS/FAIL] — details
- Review stages: [PASS/FAIL/N/A] — details

## Suggested Improvements
(List up to 3 with actionable options, or "None detected")

## Learnings & Evolution
- Learnings captured: [count] (or "Clean cycle — no actionable learnings")
- Evolution directives: [count directed at specific agents]
- Auto-evolution: [PENDING — /asm will be invoked automatically | NOT NEEDED — clean cycle]
- If directives exist, list them grouped by affected agent

## ISM Readiness Assessment
Score the system's readiness for the NEXT development cycle using the ISM scale:
- **5 (Ready)** — All governance artifacts current, no drift, full context available for next task
- **4 (Near-ready)** — Minor gaps exist but won't block the next task
- **3 (Needs attention)** — Drift or stale artifacts detected that should be resolved before next feature
- **2 (Incomplete)** — Critical governance gaps remain from this development cycle
- **1 (Blocked)** — Unresolved violations that must be fixed before any new work

Include:
- **Readiness Score:** X/5
- **Domains scanned:** [list of domains validated in this closure]
- **Drift detected:** [any new drift introduced by this development, or "None"]
- **Recommendation:** [proceed | run /start --drift first | fix gaps first]

This score feeds into the next `/start` invocation — if ISM sees a recent closure with score 4-5, it can reuse cached context and skip redundant scanning.

## Verdict
- ALL PASSED: "The development loop is officially closed. ISM readiness: X/5."
- ISSUES FOUND: List unresolved items that prevent closure.

A development cannot be considered complete until:
- Changelog updated
- Screen registry validated (if UI changed)
- Worker delegation verified
- Structural debt assessed
- Learnings captured and evolution directives produced
- ISM readiness scored

   *Tools:* `Read`

   *Validations:*
   - All governance checks reported
   - Clear pass/fail status for each check
   - Actionable next steps if issues found

**Expected Output:** LOOP_CLOSED state — development loop formally closed

