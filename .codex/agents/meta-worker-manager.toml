## Conventions

### Naming

#### Worker Directory (🔴 Required)

Worker directories use kebab-case matching the worker name

**Rule:** api-startup/src/modules/ai/workers/{worker-name}/ (e.g., content-writer/, growth-hacker/)


#### File Names (🔴 Required)

Worker files follow a strict naming pattern per tier

**Rule:** {name}.lead.worker.ts, {name}.worker.workflow.ts, {name}.worker.task.ts, {name}.prompt.ts, index.ts


#### Task Key Format (🔴 Required)

Task keys use workerName:taskName in camelCase

**Rule:** ceo:strategicAnalysis, dev:requirementsAnalysis — always prefix with worker name


#### Trigger Key Format (🔴 Required)

Workflow trigger keys use camelCase, unique across the entire system

**Rule:** roadmap, generateBusinessPlan — check registry for collisions before using


### Structure

#### Barrel Export (🔴 Required)

Every worker directory has an index.ts that re-exports all tiers

**Rule:** export * from lead worker, workflow, and task files


#### Lead Worker Export Pattern (🔴 Required)

Lead worker exports a factory function, not a plain object

**Rule:** export const get{Name}WorkerConfig = (tools...) => ({ ... }) satisfying WorkerConfiguration


#### Workflow/Task Array Exports (🔴 Required)

Workflow and task files export both individual consts and a collected array

**Rule:** export const {name}Workflows: FlowWorkerConfig[] = [...] and export const {name}Tasks: TaskWorkerConfig[] = [...]


### Architecture

#### Context Scoping (🔴 Required)

Task workers receive only scoped inputs, never raw project context

**Rule:** Use workflow_context, task_output, mission_input, or static — never project_context


#### Phase DAG (🔴 Required)

Workflow phases must form an acyclic directed graph via dependsOn

**Rule:** Every phase lists its dependencies; first phase has dependsOn: []


#### Mirrored Action Contract (🔴 Required)

Chat-visible worker workflows must preserve an action-compatible runtime contract

**Rule:** Persist actionId, taskToStepMap, initiatingWorkerId, initiatingWorkerSkill, splitView, and userThreadId in workflow inputs; re-own the workflow to the mirrored action


#### Deliverable Ownership (🔴 Required)

User-visible deliverables must be discoverable from action results and the worker Deliverables tab

**Rule:** Save visible Items with ownerType=action, ownerId=actionId, and workerId=the canonical full worker id (for example common:{projectId}:{skill})


#### No Helper Tool Worker IDs (🔴 Required)

Shared artifact tools must inherit the initiating worker identity from context

**Rule:** Never scaffold report/workbook/calendar-style tools that save visible outputs under helper ids such as report-tools, workbook-tools, or calendar-tools


#### Thread Lifecycle Fan-out (🔴 Required)

Workflow runtime must notify task, workflow, and lead threads of lifecycle changes

**Rule:** Persist structured progress/error/result messages to the task-worker thread, the workflow-worker thread, and the lead-worker thread so agents and the frontend can reload the same source of truth


#### Worker Selection Protocol (🔴 Required)

Workflows must be assigned to workers based on knowledge scope, competence, and domain alignment — not surface-level topic similarity

**Rule:** Before assigning a workflow, evaluate candidate workers on: knowledgeAreas overlap, capabilities match, tool coverage, domain alignment. Cross-domain workflows go to broad-context workers (CEO). Narrow workflows go to specialists. Document the selection rationale.


#### Mandatory User Choice Points (🔴 Required)

Every workflow MUST have at least one meaningful user choice step that changes the output direction. Workflows must never be fully automated black boxes.

**Rule:** Add at least one choose/form/review step per workflow. Place direction-setting choices BEFORE generation steps (not after). Offer 3-5 concrete options + allowCustom. Only add choices where the user decision meaningfully changes what gets produced — never ask obvious questions.


#### Choice Design — Options Over Questions (🔴 Required)

Workflows must propose concrete options, not open-ended questions. The lead worker proposes 2-4 meaningful choices; workflows use static or LLM-generated options.

**Rule:** Use PhaseChoiceConfig with predefined options for universal decisions (methodology, approach, scope). Use PhaseChoiceTarget with guidelines for context-dependent decisions where options depend on the user project. Always set allowCustom: true for flexibility. Use clear, descriptive labels with emoji for quick scanning.


#### Review Steps for Critical Intermediate Outputs (🟡 Recommended)

When a workflow produces an intermediate output that shapes all downstream steps (e.g., milestones before tasks, assumptions before forecasts), add a review step so the user can validate direction.

**Rule:** Add ActionStepStatus.review after steps whose output is the foundation for downstream work. The review step pauses execution and lets the user approve, adjust, or request regeneration before proceeding.


#### Graceful Default Without Choices (🔴 Required)

Workflows must produce a good result even if the user skips or ignores a choice step. Choices enhance output — they never gate it.

**Rule:** Define sensible defaults for all choice-dependent parameters. If no selection is made, use the first/most-common option as default. Document the default behavior in the step description.


#### Entity Selection for Context-Dependent Workflows (🔴 Required)

Workflows that operate on a specific entity (product, page, site, team member, worker, or existing item) MUST ask the user which entity to act on. Use requiredContext with fetch_and_propose strategy or a pre-workflow choose step.

**Rule:** If a workflow produces output specific to a product, page, site, team member, worker, or previous deliverable — add entity selection via requiredContext (fetch_and_propose) or a choose step. The selectable entity types are: product, page, site, items (past deliverables), team member, and workers. Never assume which entity the user means — always ask.


#### Item Iteration Support (🟡 Recommended)

Workflows that produce deliverables users may want to iterate on should offer to refine an existing item instead of always creating from scratch.

**Rule:** For workflows producing major deliverables (financial plans, roadmaps, playbooks, strategies), add an optional pre-workflow step: "Create new or update existing?" with entity selection of previous items. Use list_my_items to fetch past deliverables from the same worker.


#### Serializable Prompt Configs (🔴 Required)

Prompt configs MUST be fully serializable as JSON — no function callbacks anywhere in the workflow pipeline

**Rule:** Use promptTransforms array (type: prepend | append | replace | injectSection) instead of function callbacks like postProcess or contextFormatter. No functions in any config that flows through the workflow pipeline. Any non-serializable value in a prompt config will cause silent data loss when the config is persisted to or read from the database.

**✅ Good Examples:**

```
// Use promptTransforms — fully serializable:
promptTransforms: [
  { type: 'prepend', content: 'Always respond in {{language}}.' },
  { type: 'injectSection', section: 'context', content: '{{projectSummary}}' },
]
```

**❌ Bad Examples:**

```
// Function callbacks are NOT serializable and will be lost on persist/reload:
postProcess: (output) => output.trim(),
contextFormatter: (ctx) => `Project: ${ctx.name}`,
```


### Frontend Contract

#### Reload-Safe Workflow Results (🔴 Required)

In-progress workflows must be reconstructible from persisted thread history after page reload

**Rule:** Launch and completion results must preserve type, actionId, workflowId, and splitView so the UI can rebuild action_progress cards and reopen results


#### Localized Worker UX (🔴 Required)

All workflow messages and interactions shown to the user must match the user language

**Rule:** Propagate userLanguage/language/locale through lead, flow, and task runtimes; localize code-owned choices, workflow status messages, file prompts, and structured output language fields


#### Structured Interaction Separation (🔴 Required)

Choices, uploads, and workflow prompts are runtime state, not chat prose

**Rule:** Never inline JSON interactions into chat text; persist prompts/choices/uploads and user answers as structured metadata so reload can reconstruct the workflow state machine


### Registration

#### Triple Registration (🔴 Required)

Every new worker must be registered in three places

**Rule:** worker-index.ts (metadata), worker-workflow.registry.ts (if workflows), tools.service.ts (DI wiring)

