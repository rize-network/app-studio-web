## Mandatory Choice Design for Workflows

Every workflow MUST include at least one meaningful user choice point. Workflows should never be fully automated black boxes — the user must have control over direction-setting decisions.

### Choice Design Principles

1. **Only add choices where they change output quality** — Don't add choices for interaction's sake. Add them where the user's decision meaningfully changes what gets produced. Good: "What's your sales model?" Bad: "Do you want a summary?"

2. **Offer 3-5 concrete options + custom** — Never ask open-ended questions in workflow steps. Always propose specific approaches the AI knows how to execute differently. Set `allowCustom: true` for flexibility.

3. **Place choices BEFORE generation, not after** — Users should steer direction before AI generates, not review after. Post-generation review is for refinement of critical intermediate outputs, not direction-setting.

4. **Use LLM-generated choices for context-dependent decisions** — When the right options depend on the user's project (industry, stage, team size), use `PhaseChoiceTarget` with guidelines so the lead generates contextual options.

5. **Default gracefully without choices** — If a user skips a choice, use the first/most-common option as default. Choices enhance output — they never gate it.

### Choice Implementation Patterns

**Pattern 1: Pre-workflow direction choice (most common)**
Add a `choose` step BEFORE the workflow step to let users set the approach:
```
{
  name: 'chooseApproach',
  type: ActionStepStatus.choose,
  title: 'Choose Approach',
  description: 'Select the approach that best fits your needs',
  choiceConfig: {
    question: 'What approach works best for you?',
    options: [
      { id: 'option1', label: 'Option 1', description: 'Description', emoji: '🎯' },
      { id: 'option2', label: 'Option 2', description: 'Description', emoji: '🚀' },
      { id: 'option3', label: 'Option 3', description: 'Description', emoji: '💡' },
    ],
    allowCustom: true,
    saveAs: 'approach',
  },
}
```

**Pattern 2: Review after critical intermediate output**
Add a `review` step after a generation step whose output shapes all downstream work:
```
{
  name: 'reviewMilestones',
  type: ActionStepStatus.review,
  title: 'Review Results',
  description: 'Review and adjust before proceeding',
}
```

**Pattern 3: Selection from generated variants (creative workflows)**
For workflows producing multiple variants (logo, ads, media), add a selection step:
```
{
  name: 'selectVariant',
  type: ActionStepStatus.choose,
  title: 'Select Preferred Direction',
  description: 'Pick the direction to develop further',
  choiceConfig: {
    sourceStep: 'generateVariants',
    targets: [{ key: 'variants', label: 'Variants', saveAs: 'selectedVariant', required: true }],
  },
}
```

### What Choices to Add — Decision Framework

Ask these questions for each workflow step:

| Question | If YES → Add Choice |
|----------|---------------------|
| Does the workflow operate on a specific product? | Entity selection: which product? |
| Does the workflow target a specific page or site? | Entity selection: which page/site? |
| Does the workflow need a team member? | Entity selection: which team member? |
| Could the user want to iterate on a past deliverable? | Item selection: create new or update existing? |
| Does the approach/methodology vary by industry? | Pre-workflow choose (industry/methodology) |
| Are there fundamentally different strategies? | Pre-workflow choose (strategy type) |
| Does the output change based on company stage? | Pre-workflow choose (stage/maturity) |
| Is there a critical intermediate output? | Review step after that output |
| Does the AI generate multiple variants? | Selection step for user to pick |
| Does scope/depth significantly affect quality? | Pre-workflow choose (scope level) |

### Entity Selection — Selectable Types

Workflows that act on specific entities MUST include entity selection. The selectable types are:

| Entity | When to Ask | How to Fetch |
|--------|------------|--------------|
| **Product** | Workflow output is product-specific (ads, pricing, sales, content) | `get_project_details` → product knowledge |
| **Page** | Workflow targets a specific page (SEO, copywriting, optimization) | `list_my_items` with itemType=page or Page model |
| **Site** | Workflow targets a domain/site (tracking, deployment, SEO) | Site/domain configuration |
| **Items** | User may want to iterate on a previous deliverable | `list_my_items` for past outputs from the same worker |
| **Team Member** | Workflow needs assignment, capacity, or sender identity | `ProjectMember` model via project context |
| **Worker** | Workflow configures or reviews a specific AI agent | Worker registry / custom worker list |

Use `requiredContext` with `strategy: 'fetch_and_propose'` to implement entity selection:
```
requiredContext: [{
  key: 'selectedProduct',
  description: 'Which product this workflow should focus on',
  strategy: 'fetch_and_propose',
  gatherTool: 'get_project_details',
  choicePrompt: 'Which product should we work on?',
  required: true,
}]
```

## Scaffold Workflow

When creating a new worker:

1. **Gather Requirements**: What domain? What capabilities? What workflows? What tools needed?
2. **Read Existing Patterns**: Read a similar existing worker for reference patterns
3. **Create Directory**: `api-startup/src/modules/ai/workers/{worker-name}/`
4. **Create Lead Worker**: `{name}.lead.worker.ts` with WorkerConfiguration
5. **Create Prompt**: `{name}.prompt.ts` with prompt builder function
6. **Create Workflows** (if any): `{name}.worker.workflow.ts` with FlowWorkerConfig[]
7. **Create Tasks** (if any): `{name}.worker.task.ts` with TaskWorkerConfig[]
8. **Design User Choice Points** (MANDATORY): For each workflow, identify at least one meaningful direction-setting decision. Add choose/review steps using the patterns above. Document why each choice matters.
9. **Encode Ownership Contract**: Ensure user-visible outputs are action-owned and use canonical worker ids
10. **Encode Reload Contract**: Ensure launch/completion results preserve `actionId`, `workflowId`, and `splitView`
11. **Encode Language Contract**: Propagate `userLanguage/language/locale` through worker, workflow, task, and structured outputs
12. **Encode Structured Interaction Contract**: Persist choices/uploads/prompts/status as metadata, never inline JSON in chat text
13. **Encode Thread Notification Contract**: Persist and fan out progress/error/result messages to task/workflow/lead threads
14. **Create Index**: `index.ts` barrel file re-exporting all
15. **Register in worker-index.ts**: Add WorkerInfo entry
16. **Register in worker-workflow.registry.ts**: Import and add workflows/tasks (if any)
17. **Register in tools.service.ts**: Import config, instantiate with tools, add to workers record

## Worker System Vision — The 3 Pillars

Every worker you scaffold MUST embody these three architectural pillars. They define what the system does vs. what the LLM does.

### Pillar 1: Configuration Holds the Logic

The workflow is a **declarative configuration**. The system code reads and executes it. No logic needs to be sent as LLM context.

- Phases, task order, dependencies, input/output chains — all live in config
- The runtime (code) interprets the config and drives execution
- This means we save massive amounts of context: the LLM never needs to understand "what to do next" — the system already knows
- When scaffolding workflows, put every deterministic decision into the config, not into prompts

### Pillar 2: Items as Shared Memory

Data produced by one step is stored as **items**, linked between steps, and reused. Each task only receives what it needs — not everything.

- Task outputs become items that subsequent tasks can reference via `task_output` source
- Workflow inputs provide scoped context via `workflow_context` source
- The lead worker curates what goes into workflow inputs — filtering full project context down to what matters
- This is context optimization: instead of passing everything to every task, we store intermediate results and let tasks pull only their dependencies
- Result: each task gets a small, focused input set → better LLM performance, lower cost, more relevant outputs

### Pillar 3: Workers Handle the Unexpected, Not the Expected

The workflow worker's intelligence is reserved for situations that **require judgment**:

1. **Error analysis** — "Something unexpected happened." The LLM analyzes what went wrong and decides how to recover.
2. **User-driven changes** — "The user wants something different." The LLM adapts the workflow: edits tasks, changes inputs, adjusts outputs.
3. **Smart adaptation** — "For this use case, skip step X, add step Y." The LLM customizes the workflow configuration for the specific situation.

**NOT** for executing the normal flow — that's code. The system reads the config and runs each phase/task. The LLM is only invoked when:
- A task's `taskType` is `a2a` (AI thread for creative/analytical work)
- An error occurs that needs diagnosis
- The user requests a change mid-workflow
- The workflow needs dynamic customization before execution

### What This Means for Scaffolding

When you create a worker:
- **Config captures the deterministic path** — phases, dependencies, input chains, output keys
- **Items capture the data** — each step stores its output, next steps reference it by key
- **LLM tasks do only creative/analytical work** — analysis, generation, synthesis, judgment calls
- **The system handles orchestration** — phase ordering, dependency resolution, item storage/retrieval, error routing
- Never put orchestration logic in prompts. Never pass full context when a scoped item reference will do. Never use the LLM for work that code can do deterministically.

## Full Runtime Architecture — How the 3 Layers Actually Work

The system has 3 layers: **Configuration** declares intent, **Prompt Generators** inject awareness, **Runtime** wires execution. Adding a new worker is purely declarative: write 3 config files, register in 2 registries, and the runtime handles everything.

### Layer 1: Configuration (What You Write)

#### Lead Worker Config (`*.lead.worker.ts`)

Lead workers use a **factory function pattern** returning `WorkerConfiguration` (from `@worker-sdk/types`):

```
export const getCFOWorkerConfig = (
  workflowLauncherTools: WorkflowLauncherTools,
  analyticsTools: AnalyticsTools,
  knowledgeTools: KnowledgeTools,
): WorkerConfiguration => ({
  name: 'cfo-worker',
  workerRole: 'lead',           // Always 'lead' on the config itself
  description: '...',
  capabilities: ['...'],
  services: ['FinanceService', ...],
  knowledgeAreas: ['financial', 'project', ...],
  buildPrompt: ({userPrompt, infos, knowledgeAreas}) =>
    CFOAgentPrompt({userPrompt, infos, knowledgeAreas, tools: [...]}),
  buildTools: () => ({
    definitions: [...],
    implementations: [...],
  }),
});
```

**Critical details:**
- `workerRole` is always `'lead'` on the config — the domain identity ('cfo', 'plan') comes from the worker name and NestJS module registration
- Prompts are built by dedicated prompt files (`{role}.prompt.ts`), NOT from a `systemPrompt` string field
- Tool instances are injected via NestJS DI through the factory function parameters
- Lead workers are NOT in `worker-workflow.registry.ts` — they're registered via NestJS module providers

#### Flow Worker Config (`*.worker.workflow.ts`)

Pure declarative config. The `workerRole` field here IS the domain key that links workflows to leads:

```
export const cfoGrantWorkflow: FlowWorkerConfig = {
  triggerKey: 'grant',
  workerRole: 'cfo',        // Links to the cfo lead worker
  phases: [
    { id: 'upload', taskKeys: ['cfo:uploadGrant'], dependsOn: [] },
    { id: 'analyze', taskKeys: ['cfo:analyzeGrant'], dependsOn: ['upload'] },
  ],
};
```

Registered in `worker-workflow.registry.ts` (triggerKey + taskKey lookup).

#### Task Worker Config (`*.worker.task.ts`)

Each task declares its inputs, output key, and prompt config:

```
export const cfoAnalyzeGrant: TaskWorkerConfig = {
  taskKey: 'cfo:analyzeGrant',
  taskType: 'a2a',
  outputKey: 'grantAnalysis',
  inputs: [
    { param: 'grantDoc', source: 'task_output', sourceKey: 'uploadedGrant' },
    { param: 'companyInfo', source: 'workflow_context', sourceKey: 'companyProfile' },
  ],
  promptConfig: { ... },
};
```

### Layer 2: Prompt Generation (How Config Becomes Context)

Each tier has a dedicated prompt generator that reads the config and produces the system prompt:

**Lead Worker prompt stack:**
```
{Role}AgentPrompt()                    ← Domain-specific (ceo.prompt.ts, cfo.prompt.ts)
  ├── Role, mission, capabilities
  ├── Workflow trigger table            ← "When user says X → launch_action_workflow(triggerKey=Y)"
  ├── Decision framework
  ├── generateKnowledgeContextSection() ← Injects project knowledge
  ├── getBoundariesForRole()            ← always/askFirst/never guardrails
  └── generateQualitySection()          ← Quality standards
        │
        ▼ withDiscoveryTools() → createStructuredSystemPrompt()
```

**Structured output contract** — lead workers output JSON, not free text:
`{ language, text, tool_calls, choices, fileUploadRequest }`

**Workflow Worker:** `generate-workflow-worker-prompt.ts` → phase DAG + available tools
**Task Worker:** `generate-prompt.ts` → builds prompt from `GeneratePromptConfig` (the `promptConfig` field)

### Layer 3: Runtime (How Config Gets Executed)

#### Lead Worker Execution
```
WorkerCoordinatorService
├── Resolves WorkerConfiguration from NestJS DI
├── Calls config.buildPrompt() + config.buildTools()
└── ConversationRuntime.runTurn() on user's chat thread
```

#### Workflow Launch — Event-Driven (NOT direct spawn)
When a lead worker calls `launch_action_workflow(triggerKey)`:
1. `registry.getWorkflow(triggerKey)` → finds the FlowWorkerConfig
2. Creates Workflow + Task rows + Action + Thread in DB
3. `generateWorkflowWorkerPrompt()` → builds workflow system prompt
4. `eventEmitter.emit(CONVERSATION_REQUESTED, payload)` → **async event**, decoupled from lead
5. Returns `{ workflowId, actionId, threadId }` immediately to lead worker

#### Workflow Worker Execution
Runs on a dedicated workflow thread via `executeWithTools()` loop (max 50 iterations):
- Reads phase DAG from its system prompt
- Interactive phases → `update_workflow_task_status(WAITING_FOR_INPUT)` → frontend renders form/uploader
- Execution phases → `spawn_worker_agent(taskKey)` → dispatches task worker
- Final → `complete_workflow()` → posts result to user thread

#### Task Worker Execution
Per spawn_worker_agent call:
1. `registry.getTask(taskKey)` → finds the TaskWorkerConfig
2. `resolveTaskInputs(taskConfig.inputs, sources)` → resolves inputs from Workflow.inputs
3. Creates task thread
4. Builds prompt from `promptConfig`
5. If `toolKeys`: `executeWithTools()` loop (10 iter). Else: single `aiService.send()` call
6. Stores result → `Task.result` + merges into `Workflow.inputs`

#### Task Output Storage — The `__taskOutput__` Pattern

Task results are merged back into `Workflow.inputs` under a prefixed key:
```
// After task completes
Workflow.inputs.__taskOutput__<outputKey> = parsedResult;
```

This is how `TaskInputResolver` finds them:
```
case 'task_output':
  // Primary: check sources.taskOutputs[key]
  // Fallback: check __taskOutput__<key> in workflow inputs
```

So `Workflow.inputs` is the **single source of truth** — it holds both initial context AND accumulated task outputs.

#### Thread Hierarchy
```
User Chat Thread (user-facing)
  └── Lead Worker runs here
        └── Workflow Thread (type: 'workflow', isInternal: true)
              └── Workflow Worker orchestrator runs here
                    └── Task Thread(s) (type: 'worker', isInternal: true)
                          └── Individual task workers run here
                                (mapped in Workflow.inputs.taskThreadMap)
```

### Runtime Summary Table

| Aspect | Lead Worker | Workflow Worker | Task Worker |
|--------|------------|-----------------|-------------|
| Config type | WorkerConfiguration (factory fn) | FlowWorkerConfig (declarative) | TaskWorkerConfig (declarative) |
| Prompt builder | {role}.prompt.ts → {Role}AgentPrompt() | generate-workflow-worker-prompt.ts | generate-prompt.ts (from promptConfig) |
| Registry | NestJS DI (module providers) | worker-workflow.registry.ts | worker-workflow.registry.ts |
| Thread | User's chat thread | Dedicated workflow thread | Per-task thread |
| Execution | ConversationRuntime.runTurn() | executeWithTools() loop (50 iter) | Single AI call or executeWithTools() (10 iter) |
| Tools | launch_action_workflow, web search, context | dispatch_task, update_step_status, complete_workflow | Domain tools via toolKeys |
| State storage | In-memory (conversation) | Workflow.inputs (DB) | Task.result + Workflow.inputs.__taskOutput__ (DB) |
| Lifecycle | Persistent (chat session) | Ephemeral (one workflow run) | Ephemeral (one task execution) |

### What This Means When You Scaffold

1. **Lead worker** — Write a factory function that receives tool instances and returns `WorkerConfiguration`. The `buildPrompt` calls your `{role}.prompt.ts`. The `buildTools` returns tool definitions + implementations. Register via NestJS DI in `tools.service.ts`.

2. **Flow worker** — Write pure config. `workerRole` must match the lead worker's domain identity (not `'lead'`). `triggerKey` is how the lead worker launches it. Phases form a DAG via `dependsOn`. Register in `worker-workflow.registry.ts`.

3. **Task worker** — Write pure config. `taskKey` format is `{workerName}:{taskName}`. Inputs reference `workflow_context` (from lead's curated context) or `task_output` (from previous task's `outputKey`). The runtime stores results in `Workflow.inputs.__taskOutput__<outputKey>`. Register in `worker-workflow.registry.ts`.

4. **The beauty** — Config declares intent, prompt generators inject awareness, runtime wires execution. No need to understand the runtime internals. Just write correct config files and the system handles everything else.

