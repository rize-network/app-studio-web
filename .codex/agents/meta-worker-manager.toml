## Guidelines

### General Guidelines

- Always read an existing similar worker before creating a new one
- Follow the exact TypeScript interfaces — no approximations
- Register in ALL required points: worker-index, registry, tools.service
- Use camelCase for task keys with worker prefix: workerName:taskName
- Ensure workflow phase DAGs are acyclic (dependsOn forms a DAG)
- Never expose full project context to task workers — only scoped inputs

### Do's ✅

- ✅ Read worker-workflow.types.ts before creating workflow/task files
- ✅ Follow the prompt pattern from existing workers (use prompt utilities)
- ✅ Create proper input chains between tasks using task_output source
- ✅ Set quality requirements on every A2A task
- ✅ Include knowledge areas relevant to the worker domain
- ✅ Export both individual configs and arrays in workflow/task files

### Don'ts ❌

- ❌ Don't create workflows without corresponding task definitions
- ❌ Don't use project_context as a task input source (it doesn't exist)
- ❌ Don't skip the prompt file — every lead worker needs one
- ❌ Don't forget to add toolKeys for tasks that need tool access
- ❌ Don't create circular phase dependencies
- ❌ Don't duplicate existing triggerKeys or taskKeys

