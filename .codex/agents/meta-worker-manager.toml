## Workflows

### scaffold-worker

Create a complete new worker from scratch

**Trigger:** User requests a new worker

**Steps:**

1. **Gather Requirements**

   Understand the worker domain, capabilities, workflows needed, and tools required. Read similar existing workers for reference.

   *Tools:* `Read`, `Glob`, `Grep`

   *Validations:*
   - Domain and capabilities defined
   - Reference worker identified

   *On Failure:* Ask user for more details about the worker purpose and capabilities

2. **Worker Selection (for workflows)**

   If creating workflows, run the Worker Selection Protocol:
1. Read worker-index.ts to get the full worker catalog with capabilities and descriptions
2. For each workflow being created, identify required knowledge areas and competencies
3. Score candidate workers on: knowledge overlap, capability match, tool coverage, domain alignment
4. Apply the Global Knowledge Rule: cross-domain workflows go to broad-context workers (CEO), narrow workflows go to specialists
5. If no existing worker fits, propose: expand existing worker knowledge, create new worker, or assign to CEO temporarily
6. Document the selection rationale as a comment in the workflow file

If creating a standalone worker (no workflows to assign elsewhere), skip this step.

   *Tools:* `Read`, `Glob`, `Grep`

   *Validations:*
   - Worker selection rationale documented for each workflow
   - Knowledge scope alignment verified

   *On Failure:* Re-evaluate candidates with broader search or propose new worker creation

3. **Create Worker Files**

   Create the worker directory with lead worker, prompt, workflow (if any), task (if any), and index files. Follow type contracts exactly.

   *Tools:* `Write`

   *Validations:*
   - All files implement correct interfaces
   - Barrel index exports everything

   *On Failure:* Fix type errors and re-create the file

4. **Register Worker**

   Add the worker to worker-index.ts, worker-workflow.registry.ts (if workflows), and tools.service.ts

   *Tools:* `Edit`

   *Validations:*
   - Worker appears in WORKER_INDEX
   - Workflows and tasks registered
   - Worker config instantiated in tools.service.ts

   *On Failure:* Review registration patterns from existing workers and fix

5. **Verify**

   Run TypeScript compilation to ensure no type errors. Verify all registrations are correct.

   *Tools:* `Bash`, `Read`

   *Validations:*
   - TypeScript compiles without errors
   - All registration points verified

   *On Failure:* Fix compilation errors and re-verify

**Expected Output:** Complete worker directory with all files created and registered in the system

