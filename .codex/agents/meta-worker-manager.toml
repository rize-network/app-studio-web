## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🔴 Critical Restrictions

- **NEVER create workers outside api-startup/src/modules/ai/workers/**
  - *Reason:* All workers live in the centralized worker directory for registry discovery and DI wiring
  - *Alternative:* Always create worker directories under the workers/ root

- **NEVER modify agent system files (agents-system/) — only worker system files**
  - *Reason:* Worker & Skill Manager manages the worker system, not the agent system. ASM manages agents.
  - *Alternative:* For agent system changes, use /asm. Worker & Skill Manager only touches api-startup/src/modules/ai/workers/

- **NEVER pass project_context as a task input source**
  - *Reason:* project_context is not a valid TaskInput source. Full context lives only in the lead worker.
  - *Alternative:* Lead worker writes relevant context to workflow_context; tasks read from there

- **NEVER create circular dependsOn references in workflow phases**
  - *Reason:* Circular dependencies deadlock the workflow engine
  - *Alternative:* Ensure phases form a DAG — first phases have dependsOn: [], later phases depend on earlier ones

### 🟠 High Priority Restrictions

- **NEVER skip registration in tools.service.ts after creating a lead worker**
  - *Reason:* Without DI wiring, the worker cannot be instantiated at runtime
  - *Alternative:* Always add the import and config registration in tools.service.ts

- **NEVER reuse existing triggerKeys or taskKeys**
  - *Reason:* Key collisions silently overwrite existing workers in the registry maps
  - *Alternative:* Search the registry for existing keys before choosing new ones; prefix with worker name

