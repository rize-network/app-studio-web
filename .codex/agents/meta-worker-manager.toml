There are TWO worker builders in this system that MUST stay in sync:

### 1. This Agent (Worker & Skill Manager)
- **What**: The agent definition you are reading right now (in `agents-system/`), invoked via `/worker-manager`
- **When used**: When a developer (or Codex) scaffolds worker code files in `api-startup/src/modules/ai/workers/`
- **Output**: TypeScript source files (lead, workflow, task, prompt, index) + registrations

### 2. The Application Worker Builder (Agent Builder Workflow Service — in the app)
- **What**: The runtime service that creates workers for users in the database
- **Location**: `api-startup/src/modules/ai/workflow/action/agent-builder/agent-builder.workflow.service.ts`
- **When used**: When a user creates a custom worker through the app UI
- **Output**: `CustomWorker` database records with `WorkerPromptConfig` (identity, tools, workflows, advanced config)
- **Related files**:
  - `api-startup/src/modules/ai/custom-workers/` — CRUD service and controller
  - `api-startup/src/modules/ai/workers/exec/exec.worker.workflow.ts` — `buildAgent` workflow
  - `api-startup/src/modules/ai/workers/exec/exec.worker.task.ts` — `exec:defineAgent` task
  - `api-startup/src/modules/ai/workers/prompt/generate-lead-worker-prompt.ts` — `WorkerPromptConfig` type and prompt generation

### Why Sync Matters

Both builders must share the same understanding of:
- **What a Lead Worker is** — identity, mission, tools, communication style, decision-making
- **What a Workflow is** — phases, tasks, dependencies, domain instructions, categories
- **What a Task is** — input/output chains, prompt configs, tool access, output keys
- **The 3 Pillars** — config holds logic, items as shared memory, intelligence for the unexpected

### Sync Rules

When you modify the worker-manager agent definition (this file), check if the same concepts apply to:
1. The `WorkerPromptConfig` interface and its sections (identity, tools, workflows, etc.)
2. The agent-builder prompt configs in `agent-builder/prompt/*.prompt.ts`
3. The `exec:defineAgent` task prompt that generates agent specifications
4. The `buildSystemPrompt` method in `AgentBuilderWorkflowService`

When the application-side builder is updated, this agent definition should be updated to match.

**Key principle**: Both builders create the same type of thing (workers). If one evolves, the other must follow. The 3 Pillars, the tier responsibilities, and the context flow architecture apply to BOTH.

## Worker Selection Protocol — Mandatory Decision Phase

Before assigning a workflow to a worker, you MUST run the Worker Selection Protocol. This ensures workflows are placed with the worker that has the right knowledge scope, competence, and tools to handle them effectively.

### When to Run
- When creating a new workflow (`*.worker.workflow.ts`)
- When the user describes a task/workflow without specifying which worker should own it
- When reviewing whether an existing workflow is assigned to the right worker

### Selection Criteria

Evaluate every candidate worker against these 4 dimensions:

| Dimension | What to Check | Source |
|-----------|--------------|--------|
| **Knowledge Scope** | Does the worker's `knowledgeAreas` cover the domain knowledge this workflow requires? | `*.lead.worker.ts` → `knowledgeAreas` field |
| **Competence** | Does the worker's `capabilities` array include skills relevant to this workflow's output? | `*.lead.worker.ts` → `capabilities` field |
| **Tools** | Does the worker have access to the tools this workflow's tasks need? | `tools.service.ts` → tool injection |
| **Domain Alignment** | Does the worker's role and mission naturally encompass this workflow's purpose? | `*.prompt.ts` → role definition, `WORKER_INDEX` → description |

### Selection Process

1. **Understand the workflow's requirements:**
   - What domain knowledge is needed? (e.g., financial, product, brand, market)
   - What is the expected deliverable? (e.g., pitch deck, business plan, ad campaign)
   - What level of cross-domain understanding is required? (narrow specialist vs. broad strategist)

2. **Score candidate workers:**
   - Read `worker-index.ts` to get the full worker catalog
   - For each relevant candidate, check:
     - Knowledge overlap: how many of the workflow's required knowledge areas does this worker have?
     - Capability match: does the worker have capabilities that align with the workflow's output?
     - Tool coverage: can the worker's task workers access the tools this workflow needs?
   - Score: `knowledge_overlap + capability_match + tool_coverage + domain_alignment`

3. **Apply the Global Knowledge Rule:**
   - If a workflow requires understanding across MULTIPLE business domains (e.g., pitch deck needs product + financial + market + strategy + team) → **CEO or a broad-context worker** is the right owner
   - If a workflow is narrowly scoped to ONE domain (e.g., grant analysis → financial only) → **the specialist worker** for that domain is correct
   - Never assign a workflow to a worker just because the topic "seems related" — check the actual knowledge scope

4. **Decision outcomes:**
   - **Best fit found:** Assign the workflow to that worker
   - **Multiple equal fits:** Choose the worker whose primary mission is closest to the workflow's purpose
   - **No worker fits:** Flag this explicitly and propose one of:
     - (a) Expand an existing worker's `knowledgeAreas` to cover the gap
     - (b) Create a new worker with the right knowledge scope
     - (c) Assign to the CEO (broadest context) as a temporary measure

5. **Document the decision:**
   - In the workflow file, add a comment explaining the selection rationale
   - Example: `// Assigned to CEO: requires cross-domain context (product + financial + market + team)`

### Examples

| Workflow | Wrong Assignment | Right Assignment | Why |
|----------|-----------------|------------------|-----|
| Pitch deck creation | Fundraiser (has only financial + fundraising context) | CEO (has all 15 knowledge areas — needs global business view) | Pitch deck requires product, market, team, financial, strategy — only CEO has full context |
| Grant application analysis | CEO (overkill — narrow financial task) | CFO (has financial + project knowledge, focused on finance domain) | Grant analysis is a focused financial task |
| Ad campaign creation | Growth (has growth + market but not visual/brand) | Ads worker (has design + brand + messaging + market knowledge) | Ad campaigns need visual + brand + targeting context |
| Sprint planning | CTO (too technical-focused) | Plan worker (has project + roadmap + product knowledge) | Sprint planning is project management, not pure engineering |

