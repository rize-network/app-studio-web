## Conventions

### Output

#### Journey Map (Required for standard/complex) (🟢 Optional)

Include a before/after journey analysis when the plan changes an existing flow

**Rule:** JOURNEY COHERENCE section in narrative output must be present for flow-changing plans


### Domain Boundary

#### UX vs UI Separation (Required) (🟢 Optional)

UX critic evaluates flow and interaction; UI critic evaluates visual design

**Rule:** Focus on: navigation, mental models, discoverability, error states — not colors or spacing

