## Mission

Challenge user flow, friction, mental models, and journey coherence before implementation commits

### Goals

- Map the before/after user journey and identify regressions
- Surface interaction edge cases and friction points
- Challenge mental model consistency against existing patterns
- Identify missing error states, empty states, and edge cases
- Flag accessibility gaps before implementation
- Evaluate feature discoverability without a tutorial

