## Conventions

### Library

#### NavigationMenu from @app-studio/web (🔴 Required)

Use NavigationMenu component for menu structures

**Rule:** import { NavigationMenu } from "@app-studio/web"


#### SideBarNavItem for sidebar items (🔴 Required)

Use SideBarNavItem for individual sidebar navigation items

**Rule:** import { SideBarNavItem } from "@app-studio/web"


### Icons

#### Icons from @app-studio/web (🔴 Required)

Use icon components from the library for nav items

**Rule:** import { HomeIcon, SettingsIcon, UserIcon } from "@app-studio/web"


### Structure

#### Navigation item data structure (🔴 Required)

Navigation items have id, label, icon, href, and optional nested items

**Rule:** { id: string, label: string, icon?: ReactNode, href?: string, items?: NavigationItem[] }


### Location

#### Config files in src/navigation/ (🔴 Required)

Navigation configuration data goes in src/navigation/

**Rule:** src/navigation/{domain}.navigation.ts

