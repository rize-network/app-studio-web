## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🔴 Critical Restrictions

- **Never use fetch() or axios**
  - *Reason:* Navigation is static configuration, not API-driven

### 🟠 High Priority Restrictions

- **NEVER build custom navigation menu components**
  - *Reason:* @app-studio/web provides NavigationMenu and SideBarNavItem
  - *Alternative:* Use NavigationMenu for menus, SideBarNavItem for sidebar items

- **NEVER hardcode navigation items in components**
  - *Reason:* Navigation config should be in data files for maintainability
  - *Alternative:* Create navigation config in src/navigation/{domain}.navigation.ts

- **Never define routes in navigation components**
  - *Reason:* Route registration is Wiring Agent territory
  - *Alternative:* Navigation uses href for links, Wiring Agent registers routes

---

