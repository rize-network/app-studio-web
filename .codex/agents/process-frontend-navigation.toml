## Common Errors to Avoid

### Library

#### ℹ️ Building a custom navigation menu from scratch with divs and links

**Why:** @app-studio/web provides NavigationMenu with built-in active state, nested items, and keyboard navigation

**Correct approach:** Use NavigationMenu from @app-studio/web for all menu structures


#### ℹ️ Building custom sidebar nav items instead of using SideBarNavItem

**Why:** SideBarNavItem provides consistent icon + label layout, active state styling, and collapse behavior

**Correct approach:** Use SideBarNavItem from @app-studio/web for sidebar navigation items


### Configuration

#### ℹ️ Hardcoding navigation items directly in component JSX

**Why:** Hardcoded items are difficult to maintain, cannot be reused, and scatter navigation logic

**Correct approach:** Create navigation config in src/navigation/{domain}.navigation.ts and import it


### Scope

#### ℹ️ Defining route registrations inside navigation components

**Why:** Route registration is the Wiring Agent responsibility — navigation only provides links

**Correct approach:** Use href for navigation links, let the Wiring Agent handle route registration


### Icons

#### 🟠 Using raw SVGs or third-party icon libraries for navigation icons

**Why:** @app-studio/web exports consistent icon components that match the design system

**Correct approach:** Import icon components from @app-studio/web (HomeIcon, SettingsIcon, UserIcon, etc.)


### State

#### 🟠 Not supporting active state on navigation items

**Why:** Users need visual feedback about their current location in the app

**Correct approach:** Pass isActive prop to SideBarNavItem or defaultActiveItemId to NavigationMenu

