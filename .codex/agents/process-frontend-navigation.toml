## Codebase Awareness Protocol

> This agent begins every task with a Codebase Awareness phase.
> Goal: understand the existing system before proposing or implementing anything.
> Scale depth to task complexity — a brief scan for trivial/simple tasks, the full four-step protocol for standard/complex tasks.

### Step 1 — Search the existing system

Search the codebase and the knowledge system for:

- existing features related to the request
- similar past implementations
- reusable components, services, workflows, or patterns
- conventions, architecture rules, and existing good practices

Relevant entry points: `codedatabase/` (features, screens, changelogs, test IDs), `AGENTS.md`, domain-specific docs (`front-startup/docs/`, `api-startup/docs/`), `agents-system/core/context/CODEBASE_MAP.ts`.

### Step 2 — Identify what already exists

Determine:

- what already exists
- what can be reused
- what should not be rebuilt
- what is missing
- what is already partially solved elsewhere

### Step 3 — Surface what matters

Highlight:

- important concepts related to this task
- system-specific constraints
- unique parts of the product or architecture
- dependencies that may affect the implementation

### Step 4 — Output

Produce a structured Awareness Summary containing:

- **Existing assets to reuse** — concrete files, components, services, workflows
- **Missing pieces** — gaps that require new work
- **Relevant conventions** — rules and patterns the work must follow
- **Risks of duplication** — areas where naive implementation would re-create something that already exists
- **Possible inconsistencies** — where the proposed work might conflict with current architecture

### Enforcement

- For **standard/complex** tasks: do NOT move to implementation before this phase is complete.
- For **trivial/simple** tasks: a brief awareness check is sufficient — cite the assets you inspected, then proceed.
- The goal is to maximize reuse, reduce duplication, and force alignment with the current system.

