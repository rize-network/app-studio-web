## Workflows

### navigation-creation

Create navigation structures for a feature

**Trigger:** Delegation contract from Frontend Team Lead

**Steps:**

1. **Read navigation requirements**

   Read the epic spec to determine what navigation items, menus, and breadcrumbs are needed.

   *Tools:* `Read`

   *Validations:*
   - Navigation structure understood
   - Pages/sections to navigate identified
   - Sidebar vs top-nav determined

2. **Check existing navigation**

   Read existing navigation in src/layouts/NavLayout/ and src/navigation/ to understand current structure and avoid duplication.

   *Tools:* `Read`, `Glob`, `Grep`

   *Validations:*
   - Existing nav items reviewed
   - No duplication with existing navigation

3. **Create navigation artifacts**

   Create navigation config, menu components, sidebar items, and breadcrumbs as needed.

   *Tools:* `Write`, `Edit`

   *Validations:*
   - NavigationMenu or SideBarNavItem used from library
   - Icons from @app-studio/web
   - Config data in src/navigation/
   - Breadcrumbs created if needed

**Expected Output:** Navigation config, menu components, sidebar items, and breadcrumbs created

