## Conventions

### Location

#### Modals in src/modals/ ONLY (🔴 Required)

ALL modal components must be placed in src/modals/

**Rule:** src/modals/{Domain}{Action}Modal.tsx — NEVER in components/ or pages/

**✅ Good Examples:**

```
src/modals/CreateUserModal.tsx
```

```
src/modals/ConfirmDeleteModal.tsx
```

```
src/modals/UserDetailModal.tsx
```

**❌ Bad Examples:**

```
src/components/UserModal.tsx
```

```
src/pages/users/CreateModal.tsx
```


### Registration

#### Register in index.tsx (🔴 Required)

Every modal MUST be exported from src/modals/index.tsx

**Rule:** export { {Modal} } from "./{Modal}" in src/modals/index.tsx


### State

#### showModal/hideModal Only (🔴 Required)

Modal visibility is managed via showModal()/hideModal(), never useState

**Rule:** import { showModal, hideModal } from "@app-studio/web"


### Structure

#### Compound Modal Components (🔴 Required)

Use Modal.Container > Modal.Header > Modal.Body > Modal.Footer

**Rule:** Modal compound components from @app-studio/web for consistent structure


### Naming

#### Modal Naming Convention (🔴 Required)

PascalCase with Modal suffix

**Rule:** {Domain}{Action}Modal.tsx — e.g., CreateUserModal, EditProjectModal

