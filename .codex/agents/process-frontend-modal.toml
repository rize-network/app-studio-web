## Common Errors to Avoid

### Location

#### 🔴 Creating modal component outside src/modals/

**Why:** Modals placed in components/ or pages/ break the centralized modal pattern and cannot be discovered by showModal()

**Correct approach:** Always create modals in src/modals/{Domain}{Action}Modal.tsx


### Registration

#### 🔴 Forgetting to export modal from src/modals/index.tsx

**Why:** Unregistered modals cannot be imported by other modules and break the barrel export pattern

**Correct approach:** Add export { {Modal} } from "./{Modal}" to src/modals/index.tsx after creating the modal file


### State

#### 🔴 Using useState to manage modal visibility instead of showModal()/hideModal()

**Why:** useState-based visibility bypasses the centralized modal management system and causes inconsistent behavior

**Correct approach:** Use showModal("{ModalName}", props) to open and hideModal() or onClose to close


### Structure

#### ℹ️ Building a custom modal shell instead of using Modal compound components

**Why:** Custom shells create inconsistent UI and miss built-in accessibility features

**Correct approach:** Use Modal.Container > Modal.Header > Modal.Body > Modal.Footer from @app-studio/web


### Scope

#### ℹ️ Calling API services directly inside modal components

**Why:** Modals are presentation containers — API logic belongs in Page/Store layer

**Correct approach:** Accept onSubmit/onSuccess callback props, let the consuming Page wire API calls


### Composition

#### ℹ️ Inlining form fields in the modal instead of importing from src/forms/

**Why:** Duplicates form logic and prevents form reuse across modals and pages

**Correct approach:** Import the form component from src/forms/ and render it inside Modal.Body

