## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🔴 Critical Restrictions

- **NEVER create modals outside src/modals/**
  - *Reason:* Convention requires all modals centralized in src/modals/
  - *Alternative:* Always write to src/modals/{Domain}{Action}Modal.tsx

- **NEVER use useState for modal visibility**
  - *Reason:* showModal()/hideModal() manages modal state centrally
  - *Alternative:* Use showModal() to open, hideModal() or onClose to close

- **NEVER forget to register in src/modals/index.tsx**
  - *Reason:* Unregistered modals cannot be opened via showModal()
  - *Alternative:* Always add export to src/modals/index.tsx after creating modal

- **Never use fetch() or axios**
  - *Reason:* All API calls via generated services, not in modals

### 🟠 High Priority Restrictions

- **Never call APIs directly in modals**
  - *Reason:* Modals receive callbacks — Page/Store handles API calls
  - *Alternative:* Accept onSubmit/onSuccess props, let Page Agent wire to store/API

