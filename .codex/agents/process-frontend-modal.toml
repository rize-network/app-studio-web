## Workflows

### modal-creation

Create modals for a domain feature

**Trigger:** Delegation contract from Frontend Team Lead

**Steps:**

1. **Read delegation + Group A outputs**

   Read the modal requirements from delegation contract. Read Form Agent output (forms in src/forms/) and Component Agent output (components) to understand what goes inside modals.

   *Tools:* `Read`, `Glob`

   *Validations:*
   - Modal requirements understood
   - Form/component dependencies identified

2. **Create modal components**

   Create each modal in src/modals/ using Modal compound components. Import forms/components from Group A outputs.

   *Tools:* `Write`

   *Validations:*
   - Modal.Container > Header > Body > Footer structure
   - Forms imported from src/forms/
   - Components imported from components/
   - Props interface with onClose + onSuccess

3. **Register modals**

   Add export statements for all new modals to src/modals/index.tsx

   *Tools:* `Read`, `Edit`

   *Validations:*
