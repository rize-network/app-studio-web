**Rule:** ISSUE_RECEIVED → INVESTIGATED → PLANNED → FIXED → VERIFIED (no skipping)


### Investigation

#### Codedatabase-First Investigation (🔴 Required)

Step 1: Read codedatabase/features/{feature-id}/feature.json
→ Understand: screens, entities, flows, dependencies

Step 2: Read codedatabase/features/{feature-id}/changelog.json + glob changelog.d/*.json
→ Check: did a recent change introduce this bug?

Step 3: Read codedatabase/screens/{screen}.screen.json (if UI bug)
→ Understand: layout, interactions, test IDs, requests

Step 4: NOW investigate source code with targeted reads
→ You already know WHERE to look

**Rule:** ALWAYS read codedatabase before investigating code


#### Root Cause Documentation (🔴 Required)

## Root Cause Analysis

**Symptom:** Login button shows "undefined" error message
**Expected:** Should show "Invalid email or password"

**Investigation:**
1. LoginForm.tsx:42 — catches error from useAuthStore.login()
2. useAuthStore.ts:67 — login() calls authService.login()
3. authService.ts:23 — throws { code: "INVALID_CREDENTIALS", message: "..." }
4. LoginForm.tsx:45 — displays error.response.data.message
5. BUT: API returns { error: { code: ..., message: ... } } (nested)

**Root Cause:** LoginForm reads error.response.data.message
but API returns error.response.data.error.message (extra nesting)

**Fix:** Update error path in LoginForm.tsx:45

**Rule:** Document root cause clearly before planning fix


### Fix Scope

#### Minimal Fix Principle (🔴 Required)

✅ CORRECT — Minimal fix
Issue: Error message shows "undefined"
Fix: Change error path from data.message to data.error.message (1 line)

❌ WRONG — Scope creep
Issue: Error message shows "undefined"
Fix: Refactor entire error handling, add error boundary,
create ErrorDisplay component, update all forms...

**Rule:** Fix ONLY the reported issue. No refactoring, no improvements, no scope creep.


### Delegation

#### Agent Selection for Fixes (🔴 Required)

Backend fix → dev-api
  Examples: API errors, service logic, Prisma queries, DTOs

Frontend fix → dev-front
  Examples: UI bugs, state issues, component rendering, forms

Full-stack fix → dev-api FIRST, then dev-front
  Examples: API returns wrong data AND UI handles it wrong

Security fix → security-api or security-front
  Examples: Auth bypass, XSS, injection

For simple single-area fixes, delegate directly (no team leads needed).
For complex multi-area fixes, use team leads (tl-backend, tl-frontend).

**Rule:** Delegate to the agent matching the fix area


### Verification

#### Fix Verification Checklist (🔴 Required)

Verification Checklist:
1. ✅ Existing tests still pass (npm run test)
2. ✅ Regression test added for the specific bug
3. ✅ Lint passes (npm run lint)
4. ✅ TypeScript compiles (tsc --noEmit)
5. ✅ changelog entry file added to codedatabase changelog.d/
6. ✅ Screen spec updated (if UI changed)
7. ✅ Test IDs updated (if new test IDs added)

**Rule:** Every fix MUST be verified before marking complete


### Codedatabase

#### Codedatabase Sync for New Models and Modules (🔴 Required)

Post-fix verification checklist — new model/module case:
1. ✅ changelog entry file added to changelog.d/ with type "fix" or "feature"
2. ✅ feature.json entities[] updated to include new model (if applicable)
3. ✅ feature.json fileReferences.backend updated to include new files
4. ✅ feature.json dependencies[] still accurate after module additions
5. ✅ If no feature entry exists → create codedatabase/features/{subsystem}/feature.json

**Rule:** If the fix introduces new Prisma models, new NestJS modules, or deletes legacy code, add a changelog entry file to codedatabase/features/{affected-feature}/changelog.d/ AND verify feature.json entities/dependencies are still current. If no feature entry exists for the affected subsystem, create one.


#### Dead-Code Deletion fileReference Scan (🔴 Required)

Post-deletion step:
1. Identify all deleted file paths from the fix
2. Grep codedatabase/features/*/feature.json for each deleted path
3. If a match is found:
   - Flag the entry as STALE (or remove it if no replacement)
   - Update fileReferences.backend with the replacement path (if applicable)
4. Do NOT close the fix loop until all stale references are resolved

**Rule:** After any dead code deletion, scan codedatabase/features/*/feature.json fileReferences.backend for paths that no longer exist. If found, flag them as STALE and update or remove them before closing the loop.


#### Screen Spec Drift Scan (🔴 Required)

// During investigate or update-codedatabase step:
1. Identify which screen spec corresponds to the modified component
   e.g. PitchDeckEditorPage.screen.json for editor.pitchDeck.page.tsx
2. Verify spec.route matches the actual router config entry
   (grep RouterConfig.tsx for the component path)
3. Verify every spec.canonical_test_ids[].test_id still exists in the code as data-testid=""
4. If drift found:
   - Do NOT rename or fix in this PR (scope creep)
   - Log a follow-up note in the Close Manager handoff:
     "Pre-existing drift on {Screen}.screen.json — route field X does not match actual route Y; testid 'canonical' not in code. Track as separate alignment task."
   - Close Manager will pick it up and surface it as a Suggested Improvement.

**Rule:** When a fix modifies a UI component linked to a screen spec, scan that spec for route and canonical_test_ids drift against the current code BEFORE closing. Flag mismatches as "pre-existing drift, not introduced by this fix" and surface them as follow-up items — do NOT silently fix them (scope creep) and do NOT ignore them (invisible debt).


#### Mandatory Changelog Entry (Drop Directory) (🔴 Required)

File: codedatabase/features/user-authentication/changelog.d/CLG-user-authentication-0011.json

Contents (single object, NOT an array):
{
  "id": "CLG-user-authentication-0011",
