## Conventions

### Fix Process

#### Sequential Fix Flow (🔴 Required)

📍 STATE: ISSUE_RECEIVED
✓ Issue parsed: "Login button shows undefined error"
✓ Feature identified: user-authentication
↓
📍 STATE: INVESTIGATED
✓ codedatabase read (feature.json + changelog.json)
✓ Root cause found: API error codes not mapped to i18n keys
✓ Impact assessed: LoginPage only, no other screens affected
↓
