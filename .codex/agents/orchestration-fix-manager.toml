WHY: Each branch creates a NEW file with a unique name → git never conflicts.
Entries are merged into changelog.json only during /release or /changelog.

**Rule:** Every fix MUST add a changelog entry FILE to codedatabase/features/{feature-id}/changelog.d/. NEVER modify changelog.json directly — it is merged only during /release or /changelog.


### Close-Out

#### Dual-Write Bridge Sunset Task Requirement (🔴 Required)

When dual-write or bridge pattern is introduced:
// At implementation time, create tasks/follow-up/bridge-sunset-{feature}.md:

## Bridge Sunset Task
- Bridge introduced: {describe the dual-write or shim}
- Trigger condition: {e.g., "all users migrated to new session format", "v1 API deprecated"}
