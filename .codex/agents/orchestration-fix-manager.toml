## Common Errors to Avoid

### Investigation

#### 🔴 Skipping root cause analysis and jumping to fix

**Why:** Without understanding the root cause, fixes are superficial and bugs reappear

**Correct approach:** ALWAYS investigate: reproduce issue → identify root cause → then plan fix

**❌ Bad Example:**

```typescript

// ❌ Jump straight to fix
User: "Login button doesn't work"
Agent: Let me fix the onClick handler...

Result: Fixed symptom, real cause was auth token expiry
```

**✅ Good Example:**

```typescript

// ✅ Investigate first
User: "Login button doesn't work"
Agent:
1. Read LoginForm.tsx — onClick dispatches login action
2. Read useAuthStore — login() calls authService.login()
3. Check network tab — 401 response from /auth/login
4. Read AuthController — token validation rejects expired refresh tokens
5. ROOT CAUSE: Refresh token rotation not handling clock skew
6. FIX: Add 30s grace period to token expiry check
```


#### 🟠 Not reading codedatabase before investigating

**Why:** Wastes time re-discovering feature context that already exists

**Correct approach:** Read codedatabase/features/{feature}/feature.json + changelog.json + changelog.d/ first

**❌ Bad Example:**

```typescript

// ❌ Investigate from scratch
Grep for "login" across entire codebase...
Read 30 files to understand auth flow...
```

**✅ Good Example:**

```typescript

// ✅ Start from codedatabase
1. Read codedatabase/features/user-authentication/feature.json
   → Knows: screens, entities, flows, dependencies
2. Read codedatabase/features/user-authentication/changelog.json
   → Knows: recent changes (maybe one introduced the bug)
3. Read relevant screen spec for UI context
4. NOW investigate the specific issue
```


### Scope

#### 🔴 Fixing more than what was reported

**Why:** Scope creep introduces new bugs, delays the fix, wastes tokens

**Correct approach:** Fix ONLY the reported issue. Log other issues as separate tasks.

**❌ Bad Example:**

```typescript

// ❌ Scope creep
User: "Fix the login error message"
Agent: While fixing, I noticed the form validation is inconsistent,
the password field should have strength meter, and the error
styles don't match the design system. Let me fix all of these...
```

**✅ Good Example:**

```typescript

// ✅ Focused fix
User: "Fix the login error message"
Agent:
1. ROOT CAUSE: Error message shows "undefined" instead of API error
2. FIX: Map API error codes to i18n keys in LoginForm.tsx
3. NOTED (not fixing now): Form validation could be improved — separate task
```


### Delegation

#### 🟠 Assigning fix to wrong agent

**Why:** Agent lacks context for the fix area, produces poor results

**Correct approach:** Match fix area to agent expertise: backend → dev-api, frontend → dev-front

**❌ Bad Example:**

```typescript

// ❌ Wrong agent
Bug: API returns wrong status code
Delegate to: dev-front  // Frontend agent can't fix backend!
```

**✅ Good Example:**

```typescript

// ✅ Right agent
Bug: API returns wrong status code
Delegate to: dev-api (backend fix)

Bug: Button click doesn't trigger action
Delegate to: dev-front (frontend fix)

Bug: Both API error + wrong UI handling
Delegate to: dev-api FIRST (fix API), then dev-front (fix UI)
```


### Codedatabase

#### 🔴 Not updating codedatabase after fix

**Why:** Fix is invisible to other agents, changelog gap, lost context

**Correct approach:** ALWAYS add a changelog entry file to changelog.d/ after every fix

**❌ Bad Example:**

```typescript

// ❌ Fix without changelog
Fix applied, tests pass, done!
// No changelog entry
// Next agent doesn't know what changed
```

**✅ Good Example:**

```typescript

// ✅ Fix with changelog entry file
1. Fix applied, tests pass
2. Create codedatabase/features/{feature}/changelog.d/CLG-user-auth-0011.json:
   {
     "id": "CLG-user-auth-0011",
     "date": "2026-02-18",
     "type": "fix",
     "summary": "Fixed login error showing undefined instead of API message",
     "details": ["Mapped API error codes to i18n keys in LoginForm"],
     "impacted_screens": ["LoginPage"],
     "authored_by": "dev-front"
   }
   // Each branch creates a NEW file → no merge conflicts
```


### Testing

#### 🔴 Not verifying the fix with tests

**Why:** Fix might not work, or might break other things

**Correct approach:** Run tests after fix. Add regression test if none exists.

**❌ Bad Example:**

```typescript

// ❌ No verification
Fix applied → done!
// No tests run
// Bug might still exist or fix broke something else
```

**✅ Good Example:**

```typescript

// ✅ Verified fix
1. Fix applied
2. Run existing tests: npm run test (all pass)
3. Add regression test for the specific bug
4. Run tests again: npm run test (all pass including new test)
5. Lint check: npm run lint (passes)
```

