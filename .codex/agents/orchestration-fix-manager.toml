## Workflows

### investigate

MANDATORY: Investigate the bug before planning any fix

**Trigger:** Any bug report or issue

**Steps:**

1. **Parse Issue**

   Parse the bug report:
- What is the symptom? (what the user sees)
- What is the expected behavior?
- Which feature is affected?
- Which screen/page is affected?
- Any error messages or steps to reproduce?

   *Tools:* `Read`

   *Validations:*
   - Symptom identified
   - Feature identified
   - Screen identified (if UI bug)

2. **Read Codedatabase**

   MANDATORY before investigating code:
1. Read codedatabase/features/{feature-id}/feature.json
   → Understand: screens, entities, flows, dependencies
2. Read codedatabase/features/{feature-id}/changelog.json
   → Check: did a recent change introduce this bug?
3. Read codedatabase/screens/{screen}.screen.json (if UI bug)
   → Understand: layout, interactions, test IDs, requests

If you don't know which feature, search:
- Glob: codedatabase/features/*/feature.json
- Grep for keywords in feature descriptions

   *Tools:* `Read`, `Glob`, `Grep`

   *Validations:*
   - Feature context loaded from codedatabase
   - Recent changelog reviewed for potential regression

3. **Find Root Cause**

   Trace the bug through the code:
1. Start from the symptom (UI element, API endpoint, error message)
2. Follow the data flow:
   - Frontend: Component → Store → API Service → Backend
   - Backend: Controller → Service → Prisma → Database
3. Identify exactly WHERE the bug occurs
4. Document the root cause clearly

Output a Root Cause Analysis:
- Symptom: [what user sees]
- Expected: [correct behavior]
- Root Cause: [what code is wrong and why]
- Affected files: [list of files to change]
- Impact: [what else might be affected]

   *Tools:* `Read`, `Glob`, `Grep`

   *Validations:*
   - Root cause identified with specific file and line
   - Impact assessment completed

**Expected Output:** INVESTIGATED state with root cause analysis


### plan-fix

Plan the minimal fix after investigation

**Trigger:** After investigation completes

**Steps:**

1. **Design Fix**

   Create a minimal fix plan:
1. What to change (specific files, specific lines)
2. How to change it (exact code change description)
3. What NOT to change (explicitly scope the fix)
4. Which agent to assign AND which app is affected:
   - Backend bug (api-startup) → dev-api
   - front-startup bug → dev-front (working in front-startup/)
   - back-startup bug → dev-front (working in back-startup/)
   - Full-stack bug → dev-api FIRST, then dev-front for affected app(s)
   - Security bug → security-api or security-front
5. Test plan:
   - Which existing tests to run
   - What regression test to add
6. Lint plan: npm run lint:fix after fix

   *Tools:* `Read`

   *Validations:*
   - Fix is minimal (no scope creep)
   - Agent correctly assigned
   - Test plan included

**Expected Output:** PLANNED state with fix plan


### execute-fix

Delegate fix to the right agent

**Trigger:** After fix plan is approved

**Steps:**

1. **Delegate to Agent**

   Use Task tool to delegate the fix:
- Provide root cause analysis
- Provide exact fix instructions
- Specify files to change
- Specify which app the fix targets: front-startup, back-startup, or api-startup
- Specify test to add
- Specify lint command to run after

For full-stack fixes:
1. Delegate backend fix to dev-api FIRST
2. Wait for backend fix to complete
3. If API contract changed:
   - Run npm run api:local in front-startup (via dev-front)
   - Run npm run api:local in back-startup (via dev-front with targetApp: "back-startup") if back-startup is affected
4. Then delegate frontend fix to dev-front — specify which app: front-startup or back-startup

For back-startup-only fixes:
1. Delegate to dev-front with explicit context that the fix is in back-startup/
2. dev-front will work in back-startup/ directory

   *Tools:* `Task`

   *Validations:*
   - Fix applied by agent
   - Tests pass
   - Lint passes

2. **Review Fix**

   After agent applies fix:
1. Read the changed files to verify fix is correct
2. Verify fix matches the plan (no scope creep from agent)
3. Check no `as any` casts were introduced
4. Check tests pass
5. Check lint passes

If fix is wrong or incomplete:
- Provide feedback to agent
- Re-delegate with corrections

   *Tools:* `Read`, `Task`

   *Validations:*
   - Fix matches plan
   - No scope creep
   - No as any casts introduced
   - Tests pass
   - Lint clean

   *On Failure:* Re-investigate if fix did not resolve the issue

3. **Lint Fix + Build Verification**

   MANDATORY after fix is verified — run lint:fix and ensure ALL applications remain deployable.

First run lint:fix on all modified apps:
- If front-startup was changed: cd front-startup && npm run lint:fix
- If back-startup was changed: cd back-startup && npm run lint:fix
- If api-startup was changed: cd api-deployer && npm run lint:fix

Then delegate to the fixing agent to run the build verification:
- If backend (api-startup) was changed:
  1. cd api-startup && npm run build (API must compile)
  2. cd front-startup && npm run api:local (regenerate services if API contract changed)
  3. cd front-startup && npm run build (front-startup must still compile)
  4. cd back-startup && npm run api:local (regenerate back-startup services if API contract changed)
  5. cd back-startup && npm run build (back-startup must still compile)
- If front-startup only was changed:
  1. cd front-startup && npm run build (front-startup must compile)
- If back-startup only was changed:
  1. cd back-startup && npm run build (back-startup must compile)
- If both front-startup and back-startup were changed: run steps for both

ALL applications MUST be deployable after every fix.
If any build fails, the fix introduced a regression — re-delegate to fix build errors.

   *Tools:* `Task`

   *Validations:*
   - Relevant build steps pass
   - Application is deployable
   - No broken imports or type errors

   *On Failure:* Fix build errors before proceeding to codedatabase update

**Expected Output:** FIXED state with verified fix


### update-codedatabase

MANDATORY: Update codedatabase after every fix

**Trigger:** After fix is verified

**Steps:**

1. **Add Changelog Entry**

   Delegate to agent to add a changelog entry file.

IMPORTANT: Write a SINGLE ENTRY FILE (not into changelog.json).
This avoids merge conflicts when multiple branches work in parallel.

File path: codedatabase/features/{feature-id}/changelog.d/CLG-{feature-id}-{NNNN}.json

File contents (single object, NOT wrapped in an array):
{
  "id": "CLG-{feature-id}-{NNNN}",
  "date": "YYYY-MM-DD",
  "type": "fix",
  "summary": "[concise description of what was fixed]",
  "details": ["[bullet 1]", "[bullet 2]"],
  "impacted_screens": ["[ScreenId]"],
  "impacted_api": ["[request_key]"],
  "tests": {
    "added": ["[new-test-file.spec.ts]"],
    "updated": ["[existing-test.spec.ts]"]
  },
  "breaking_change": false,
  "authored_by": "[agent-name]"
}

The entry will be merged into changelog.json during /release or /changelog.
Create the changelog.d/ directory if it does not exist.

   *Tools:* `Task`

   *Validations:*
   - Changelog entry file created in changelog.d/
   - Entry has correct type: "fix"
   - Impacted screens listed

2. **Update Screen Spec (if UI changed)**

   If the fix changed UI layout, interactions, or test IDs:
- Update the relevant codedatabase/screens/*.screen.json
- Update codedatabase/testids.registry.json if new test IDs

Skip this step if the fix was backend-only or didn't change UI structure.

   *Tools:* `Task`

   *Validations:*
   - Screen spec updated (if applicable)
   - Test IDs registered (if applicable)

**Expected Output:** VERIFIED state — fix complete with codedatabase updated

