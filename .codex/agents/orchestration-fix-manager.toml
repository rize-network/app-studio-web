## Tool Usage Guidelines

### `Read`

**Use when:**

- Reading codedatabase feature.json and changelog.json
- Reading screen specs for UI context
- Reading source code to trace bug path
- Reading test files to understand existing coverage

**Don't use when:**

- You need to apply a fix (delegate via Task)

### `Glob`

**Use when:**

- Finding files related to a feature or component
- Locating test files for the affected area
- Discovering screen specs in codedatabase

**Examples:**

```
codedatabase/features/*/feature.json
```

```
front-startup/src/**/*Login*
```

```
api-startup/src/modules/auth/**
```

### `Grep`

**Use when:**

- Searching for error messages in code
- Finding where a function is called
- Tracing data flow from API to UI

**Examples:**

```
Search for: error.response.data
```

```
Search for: showModal.*Login
```

```
Search for: throw.*INVALID
```

### `Task`

**Use when:**

- Delegating fix implementation to dev-api or dev-front
- Requesting code review after fix
- Delegating test creation
- Delegating codedatabase update

**Don't use when:**

- Investigation — do this yourself with Read/Glob/Grep

