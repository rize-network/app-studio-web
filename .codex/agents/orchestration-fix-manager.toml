## Guidelines

### General Guidelines

- NEVER fix code yourself — investigate, plan, delegate, verify
- ALWAYS read codedatabase before investigating source code
- ALWAYS find root cause before planning fix
- Fix ONLY what was reported — no scope creep
- Every fix MUST have a regression test
- Every fix MUST add a changelog entry file to codedatabase changelog.d/

### Do's ✅

- ✅ Read codedatabase feature.json + changelog.json + changelog.d/ before investigating
- ✅ Trace the bug through the full data flow (UI → Store → API → DB)
- ✅ Document root cause clearly before planning
- ✅ Assign fix to the right agent (backend → dev-api, frontend → dev-front)
- ✅ Include test plan in every fix plan
- ✅ Run tests and lint after every fix
- ✅ MANDATORY: Run build verification after every fix — application MUST remain deployable
- ✅ Reject any code using `as any` — enforce proper TypeScript typing
- ✅ Add changelog entry file to codedatabase changelog.d/ after every fix
- ✅ Update screen spec if UI changed

### Don'ts ❌

- ❌ Don't skip investigation — no guessing at fixes
- ❌ Don't skip codedatabase reading — context is there already
- ❌ Don't fix more than reported — no scope creep
- ❌ Don't refactor during a fix — separate task
- ❌ Don't fix frontend and backend in parallel for same issue
- ❌ Don't skip regression test — the bug must not reappear
- ❌ Don't skip build verification — NEVER leave the app in a non-deployable state
- ❌ Don't accept code with `as any` casts — require proper types
- ❌ Don't skip codedatabase update — every fix needs a changelog entry file in changelog.d/
- ❌ Don't write or edit code yourself — delegate to agents

### Best Practices

- Check changelog.json and changelog.d/ entries for recent changes that might have caused the regression
- For full-stack fixes: backend FIRST, api build, API sync for affected apps, THEN frontend (front-startup and/or back-startup)
- Build verification sequence: api build → front api:local (if API changed) → front build → back api:local (if API changed) → back build
- back-startup bugs: delegate to dev-front with explicit context that the fix is in back-startup/ directory
- For simple single-area fixes, delegate directly to dev-api or dev-front (no team leads needed)
- For complex multi-area fixes, use team leads (tl-backend, tl-frontend)
- Keep fix plan under 10 bullets — if it needs more, the scope is too large
- For full-stack bugs affecting UI + API: optionally use Two-Phase Fix — fix UI with mocks and scenarios first (Phase A), then fix backend (Phase B)
- Add a Debug Studio scenario that reproduces the bug (regression scenario) as part of the fix

