- Frontend coordination required: {yes/no — describe if yes}
- Backend coordination required: {yes/no — describe if yes}
- Estimated effort: {small/medium/large}

This task MUST be created before marking the fix complete.

**Rule:** If any implemented phase uses a dual-write, compatibility shim, or migration bridge pattern — create a follow-up task at implementation time that defines: (a) the trigger condition for removing the bridge, (b) which components need to change, (c) any frontend/backend coordination required.


### Governance

#### Verify Sub-Agent Governance Checklist (🔴 Required)

Sub-agent returns: "Governance Complete: ✅
  - changelog.d/CLG-auth-0007.json created (type: fix)
  - screens/pages/LoginPage.screen.json updated (error state)
  - testids.registry.json: added 'login_error_message'"
→ Fix Manager accepts and closes the fix.

Sub-agent returns: "Bug fixed, tests pass." (no governance block)
→ Fix Manager re-dispatches with: "Governance Checklist required per Article III — list changelog entries, screen specs, and test IDs before returning."

**Rule:** Before marking a fix complete, confirm the delegated sub-agent return message contains "Governance Complete: ✅" with a list of changelog entries created, screen specs updated/created, and test-id registrations added. If missing, re-dispatch with explicit governance requirement. Never silently accept code-only completion — Close Manager will flag it later and create rework.


### Scope Management

#### Chunk Large Refactors (🔴 Required)

// Good: 11-store refactor decomposed into 3 commits, each ~15-17 files
//   Chunk A (293e1a1a): Company + Department domain (17 files)
//   Chunk B (d83540b1): Governance + Pulse + Improvement + Incident (14 files)
//   Chunk C (03d47eef): Worker-ops + Memory (17 files)
// Each chunk verified with: npx tsc --noEmit | grep -E '(StoreA|StoreB|...)' → 0 errors
// Each chunk committed atomically before launching the next delegation

// Bad: One 50-file delegation → agent silently edits out-of-scope files,
//      loses track of allowlist, times out, returns stale report

**Rule:** For fixes/refactors touching >20 files across multiple domains, decompose into 3-5 chunks grouped by domain. Each chunk: (a) explicit file allowlist in the delegation prompt, (b) per-chunk tsc-grep verification command scoped to those files, (c) atomic commit between chunks before launching the next. NEVER try to complete a cross-cutting refactor in one dev-front run — single-agent runs drift or re-interpret the scope past ~25 files.


#### Verify Workspace State Between Delegations (🔴 Required)

// Pattern: before each chunk delegation in a multi-chunk refactor
git status                    # uncommitted changes?
git log --oneline -3          # last 3 commits match expectations?
git diff HEAD -- src/stores/  # any unstaged changes in scope?

// Then in the delegation prompt:
"Before editing any file in the allowlist, run:
   git diff HEAD -- <file>
 If it already matches target state → report already-done and skip."

**Rule:** Before launching a follow-up delegation, run `git status` and `git log --oneline -5` to confirm the workspace matches your mental model. A prior agent may have been interrupted, reverted, or applied partial work. If the workspace drift matters, include a "State Check" step in the new delegation prompt: "Run git diff HEAD -- <file> before editing; if already matches target state, report already-done."


### Diagnostics

#### Loud Errors Before More Fixes When Silent Failures Persist (🔴 Required)

// After 2 fix iterations with no resolution:
// Wrong: propose a third fix
// Right: delegate a diagnostic pass
//   "Replace every silent empty-return with throw new Error({reason, shape, topKeys, has_json, has_output, is_resultRef})"
// Then wait for the next run — the error payload reveals the actual failure mode.
// This saved ~6 deploy cycles in the roadmap/ResultRef series (CLG-0007 onward).

**Rule:** If two iterations of a fix have not resolved a bug and the failure mode is silent (empty results, no error thrown), STOP proposing more fixes. Instead, delegate a diagnostic pass that replaces silent empty-returns with thrown errors containing the actual runtime shape of inputs and outputs. Root causes hidden behind silent returns consume days. One loud-error pass exposes them in one run.


#### Check Running Processes Before Re-Debugging a Fix (🔴 Required)

# First diagnostic when a fix appears to not take effect:
ps aux | grep -E "(nest|api-startup)" | grep -v grep
# If multiple processes are found, or process start time predates the fix → restart ALL of them:
pkill -f "api-startup"
cd api-startup && npm run start:dev

**Rule:** If a code fix is on disk, compiled in dist, and tests pass — but the running application still shows the bug — check running processes BEFORE debugging the code again. Run `ps aux | grep "app-name"`: stale watch-mode or standalone node processes consume the old code in memory and ignore file changes. About 20% of "fix did not work" reports are actually stale-process reports.


### Refactoring

#### Audit Callsite Guards When Extending Helper Capability (🔴 Required)

// Helper extended: resolveInputRefs now unwraps {output: X} for non-ref values too
// Stale guard at callsite:
if (refs.length > 0) {           // ← filters on old capability
  inputs = await resolveInputRefs(inputs);
}
// After extension: the function is IDEMPOTENT. Drop the guard:
inputs = await resolveInputRefs(inputs);
// Primitives and non-envelope objects pass through unchanged — no behavior change for old inputs.

**Rule:** When a fix extends a pure helper function (adds a new branch, supports a new input shape, handles a new case), audit EVERY callsite in the same fix. A guard at the callsite that filters on the OLD capability will silently prevent the NEW capability from running. Prefer calling idempotent helpers unconditionally over guarding them.

