## Conventions

### Location

#### Forms in src/forms/ ONLY (🔴 Required)

ALL Formik forms must be placed in src/forms/

**Rule:** src/forms/{Domain}{Action}Form.tsx — NEVER in components/ or pages/

**✅ Good Examples:**

```
src/forms/UserCreateForm.tsx
```

```
src/forms/LoginForm.tsx
```

```
src/forms/ProjectEditForm.tsx
```

**❌ Bad Examples:**

```
src/components/UserForm.tsx
```

```
src/pages/login/LoginForm.tsx
```


### Library

#### Formik + Yup Required (🔴 Required)

All forms use Formik for state and Yup for validation

**Rule:** import { Formik, Form, Field } from "formik" + import * as Yup from "yup"


### Validation

#### Match Backend DTOs (🔴 Required)

Yup schema must mirror backend DTO validation rules

**Rule:** @IsEmail → .email(), @MinLength(n) → .min(n), @IsNotEmpty → .required()


### Props

#### Standard Form Props (🔴 Required)

All forms accept onSubmit, optional initialValues, optional isLoading

**Rule:** onSubmit: (values) => void | Promise<void>, initialValues?: Partial<Values>, isLoading?: boolean


### Types

#### Export Value Types (🔴 Required)

Export the form values interface for use by other agents

**Rule:** export interface {Domain}{Action}Values { ... }


### API Integration

#### Forms Call Generated Hooks Directly (MANDATORY) (🔴 Required)

Forms instantiate a generated useXxxControllerYyyService hook inline and submit via request.run(). The hook is the source of truth for loading/error/data.

**Rule:** Inside the form component, call useXxxControllerYyyService({ onSuccess, onError }) directly. In handleSubmit, call request.run(params). Read loading from request.loading (feed to Button isLoading). Read error from request.error if needed. The onSuccess callback MUST: (1) fire showToast('success', ...), (2) call the onSuccess?.(data) callback prop so the parent page can refetch its own list via its listXRequest.run(), (3) call hideModal() if the form is in a modal. onSuccess SHOULD call a store setter (upsertEntity(data)) ONLY when a store is justified by the "Do I Need a Store?" checklist and exists. DEFAULT: no store update — the parent page refetches its own list hook to pick up the change. NEVER call a store async action (stores have none). NEVER import useXxxRequests() from a page's request file — forms own their own hook instance for isolation. NEVER use the direct xxxControllerYyy() function — always the hook.

**✅ Good Examples:**

```
// ✅ DEFAULT — no store, parent page refetches its list
// src/forms/CreateDepartmentForm.tsx
const createDepartmentRequest = OrgService.useOrgControllerCreateDepartmentService({
  onSuccess: (data) => {
    showToast('success', 'Created', '...')
    onSuccess?.(data)     // parent page receives this and calls listDepartmentsRequest.run() to refresh
    hideModal()
  },
  onError: () => showToast('error', 'Failed', ''),
})

const handleSubmit = (values) => {
  createDepartmentRequest.run(companyId, dtoFrom(values))
}

<Button isLoading={createDepartmentRequest.loading} onClick={handleSubmit}>Create</Button>
```

```
// ✅ EXCEPTION — when a store is justified, update it too
onSuccess: (data) => {
  upsertCompany(data)       // useCompanyStore.activeCompany is cross-cutting
  showToast('success', 'Updated', '...')
  onSuccess?.(data)
  hideModal()
},
```

**❌ Bad Examples:**

```
const createDepartment = useDepartmentStore(s => s.createDepartment)  // FORBIDDEN — store has no such action
```

```
const isLoading = useDepartmentStore(s => s.isLoading)  // FORBIDDEN — stores don't hold loading
```

```
await orgControllerCreateDepartment(...)  // FORBIDDEN — use the generated hook, not the direct function
```

```
const { createDepartmentRequest } = useDepartmentRequests()  // FORBIDDEN — forms instantiate their own hook, not the page's request file
```

```
// ❌ NOT JUSTIFIED — updating a useless store
onSuccess: (data) => upsertDepartment(data)   // if useDepartmentStore exists for no good reason, delete the store and refetch from the page instead
```

