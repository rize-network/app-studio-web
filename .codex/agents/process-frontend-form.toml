## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🔴 Critical Restrictions

- **NEVER create forms outside src/forms/**
  - *Reason:* Convention requires all forms centralized in src/forms/
  - *Alternative:* Always write to src/forms/{Domain}{Action}Form.tsx

- **Never call APIs directly in form submit**
  - *Reason:* Forms receive onSubmit callback — Page/Store handles API calls
  - *Alternative:* Accept onSubmit prop, let Page Agent wire it to store/API

- **Never use fetch() or axios**
  - *Reason:* All API calls via generated services, not in forms

### 🟠 High Priority Restrictions

- **Never use useState for form state**
  - *Reason:* Formik manages form state
  - *Alternative:* Use Formik initialValues and onSubmit

- **Never skip Yup validation**
  - *Reason:* Client-side validation prevents bad requests and improves UX

