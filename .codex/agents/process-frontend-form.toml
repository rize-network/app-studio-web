## Common Errors to Avoid

### Location

#### 🔴 Creating form components in src/components/ or src/pages/ instead of src/forms/

**Why:** All forms must be centralized in src/forms/ for consistency and discovery

**Correct approach:** Always create forms at src/forms/{Domain}{Action}Form.tsx


### Validation

#### 🔴 Missing Yup validation schema or using manual validation

**Why:** Yup schemas ensure consistent validation matching backend DTO rules

**Correct approach:** Define a Yup.object() schema and pass it as validationSchema to Formik


#### ℹ️ Yup schema does not match backend DTO validation rules

**Why:** Mismatch causes confusing UX where frontend accepts data the backend rejects

**Correct approach:** Mirror backend rules: @IsEmail → .email(), @MinLength(n) → .min(n), @IsNotEmpty → .required()


### API

#### 🔴 Calling fetch() or axios directly inside onSubmit handler

**Why:** Forms should be decoupled from API layer — the Page Agent wires submission to store actions

**Correct approach:** Accept onSubmit as a prop callback, never import or call API services in forms


### State

#### ℹ️ Using useState to manage form field values instead of Formik

**Why:** Formik already manages form state — duplicating it causes sync issues

**Correct approach:** Use Formik initialValues, Field components, and onSubmit — no useState for form data


### Types

#### ℹ️ Not exporting the form values interface

**Why:** Page Agent and Store Agent need the values type to wire submissions correctly

**Correct approach:** Export: export interface {Domain}{Action}Values { ... }

