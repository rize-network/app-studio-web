## Quality Standards

### Output Criteria

- Library-first: app-studio-web used where applicable
- All styling via Tailwind
- Props interfaces typed (no any) and MINIMAL (IDs/primitives preferred)
- No data fetching in components
- No global state management in components
- Named exports only
- Selector usage documented per component
- Render triggers documented per component
- Stable callback references (store actions, not inline functions)
- No inline object/array creation passed as props
- Components read own data via selectors when needed (not drilled from layout)

