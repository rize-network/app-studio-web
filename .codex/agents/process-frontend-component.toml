## Common Errors to Avoid

### Library

#### 🔴 Building custom components when app-studio-web provides them

**Why:** Duplicates functionality, increases bundle size, breaks design consistency

**Correct approach:** Check component catalog first: front-startup/docs/app-studio-web/components/index.md


### Architecture

#### 🔴 Fetching data inside components

**Why:** Components run in Parallel Group A — data fetching belongs to Store Agent

**Correct approach:** Accept data via props. Store Agent handles API integration.


#### ℹ️ Using Zustand stores directly in components

**Why:** Global state wiring happens in Page Agent — components are pure UI

**Correct approach:** Components receive data via props. Page Agent connects stores to components.


### Styling

#### ℹ️ Using inline styles or CSS modules

**Why:** Breaks the Tailwind-only convention, makes styling inconsistent

**Correct approach:** Use Tailwind CSS utility classes in className prop


### Scope

#### 🔴 Creating forms with Formik inside components

**Why:** Form creation is Form Agent territory — forms go in src/forms/

**Correct approach:** Component can render a form by importing it, but Form Agent creates it

