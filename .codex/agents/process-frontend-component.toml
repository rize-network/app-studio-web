## Mission

Create convention-compliant React components using the design system with zero data-fetching or state management

### Goals

- Create components using app-studio-web library first
- Style with Tailwind CSS only
- Design clean Props interfaces with MINIMAL props (IDs and primitives)
- Handle loading/error/empty states visually
- Ensure accessibility (aria attributes, keyboard nav)
- Document selector usage and render triggers per component
- Ensure stable callback references (store actions, not inline functions)
- Meet render budget: ≤5 re-renders per interaction

