## Conventions

### Library

#### Library-First Rule (🔴 Required)

Always check app-studio-web before creating custom components

**Rule:** Read front-startup/docs/app-studio-web/components/index.md. Use library components (View, Text, Button, Input, Card, Table, Modal, etc.) before building custom.

**✅ Good Examples:**

```
import { Button } from "app-studio-web"
```

```
import { View, Text } from "app-studio-web"
```

**❌ Bad Examples:**

```
<button className="...">
```

```
<div> instead of <View>
```


### Naming

#### File Naming (🔴 Required)

Component files use PascalCase

**Rule:** components/{Domain}/{ComponentName}.tsx

**✅ Good Examples:**

```
components/Auth/LoginCard.tsx
```

```
components/User/UserAvatar.tsx
```

**❌ Bad Examples:**

```
components/loginCard.tsx
```

```
components/auth/login-card.tsx
```


#### Props Interface (🔴 Required)

Every component has a typed Props interface

**Rule:** interface {ComponentName}Props { ... }

**✅ Good Examples:**

```
interface LoginCardProps { user: User; onLogin: () => void }
```

**❌ Bad Examples:**

```
props: any
```

```
No props interface at all
```


### Styling

#### Tailwind Only (🔴 Required)

All styling via Tailwind CSS utility classes

**Rule:** No inline styles, no CSS modules, no styled-components. Use className with Tailwind utilities.

**✅ Good Examples:**

```
className="p-4 rounded-lg bg-white shadow-sm"
```

**❌ Bad Examples:**

```
style={{ padding: 16 }}
```

```
import styles from "./Component.module.css"
```


### Architecture

#### Props In, JSX Out (🔴 Required)

Components are pure UI — no data fetching, no global state

**Rule:** Components receive data via props and render JSX. No fetch(), no useStore(), no API calls.

**✅ Good Examples:**

```
const UserCard = ({ user }: UserCardProps) => <View>...</View>
```

**❌ Bad Examples:**

```
const UserCard = () => { const data = useFetch("/api/users"); ... }
```


#### Lean Components (🔴 Required)

Components must be lean, focused, and independently testable

**Rule:** Each component does ONE thing. Max ~100 lines. Zero coupling to siblings. Testable in isolation with just props — no need to mock stores, routers, or context.

**✅ Good Examples:**

```
UserAvatar.tsx — 40 lines, renders avatar from name+url props
```

**❌ Bad Examples:**

```
UserSection.tsx — 300 lines, fetches data, manages state, renders everything
```


#### Minimal Props Only (🔴 Required)

Accept ONLY the minimal data the component actually renders

**Rule:** Pass primitives or small slices, never entire objects when only one field is used. Fewer props = fewer re-renders = easier testing.

**✅ Good Examples:**

```
({ name, avatarUrl }: UserAvatarProps) — uses both props directly
```

**❌ Bad Examples:**

```
({ user, config, theme }: Props) — passes whole objects, uses user.name only
```


### States

#### Visual States (🟡 Recommended)

Handle loading, error, and empty states

**Rule:** Accept isLoading, isError, isEmpty props and render appropriate UI for each state


### Accessibility

#### ARIA Attributes (🟡 Recommended)

Add aria-label, role, and keyboard handlers where appropriate

**Rule:** Interactive elements need aria-label. Lists need role="list". Buttons need keyboard handlers.


### Exports

#### Named Exports Only (🔴 Required)

Use named exports for all components

**Rule:** export const ComponentName = ... (no default exports)


### Filtering

#### No View-Type Filters in Components (🔴 Required)

Components must not filter or transform data by status/type flags internally — filtering is the caller's responsibility (store selector or page)

**Rule:** Never filter a list prop inside a component (e.g. items.filter(i => i.active)). Accept already-filtered data from the parent. Components render what they receive — they do not decide what to show based on business status.

**✅ Good Examples:**

```
// Parent passes filtered data; component renders it as-is
const activeItems = useProjectStore(s => s.activeItems);
<ItemList items={activeItems} />
```

**❌ Bad Examples:**

```
// Component filters internally — hides business logic
const ItemList = ({ items }) => items.filter(i => !i.archived).map(...)
```


### Data Refresh

#### Emit Actions, Never Mutate Derived State (🔴 Required)

After triggering an action (archive, delete, publish), components must not update their own derived view state — they emit the action and let the store+page handle refetch

**Rule:** Components call onAction() callbacks and do NOT manage list state after the action. The Page or store is responsible for triggering refetch and updating displayed data. Components are stateless with respect to the list they render.

**✅ Good Examples:**

```
// Component emits; page handles refetch
<ItemCard onArchive={() => onArchive(item.id)} />
```

**❌ Bad Examples:**

```
// Component removes item from local state after archive
const [list, setList] = useState(items);
const handleArchive = (id) => { archive(id); setList(list.filter(i => i.id !== id)); }
```

