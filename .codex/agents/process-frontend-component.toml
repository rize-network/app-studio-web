## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🔴 Critical Restrictions

- **Never fetch data inside components**
  - *Reason:* Data fetching belongs to Store Agent; components are pure UI
  - *Alternative:* Accept data via typed props

- **Never create Formik forms**
  - *Reason:* Forms belong to Form Agent in src/forms/
  - *Alternative:* Import forms from src/forms/ if needed, or delegate to Form Agent

- **Never use fetch() or axios**
  - *Reason:* All API calls must go through generated services (and that is Store Agent territory)
  - *Alternative:* Components do not make API calls at all

- **Never use React Context for data that updates during interaction**
  - *Reason:* Context re-renders all consumers on any change. Use store selectors for interactive data (typing, selection, drag).
  - *Alternative:* Accept data via props (from Page which reads store) or via thin selector hooks

- **Never return after writing or modifying a component without producing the Governance Checklist**
  - *Reason:* Article III mandates changelog, screen registry, and test-id governance. Close Manager repeatedly flags cycles where components shipped with no governance updates — creating technical debt.
  - *Alternative:* Before returning, produce a "Governance Complete: ✅" block listing: (1) changelog.d/ entry files created per impacted feature, (2) any new data-testid values registered in codedatabase/testids.registry.json. Components rarely have their own screen JSON (they are consumed by pages/modals/drawers), so parent screen specs may need updating if the component changes the parent surface. If truly no feature surface was touched, say "Governance: N/A" with justification.

### 🟠 High Priority Restrictions

- **Never use Zustand stores directly in components**
  - *Reason:* Store wiring happens in Page Agent; components are stateless UI
  - *Alternative:* Accept store data via props from parent Page

- **Never use inline styles or CSS modules**
  - *Reason:* Project uses Tailwind CSS exclusively
  - *Alternative:* Use Tailwind utility classes in className

- **Never build custom when library provides the component**
  - *Reason:* app-studio-web maintains design consistency
  - *Alternative:* Check library catalog first, only build custom for gaps

- **Never use any type for props**
  - *Reason:* Defeats TypeScript type safety
  - *Alternative:* Create typed Props interface for every component

- **Never create files outside components/{Domain}/**
  - *Reason:* Other folders are owned by other sub-agents
  - *Alternative:* Only write to components/{Domain}/{ComponentName}.tsx

- **Never accept entire objects as props when only one field is used**
  - *Reason:* Passing whole objects causes unnecessary re-renders and tight coupling
  - *Alternative:* Destructure at the call site: <Avatar name={user.name} /> instead of <Avatar user={user} />

- **Never exceed ~100 lines per component**
  - *Reason:* Large components are hard to test, review, and reuse
  - *Alternative:* Split into smaller, focused sub-components

- **Never couple to sibling components**
  - *Reason:* Components must be independently testable and reusable
  - *Alternative:* Communicate through props and callbacks, never import siblings directly

