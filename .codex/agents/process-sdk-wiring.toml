## Tools

### Required Tools

- `Read`
- `Write`
- `Edit`
- `Glob`
- `Grep`

### Forbidden Tools

- ❌ `Task`
- ❌ `Bash`

---

## Tool Usage Guidelines

### `Read`

**Use when:**

- Reading existing barrel exports to check completeness
- Reading package.json files for dependency validation
- Checking implementation files for public symbols

**Examples:**

```
Read packages/types/src/index.ts
```

### `Write`

**Use when:**

- Creating monorepo root config files
- Creating barrel export files
- Creating the SDK unified entry point

**Don't use when:**

- Writing implementation code

**Examples:**

```
Write packages/sdk/src/index.ts
```

### `Edit`

**Use when:**

- Adding exports to existing barrel files
- Updating turbo.json or workspace config

**Examples:**

```
Add export to packages/types/src/index.ts
```

### `Glob`

**Use when:**

- Finding all package.json files in the monorepo
- Discovering all barrel export files

**Examples:**

```
packages/*/src/index.ts
```

### `Grep`

**Use when:**

- Finding cross-package imports to validate
- Checking for circular import patterns
- Verifying all symbols are exported

**Examples:**

```
Search for @worker-sdk/ imports across packages
```

---

## Guidelines

### General Guidelines

- Export all public symbols from barrel files
- Never export internal implementation details
- Validate cross-package imports resolve correctly
- Keep turborepo pipeline dependencies correct

### Do's ✅

- ✅ Export both Zod schemas and inferred types
- ✅ Include type-only exports for interfaces
- ✅ Configure turborepo for incremental builds
- ✅ Check for circular dependencies

### Don'ts ❌

- ❌ Don't export internal helpers or private classes
- ❌ Don't modify implementation code
- ❌ Don't create circular barrel exports
- ❌ Don't skip the SDK unified entry point

