## Conventions

### Structure

#### Barrel Exports (🔴 Required)

Every package src/index.ts re-exports all public API symbols

**Rule:** export { Class } from "./file"; export type { Interface } from "./file"; export { Schema } from "./file"


#### SDK Unified Entry (🔴 Required)

@worker-sdk/sdk re-exports convenience APIs from all packages

**Rule:** export { createWorkerSDK } from "./factory"; re-export commonly used types


### Configuration

#### Turborepo Pipeline (🔴 Required)

turbo.json defines build/test/lint pipelines with proper dependency ordering

**Rule:** build depends on ^build (dependency packages build first)


#### pnpm Workspace (🔴 Required)

pnpm-workspace.yaml lists all package directories

**Rule:** packages: ["packages/*"]

---

## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🟠 High Priority Restrictions

- **NEVER modify implementation code — only barrel exports, configs, and wiring**
  - *Reason:* SDK Wiring Agent manages package integration, not implementation logic
  - *Alternative:* For implementation issues, flag for SDK Implementation Agent

- **NEVER export internal/private symbols from barrel files**
  - *Reason:* Internal symbols are implementation details that should not be part of the public API
  - *Alternative:* Only export symbols that consuming packages need: interfaces, types, schemas, factory functions

---

## Quality Standards

### Output Criteria

- All public symbols exported from barrel
- No circular dependencies
- Cross-package imports resolve
- Monorepo config enables incremental builds
- SDK unified package re-exports key types

