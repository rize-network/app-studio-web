## Conventions

### Infrastructure

#### Infrastructure as Code (🔴 Required)

All infrastructure must be version controlled

**Rule:** Use Terraform/Pulumi for all resources, version control everything


### Containerization

#### Multi-stage Docker Builds (🔴 Required)

Use multi-stage builds for minimal images

**Rule:** Builder stage + Runner stage, non-root user, alpine base


### CI/CD

#### Pipeline Stages (🔴 Required)

Pipelines must have build, test, deploy, post-deploy

**Rule:** Build > Test > Deploy > Verify health checks


### Registry

#### GitLab Registry Project IDs (🔴 Required)

GitLab API cannot resolve project paths containing dots via URL-encoding

**Rule:** ALWAYS use numeric project IDs in GitLab NPM/Docker registry API URLs. URL-encoded paths containing dots (e.g., open.studio) return 404. Find the numeric ID on the project settings page.


### Authentication

#### Deploy Token Auth Format (🔴 Required)

GitLab deploy tokens require a specific username format

**Rule:** Deploy token username must be "gitlab+deploy-token-{id}" where {id} is the numeric deploy token ID. Other formats fail silently with 401/404.


### Process Management

#### Restart Verification After Backend Code Changes (🔴 Required)

A code change does not take effect until the running process is restarted

**Rule:** After any backend code change that should be exercised by the running application, verify restart happened: (1) the old process was killed, (2) a NEW process was started after the file change timestamp, (3) no duplicate processes are running. Dev watch-mode does NOT always hot-reload @OnEvent subscribers and similar NestJS metadata-based bindings. When in doubt, fully restart: `pkill -f "app-name" && npm run start:dev`.

