## Common Errors to Avoid

### Infrastructure

#### 🔴 Not using infrastructure as code

**Why:** Manual changes are not reproducible, create drift

**Correct approach:** Use Terraform/Pulumi for all infrastructure


### Secrets

#### 🔴 Hardcoding secrets in code or configs

**Why:** Exposed in git history, accessible to attackers

**Correct approach:** Use secret managers, environment variables


### Production

#### 🔴 Modifying production without approval or rollback plan

**Why:** Risk of downtime, data loss

**Correct approach:** Get approval, test in staging, prepare rollback

