```typescript
// Liveness: Is the process running?
@Get('health/live')
liveness() {
  return { status: 'ok' };
}

// Readiness: Can it serve traffic?
@Get('health/ready')
async readiness() {
  await this.prisma.$queryRaw\`SELECT 1\`;
  return { status: 'ready', db: 'connected' };
}
```

