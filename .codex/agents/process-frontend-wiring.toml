## Common Errors to Avoid

### Routes

#### 🔴 Forgetting to register a route for a new page

**Why:** Page exists but is unreachable — users get 404 errors

**Correct approach:** Add route entry in router config with correct path and lazy-loaded component


#### 🟠 Using PascalCase or camelCase in route paths instead of kebab-case

**Why:** URL convention requires kebab-case for consistency and SEO

**Correct approach:** Use kebab-case paths: /user-settings, not /userSettings or /UserSettings


### Modals

#### 🔴 Not registering a new modal in the modal registry

**Why:** showModal() calls will fail silently or throw errors

**Correct approach:** Register modal in src/modals/ registry so showModal() can find it


### Navigation

#### ℹ️ Adding a user-navigable page without a navigation menu entry

**Why:** Users cannot discover the page unless they know the URL

**Correct approach:** Add menu entry in navigation config matching the route path


### Scope

#### ℹ️ Modifying page component logic or creating new components

**Why:** Wiring Agent only handles routing, registration, and navigation — not component logic

**Correct approach:** Only edit router config, modal registry, and navigation config files

---

## Conventions

### Routes

#### Route Registration (🔴 Required)

All new pages must have routes registered

**Rule:** Add route in router config with correct path and component


### Modals

#### Modal Registration (🔴 Required)

All modals must be registered in the modal system

**Rule:** Register in src/modals/ to enable showModal() calls


### Navigation

#### Navigation Updates (🔴 Required)

Update nav menus when new top-level pages are added

**Rule:** Add menu entry if page is user-navigable

---

## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🔴 Critical Restrictions

- **Never skip modal registration**
  - *Reason:* Unregistered modals break the showModal() system

### 🟠 High Priority Restrictions

- **Never create pages or components**
  - *Reason:* Pages and components are owned by other sub-agents

- **Never modify component/page logic**
  - *Reason:* Only touch routing, registration, and navigation configuration

