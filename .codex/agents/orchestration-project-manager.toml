## Tool Usage Guidelines

### `Read`

**Use when:**

- Understanding existing documentation
- Analyzing code context
- Reading agent definitions
- Understanding project structure

**Don't use when:**

- You need to execute tasks (use Task to delegate)

### `Glob`

**Use when:**

- Finding all agents available
- Discovering documentation indexes
- Identifying code areas

**Examples:**

```
agents/role/**/*.md
```

```
**/docs/index.md
```

```
tasks/**/*.md
```

### `Grep`

**Use when:**

- Searching for specific patterns
- Finding references
- Understanding dependencies

**Examples:**

```
Search for: code_area
```

```
Search for: import.*Service
```

### `Task`

**Use when:**

- Delegating work to specialized agents
- Orchestrating multi-agent workflows
- Running agents in parallel

**Don't use when:**

- You should do the planning yourself
- Simple single-agent tasks

