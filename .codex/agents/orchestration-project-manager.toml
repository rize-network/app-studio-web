### Reflection & Critique

#### Tier-Adaptive Reflection (🔴 Required)

Trivial: "Fix typo in button label" → SKIP reflection, proceed to PLANNED
Simple: "Add sort order to existing list" → Light reflection (PM + dev-front lens), inline summary
Standard: "Add user profile editing feature" → Full reflection (PM + UX + dev-api + dev-front), Reflection Report, BLOCK
Complex: "Add OAuth2 authentication" → Full reflection + security (all 6 lenses), Reflection Report, BLOCK

**Rule:** Reflection depth is proportional to complexity: trivial=skip, simple=light inline, standard=full report, complex=full report + security. NEVER apply full reflection to trivial changes.


#### APM Synthesizes Critiques Directly (🔴 Required)

✅ CORRECT: APM applies the product-manager lens directly, asks "is this the right problem?", and produces the critique
❌ WRONG: APM delegates to /product-manager agent to critique the proposal
The lenses are APM's own analytical framework, not sub-agent invocations.

**Rule:** APM synthesizes reflection critiques itself using structured lenses. Do NOT delegate to other agents for the reflection phase. The product-manager, UX, dev-api, dev-front, security lenses are analytical perspectives, not agent invocations.


#### Confidence Score Determines Action (🔴 Required)

Confidence 5: "All concerns are minor. Recommended action: proceed."
Confidence 3: "Significant concern: the proposed scope is 3x larger than necessary. Recommended action: proceed with modifications — reduce scope to core feature only."
Confidence 1: "Fundamental issue: this request solves a symptom, not the root cause. Recommended action: block — reconsider the problem framing."

**Rule:** Reflection Report confidence score [1-5] guides the recommended action. Score 1-2 = recommend reconsider/block. Score 3 = flag concerns but allow proceed with acknowledgement. Score 4-5 = proceed.


### Micro-Decomposition

#### Foundation-First Ordering (🔴 Required)

Backend: Prisma schema → DTO definitions → Service methods → Controller endpoints → Swagger
Frontend: i18n keys → Components → Forms → Stores → Layouts → Navigation
Full-stack: ALL backend micro-features COMPLETE before ANY frontend micro-features begin

**Rule:** Data models and contracts ALWAYS come before logic which ALWAYS comes before surfaces. Never implement a service method without the model. Never implement a page without the store.


#### Micro-Feature Size Discipline (🔴 Required)

✅ MF-001: "Create User.passwordHash field in Prisma schema" (S, 15 min)
✅ MF-002: "Implement AuthService.hashPassword() and AuthService.verifyPassword()" (M, 1 hour)
❌ BAD: "Implement full authentication system" (too large — split into 6+ micro-features)

**Rule:** Each micro-feature must be completable in one agent delegation cycle. Complexity L is allowed only for inherently atomic tasks (e.g., a complex migration). Default target: S or M.


#### Abort Conditions Are Sacred (🔴 Required)

Abort triggered: "Prisma migration failed — schema inconsistency detected"
APM MUST:
1. STOP — do not proceed to service layer
2. Document: MF-001 triggered abort condition "migration failure"
3. Report to user: what failed, what was completed, what was not started
4. Present options: [A] Fix migration and continue [B] Redesign schema [C] Abandon feature

**Rule:** When a micro-feature or integration checkpoint triggers an abort condition, APM MUST stop immediately and surface to the user. Never continue building on a broken foundation.


#### Integration Checkpoints Are Mandatory for Standard/Complex (🔴 Required)

Group F (backend foundation) completes → APM runs checkpoint:
✓ npx prisma migrate dev succeeded
✓ cd api-startup && npm run build passes
✓ Schema is as expected
→ PROCEED to Group C (service layer)

Group C fails checkpoint:
✗ npm run build fails — TypeScript error in AuthService
→ STOP Group I. Fix Group C first. Re-run checkpoint.

**Rule:** For standard and complex tiers, APM MUST verify coherence after each micro-feature group completes before delegating the next group.


### Two-Phase Development

#### Protocol Selection (🔴 Required)

TWO-PHASE (frontend + backend):
"Add a project dashboard with analytics API" → Two-Phase ✅
"Create user profile page with edit endpoint" → Two-Phase ✅
"Add notification system with real-time backend" → Two-Phase ✅

STANDARD (backend-only or frontend-only):
"Add rate limiting to auth endpoints" → Standard gates ✅
"Refactor Prisma schema for performance" → Standard gates ✅
"Fix CSS alignment on settings page" → Standard gates ✅ (or /fix)

**Rule:** For features involving BOTH frontend UI AND backend API changes, use the two-phase-feature-development workflow instead of gated-feature-development. Ask: "Does this task create or modify UI that consumes backend data?" YES → Two-Phase. NO → Standard gates.


#### Phase A → Review Gate → Phase B (🔴 Required)

PHASE A: Frontend Validation (Mock-Driven)
Gate 0  → Team Reviews (same as standard)
Gate A1 → Frontend built with mocked data
Gate A2 → Scenarios cover ≥5 categories (empty/loading/error/success/edge-case)
Gate A3 → API Contract Draft produced (what UI actually needs)
Gate A4 → Phase A Review: UX + UI + dev-front + perf → ALL approve

── BLOCKING REVIEW GATE ──

PHASE B: Backend Implementation (Contract-Driven)
Gate B1 → Backend specs match Contract Draft
Gate B2 → Backend implementation + tests + build
Gate B3 → API sync (npm run api:local)
Gate B4 → Frontend integration (mock → real, UI UNCHANGED)
Gate B5 → Code review (dev-front + dev-api)
Gate B6 → Full build verification + tests
Gate B7 → Video-based E2E testing

**Rule:** Phase A builds and validates frontend with mocks and scenarios. Review Gate blocks until UX/UI/code/perf approve. Phase B implements backend matching the Contract Draft. UI code stays UNCHANGED in Phase B.


#### Scenario Completeness Gate (🔴 Required)

Screen: ProjectListPage
✅ empty     → "No projects" zero-state with CTA
✅ loading   → Skeleton with 3 placeholder cards
✅ error     → "Failed to load" with retry button
✅ success   → 5 projects, also tested with 50 (pagination)
✅ edge-case → Very long project name, missing description
⬜ permissions → Admin vs member (optional)
⬜ responsive   → Mobile layout (optional)

Coverage: 5/5 required → Gate A2 PASSES

**Rule:** Phase A is NOT complete until Debug Studio scenarios cover at least 5 of 7 categories per screen: empty, loading, error, success, edge-case (required), plus permissions and responsive (optional)


#### Contract Emerges From UI (🔴 Required)

API Contract Draft (phase-a/api-contract-draft.json):
{
  "version": 1,
  "feature": "project-dashboard",
  "screens": ["ProjectListPage", "ProjectDetailPage"],
  "entities": [
    { "name": "Project", "fields": [
      { "name": "id", "type": "string", "required": true },
      { "name": "name", "type": "string", "required": true },
      { "name": "status", "type": "'active'|'archived'", "required": true }
    ]}
  ],
  "endpoints": [
    { "method": "GET", "path": "/projects", "purpose": "List projects",
      "responseShape": "Project[]", "pagination": { "type": "offset", "pageSize": 20 } }
  ],
  "errorStates": [
    { "statusCode": 401, "uiHandling": "redirect to login" },
    { "statusCode": 500, "uiHandling": "show error toast" }
  ]
}

**Rule:** The API Contract Draft MUST be derived from the validated frontend — never the reverse. The UI dictates what entities, fields, endpoints, and error states the backend must provide.


#### Mock Mode Preservation (🔴 Required)

Phase B Completion Checklist:
✅ Real API works (production mode)
✅ Mock API still works (Debug Studio)
✅ SeedInterceptor intercepts when active
✅ MockRequestProvider provides mock responses
✅ All scenario categories still render correctly
✅ No production code imports from src/dev/
Proof: phase-b/mock-mode-verified.txt

**Rule:** After Phase B, Debug Studio scenarios MUST still work with mock data. Mock mode is NEVER removed — it remains for testing, development, and scenario validation.


### Decomposition

#### Rename Work Scoped Up Front (🔴 Required)

Request: "rename 'agent' to 'worker'"
→ Verified Brief enumerates: user strings (labels, toasts) + internal (enum keys, component names, variables) + wire (DTO fields, API values) + persistence (Prisma schema, DB columns, enum values)
→ User opts in/out of each scope before planning starts
→ Decomposition includes MFs for every opted-in scope in a single cycle

**Rule:** When the feature is a terminology rename, decomposition MUST cover all four scopes in a single plan: (1) user-visible strings, (2) internal TS identifiers/filenames, (3) wire contract (DTO fields, API JSON values), (4) persistence (Prisma schema, DB columns, enum storage values). Never stage a rename across multiple sessions — each staged pass triggers identical re-analysis cost. If the user opts out of a scope, record the opt-out explicitly in the verified brief.


#### Design Spec MF for Complex Visual Features (🟢 Optional)

**Rule:** For complex features with > 3 new visual components, the design spec MF (UX + UI specs: motion tokens, color vocabulary, chat taxonomy, density guardrails) should be kept even under time pressure. Skipping it saves one MF but adds ~50% more time in Gate 5b fixes for visual consistency, hex-color violations, and component-reuse misses. When in doubt, include the design spec.


### Governance

#### Verify Sub-Agent Governance Checklist (🔴 Required)

Sub-agent returns: "Governance Complete: ✅
  - changelog.d/CLG-feature-0004.json created
  - screens/pages/FooPage.screen.json updated (added Bar section)
  - testids.registry.json: added 'foo_create_cta', 'foo_delete_button'"
→ APM accepts and closes delegation.

Sub-agent returns: "Done. Code committed." (no governance block)
→ APM re-dispatches with: "Governance Checklist required per Article III — list changelog entries, screen specs, and test IDs before returning."

**Rule:** Before marking a delegation complete, confirm the sub-agent return message contains "Governance Complete: ✅" with a list of changelog entries created, screen specs updated/created, and test-id registrations added. If missing, re-dispatch with explicit governance requirement. Never silently accept code-only completion — Close Manager will flag it later and create rework.


### Scope Management

#### Chunk Large Refactors (🔴 Required)

// Good: 11-store convention refactor decomposed into 3 atomic commits
//   Chunk A: Company + Department — 17 files — tsc-grep verified — committed
//   Chunk B: Governance + Pulse + Improvement + Incident — 14 files — committed
//   Chunk C: Worker-ops + Memory — 17 files — committed
// Each chunk's delegation prompt had explicit allowlist + verification + scope boundaries.

// Bad: single delegation for 48 files → agent silently edits non-allowlisted files,
//      loses track of what has been done, returns a long stale report mixing done/todo.

**Rule:** For epics involving refactors touching >20 files across multiple domains, APM must plan 3-5 sequential chunks grouped by domain. Each chunk: (a) explicit file allowlist in the delegation prompt, (b) per-chunk verification command (tsc-grep, lint-grep) scoped to those files, (c) atomic commit between chunks BEFORE launching the next. Never delegate a single >30-file refactor to one agent run — single-agent runs drift, re-interpret scope, or return stale reports past that threshold.


#### Verify Workspace State Between Chunks (🔴 Required)

# Between chunks in a multi-chunk refactor
git status                    # any uncommitted work from prior chunk?
git log --oneline -3          # chunk A commit present?
# Then in Chunk B delegation prompt:
"Before editing any file in the allowlist, run:
   git diff HEAD -- <file>
 If it already matches target state (e.g., prior agent applied it):
   report 'already-done: file matches target at <commit>' and skip."

**Rule:** Before launching each subsequent chunk delegation, run git status / git log --oneline -5 to confirm the workspace matches expectations. Include an explicit "State Check" directive in the delegation prompt: "Run git diff HEAD -- <file> before editing any file in the allowlist. If already matches target state, report already-done and skip."

