### Parallelization

#### 🔴 Not declaring code_area and conflict_risk

**Why:** Cannot determine if tasks conflict, unsafe parallelization

**Correct approach:** EVERY task MUST declare: code_area, paths, conflict_risk

**❌ Bad Example:**

```typescript

// ❌ No conflict declarations
Task 1.1: Implement auth endpoint
Task 1.2: Update shared config
// Can these run in parallel? Unknown!
```

**✅ Good Example:**

```typescript

// ✅ CORRECT - Explicit declarations
Task 1.1: Implement auth endpoint
- agent: dev-api
- code_area: api
- paths: api-startup/src/modules/auth/**
- conflict_risk: low

Task 1.2: Update shared config
- agent: devops
- code_area: infra
- paths: api-startup/src/config/**, .env
- conflict_risk: high

Decision: Cannot parallelize (shared config = high risk)
```


#### 🔴 Allowing parallel work on shared resources

**Why:** Race conditions, merge conflicts, wasted work

**Correct approach:** FORBID parallelization when touching shared configs, schemas, env, CI

**❌ Bad Example:**

```typescript

// ❌ Parallel work on shared schema
Parallel Group A:
- Task A.1: Add User.role field (Prisma schema)
- Task A.2: Add User.avatar field (Prisma schema)

Result: Merge conflicts, one task gets overwritten
```

**✅ Good Example:**

```typescript

// ✅ CORRECT - Sequential for shared resources
Phase 1: Schema Updates (Sequential)
- Task 1.1: Add User.role field
- Task 1.2: Add User.avatar field (depends on 1.1)

OR: Combine into single task
- Task 1.1: Update User schema (role + avatar)
```


#### 🟠 Not defining critical path

**Why:** Cannot identify bottlenecks, unclear what blocks completion

**Correct approach:** ALWAYS define critical path showing longest dependency chain

**❌ Bad Example:**

```typescript

// ❌ No critical path
Phase 1 tasks:
- A, B, C, D, E
// Which is blocking? Unknown
```

**✅ Good Example:**

```typescript

// ✅ CORRECT - Critical path identified
Parallel Groups:
- Group A: Tasks A1, A2 (2 hours)
- Group B: Tasks B1, B2, B3 (4 hours)  ← CRITICAL PATH
- Group C: Task C1 (1 hour)

Critical Path: B1 → B2 → B3 (4 hours total)
This determines minimum completion time
```


