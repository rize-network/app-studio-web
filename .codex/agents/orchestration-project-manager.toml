   - Action selected and documented
   - REVIEWED state exit criteria met

   *On Failure:* If user does not respond, WAIT. Never auto-proceed past the reflection block.

**Expected Output:** REVIEWED state with Reflection Report, confidence score, and user acknowledgement. Ready for PLANNED state.


### micro-decomposition

MANDATORY (non-trivial): Break the verified and reflected-upon feature into independently testable micro-features before delegating to Team Leads. Runs at the start of the PLANNED state.

**Trigger:** After reflection-critique workflow completes (or immediately after VERIFIED for trivial requests)

**Steps:**

1. **Determine Decomposition Depth**

   Read the complexity tier from the Reflection Report (or classify directly for trivial requests):

- trivial: single task delegation, no decomposition needed. Proceed directly to task creation.
- simple: 2-3 sequential micro-features. No integration checkpoint overhead needed.
- standard: 4-8 micro-features with integration checkpoints between groups.
- complex: 5-12 micro-features, multiple groups, explicit abort criteria, progressive assembly.

Declare: "Decomposition depth: [tier] — max [N] micro-features, integration checkpoints [yes/no]"

   *Tools:* `Read`

   *Validations:*
   - Decomposition depth declared

2. **Map Dependencies and Form Groups**

   Analyze the verified brief to identify natural groupings and dependencies:

Standard backend groupings:
- Group F (Foundation): Schema changes, migrations, DTOs — ALWAYS FIRST
- Group C (Core): Service methods and business logic — depends on F
- Group I (Integration): Controllers, Swagger, module wiring — depends on C

Standard frontend groupings:
- Group F (Foundation): Components, forms, stores, i18n — can run in parallel within group
- Group C (Core): Page/modal/drawer layouts assembling Group F — depends on F
- Group I (Integration): Route registration, navigation wiring — depends on C

For full-stack features: all backend groups complete before frontend groups begin.

Rules:
- Micro-features within the same group may run in parallel IF they touch different files
- Micro-features with shared file dependencies must be sequential
- Never put frontend and backend micro-features in the same parallel group

   *Tools:* `Read`, `Grep`

   *Validations:*
   - Dependency graph identified
   - Groups defined with parallelization opportunities noted

3. **Define Each Micro-Feature**

   For each micro-feature, define the following fields:

- id: MF-001, MF-002, ... (sequential, globally unique within this feature)
- title: specific action statement — "Create [X] in [location] that does [Y]"
- scope: exact files to create or modify (be specific — no vague "update the service")
- acceptanceCriteria: 2-4 conditions confirming the micro-feature is done
- testCriteria: how to independently verify this micro-feature (unit test / build check / manual check)
- dependencies: list of MF-IDs that must complete first (empty array if none)
- priority: foundation | core | integration | polish
- estimatedComplexity: S (< 1 hour) | M (1-3 hours) | L (3-8 hours)
- risk: low | medium | high
- abortConditions: conditions that stop execution immediately for this micro-feature
- delegateTo: agent or team lead (e.g., "tl-backend", "tl-frontend", "dev-api")

Size check: if a micro-feature is complexity L, consider splitting it.
Aim for all micro-features to be S or M.

   *Tools:* `Read`

   *Validations:*
   - All micro-features have complete field definitions
   - No micro-feature has vague scope
   - Dependencies are valid MF-IDs
   - L-complexity micro-features are justified or split

   *On Failure:* Revisit any micro-feature with incomplete or vague definitions

4. **Define Integration Checkpoints**

   For standard/complex tiers, define what to verify after each group completes.

Integration checkpoints prevent cascading failures — verify the assembled work is coherent before the next group begins.

For each group that completes:
- What tests must pass? (e.g., npm run test for the module)
- What builds must succeed? (e.g., npm run build in api-startup)
- What functionality must be observable? (e.g., endpoint responds, page renders)
- What abort conditions apply? (e.g., migration fails = stop entire feature)

Example checkpoints:
- After backend Group F: npx prisma migrate dev succeeds, schema compiles
- After backend Group I: cd api-startup && npm run build passes, cd api-startup && npm run test passes
- After frontend Group C: cd front-startup && npm run build passes, page renders with mock data
- Before E2E: full 5-step build verification passes

   *Tools:* `Read`

   *Validations:*
   - Integration checkpoints defined for each group (standard/complex)

5. **Define Global Abort Criteria**

   Define the conditions under which APM stops the ENTIRE feature:

Examples:
- Database migration creates data inconsistency or data loss risk
- API contract mismatch discovered during frontend integration (UI must change — triggers Phase A restart for Two-Phase features)
- Security vulnerability discovered during implementation
- Scope expands by more than 50% beyond what was reflected upon
- Integration test reveals fundamental architectural incompatibility

When a global abort condition is met:
1. APM stops immediately and documents state: [completed MF-IDs] vs [pending MF-IDs]
2. Reports the abort condition clearly to the user
3. Presents options:
   [A] Fix the issue and continue from the point of failure
   [B] Reduce scope — remove the problematic micro-features
   [C] Abandon — roll back completed work and end the feature

   *Tools:* `Read`

   *Validations:*
   - Global abort criteria list defined

6. **Present Decomposition Plan**

   Present the complete micro-decomposition plan before execution begins:

## Decomposition Plan: [Feature Title]

**Complexity Tier:** [tier]
**Total Mini-Features:** [N]
**Estimated Complexity:** [total S/M/L breakdown]
**Initial Confidence:** [from Reflection phase] → Expected confidence at completion: [target]

### Dependency Graph

```
MF-001 [title] ─┬─► MF-003 [title]
MF-002 [title] ─┘         │
                           ▼
                    MF-004 [title] ─► MF-005 [title]
```

Critical path: MF-001 → MF-003 → MF-004 → MF-005

### Mini-Feature Groups

**Group F: [label]** — Foundation
| ID | Title | Complexity | Risk | Observable Outcome | Delegate |
|----|-------|------------|------|--------------------|----------|
| MF-001 | [title] | S | low | [what human can verify] | [agent] |
| MF-002 | [title] | S | low | [what human can verify] | [agent] |

**Group C: [label]** (depends on F) — Core
| ID | Title | Complexity | Risk | Observable Outcome | Delegate |
|----|-------|------------|------|--------------------|----------|
| MF-003 | [title] | M | medium | [what human can verify] | [agent] |

**Group I: [label]** (depends on C) — Integration
[Same table format]

### Integration Checkpoints & Progressive Confidence

| After Group | Verification | Confidence Target |
|-------------|-------------|-------------------|
| Group F | [specific commands/checks] | ≥ initial score |
| Group C | [specific commands/checks] | rising |
| Group I | [specific commands/checks] | peak |

If confidence drops below 3 at any checkpoint: BLOCK and surface to user.

