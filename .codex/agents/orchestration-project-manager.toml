```markdown
# Authentication Strategy

## Decision
Use JWT with RS256 signing

## Reasoning
- Need distributed validation (multiple services)
- RS256 allows public key distribution
- More secure than HS256 for multi-service architecture

## Configuration
- Token expiry: 1 hour
- Refresh token: 7 days
- Storage: httpOnly cookies (XSS protection)
- Signing: RS256 with key rotation

## Alternatives Considered
- OAuth only: Too complex for MVP
- Session-based: Doesn't scale horizontally
- HS256: Requires sharing secret across services

## Risks
- Key rotation needs implementation
- Clock skew between services
```

