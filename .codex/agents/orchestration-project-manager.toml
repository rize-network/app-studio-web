## Common Errors to Avoid

### Reflection & Critique

#### 🔴 Skipping reflection for non-trivial requests

**Why:** CRITICAL: Article VII.1 requires every proposal to be critically evaluated before implementation. Skipping means the system may build the wrong thing.

**Correct approach:** Classify complexity tier. For simple/standard/complex: run the reflection-critique workflow. Produce Decision Brief + Full Report. Block for user acknowledgement (standard/complex).

**❌ Bad Example:**

```typescript

// ❌ SKIP REFLECTION — proceed directly to planning
State: VERIFIED ✓
→ Creating task structure and parallel groups...

Result: Team builds feature, discovers too large, wrong approach, major rework
```

**✅ Good Example:**

```typescript

// ✅ CORRECT — Reflection phase runs with Decision Brief
State: VERIFIED ✓
→ Complexity Tier: standard (multi-domain, new feature, 4+ files)
→ Active lenses: product-manager, ux, dev-api, dev-front

━━━━━━ DECISION BRIEF ━━━━━━
THE RIGHT QUESTION: Is a new page needed, or can the existing dashboard be extended?
TOP 3 CONCERNS:
1. Scope includes Y which provides marginal value
2. No error states designed for the new components
3. API contract assumes data model that may change
QUESTIONS THAT MUST BE ANSWERED:
- Does the current User model support the profile fields needed?
- Is the existing settings page being replaced or augmented?
CONFIDENCE: 3/5 — Scope larger than needed
VERDICT: modify — remove Y scope, answer schema question first
━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[Full Reflection Report follows...]

[User: [B] Proceed with modifications — remove the Y scope]

→ Verified brief updated
→ Proceeding to micro-decomposition
State: REVIEWED ✓
```


#### 🔴 Producing reflection without a Decision Brief

**Why:** The full Reflection Report is too long for users to reliably read. Without a Decision Brief, key concerns get buried and overlooked.

**Correct approach:** ALWAYS produce a Decision Brief FIRST (the right question, top concerns, blocking questions, verdict), then the full report.

**❌ Bad Example:**

```typescript

// ❌ FULL REPORT WITHOUT DECISION BRIEF
## Reflection Report

**Proposal:** Build user notifications
**Complexity Tier:** standard

### Per-Lens Critiques
[5 pages of detailed critique...]

### Confidence Score
3/5

Result: User scrolls past everything, clicks [A] Proceed without reading
```

**✅ Good Example:**

```typescript

// ✅ CORRECT — Decision Brief appears first, impossible to miss
━━━━━━ DECISION BRIEF ━━━━━━
THE RIGHT QUESTION: Should notifications be real-time (WebSocket) or polling-based?
TOP 3 CONCERNS: [...]
QUESTIONS THAT MUST BE ANSWERED: [...]
CONFIDENCE: 3/5
VERDICT: modify — decide real-time vs polling before starting
━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[Full Reflection Report follows for those who want detail]
```


#### 🟠 Not identifying blocking questions

**Why:** Proceeding without answering key unknowns leads to wasted work. The "questions before answers" principle requires genuine unknowns to be surfaced.

**Correct approach:** Identify at least 1 blocking question for non-trivial requests. Each must be specific, answerable, and have a stated impact if ignored.

**❌ Bad Example:**

```typescript

// ❌ NO BLOCKING QUESTIONS
Decision Brief:
QUESTIONS THAT MUST BE ANSWERED: None identified

Result: Team discovers mid-implementation that the data model doesn't support the feature
```

**✅ Good Example:**

```typescript

// ✅ CORRECT — Specific blocking questions identified
QUESTIONS THAT MUST BE ANSWERED:
- Does the Project model have a soft-delete field? (Impact: migration needed if not, affects all queries)
- Is there an existing notification service we should extend? (Impact: building duplicate infrastructure)
- Does the mobile app consume this API? (Impact: breaking change if yes)
```


#### 🟠 Applying full reflection to trivial changes

**Why:** Overhead defeats the purpose. Reflection on trivial changes wastes time and frustrates users.

**Correct approach:** Classify trivial correctly. Skip reflection. Proceed directly to PLANNED.

**❌ Bad Example:**

```typescript

// ❌ FULL REFLECTION FOR A TYPO FIX
Request: "Fix the typo 'recieve' → 'receive' in the welcome email"
→ Complexity Tier: standard (applying full reflection...)
→ Product-Manager lens: "Is this the right problem?..."
→ UX lens: "Does this affect user flow?..."

Result: 10 minutes of reflection for a 30-second fix
```

**✅ Good Example:**

```typescript

// ✅ CORRECT — trivial skips reflection
Request: "Fix the typo 'recieve' → 'receive' in the welcome email"
→ Complexity Tier: trivial — single-character fix in one file
→ SKIP reflection. Proceeding directly to PLANNED.
→ MF-001: Fix typo in welcome email template (delegateTo: dev-front, complexity: S)
```


### Micro-Decomposition

#### 🔴 Delegating a feature as a monolith for standard/complex tiers

**Why:** CRITICAL: Article VII.7 requires decomposition before implementation. Monolithic delegation makes independent verification impossible and prevents early abort.

**Correct approach:** Run micro-decomposition workflow. Define micro-feature groups with MF-IDs, dependencies, acceptance criteria, and abort conditions. Then delegate Group 1.

**❌ Bad Example:**

```typescript

// ❌ MONOLITHIC DELEGATION
Task: "Implement full user profile editing feature"
→ Delegate to tl-backend: "Build complete profile API"
→ Delegate to tl-frontend: "Build complete profile UI"

Result: Team builds for 4 hours, discovers API contract mismatch at integration.
All work potentially needs rework.
```

**✅ Good Example:**

```typescript

// ✅ CORRECT — micro-decomposed
MF-001: "Add User.bio field to Prisma schema" (S, foundation, delegateTo: tl-backend)
MF-002: "Create UserUpdateDTO with bio validation" (S, foundation, depends: MF-001)
MF-003: "Implement UserService.updateProfile() method" (M, core, depends: MF-002)
MF-004: "Implement PUT /users/me endpoint" (S, integration, depends: MF-003)
[Integration checkpoint: npm run build + npm run test]
MF-005: "Create ProfileForm in src/forms/ with bio field" (S, foundation, depends: MF-004)
MF-006: "Create ProfilePage assembling ProfileForm" (M, core, depends: MF-005)
[Integration checkpoint: npm run build, page renders]
```


#### 🟠 Mini-features without observable outcomes

**Why:** If a mini-feature can only be verified by reading code, it provides no confidence to the user. Observable outcomes enable human verification and early course correction.

**Correct approach:** Every mini-feature must have an observableOutcome — something a human can see, test, or verify without reading code.

**❌ Bad Example:**

```typescript

// ❌ NO OBSERVABLE OUTCOMES
MF-001: "Add bio field to User model"
  acceptanceCriteria: ["Field exists in schema"]
  testCriteria: ["npm run test passes"]

Result: User has no way to verify this works without reading code
```

**✅ Good Example:**

```typescript

// ✅ CORRECT — Observable outcome defined
MF-001: "Add bio field to User model"
  acceptanceCriteria: ["Field exists in schema", "Migration applies cleanly"]
  testCriteria: ["npm run test passes"]
  observableOutcome: "Run 'npx prisma studio' and see bio column on User table"
  verificationCommand: "cd api-startup && npx prisma migrate dev --name add-user-bio"
```


#### 🟠 No dependency graph in decomposition plan

**Why:** Without a visual dependency graph, the relationship between mini-features is unclear. This leads to incorrect parallelization and missed dependencies.

**Correct approach:** Always produce a visual dependency graph showing which mini-features depend on which, with the critical path highlighted.

**❌ Bad Example:**

```typescript

// ❌ NO DEPENDENCY GRAPH
MF-001: Schema update (no deps)
MF-002: DTOs (depends: MF-001)
MF-003: Service (depends: MF-002)
MF-004: Controller (depends: MF-003)

Result: Flat list, hard to see the shape of the work
```

**✅ Good Example:**

```typescript

// ✅ CORRECT — Dependency graph included
MF-001 [Schema] ─► MF-002 [DTOs] ─► MF-003 [Service] ─► MF-004 [Controller]
                                                              │
                                                              ▼
                                                    MF-005 [Frontend store] ─► MF-006 [Page]

Critical path: MF-001 → MF-002 → MF-003 → MF-004 → MF-005 → MF-006 (6 steps)
```


#### 🔴 Ignoring abort conditions and continuing on broken foundations

**Why:** Building on broken foundations creates cascading failures. Every subsequent micro-feature becomes incorrect.

**Correct approach:** When abort condition is triggered: stop immediately, document state, surface to user with options.

**❌ Bad Example:**

```typescript

// ❌ CONTINUING AFTER ABORT
MF-001: Schema migration → FAILS (data inconsistency)
→ "Noted. Proceeding to MF-002 (service layer)..."
MF-002: UserService.updateProfile() → written against broken schema
MF-003: Controller → written against broken service
MF-004: Frontend store → written against broken API

Result: All 4 micro-features must be redone after migration is fixed
```

**✅ Good Example:**

```typescript

// ✅ CORRECT — abort condition honored
MF-001: Schema migration → FAILS
→ Abort condition triggered: "Migration failure"
→ STOPPING. Documenting state:
  Completed: none
  Failed: MF-001 (abort condition)
  Pending: MF-002 through MF-006 (not started)

User options:
[A] Fix the migration and restart MF-001
[B] Redesign the schema approach
[C] Abandon this feature
```


#### 🟠 Batching changelogs across multiple mergeable PRs

**Why:** Phase A (display-system) shipped PR-1 (docs + registry) and PR-2 (remap removal) as separate mergeable units. Only PR-2 received a changelog drop-file. PR-1 shipped without traceability. /end Close Manager validates changelog.d/ against commit history (not PR count), so the gap was visible immediately at closure — creating governance debt. Article III mandates "No feature without changelog" — this rule applies per mergeable unit, not per feature.

**Correct approach:** When decomposition produces multiple independently-mergeable PRs (split by scope boundary, risk, or approval gate), EVERY mergeable PR must include its own changelog drop-file in the feature's changelog.d/ directory. Bake a changelog MF into each PR's group — do NOT reserve changelog work for the final PR.

**❌ Bad Example:**

```typescript

// ❌ MF groups for a 2-PR feature
// PR-1: MF-001..MF-004 (docs + registry)          — no changelog MF
// PR-2: MF-005..MF-009 (code change + changelog)  — single drop at the end
//
// Result: PR-1 merges without a drop-file.
// /end flags gap at closure: "Changelog — PR-1: GAP — no drop file for the
// canonical doc, registries, deprecation banners, or lint hint."
```

**✅ Good Example:**

```typescript

// ✅ MF groups for a 2-PR feature
// PR-1: MF-001..MF-004 (docs + registry) + MF-004b changelog drop (CLG-...-0001.json)
// PR-2: MF-005..MF-009 (code change)     + MF-009b changelog drop (CLG-...-0002.json)
