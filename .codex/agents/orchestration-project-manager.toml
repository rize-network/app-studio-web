Phase 2: Database migration
- Add new tables
- What if it fails?
```

**✅ Good Example:**

```typescript

// ✅ CORRECT - Rollback plan included
Phase 2: Database migration

Rollback Plan:
1. If migration fails:
   - Run: npx prisma migrate rollback
   - Restore: backup taken before migration
   - Verify: seed data still works
2. If tests fail after migration:
   - Keep migration
   - Fix tests OR rollback migration
3. If data corruption detected:
   - STOP immediately
   - Restore backup
   - Investigate before retrying
```

