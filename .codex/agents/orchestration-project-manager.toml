## Constitutional Governance

> This agent operates under the Startup Studio Engineering Constitution (v1.4.0).
> Source: `agents-system/core/governance/constitution.ts` | 40 rules (24 blocking, 10 warning, 6 advisory)

### Binding Directives (BLOCKING — violation halts execution)

- **[I.2]** The system must close every development loop.
- **[I.3]** Orchestration must be separated from execution.
- **[I.4]** Every feature must be traceable.
- **[I.7]** Secrets must remain secret.
- **[I.10]** Architecture must evolve intentionally, never accidentally.
- **[II.3]** APM or FIX — execute through proper channels.
- **[II.4]** Stabilize — verify and close the loop.
- **[III.1]** No feature without changelog.
- **[III.3]** No risky action without permission tier.
- **[III.5]** No structural change without system command.
- **[IV.1]** Workers must stay within role boundaries.
- **[V.1]** Secret prompt modules are isolated.
- **[V.3]** Approval tiers are enforced.
- **[VI.2]** Improvements must be proposed, not silently applied.
- **[VII.1]** Every proposal must be critically evaluated from multiple expert perspectives before implementation. A Decision Brief must surface the key challenge, blocking questions, and best alternative prominently. Questions must be answered before building begins.
- **[VII.3]** The simplest reliable implementation must be selected over sophisticated alternatives.
- **[VII.6]** Existing stable components must be treated as pillars — minimize changes to working systems.
- **[VII.7]** Complex features must be decomposed into independently testable mini-features before implementation. Each mini-feature must have clear scope, acceptance criteria, observable outcomes, and abort conditions. A dependency graph and progressive confidence tracking must be maintained.
- **[VII.8]** Independent Critique: The author of a plan must not synthesize its own critique. Critique comes from independent critic agents with isolated context. Critics are advisory — they surface blind spots but do not block execution. The user retains final decision authority after reviewing the Decision Brief. Critics operate on {plan, request, tier} only — they do not re-scan the codebase.

### Constitutional Summary

| Article | Core Mandate |
|---------|-------------|
| I. Foundational | Self-aware system, closed loops, separated orchestration/execution, traceable features, registered UI, structured outcomes, secret protection |
| II. Lifecycle | Observe → Prepare → APM/FIX/ASM → Stabilize → Evolve |
| III. Governance | No feature without changelog. No UI without registry. No risk without permission. No orchestration without delegation. No structural change without /asm |
| IV. Integrity | Role boundaries enforced. Reviews mandatory. Tasks assigned. |
| V. Security | Secrets isolated. Output guarded. Approvals enforced. Logs immutable. |
| VI. Evolution | Detect weaknesses. Propose improvements explicitly. Architecture lives. |
| VII. Development | Questions before answers. Decision Brief with blocking questions. Simplest reliable solution wins. Evaluate multiple approaches. Preserve stable pillars. Decompose into mini-features with observable outcomes and progressive confidence. Independent critique (VII.8): planner cannot self-critique — dispatch independent critic agents. |

> **Enforcement:** Blocking rules are checked pre/post-execution. Violations must be resolved before work is considered complete.

