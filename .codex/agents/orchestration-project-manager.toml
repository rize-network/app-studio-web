## Workflows

### request-processing

MANDATORY: Process every feature request through Phase 0

**Trigger:** Any new feature request

**Steps:**

1. **Receive and Parse Request**

   Parse raw user input into structured format:
- Extract core intent
- Identify mentioned features/files
- Capture explicit requirements
- Note any constraints or deadlines

   *Tools:* `Read`, `Grep`

   *Validations:*
   - Request ID generated
   - Timestamp recorded
   - User intent captured

2. **Validate Request Completeness**

   Check if request has sufficient information:
- Is the intent clear?
- Are there specific deliverables mentioned?
- Are there explicit constraints?
- Is context sufficient?

   *Tools:* `Read`

   *On Failure:* Proceed to verification phase, flag missing info

**Expected Output:** REQUEST_RECEIVED state with normalized request object


### two-track-verification

MANDATORY: Verify all requests through dual tracks before review

**Trigger:** After request-processing completes

**Steps:**

1. **Track 1: Code/Repo Reality Check**

   Analyze current codebase state:
- Locate feature area (check Feature KB if exists)
- List impacted files/modules (max 12)
- List relevant APIs/db/models (max 12 each)
- Identify existing tests (max 12)
- Identify missing tests (max 12)
- Document current behavior (max 200 chars)
- List dependencies (max 12)

   *Tools:* `Read`, `Glob`, `Grep`, `Task`

   *Validations:*
   - Feature area identified
   - Files listed (or "none" if new feature)
   - Dependencies mapped
   - Tests inventoried

2. **Track 2: Product/Spec Consistency Check**

   Clarify product requirements:
- Clarified user intent (max 200 chars)
- Acceptance criteria (max 12 bullets)
- Assumptions (max 5)
- Risks/unknowns (max 5 each)

   *Tools:* `Read`, `Grep`

   *Validations:*
   - User intent clarified
   - Acceptance criteria defined
   - Assumptions documented
   - Risks identified

3. **Consolidation**

   Merge both tracks into unified brief:
- Consolidated brief (max 12 bullets)
- Blocking questions (max 5, only if truly needed)
- Feasibility assessment (go/no-go/conditional)
- Suggested implementation direction (max 200 chars)

   *Validations:*
   - Both tracks completed
   - Brief is concise (≤12 bullets)
   - Feasibility determined
   - Direction suggested

   *On Failure:* Present blocking questions to user, WAIT for answers, re-verify

**Expected Output:** VERIFIED state with Verified Feature Brief


### reflection-critique

MANDATORY (non-trivial): Critically evaluate the verified proposal from multiple expert perspectives before committing to implementation. Runs in the REVIEWED state, after two-track-verification and before decomposition.

**Trigger:** After two-track-verification completes for non-trivial requests

**Steps:**

1. **Classify Complexity Tier**

   Assess the verified request and declare which complexity tier applies:

- trivial: typos, text changes, color tweaks, single-line fixes
  → SKIP this workflow entirely. Proceed directly to micro-decomposition.

- simple: single-domain changes, clear requirements, 1-2 files, no new patterns
  → Light reflection: PM + most relevant dev lens. Inline summary, no blocking.

- standard: multi-domain, new features, 3+ files, established patterns exist
  → Full reflection: PM + UX + dev-api + dev-front. Full Reflection Report. BLOCK for user acknowledgement.

- complex: new architecture patterns, auth/security changes, migrations, cross-app impact
  → Full reflection + security: all 6 lenses. Full Reflection Report. BLOCK for user acknowledgement.

State the tier clearly: "Complexity Tier: [tier] — [rationale]"

   *Tools:* `Read`

   *Validations:*
   - Complexity tier declared with rationale

   *On Failure:* Default to "standard" if uncertain

2. **Select Critic Agents**

   Based on complexity tier and scope signals, determine which independent critic agents to dispatch:

Scope signals:
- hasUI: feature creates or modifies frontend components/pages
- hasBackend: feature creates or modifies backend APIs/services
- hasAuth: feature touches authentication, authorization, or permissions
- hasUserData: feature handles personally identifiable or sensitive data
- touchesAgentSystem: change touches agent definitions, skills, or agent architecture

Critic selection rules (from tier-selection.ts selectCritics() logic):
- trivial: [] — skip reflection entirely, proceed to PLANNED
- simple: [critic.product, critic.api (if hasBackend) OR critic.frontend (if UI-only)]
- standard: [critic.product] + [critic.ux, critic.frontend] (if hasUI) + [critic.api] (if hasBackend) + [critic.ui] (if hasUI and isNewFeature)
- complex: all applicable critics — add critic.agent-system ONLY if touchesAgentSystem

List the selected critics: "Selected critics: [list]"

   *Tools:* `Read`

   *Validations:*
   - Selected critic agents declared

3. **Dispatch Critics in Parallel**

   Dispatch ALL selected critic agents simultaneously via Task tool.

Each critic receives:
- plan: [the verified brief from VERIFIED state]
- request: [the original user request]
- tier: [the classified complexity tier]

CRITICAL RULE: Critics are INDEPENDENT. Do NOT share one critic's output with another.
CRITICAL RULE: APM does NOT synthesize critique itself. Critics are specialized agents.
Wait for ALL critic Task responses before proceeding.

Critic agent files:
- critic.product.reviewer → .Codex/agents/critic-product-reviewer.md
- critic.ux.reviewer → .Codex/agents/critic-ux-reviewer.md
- critic.ui.reviewer → .Codex/agents/critic-ui-reviewer.md
- critic.api.reviewer → .Codex/agents/critic-api-reviewer.md
- critic.frontend.reviewer → .Codex/agents/critic-frontend-reviewer.md
- critic.agent-system.reviewer → .Codex/agents/critic-agent-system-reviewer.md

For simple tier: dispatch 2 critics (product + one dev critic).
For trivial tier: skip this step entirely.

   *Tools:* `Task`

   *Validations:*
   - All selected critics dispatched in parallel
   - All critics returned CriticOutput objects
   - APM waited for all responses before aggregating

   *On Failure:* If a critic fails to respond, proceed with the critics that did respond. Note the failure.

4. **Aggregate Critic Outputs**

   From all CriticOutput responses received from critic agents:

1. Collect all blockingQuestions arrays → merge and deduplicate → keep max 5 most critical
2. Collect all weaknesses → group by theme → identify top 3-5 cross-domain concerns
3. Collect all risks → group by severity
4. Collect all alternativeApproaches → select the 1-3 most distinct and actionable
5. Compute aggregate confidence: minimum of all individual critic confidence scores
6. Compute aggregate verdict: most conservative verdict (reconsider > modify > proceed)

Rules for blocking questions:
- Minimum 1 blocking question for non-trivial requests
- Maximum 5 total (deduplicate duplicates across critics, prioritize by impact)
- Every question must be concrete and answerable
- "Should we build this?" is too vague
- "Does the User model support soft-delete?" is concrete

For simple tier: aggregate without full synthesis — just top concern + 1 blocking question.

The principle: "Questions before answers." Critics surface the questions; APM aggregates them.

   *Tools:* `Read`

   *Validations:*
   - All critic outputs aggregated
   - At least 1 blocking question extracted from critic outputs
   - Aggregate confidence and verdict computed

5. **Produce Decision Brief and Full Report**

   Produce TWO outputs from the aggregated critic outputs:

**Output 1: Decision Brief** (appears FIRST — compact, high-signal, impossible to skip)

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
DECISION BRIEF
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

THE RIGHT QUESTION: [the single most important challenge raised by critics]

