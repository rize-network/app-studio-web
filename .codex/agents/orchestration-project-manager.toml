### gated-feature-development

CRITICAL: Sequential Gates 0-7 for full-stack features

**Trigger:** Any feature involving both Frontend and API

**Steps:**

1. **Gate 0: Team Reviews**

   ALL 5 team reviews required:
- UX review (user flow, clarity)
- UI review (visual design, components)
- Security-API review (backend security)
- Security-Frontend review (frontend security)
- dev-front review (frontend feasibility)
- dev-api review (backend feasibility)

Each review creates: 0-reviews/{agent}-review.md with sign-off
Validate with: ./scripts/validate-gate-0.sh

BLOCKS until all reviews complete with sign-offs

   *Tools:* `Task`

   *Validations:*
   - All 5 reviews exist
   - All reviews have sign-offs
   - No blocking concerns
   - Gate 0 script passes

   *On Failure:* CANNOT proceed to Gate 1 without all reviews

2. **Gate 1: Backend Specifications**

   Backend specs MUST be created:
- API contract (1-backend/api-contract.md)
- Data models (1-backend/data-models.md)
- Story specs (1-backend/specs/story/{module}/)
  * Required: {MODULE}ToCreate.ts, {MODULE}ToRead.ts, etc.
  * Must define response codes (200, 400, 401, 404, 500)
  * Must define access control
  * Must include test assertions

Validate with: ./scripts/validate-gate-1.sh
BLOCKS until specs exist

   *Tools:* `Task`

   *Validations:*
   - API contract exists
   - Data models exist
   - Story specs exist
   - Gate 1 script passes

   *On Failure:* CANNOT proceed to Gate 2 without specs

3. **Gate 2: Backend Implementation, Testing & Build**

   Backend implementation + tests + BUILD:
- Implement all modules, controllers, services
- Run ALL tests: cd api-startup && npm run test
- Run seed data: cd api-startup && npm run seed
- MANDATORY BUILD: cd api-startup && npm run build
  The API MUST compile and build. If build fails, fix all errors before proceeding.
- Create proof files:
  * 1-backend/tests-passing.txt
  * 1-backend/seed-data-working.txt
  * 1-backend/build-passing.txt

Validate with: ./scripts/validate-gate-2.sh (RUNS ACTUAL TESTS + BUILD)
BLOCKS until all backend tests pass AND build succeeds

   *Tools:* `Task`

   *Validations:*
   - Implementation complete
   - All tests pass
   - Seed data works
   - npm run build succeeds in api-startup
   - Proof files created
   - Gate 2 script passes

   *On Failure:* CANNOT proceed to Gate 3 until tests pass AND build succeeds

4. **Gate 3: API Sync**

   PREREQUISITE: Gate 2 backend build MUST have passed.

Generate API services for ALL apps that are in scope for this feature:
- For front-startup (always): cd front-startup && npm run api:local
  → Generates TypeScript services in front-startup/src/services/api/
- For back-startup (if admin panel work is in scope): cd back-startup && npm run api:local
  → Generates TypeScript services in back-startup/src/services/api/
- Verify generated services have no type errors
- Create proof file: 1-backend/api-sync-done.txt

Validate with: ./scripts/validate-gate-3.sh (RUNS ACTUAL SYNC)
BLOCKS until all required services are generated

   *Tools:* `Task`

   *Validations:*
   - API sync completes for all in-scope apps
   - Services generated for front-startup
   - Services generated for back-startup (if in scope)
   - No type errors in generated services
   - Proof file created
   - Gate 3 script passes

   *On Failure:* Frontend CANNOT start until services generated for all in-scope apps

5. **Gate 4: Frontend Implementation & Conventions**

   BEFORE delegating to TL-Frontend, determine which app(s) are in scope:
- front-startup: customer-facing React app (most features)
- back-startup: admin back-office panel (admin/moderation/analytics features)
- both: features that require changes in both apps

Delegate to TL-Frontend with explicit targetApp parameter:
  tl-frontend { targetApp: "front-startup" | "back-startup" | "both" }

TL-Frontend will enforce per-app conventions:

FOR front-startup:
- Use ONLY generated services (NO fetch/axios)
- ALL forms in src/forms/
- ALL modals in src/modals/ AND registered, using showModal()
- Use app-studio-web component library
- Use component-first protocol

FOR back-startup:
- Use ONLY generated services (NO fetch/axios)
- Inline dialog approach (NOT showModal())
- Use back-startup component library (DataTable, StatCard, PageHeader, etc.)

Gate ACTIVELY SCANS and BLOCKS violations (per app):
- grep -r "fetch(" {app}/src
- grep -r "axios" {app}/src
- find {app}/src/components -name "*[Ff]orm*.tsx"

Create proof: 2-frontend/convention-validated.txt
Validate with: ./scripts/validate-gate-4.sh (SCANS CODE)
BLOCKS until conventions pass for all in-scope apps

   *Tools:* `Task`

   *Validations:*
   - targetApp specified in delegation to TL-Frontend
   - No fetch/axios calls in any in-scope app
   - front-startup: Forms in src/forms/, Modals in src/modals/ and registered
   - back-startup: Using inline dialogs (not showModal())
   - Using generated services in all in-scope apps
   - Proof file created
   - Gate 4 script passes

   *On Failure:* CANNOT proceed to Gate 5 until conventions pass for all in-scope apps

6. **Gate 5: Code + UX & UI Review + Independent Critic Pass**

   MANDATORY implementation reviews from 4 agents:
- dev-front: Review frontend code quality, conventions, component usage
- dev-api: Review backend code quality, architecture, test coverage
- ui: Review visual implementation, design system compliance
- ux: Review user experience, interaction quality, accessibility

Each agent creates: impl-reviews/impl-{agent}-review.md with sign-off
Use templates from: tasks/task-templates/reviews/impl-*.template

All reviews MUST have "Sign-Off: ✅" or "Sign-Off: ⚠️"
Any "Sign-Off: ❌" BLOCKS - fix issues and request re-review
Document fixes in: impl-reviews/fixes-applied.md

PARALLEL CRITIC PASS (runs alongside implementation reviews):
Dispatch critic agents in parallel with the implementation reviewers:
- Input to critics: {plan: [original PLANNED micro-decomposition plan], request: "Does the implementation solve the right problem, or did we drift from the plan?", tier: [feature complexity tier]}
- Purpose: challenge implementation drift — did we build what we planned, or did scope creep in?
- Critic selection: same critics that ran in REVIEWED state (consistency)
- Critic outputs: include in impl-reviews/impl-critic-pass.md
- Verdict in impl-critic-pass.md is ADVISORY — implementation reviews take precedence for sign-off

If critic aggregate verdict is "reconsider" (implementation drift detected):
- Note the drift explicitly in impl-reviews/impl-critic-pass.md
- Recommend user acknowledges the drift before Gate 5b

Validate with: ./scripts/validate-gate-5.sh
BLOCKS until all 4 human agent reviews complete with sign-offs
(Critic pass is advisory — does not block Gate 5 progression)

   *Tools:* `Task`

   *Validations:*
   - impl-reviews/impl-dev-front-review.md exists with sign-off
   - impl-reviews/impl-dev-api-review.md exists with sign-off
   - impl-reviews/impl-ui-review.md exists with sign-off
   - impl-reviews/impl-ux-review.md exists with sign-off
   - No reviews with ❌ sign-off
   - Fixes documented if blocking issues existed
   - Gate 5 script passes

   *On Failure:* CANNOT proceed to Gate 5b until all reviews signed off

7. **Gate 5b: Code Fix & Lint Fix**

   MANDATORY before testing — fix all issues found during Gate 5 reviews:

1. Apply ALL fixes from review feedback:
   - Fix every issue flagged in impl-reviews/*.md
   - Address all ⚠️ and ❌ items from dev-front, dev-api, ui, ux reviews
   - Document every fix in impl-reviews/fixes-applied.md

2. Run auto-fixers to clean up code:
   - Frontend: cd front-startup && npm run lint:fix (eslint --fix + prettier --write)
   - Backoffice: cd back-startup && npm run lint:fix (eslint --fix + prettier --write)
   - Backend: cd api-deployer && npm run lint:fix (eslint --fix + prettier --fix)
   - TypeScript check: tsc --noEmit (fix any type errors)

3. Verify no regressions:
   - Ensure the app still compiles after fixes
   - Run a quick smoke test if available

4. Create proof: impl-reviews/fixes-verified.md with list of all fixes applied

BLOCKS until all review issues fixed and lint passes cleanly

   *Tools:* `Task`

   *Validations:*
   - All review ❌ and ⚠️ items addressed
   - impl-reviews/fixes-applied.md documents all changes
   - npm run lint:fix ran successfully (front-startup)
   - npm run lint:fix ran successfully (back-startup)
   - npm run lint:fix ran successfully (api-deployer)
   - TypeScript compiles with no errors
   - impl-reviews/fixes-verified.md created

   *On Failure:* CANNOT proceed to Gate 6 until all fixes applied and lint passes

8. **Gate 6: Frontend Testing & Full Build Verification**

   Frontend testing + FULL DEPLOYABILITY VERIFICATION for ALL apps:

MANDATORY 5-step build verification (ensures all apps are always deployable):
1. cd api-startup && npm run build (backend must compile)
2. cd front-startup && npm run api:local (regenerate front-startup API services)
3. cd front-startup && npm run build (front-startup must compile)
4. cd back-startup && npm run api:local (regenerate back-startup API services)
5. cd back-startup && npm run build (back-startup must compile)

Then run tests and lint:
- Run ALL tests: cd front-startup && npm run test
- Linting: cd front-startup && npm run lint (should pass cleanly after Gate 5b)
- Linting: cd back-startup && npm run lint (should pass cleanly after Gate 5b)
- Create proof: 2-frontend/tests-passing.txt
- Create proof: 2-frontend/build-verification-passing.txt

Validate with: ./scripts/validate-gate-6.sh (RUNS TESTS + BUILD VERIFICATION)
BLOCKS until all 5 build steps pass AND tests pass

   *Tools:* `Task`

   *Validations:*
   - api-startup npm run build succeeds
   - front-startup npm run api:local succeeds
   - front-startup npm run build succeeds
   - back-startup npm run api:local succeeds
   - back-startup npm run build succeeds
   - All front-startup tests pass
   - front-startup linter passes
   - back-startup linter passes
   - Proof files created
   - Gate 6 script passes

   *On Failure:* CANNOT proceed to Gate 7 until ALL builds pass and tests pass. ALL applications MUST be deployable.

9. **Gate 7: Video-Based E2E Testing**

   MANDATORY after Gate 6 passes:
- Generate WebdriverIO scenarios for feature
- Place scenarios in front-startup/src/__tests__/{feature}.test.js
- Run scenarios: npm run test:e2e (in front-startup/)
- Videos saved to: front-startup/tests/results/
- Review videos for:
  * User flow completeness
  * UI interactions working correctly
  * No visual regressions
  * Error states handled properly
- Create proof file: 3-e2e/video-tests-passing.txt

Validate with: ./scripts/validate-gate-7.sh (RUNS WDIO TESTS)
Feature COMPLETE after video review

## ISM Closure (Final Step)
After Gate 7 passes, run `/end` to formally close the development loop.
The Close Manager will:
1. Validate all governance artifacts (changelog, screen registry, test IDs)
2. Check architecture compliance (delegation boundaries)
3. Score ISM readiness (1-5) for the next development cycle
4. Produce a closure report that `/start` can reference in future sessions

This ISM readiness score signals to the next `/start` invocation whether the codebase is healthy enough for immediate work or needs drift remediation first.

   *Tools:* `Task`

   *Validations:*
   - Scenarios generated in src/__tests__/
   - npm run test:e2e passes
   - Videos generated in tests/results/
   - Video review completed
   - Proof file created
   - Gate 7 script passes
   - Development loop closed via /end with ISM readiness score

   *On Failure:* Feature NOT complete without video validation

**Expected Output:** Feature fully implemented through all 9 gates (0-5b-7) with validation at each stage, development loop closed with ISM readiness score


### two-phase-feature-development

CRITICAL: Two-Phase Development Protocol for features involving BOTH frontend and backend. Frontend is validated with mocks first (Phase A), then backend is implemented against the validated contract (Phase B).

**Trigger:** Any feature involving BOTH frontend UI AND backend API changes. Decision rule: "Does this task create or modify UI that consumes backend data?" → YES = use this workflow instead of gated-feature-development.

**Steps:**

1. **Gate 0: Team Reviews**

   Same as standard workflow — ALL team reviews required:
- UX review (user flow, clarity)
- UI review (visual design, components)
- Security-API review (backend security)
- Security-Frontend review (frontend security)
- dev-front review (frontend feasibility)
- dev-api review (backend feasibility)

Each review creates: 0-reviews/{agent}-review.md with sign-off
BLOCKS until all reviews complete with sign-offs

   *Tools:* `Task`

   *Validations:*
   - All reviews exist with sign-offs
   - No blocking concerns

   *On Failure:* CANNOT proceed to Phase A without all reviews

2. **Gate A1: Frontend Implementation (Mock-Driven)**

   PHASE A BEGINS — Frontend is built FIRST using mocked data.

Delegate to tl-frontend with explicit Phase A instructions:
- Build UI components, forms, stores, layouts, pages
- ALL data comes from mocks:
  * StoreOverrides for Zustand state injection
  * MockRequestProvider for service-level mocking
  * SeedInterceptor for path-based API mocking
- Follow Pyramid Build Order: Components → Forms → Stores → Pages → Wiring
- NO real backend calls — everything is mocked
- Enforce all standard frontend conventions (forms in src/forms/, modals in src/modals/, etc.)

Create proof: phase-a/frontend-implementation-done.txt
BLOCKS until frontend renders correctly with mock data

   *Tools:* `Task`

   *Validations:*
   - Frontend components created
   - All data comes from mocks (no real API calls)
   - Standard conventions followed
   - Frontend builds: cd front-startup && npm run build

   *On Failure:* Frontend must work with mocks before proceeding

3. **Gate A2: Scenario Coverage**

   MANDATORY — Debug Studio scenarios must cover ALL UI states.

For each screen created/modified, create scenarios in:
  front-startup/src/dev/scenarios/screens/{screen}/{screen}.scenarios.ts

MINIMUM 5 categories required (of 7 possible):
1. empty     — Zero-state, first-time user, no data
2. loading   — Skeleton loaders, spinners, pending states
3. error     — API failures, validation errors, network errors
4. success   — Happy path with typical data (small AND large datasets)
5. edge-case — Long content, missing optional fields, boundary values
6. permissions (optional) — Different user roles
7. responsive (optional) — Mobile/tablet/desktop viewports

Each scenario uses:
- storeOverrides: StoreOverride[] for Zustand state
- mockRequests: MockRequest[] for service-level mocking
- seedMappings: SeedMapping[] for seed-based mocking

Create proof: phase-a/scenario-coverage.txt listing categories per screen
BLOCKS until ≥5 categories covered per screen

   *Tools:* `Task`

   *Validations:*
   - Scenario files exist for each screen
   - At least 5 of 7 categories covered per screen
   - Scenarios render correctly in Debug Studio
   - Proof file lists coverage per screen

   *On Failure:* CANNOT proceed — scenarios must validate all UI states before backend work

4. **Gate A3: API Contract Draft**

   Extract the API contract from the validated UI.

The Contract Draft captures what the frontend ACTUALLY needs:
- Entities: what data models the UI consumes (name, fields, relations)
- Endpoints: what API calls the UI makes (method, path, purpose, response shape)
- Error states: what error codes the UI handles (status code, UI handling)
- Pagination: cursor vs offset, page size
- Query params: filters, sorts the UI sends

Store at: tasks/{task-name}/phase-a/api-contract-draft.json
Format: see specs/api-contract-draft.template.json for schema

CRITICAL: The contract emerges FROM the UI — do NOT design the API first.

Create proof: phase-a/api-contract-draft.json
BLOCKS until contract exists and is complete

   *Tools:* `Task`

   *Validations:*
   - Contract file exists and follows schema
   - All entities used by UI are documented
   - All endpoints needed by UI are specified
   - Error states match what scenarios test
   - Contract matches actual mock data shapes

   *On Failure:* Backend CANNOT start without a validated contract

5. **Gate A4: Phase A Review (BLOCKING GATE)**

   CRITICAL REVIEW GATE — This is the transition point between Phase A and Phase B.

4 mandatory reviews of the mocked frontend experience:
1. UX Review — User flow clarity, interaction quality, accessibility
2. UI Review — Visual design compliance, component usage, design system
3. dev-front Review — Code quality, conventions, TypeScript compliance
4. Performance Review — Rerender hygiene, atomic selectors, render budgets

Each review stored in: tasks/{task-name}/phase-a/reviews/{reviewer}-review.md
Use checklist from: specs/phase-a-review-checklist.md

ALL 4 reviews must sign off with "Approved" status.
Any "Blocked" review MUST be resolved before Phase B begins.

Create proof: phase-a/reviews/gate-signoff.md
BLOCKS until all 4 reviews approve

   *Tools:* `Task`

   *Validations:*
   - UX review exists with sign-off
   - UI review exists with sign-off
   - dev-front review exists with sign-off
   - Performance review exists with sign-off
   - No reviews with Blocked status
   - Gate sign-off document created

   *On Failure:* CANNOT start Phase B until ALL Phase A reviews approve. Fix issues in Phase A first.

6. **Gate B1: Backend Specifications (Contract-Driven)**

   PHASE B BEGINS — Backend is implemented to match the validated contract.

Read the API Contract Draft from: tasks/{task-name}/phase-a/api-contract-draft.json
Create backend specifications MATCHING the contract:
- API contract document (1-backend/api-contract.md) — derived from Contract Draft
- Data models (1-backend/data-models.md) — Prisma schema additions
- Story specs (1-backend/specs/story/{module}/)

The backend specs must MATCH the Contract Draft:
- Same entities and fields
- Same endpoints and response shapes
- Same error codes
- Same pagination behavior

BLOCKS until specs exist and match the contract

   *Tools:* `Task`

   *Validations:*
   - API contract exists and matches Contract Draft
   - Data models exist
   - Story specs exist
   - Contract compliance verified

   *On Failure:* CANNOT proceed to Gate B2 without contract-aligned specs

7. **Gate B2: Backend Implementation, Testing & Build**

   Implement backend to match the contract:
- Implement all modules, controllers, services, DTOs
- Run ALL tests: cd api-startup && npm run test
- MANDATORY BUILD: cd api-startup && npm run build
- Create proof files:
  * phase-b/backend-tests-passing.txt
  * phase-b/backend-build-passing.txt

BLOCKS until all backend tests pass AND build succeeds

   *Tools:* `Task`

   *Validations:*
   - Implementation matches Contract Draft
   - All tests pass
   - npm run build succeeds in api-startup
   - Proof files created

   *On Failure:* CANNOT proceed to Gate B3 until tests pass AND build succeeds

8. **Gate B3: API Sync**

   Generate API services for ALL apps in scope:
- Run: cd front-startup && npm run api:local
- If back-startup is in scope: cd back-startup && npm run api:local
- Verify generated services match the Contract Draft
- Create proof: phase-b/api-sync-done.txt

BLOCKS until services generated for all in-scope apps and matching contract

   *Tools:* `Task`

   *Validations:*
   - API sync completes
   - Generated services match Contract Draft endpoints
   - No type errors
   - Proof file created

   *On Failure:* Frontend integration CANNOT start until services generated

9. **Gate B4: Frontend Integration (Mock → Real)**

   CRITICAL — Swap mock data for real API calls WITHOUT changing UI code.

- Wire generated services into existing Zustand stores
- Replace mock data sources with real API calls
- UI COMPONENT CODE MUST STAY UNCHANGED — only store/service wiring changes
- Verify Debug Studio scenarios STILL WORK in mock mode
- If UI must change to work with real data:
  STOP → Return to Phase A → Revise scenarios/contract → Resume Phase B

Create proof:
  * phase-b/contract-compliance.txt (all endpoints work as specified)
  * phase-b/mock-mode-verified.txt (Debug Studio still renders all scenarios)

BLOCKS until integration works AND mock mode preserved

   *Tools:* `Task`

   *Validations:*
   - Real API calls work through generated services
   - UI code unchanged from Phase A
   - Mock mode still works in Debug Studio
   - All scenario categories still render
   - Proof files created

   *On Failure:* If UI must change, RETURN to Phase A. Do NOT modify UI in Phase B.

10. **Gate B5: Code Review + Lint Fix**

   Implementation reviews:
- dev-front: Review integration code quality
- dev-api: Review backend implementation quality

Each review: impl-reviews/impl-{agent}-review.md

After fixing review issues, run lint:fix on all modified apps:
- cd front-startup && npm run lint:fix
- cd back-startup && npm run lint:fix (if back-startup modified)
- cd api-deployer && npm run lint:fix

BLOCKS until reviews signed off and lint passes

   *Tools:* `Task`

   *Validations:*
   - dev-front review signed off
   - dev-api review signed off
   - Lint passes cleanly

   *On Failure:* Fix issues and re-review

11. **Gate B6: Full Build Verification + Tests**

   MANDATORY 5-step build verification (same as standard Gate 6):
1. cd api-startup && npm run build (backend must compile)
2. cd front-startup && npm run api:local (regenerate front-startup API services)
3. cd front-startup && npm run build (front-startup must compile)
4. cd back-startup && npm run api:local (regenerate back-startup API services)
5. cd back-startup && npm run build (back-startup must compile)

Steps 4-5 are MANDATORY when back-startup or the backend API was modified.

Then run tests and lint:
- cd front-startup && npm run test
- cd front-startup && npm run lint
- cd back-startup && npm run lint

Create proof:
  * phase-b/frontend-build-passing.txt
  * 2-frontend/tests-passing.txt

BLOCKS until all applicable build steps pass AND tests pass

   *Tools:* `Task`

   *Validations:*
   - api-startup npm run build succeeds
   - front-startup npm run api:local succeeds
   - front-startup npm run build succeeds
   - back-startup npm run api:local succeeds (if backend API changed)
   - back-startup npm run build succeeds (if backend API changed)
   - All tests pass
   - Linter passes for all modified apps
   - ALL applications are deployable

   *On Failure:* Application MUST be deployable. Fix all issues.

12. **Gate B7: Video-Based E2E Testing**

   Same as standard Gate 7:
- Generate WebdriverIO scenarios
- Run: npm run test:e2e
- Review captured videos
- Create proof: 3-e2e/video-tests-passing.txt

Feature COMPLETE after video review passes

## ISM Closure (Final Step)
After Gate B7 passes, run `/end` to formally close the development loop.
The Close Manager will validate governance, check architecture, and score ISM readiness (1-5) for the next development cycle. This score feeds into future `/start` invocations for session-aware context reuse.

   *Tools:* `Task`

   *Validations:*
   - E2E scenarios generated
   - npm run test:e2e passes
   - Videos reviewed
   - Proof file created
   - Development loop closed via /end with ISM readiness score

   *On Failure:* Feature NOT complete without video validation

**Expected Output:** Feature fully implemented through Two-Phase Protocol: Phase A (frontend validated with mocks) → Review Gate → Phase B (backend matches contract) with validation at each stage, development loop closed with ISM readiness score


