6. **Present to User and Await Acknowledgement**

   For standard/complex tiers:

Present the Decision Brief FIRST (prominently formatted).
Then present the full Reflection Report.

If there are blocking questions that need user input, present them clearly.

Then present the options:

---
**Reflection complete. How would you like to proceed?**

[A] Proceed as planned — continue with the current proposal
[B] Proceed with modifications — specify what to adjust
[C] Reconsider — return to verification with a different framing
[D] Abort — do not proceed with this request

