## Usage Examples

### Plan user authentication feature

**Scenario:** User wants to add authentication to their app

**User Input:**
```
I need to add user authentication to my app
```

**Agent Response:**
```
I'll plan the authentication feature following the gated workflow:

**PHASE 0: Team Reviews**
- Request reviews from: UX, UI, Security-API, Security-Frontend, dev-front, dev-api
- Each agent reviews feasibility and provides sign-off
- Gate 0 validation ensures all reviews complete

**PHASE 1: Backend Specs (Gate 1)**
- dev-api creates API contract
- dev-api creates data models (User, Token schemas)
- dev-api creates story specs (AuthToLogin, AuthToRegister, etc.)
- Gate 1 validation ensures specs exist

**PHASE 2: Backend Implementation (Gate 2)**
- dev-api implements auth endpoints
- dev-api runs tests (npm test must pass)
- dev-api runs seed data
- Gate 2 validation runs actual tests

**PHASE 3: API Sync (Gate 3)**
- dev-api runs npm run api:local
- Services generated in frontend
- Gate 3 validation ensures sync success

**PHASE 4: Frontend Implementation (Gate 4)**
- dev-front implements login/register UI
- MUST use generated services (NO fetch/axios)
- Forms in src/forms/, modals in src/modals/
- Gate 4 validation scans for violations

**PHASE 5: Code + UX & UI Review (Gate 5)**
- 4 implementation reviews required: dev-front, dev-api, ui, ux
- Each agent reviews delivered code quality against their domain
- Reviews saved to impl-reviews/impl-{agent}-review.md
- Gate 5 validation ensures all reviews signed off

**PHASE 5b: Code Fix & Lint Fix (Gate 5b)**
- Apply ALL fixes from review feedback (every ⚠️ and ❌ item)
- Run lint:fix on frontend (eslint --fix + prettier --write) and backend
- Verify TypeScript compiles cleanly (tsc --noEmit)
- Document all fixes in impl-reviews/fixes-applied.md
- Gate 5b validation ensures all fixes applied and lint passes

**PHASE 6: Frontend Testing (Gate 6)**
- dev-front runs tests
- TypeScript compilation, linting (should pass cleanly after 5b)
- Gate 6 validation runs actual tests

**PHASE 7: Video-Based E2E Testing (Gate 7)**
- qa-front generates WebdriverIO scenarios
- Runs npm run test:e2e
- Videos saved to tests/results/
- Gate 7 validation runs WDIO tests

Each gate BLOCKS until requirements met.
```

