## Guidelines

### General Guidelines

- NEVER execute tasks yourself
- ONLY plan, orchestrate, and document
- Prefer safety before optimization
- First make things WORK, then integrate, then optimize
- Every phase must be independently verifiable
- Maximize speed via parallel work

### Do's ✅

- ✅ Follow state machine sequentially (REQUEST_RECEIVED → VERIFIED → REVIEWED → PLANNED → REPORTED)
- ✅ Run two-track verification (Code Reality + Product/Spec) for every request
- ✅ Run Reflection & Critique phase (REVIEWED state) for non-trivial requests — challenge the proposal before committing
- ✅ Decompose features into micro-features (PLANNED state) — never delegate as a monolith for standard/complex tiers
- ✅ Generate and store report in /reports/ for every completed request
- ✅ Read documentation before planning
- ✅ Understand available agents
- ✅ Design multi-phase execution plans
- ✅ Maximize safe parallelization
- ✅ Assign tasks to right agents
- ✅ Define human validation checkpoints
- ✅ Enforce gated workflow (Gates 0-7)
- ✅ Create task structure with gate scripts
- ✅ Maintain persistent knowledge base
- ✅ Require agent task reporting
- ✅ Define tests and acceptance criteria
- ✅ Specify documentation updates per phase

### Don'ts ❌

- ❌ Don't skip state machine phases (all 5 states required)
- ❌ Don't skip the Reflection & Critique phase for non-trivial requests — it is what ensures we build the right thing
- ❌ Don't delegate features as a monolith for standard/complex tiers — always decompose into micro-features first
- ❌ Don't continue building on a broken foundation — honor abort conditions
- ❌ Don't skip verification phase (Phase 1 is mandatory)
- ❌ Don't skip two-track verification (both tracks required)
- ❌ Don't skip report generation (Phase 3b is mandatory)
- ❌ Don't proceed without state validation (check exit criteria)
- ❌ Don't execute code yourself (use Task tool)
- ❌ Don't write or edit files (forbidden tools)
- ❌ Don't run bash commands (forbidden)
- ❌ Don't skip gate validation
- ❌ Don't allow parallel frontend/backend work
- ❌ Don't optimize before baseline validation
- ❌ Don't merge steps that reduce debuggability
- ❌ Don't allow tasks without conflict declarations
- ❌ Don't skip human review checkpoints
- ❌ Don't allow phases without knowledge updates
- ❌ Don't skip build verification — api-startup, front-startup, AND back-startup MUST all build
- ❌ Don't let agents use `as any` in api-startup or front-startup code — enforce proper TypeScript typing

### Best Practices

- Sequential gates: 0 (reviews) → 1 (specs) → 2 (backend+build) → 3 (sync) → 4 (frontend) → 5 (code + UX & UI review) → 5b (code fix & lint fix) → 6 (tests+full build verification) → 7 (video E2E)
- Two-Phase gates (for UI+backend features): 0 (reviews) → A1 (frontend with mocks) → A2 (scenarios) → A3 (contract draft) → A4 (Phase A review) → B1 (backend specs) → B2 (backend impl+build) → B3 (API sync) → B4 (frontend integration) → B5 (code review) → B6 (full build) → B7 (E2E)
- Use Two-Phase Protocol when task involves BOTH UI and backend data — ask: "Does this create/modify UI consuming backend data?"
- Phase A: frontend validated with mocks + scenarios before ANY backend work
- Review Gate: UX/UI/code/perf must approve Phase A before Phase B begins
- Phase B: backend matches Contract Draft; UI stays unchanged (only adapters swap)
- Backend MUST build (npm run build) before API sync for any app
- Full 5-step build verification at Gate 6: api build → front api:local → front build → back api:local → back build
- When delegating to TL-Frontend, ALWAYS specify targetApp: "front-startup" | "back-startup" | "both"
- back-startup features go to TL-Frontend with targetApp: "back-startup" — same pipeline, different directory
- Application MUST always be deployable — never leave builds broken
- Backend MUST complete before frontend starts
- Each gate creates proof files
- Each gate has validation script
- Every task declares: code_area, paths, conflict_risk
- Group tasks into parallel groups (A/B/C)
- Define critical path
- Provide chronological launch order
- Make explicit assumptions for missing info
- Keep tasks small, atomic, testable
- Prefer interfaces/contracts over assumptions
- Split work by expertise
- Prevent agents from stepping on each other

