// /end closes cleanly without governance gaps.
```


### Gated Workflow

#### 🔴 Allowing parallel frontend and backend work

**Why:** CRITICAL: Frontend cannot start without API services. Gates 1-3 MUST complete before Gates 4-5.

**Correct approach:** ENFORCE sequential workflow: Gates 0→1→2→3 (backend) THEN 4→5 (frontend)

**❌ Bad Example:**

```typescript

// ❌ CRITICAL ERROR - Parallel frontend/backend
Phase 1: Backend & Frontend (PARALLEL)
- Task 1.1: dev-api implements API
- Task 1.2: dev-front implements UI  // WRONG! No services yet!

Result: Frontend blocks waiting for services
```

**✅ Good Example:**

```typescript

// ✅ CORRECT - Sequential gates
Phase 1: Backend Specs (Gate 1)
- dev-api creates specs
- Validate: ./scripts/validate-gate-1.sh

Phase 2: Backend Implementation (Gate 2)
- dev-api implements + tests
- Validate: ./scripts/validate-gate-2.sh

Phase 3: API Sync (Gate 3)
- npm run api:local generates services
- Validate: ./scripts/validate-gate-3.sh
- PROOF: 1-backend/api-sync-success.txt

Phase 4: Frontend Implementation (Gate 4)
- dev-front uses generated services
- Validate: ./scripts/validate-gate-4.sh

Phase 5: Agent Code Review (Gate 5)
- 4 implementation reviews with sign-offs
- Validate: ./scripts/validate-gate-5.sh

Phase 6: Frontend Testing (Gate 6)
- dev-front tests pass
- Validate: ./scripts/validate-gate-6.sh

Phase 7: Video-Based E2E Testing (Gate 7)
- Video E2E tests pass
- Validate: ./scripts/validate-gate-7.sh
```


#### 🔴 Skipping Gate 0 team reviews

**Why:** Team reviews catch issues early, prevent rework

**Correct approach:** ALWAYS require all 5 team reviews before implementation starts

**❌ Bad Example:**

```typescript

// ❌ Skip reviews, go straight to implementation
Phase 1: Backend Specs
// No reviews! Security issues, UX problems discovered later
```

**✅ Good Example:**

```typescript

// ✅ CORRECT - Gate 0 first
Phase 0: Team Reviews (Gate 0)
- UX review: user flow, clarity
- UI review: visual design, components
- Security-API review: backend security
- Security-Frontend review: frontend security
- dev-front review: frontend feasibility
- dev-api review: backend feasibility

ALL reviews must have sign-offs
Validate: ./scripts/validate-gate-0.sh

THEN proceed to Gate 1
```


#### 🔴 Not creating gate validation scripts

**Why:** Gates are not enforced, violations go undetected

**Correct approach:** ALWAYS copy gate scripts for every new task

**❌ Bad Example:**

```typescript

// ❌ No gate scripts
tasks/add-auth/
└── plan.md  // Just a plan, no validation

Result: Frontend uses fetch() directly, violations not caught
```

**✅ Good Example:**

```typescript

// ✅ CORRECT - Gate scripts setup
cp tasks/task-templates/scripts/*.sh tasks/add-auth/scripts/

tasks/add-auth/
├── scripts/
│   ├── validate-gate-0.sh
│   ├── validate-gate-1.sh
│   ├── validate-gate-2.sh
│   ├── validate-gate-3.sh
│   ├── validate-gate-4.sh  // SCANS for fetch/axios!
│   ├── validate-gate-5.sh
│   ├── validate-gate-6.sh
│   └── validate-gate-7.sh
├── 0-reviews/
├── 1-backend/
└── 2-frontend/
```


