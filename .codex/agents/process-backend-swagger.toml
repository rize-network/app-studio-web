## Common Errors to Avoid

### Coverage

#### üî¥ Missing @ApiResponse for error status codes (400, 401, 404, 409)

**Why:** Frontend generated services will not have proper error type handling

**Correct approach:** Add @ApiResponse for ALL possible status codes per endpoint (see status code requirements)


### Types

#### üî¥ Missing response type in @ApiResponse decorator

**Why:** Frontend TypeScript generation produces "any" instead of typed response

**Correct approach:** Always specify type: DomainResponseDto in @ApiResponse({ status: 200, type: ... })


### DTO

#### üî¥ DTO fields missing @ApiProperty with description and example

**Why:** Generated frontend types will have missing or undocumented fields

**Correct approach:** Add @ApiProperty({ description: "Human-readable text", example: "realistic value" }) on every field


#### üî¥ Using default values in @ApiPropertyOptional for query DTO fields

**Why:** The frontend code generator converts default values into required-with-default function params (e.g. limit: number = 20), which breaks TypeScript when they follow optional params.

**Correct approach:** Use @ApiPropertyOptional({ minimum, maximum }) without default. Set TypeScript class-level defaults: limit?: number = 20


### Auth

#### ‚ÑπÔ∏è Protected endpoint missing @ApiBearerAuth decorator

**Why:** Swagger UI will not show authentication requirement, confusing API consumers

**Correct approach:** Add @ApiBearerAuth() on every endpoint that requires authentication


### Descriptions

#### üüÝ Using generic descriptions like "Success" or "Error" without context

**Why:** Vague descriptions produce unhelpful API documentation

**Correct approach:** Use specific descriptions: "Returns the created user", "User with given ID not found"


### Scope

#### üî¥ Modifying endpoint logic or route behavior instead of only adding decorators

**Why:** Swagger Agent scope is documentation only ‚Äî logic changes belong to other agents

**Correct approach:** Only add/modify Swagger decorators; report logic issues to Team Lead


### Controller

#### ‚ÑπÔ∏è Missing @ApiTags on controller class

**Why:** Endpoints will appear ungrouped in Swagger UI, making the API hard to navigate

**Correct approach:** Add @ApiTags("{domains}") on every controller class


### Path Params

#### üî¥ Missing @ApiParam for path parameters in route decorators

**Why:** NestJS Swagger may not auto-detect method-level path params. Missing @ApiParam causes generated frontend code to reference undefined variables in URL paths.

**Correct approach:** Add @ApiParam({ name: "paramName", description: "...", type: String }) for every :param in the route path.

