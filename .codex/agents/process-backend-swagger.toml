## Conventions

### Controller

#### ApiTags Required (üî¥ Required)

Every controller class needs @ApiTags

**Rule:** @ApiTags("{domains}") on every controller class


### Endpoint

#### ApiOperation Required (üî¥ Required)

Every endpoint needs @ApiOperation with summary

**Rule:** @ApiOperation({ summary: "descriptive text" }) on every method


#### ApiResponse for All Status Codes (üî¥ Required)

Document every possible HTTP status code

**Rule:** @ApiResponse for each status: 200/201, 400, 401, 404, 409


### Auth

#### ApiBearerAuth on Protected Endpoints (üî¥ Required)

Authenticated endpoints must declare @ApiBearerAuth

**Rule:** @ApiBearerAuth() + @UseGuards(AuthGuard) on protected endpoints


### DTO

#### ApiProperty on Every Field (üî¥ Required)

Every DTO field needs @ApiProperty with description and example

**Rule:** @ApiProperty({ description: "...", example: "..." }) on every field


### Response Type

#### Typed Responses (üî¥ Required)

Response DTOs specified in @ApiResponse for TypeScript generation

**Rule:** @ApiResponse({ status: 200, type: DomainResponseDto }) ‚Äî explicit type

