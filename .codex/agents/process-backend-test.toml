## Conventions

### Seed Data

#### Use Seed Data in E2E Tests (🔴 Required)

E2E and integration tests MUST use seed data from seed.json instead of creating test data

**Rule:** Import seedData from src/shared/seed/seed.data. Use seedData["<name>"].result.<prop> for entity references. NEVER prisma.create() in test setup. NEVER hardcode IDs.

**✅ Good Examples:**

```
const projectId = seedData["projectToGenerate"].result.id
```

```
const userId = seedData["test"].result.id
```

**❌ Bad Examples:**

```
await prisma.user.create({ data: { email: "test@example.com" } })
```

```
const projectId = "hardcoded-test-id"
```


### Naming

#### Test File Suffix (🔴 Required)

Use .spec.ts for NestJS tests

**Rule:** {domain}.service.spec.ts and {domain}.controller.spec.ts

**✅ Good Examples:**

```
users.service.spec.ts
```

```
users.controller.spec.ts
```

**❌ Bad Examples:**

```
users.test.ts
```

```
test-users.ts
```


### Structure

#### Describe/It Blocks (🔴 Required)

Organize tests with describe per method, it per case

**Rule:** describe("{ClassName}") > describe("{methodName}") > it("should {verb} when {condition}")


### Mocking

#### Mock Dependencies (🔴 Required)

Mock PrismaService in service tests, mock Service in controller tests

**Rule:** Use jest.fn() for mock methods, jest.spyOn() for verification


### Coverage

#### Error Path Testing (🔴 Required)

Test error paths, not just happy paths

**Rule:** Test NotFoundException (not found), ConflictException (duplicate), BadRequestException (invalid)


### Isolation

#### Test Isolation (🔴 Required)

Each test is independent, no shared state

**Rule:** Use beforeEach to create fresh module and mocks. No test order dependencies.

---

## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🔴 Critical Restrictions

- **Never create test data manually in E2E tests — use seed data**
  - *Reason:* The seed system provides all test entities. Manual creation duplicates seeds and breaks when seeds change.
  - *Alternative:* Import seedData and use seedData["<name>"].result.<prop> references

- **Never use real database in unit tests**
  - *Reason:* Tests must be fast, deterministic, and CI-safe
  - *Alternative:* Mock PrismaService with jest.fn()

- **Never modify source files**
  - *Reason:* Test Agent writes tests, not production code
  - *Alternative:* Report source issues to Team Lead for re-dispatch

- **Never use jest globals — front-startup uses vitest**
  - *Reason:* front-startup uses vitest 1.6.1 which does NOT expose jest as a global. Using jest.spyOn, jest.fn, jest.mock etc. causes ReferenceError. Backend tests that run in the front-startup test runner (e.g., store tests, hook tests) must also use vitest.
  - *Alternative:* Always import { describe, it, expect, vi, beforeEach, afterEach } from "vitest". Use vi.spyOn, vi.fn, vi.mock, vi.restoreAllMocks.

### 🟠 High Priority Restrictions

- **Never skip error path testing**
  - *Reason:* Error handling bugs are the #1 production issue

- **Never share state between tests**
  - *Reason:* Creates flaky tests that pass/fail randomly
  - *Alternative:* Use beforeEach for fresh setup

- **Never test implementation details**
  - *Reason:* Brittle tests that break on refactors
  - *Alternative:* Test inputs and outputs, not internal method calls

