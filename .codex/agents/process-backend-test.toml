## Common Errors to Avoid

### Seed Data

#### 🔴 Creating test data manually in E2E tests (prisma.create, API calls in beforeAll) instead of using seed data

**Why:** The seed system pre-populates the database with all test entities. Manual creation duplicates seeds, is slow, and breaks when seeds change.

**Correct approach:** Import seedData from src/shared/seed/seed.data and use seedData["projectToGenerate"].result.id, seedData["test"].result.id, etc.

**❌ Bad Example:**

```typescript
const testUser = await prismaService.user.create({ data: { email: "test@example.com" } })
```

**✅ Good Example:**

```typescript
const userId = seedData["test"].result.id
```


### Mocking

#### 🔴 Using real database connection instead of mocked PrismaService

**Why:** Tests become slow, flaky, and fail in CI without a running database

**Correct approach:** Mock PrismaService with jest.fn() for each Prisma method used


### Coverage

#### ℹ️ Only testing happy paths, skipping error/edge cases

**Why:** Error handling bugs are the most common production issues

**Correct approach:** Test NotFoundException, ConflictException, BadRequestException for every endpoint


### Isolation

#### ℹ️ Sharing state between test cases via module-level variables

**Why:** Creates flaky tests that pass in isolation but fail when run together

**Correct approach:** Use beforeEach to create fresh TestingModule and mocks for every test


### Structure

#### 🟠 Flat test structure without nested describe blocks

**Why:** Makes it hard to find failures and understand what each test covers

**Correct approach:** Use describe("{ClassName}") > describe("{method}") > it("should...when...")


### Scope

#### 🔴 Modifying source/production files instead of only writing test files

**Why:** Test Agent scope is tests only — source changes belong to other agents

**Correct approach:** Only create/modify .spec.ts files; report source issues to Team Lead


### Assertions

#### ℹ️ Tests without meaningful assertions (no expect() calls)

**Why:** Tests that do not assert anything always pass and provide false confidence

**Correct approach:** Every it() block must have at least one expect() with a specific matcher

