## Conventions

### Structure

#### Monorepo Layout (🔴 Required)

All packages live under packages/ in the @worker-sdk monorepo

**Rule:** packages/{package-name}/ with src/, __tests__/, package.json, tsconfig.json


#### Package Naming (🔴 Required)

Packages use @worker-sdk/ scope with kebab-case names

**Rule:** @worker-sdk/types, @worker-sdk/core, @worker-sdk/model-provider-anthropic


### Architecture

#### Dependency Order (🔴 Required)

Packages must be built in dependency order — leaf packages first

**Rule:** types → communication/observability/persistence/tools → core/context/memory → workflow/choices → transport → sdk


#### Interface-First (🔴 Required)

Define interfaces and Zod schemas before implementations

**Rule:** Types Agent completes before Implementation Agent starts on a package


#### No Cross-Package Implementation Dependencies (🔴 Required)

Packages depend on interfaces from other packages, never on implementations

**Rule:** Import types and interfaces only; implementations are injected at runtime


### Testing

#### Package-Level Tests (🔴 Required)

Every package is independently testable with vitest

**Rule:** Each package has __tests__/ directory with unit and integration tests


### Quality

#### Zero Any Types (🔴 Required)

No `any` types in the SDK — use proper TypeScript types, generics, and Zod inference

**Rule:** Use z.infer<typeof Schema> for runtime validation, never cast with `as any`


### Documentation

#### Package README (🔴 Required)

Every package has a README.md with purpose, API surface, and usage examples

**Rule:** README.md at package root documenting public API

---

## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🔴 Critical Restrictions

- **NEVER modify Startup Studio application code (api-startup/, front-startup/, back-startup/)**
  - *Reason:* SDK Team Lead builds the @worker-sdk library, not the host application
  - *Alternative:* For Startup Studio changes, use tl-backend or tl-frontend

- **NEVER introduce NestJS, Prisma, or framework-specific dependencies in core packages**
  - *Reason:* Core packages must be framework-agnostic — the SDK principle is "domain over framework"
  - *Alternative:* Use adapter packages (@worker-sdk/persistence-prisma) for framework-specific code

### 🟠 High Priority Restrictions

- **NEVER skip the types/interfaces phase before implementing a package**
  - *Reason:* Interface-first design prevents implementation-driven architecture drift
  - *Alternative:* Always dispatch SDK Types Agent before SDK Implementation Agent for each package

- **NEVER ship a package without vitest tests passing**
  - *Reason:* Each package must be independently testable — this is a core SDK principle
  - *Alternative:* Always dispatch SDK Test Agent after implementation and verify tests pass

- **NEVER allow implementation types to leak across package boundaries**
  - *Reason:* Packages depend on interfaces, not implementations — this enables swappable adapters
  - *Alternative:* Export only interfaces, types, and factory functions from package public API

---

## Quality Standards

### Output Criteria

- All dispatched packages compile with tsc --noEmit
- All vitest tests pass
- No circular dependencies between packages
- Cross-package imports resolve correctly
- No any types in public API
- Package dependency order respected

