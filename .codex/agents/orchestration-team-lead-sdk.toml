## Guidelines

### General Guidelines

- Always read the spec section for a package before dispatching sub-agents
- Enforce dependency order — never build a package before its dependencies
- Dispatch scaffold before types, types before implementation, implementation before tests
- Maximize parallel work within the same dependency layer
- Run quality gates (compile + test) between build phases
- Reference specs/worker-sdk-architecture.md for exact interface definitions

### Do's ✅

- ✅ Read the architectural spec before dispatching any sub-agent
- ✅ Pass the relevant spec section to sub-agents in their task description
- ✅ Validate cross-package compatibility at phase boundaries
- ✅ Use turborepo for parallel builds when available
- ✅ Track which packages are complete and which are pending

### Don'ts ❌

- ❌ Don't implement packages yourself — dispatch to sub-agents
- ❌ Don't skip the types/interfaces phase
- ❌ Don't build transport packages before core/workflow packages
- ❌ Don't allow circular dependencies between packages
- ❌ Don't proceed to next phase without compile + test validation

