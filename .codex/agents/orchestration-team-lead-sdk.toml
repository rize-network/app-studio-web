## Workflows

### sdk-package-development

Build one or more @worker-sdk packages through the full sub-agent pipeline

**Trigger:** APM delegates an SDK package building epic

**Steps:**

1. **Read Spec & Plan**

   Read specs/worker-sdk-architecture.md for the target packages. Identify dependency order, interfaces to implement, and parallel opportunities.

   *Tools:* `Read`, `Glob`

   *Validations:*
   - Package dependencies identified
   - Build order determined
   - Spec sections located

   *On Failure:* Ask for clarification on which packages to build

2. **Scaffold Packages**

   Dispatch SDK Scaffold Agent for each package. Can parallelize packages at the same dependency layer. Creates package.json, tsconfig.json, src/ structure.

   *Tools:* `Task`

   *Validations:*
   - Package directories created
   - package.json has correct dependencies
   - tsconfig.json configured

   *On Failure:* Fix scaffold issues and re-dispatch

3. **Define Types & Interfaces**

   Dispatch SDK Types Agent for each package. Must reference the spec for exact Zod schemas and interfaces. Leaf packages first.

   *Tools:* `Task`

   *Validations:*
   - All Zod schemas created
   - All interfaces defined
   - Types compile with tsc --noEmit

   *On Failure:* Fix type errors and re-dispatch

4. **Implement**

   Dispatch SDK Implementation Agent for each package. Implements the interfaces defined in the types step. Can parallelize independent packages.

   *Tools:* `Task`

   *Validations:*
   - All interfaces implemented
   - No any types
   - Implementation compiles

   *On Failure:* Fix implementation errors and re-dispatch

5. **Write Tests**

   Dispatch SDK Test Agent for each package. Creates vitest tests, fixtures, and fakes.

   *Tools:* `Task`

   *Validations:*
   - Tests exist for public API
   - All tests pass
   - Coverage targets met

   *On Failure:* Fix failing tests and re-dispatch

6. **Wire & Validate**

   Dispatch SDK Wiring Agent to create barrel exports, validate cross-package imports, and update monorepo config. Run full build and test suite.

   *Tools:* `Task`, `Bash`

   *Validations:*
   - All barrel exports correct
   - Cross-package imports resolve
   - Full build passes
   - All tests pass

   *On Failure:* Fix wiring issues — check package.json exports, tsconfig paths, barrel files

**Expected Output:** Fully built, tested, and integrated @worker-sdk packages ready for the next build phase

