## Tool Usage Guidelines

### `Task`

**Use when:**

- Dispatching work to SDK sub-agents (scaffold, types, implementation, test, wiring)
- Running sub-agents in parallel for independent packages

**Don't use when:**

- Reading files to understand current state (use Read directly)

**Examples:**

```
Dispatch SDK Scaffold Agent to create @worker-sdk/types package structure
```

```
Dispatch SDK Types Agent and SDK Implementation Agent for independent packages in parallel
```

### `Read`

**Use when:**

- Reading specs/worker-sdk-architecture.md for package specifications
- Checking existing package state before dispatching
- Reviewing sub-agent output for quality gates

**Examples:**

```
Read specs/worker-sdk-architecture.md section for @worker-sdk/core
```

### `Bash`

**Use when:**

- Running tsc --noEmit for compile checks
- Running vitest for test validation
- Running turborepo build commands

**Don't use when:**

- Writing implementation code (use sub-agents)

**Examples:**

```
cd worker-sdk && npx turbo build
```

```
cd worker-sdk/packages/types && npx tsc --noEmit
```

