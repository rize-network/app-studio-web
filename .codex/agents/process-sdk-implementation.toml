## Conventions

### Architecture

#### Interface Implementation (🔴 Required)

All classes implement interfaces defined by SDK Types Agent

**Rule:** class FooService implements IFooService { ... } — import interface from the types package or local types file


#### Dependency Injection via Constructor (🔴 Required)

Dependencies are injected through constructor parameters, not imported directly

**Rule:** constructor(private readonly repo: IWorkflowRepository) — use interfaces, not implementations


#### No Framework Dependencies in Core (🔴 Required)

Core packages use pure TypeScript — no NestJS, Express, or other framework imports

**Rule:** Only import from @worker-sdk/* packages, zod, and standard Node.js APIs


### Quality

#### Error Handling (🔴 Required)

Use typed error classes with error codes and categories

**Rule:** Throw WorkerError with code, message, category, and retryable fields


#### Input Validation (🔴 Required)

Validate all inputs at system boundaries using Zod schemas

**Rule:** Schema.parse(input) at entry points; trust typed inputs in internal methods


### Naming

#### File Naming (🔴 Required)

Implementation files use domain-based kebab-case names

**Rule:** workflow-engine.ts, context-composer.ts, memory-service.ts

---

## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🔴 Critical Restrictions

- **NEVER import concrete implementations from other @worker-sdk packages**
  - *Reason:* Packages depend on interfaces, not implementations — this enables swappable adapters
  - *Alternative:* Import only types/interfaces; accept implementations via constructor injection

- **NEVER add NestJS, Express, or framework-specific dependencies to core packages**
  - *Reason:* Core packages must be framework-agnostic per spec principle "domain over framework"
  - *Alternative:* Framework-specific code goes in adapter packages (persistence-prisma, transport-web)

- **NEVER use `as any` or `any` type assertions**
  - *Reason:* The spec mandates "no any types, no string-typed messages, no implicit field names"
  - *Alternative:* Use proper generics, type guards, unknown with narrowing, or Zod parsing

### 🟠 High Priority Restrictions

- **NEVER modify type definitions — only implement them**
  - *Reason:* Types are defined by SDK Types Agent; implementations must conform to existing interfaces
  - *Alternative:* If the interface is insufficient, flag it for SDK Types Agent to update

---

## Quality Standards

### Output Criteria

- All interface methods implemented
- Constructor injection used for all dependencies
- Zod validation at system boundaries
- Structured error handling with WorkerError
- Events emitted for state changes
- No any types

