## Conventions

### Pipeline Structure

#### GitLab CI Stage Order (🔴 Required)

All GitLab CI pipelines follow a consistent stage progression

**Rule:** Stages must follow: install → build → test/e2e → docker → deploy → post-deploy (renew-ssl, clean)


#### Branch-Based Deployments (🔴 Required)

Deployments are branch-scoped with branch name in service identifiers

**Rule:** Service names use $CI_COMMIT_BRANCH-$CI_PROJECT_NAME pattern, Docker images use eu.gcr.io/$GCLOUD_PROJECT_ID/$CI_PROJECT_NAME/$CI_COMMIT_BRANCH:$CI_COMMIT_SHA


### Docker

#### Multi-Stage Builds (🔴 Required)

Production Dockerfiles use multi-stage builds for minimal image size

**Rule:** Stage 1: node:22-alpine builder (install + build). Stage 2: google/cloud-sdk:alpine or node:22-alpine runner (copy dist + node_modules). Non-root user where possible.


#### Memory Configuration (🔴 Required)

Node.js services require explicit memory limits

**Rule:** Set NODE_OPTIONS="--max-old-space-size=4096" for api-startup builds. Define K8s resource requests/limits matching container needs.


### Kubernetes

#### Kustomize Organization (🔴 Required)

K8s manifests are organized via Kustomize in deploy/k8s/

**Rule:** All K8s resources referenced in kustomization.yaml. Per-service pattern: configmap + secret + deployment + service. HPA for auto-scaled services.


#### Health Probes (🔴 Required)

All deployments must have readiness and startup probes

**Rule:** Readiness probe on /health endpoint. Startup probe for slow-starting services (api-startup). Resource requests and limits always defined.


### Build Verification

#### 5-Step Build Verification (🔴 Required)

The mandatory build verification sequence after any development work

**Rule:** Step 1: cd api-startup && npm run build → Step 2: cd front-startup && npm run api:local → Step 3: cd front-startup && npm run build → Step 4: cd back-startup && npm run api:local → Step 5: cd back-startup && npm run build


### Secrets

#### GitLab CI Variables (🔴 Required)

Secrets are stored as GitLab CI/CD variables and passed to pipelines

**Rule:** Never hardcode secrets in .gitlab-ci.yml. Reference via $VARIABLE_NAME. Use environment-specific suffixes (_DEV, _PROD). Migrate to GCP Secret Manager where possible.


### Caching

#### CI Cache Strategy (🟡 Recommended)

Pipelines use branch-scoped caching for node_modules

**Rule:** Cache key: $CI_PROJECT_NAME-$CI_COMMIT_BRANCH-{stage}. Cache paths: node_modules/, .npm/. Install stage pushes cache, subsequent stages pull.


### Registry

#### GitLab NPM Registry URLs (🔴 Required)

GitLab API cannot resolve project paths containing dots via URL-encoding

**Rule:** ALWAYS use numeric project IDs in GitLab NPM registry URLs (e.g., /projects/80531279/packages/npm/), NEVER URL-encoded paths with dots (e.g., studiolabs%2Fopen.studio%2F... returns 404). This applies to .npmrc, Dockerfile, and .gitlab-ci.yml registry configurations.


### Authentication

#### Deploy Token Auth Format (🔴 Required)

GitLab deploy tokens require a specific username format for authentication

**Rule:** Deploy token username must be "gitlab+deploy-token-{id}" where {id} is the numeric deploy token ID from the project settings page. Other formats (gitlab-deploy-token, just the token value, etc.) will fail with 401/404.


### Validation

#### TypeScript Known-Error Baseline (🔴 Required)

Reduce noise in tsc output by maintaining a baseline of pre-existing errors

**Rule:** Maintain a baseline file (e.g., tasks/known-tsc-errors.txt) listing pre-existing TypeScript errors that are unrelated to current work (common source: missing @worker-sdk/* modules in api-startup). Validation scripts should diff current `npx tsc --noEmit` output against the baseline — only NEW errors count as validation failures. When a pre-existing error is resolved, remove it from the baseline. When a new pre-existing error is deliberately introduced (e.g., intentional type loosening), add it to the baseline with a justification comment.


#### Swagger Generation Hang Detection (🔴 Required)

Detect and surface NestJS onModuleInit network hangs that block swagger generation

**Rule:** When swagger:generate hangs > 60s, check if any NestJS module onModuleInit makes external HTTP calls (e.g., PricingService → OpenRouter/LiteLLM) without a NODE_STAGE=test guard. Surface this as an infrastructure blocker to the user rather than retrying with a stale swagger.json fallback. Stale swagger produces cascading TS errors in generated services that mask real build failures.

