## 5-STEP BUILD VERIFICATION (MANDATORY)

After ANY development work, this sequence MUST pass:

```
Step 1: cd api-startup && npm run build
  → NestJS compilation (nest build -p tsconfig.build.json)
  → NODE_OPTIONS='--max-old-space-size=4096'

Step 2: cd front-startup && npm run api:local
  → Regenerates TypeScript API services from Swagger
  → Requires api-startup running on port 3000

Step 3: cd front-startup && npm run build
  → Vite production build (tsc && vite build)

Step 4: cd back-startup && npm run api:local
  → Regenerates API services for admin panel

Step 5: cd back-startup && npm run build
  → React production build (react-scripts build)
```

Steps 4-5 are MANDATORY when backend or back-startup is modified.

