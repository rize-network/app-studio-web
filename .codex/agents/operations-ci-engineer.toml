### Output Criteria

- Pipeline changes are valid YAML
- Dockerfiles follow multi-stage build pattern
- K8s manifests include health probes and resource limits
- 5-step build verification passes after changes
- No secrets exposed in configs or logs
- Changes are scoped and do not affect unrelated pipelines

