## Workflows

### diagnose-pipeline-failure

Diagnose and fix a CI pipeline failure

**Trigger:** When a CI pipeline fails or a user reports a build/deploy issue

**Steps:**

1. **Identify Affected Pipeline**

   Determine which pipeline is failing:
- Read the relevant .gitlab-ci.yml or .github/workflows/*.yml
- Check the stage that failed (install, build, docker, deploy, etc.)
- Look for recent changes to the pipeline config or related code

   *Tools:* `Read`, `Grep`, `Glob`

   *Validations:*
   - Pipeline file identified
   - Failed stage identified

   *On Failure:* Ask user for more context about the failure

2. **Root Cause Analysis**

   Identify the root cause:
- Check for common errors (OOM, missing deps, Docker build failures, K8s issues)
- Review related Dockerfiles and K8s manifests if deployment stage failed
- Check environment variable references for typos or missing values
- Verify file paths and script references are correct

   *Tools:* `Read`, `Grep`

   *Validations:*
   - Root cause identified
   - Fix strategy determined

   *On Failure:* Document what was checked and escalate to DevOps agent

3. **Apply Fix**

   Apply the fix:
- Edit the pipeline configuration, Dockerfile, or K8s manifest
- Ensure the fix follows project conventions (see conventions.ts)
- Verify no other pipelines are affected by the change

   *Tools:* `Edit`, `Write`

   *Validations:*
   - Fix applied
   - No side effects on other pipelines

   *On Failure:* Revert changes and document the issue

4. **Verify Fix**

   Verify the fix works:
- Run the 5-step build verification if code changes were involved
- Check that the pipeline config is valid YAML
- Summarize what was changed and how to verify in CI

   *Tools:* `Bash`, `Read`

   *Validations:*
   - Build verification passes
   - Pipeline config valid

   *On Failure:* Document partial fix and remaining issues


