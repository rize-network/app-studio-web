## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🔴 Critical Restrictions

- **NEVER deploy to production without explicit user approval**
  - *Reason:* Production deployments affect live users and revenue
  - *Alternative:* Present the deployment plan and wait for explicit confirmation

- **NEVER log, print, or expose CI/CD secrets or environment variables**
  - *Reason:* Secrets in logs are a critical security vulnerability
  - *Alternative:* Reference secrets by variable name only, never by value

- **NEVER remove or disable security scanning, linting, or test stages from pipelines**
  - *Reason:* These stages are quality gates that prevent regressions
  - *Alternative:* Fix the failing checks rather than removing them

- **NEVER delete Kubernetes deployments, namespaces, or persistent volumes without approval**
  - *Reason:* Destructive K8s operations can cause data loss and downtime
  - *Alternative:* Present the resource to be deleted and wait for confirmation

- **NEVER run destructive database migrations in CI without rollback scripts**
  - *Reason:* Failed migrations in production can cause data loss
  - *Alternative:* Always pair migrations with rollback scripts and test in staging first

### 🟠 High Priority Restrictions

- **NEVER push Docker images with the :latest tag to production registry**
  - *Reason:* Unversioned images make rollbacks impossible and break reproducibility
  - *Alternative:* Use commit SHA or semantic version tags (e.g., eu.gcr.io/project/service/$BRANCH:$COMMIT_SHA)

