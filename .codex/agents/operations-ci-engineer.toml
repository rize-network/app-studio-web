## Common Errors to Avoid

### Pipeline Failure

#### 🔴 Build fails with out-of-memory error in api-startup

**Why:** NestJS build requires significant memory for TypeScript compilation

**Correct approach:** Set NODE_OPTIONS="--max-old-space-size=4096" in the build stage and ensure K8s pod has sufficient memory limits (4Gi request, 16Gi limit)


#### 🔴 Docker build fails because Prisma client is not generated

**Why:** Prisma generate must run after npm install and before nest build

**Correct approach:** Ensure the Dockerfile runs npx prisma generate before npm run build in the builder stage


#### 🔴 New source file created but silently excluded by .gitignore

**Why:** A broad gitignore rule (e.g., *.ts in root .gitignore) can silently exclude new files. The file exists on disk and builds succeed locally, but a fresh clone will fail because the file is not in git.

**Correct approach:** After creating new files, verify they are tracked: run git ls-files --error-unmatch <path>. If gitignored, check .gitignore for overly broad rules. The published package may include the file (built from disk) while git does not — causing source/artifact divergence.


### Deployment

#### 🔴 Deployment fails with ImagePullBackOff in Kubernetes

**Why:** Docker image not pushed to registry or wrong image tag reference

**Correct approach:** Verify docker push succeeded in CI logs. Check image tag matches deployment manifest: eu.gcr.io/$GCLOUD_PROJECT_ID/$CI_PROJECT_NAME/$CI_COMMIT_BRANCH:$CI_COMMIT_SHA


#### 🔴 Pod stuck in CrashLoopBackOff after deployment

**Why:** Application crashes on startup due to missing env vars, failed DB connection, or port mismatch

**Correct approach:** Check pod logs with kubectl logs. Verify all required environment variables are set in the deployment manifest. Ensure Cloud SQL proxy or direct DB connection is configured.


### API Sync

#### 🔴 npm run api:local fails with connection refused

**Why:** The API server must be running locally on port 3000 for Swagger JSON generation

**Correct approach:** Start api-startup with npm run start:dev first, then run npm run api:local in front-startup or back-startup


### Docker

#### 🟠 Docker Compose fails to start postgres with volume permission errors

**Why:** Docker volume permissions conflict between host and container user

**Correct approach:** Use named volumes (postgresup) instead of bind mounts. Ensure pgvector/pgvector:pg17 image is pulled. Run docker compose down -v to reset volumes if corrupted.


#### 🔴 Docker build fails with 404 when installing @worker-sdk packages from GitLab NPM registry

**Why:** GitLab REST API cannot resolve project paths containing dots (e.g., open.studio) via URL-encoding. The .npmrc or Dockerfile uses a URL-encoded path like studiolabs%2Fopen.studio%2F... which returns 404.

**Correct approach:** Replace the URL-encoded project path with the numeric project ID in all registry URLs. For worker-sdk: use /projects/80531279/packages/npm/ instead of /projects/studiolabs%2Fopen.studio%2Fai%2Fworker-sdk/packages/npm/. Update .npmrc, Dockerfile, and .gitlab-ci.yml.


### Kubernetes

#### 🟠 HPA not scaling pods despite high CPU usage

**Why:** Metrics server not installed or resource requests not defined

**Correct approach:** Verify metrics-server is running in kube-system namespace. Ensure deployment has CPU resource requests defined (not just limits). Check HPA with kubectl describe hpa.


### GitHub Actions

#### 🟠 Validate Feature Codebase workflow fails on PR

**Why:** Feature spec JSON does not match the expected schema in codedatabase/

**Correct approach:** Run npm run codebase:validate locally in the knowledge/ directory. Fix schema violations in codedatabase/features/**/feature.json files.

