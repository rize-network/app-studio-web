## Common Errors to Avoid

### Location

#### 🔴 Creating drawer component outside src/modals/

**Why:** Drawers placed in src/drawers/, src/components/, or src/pages/ break the established convention where drawers and modals share src/modals/

**Correct approach:** Always create drawers in src/modals/{Domain}{Action}Drawer.tsx


### Registration

#### 🔴 Forgetting to export drawer from src/modals/index.tsx

**Why:** Unregistered drawers cannot be imported by other modules and break the barrel export pattern

**Correct approach:** Add export { {Drawer} } from "./{Drawer}" to src/modals/index.tsx after creating the drawer file


### Structure

#### ℹ️ Building a custom slide-out panel instead of using Drawer compound components

**Why:** Custom panels create inconsistent UI, miss overlay handling, and lack built-in accessibility

**Correct approach:** Use Drawer > Drawer.Overlay > Drawer.Container > Drawer.Header > Drawer.Body from @app-studio/web


### State

#### ℹ️ Managing drawer open/close state internally instead of via props

**Why:** Parent components need to control drawer visibility for proper UX flow

**Correct approach:** Accept isOpen: boolean and onClose: () => void props from the parent component


### Scope

#### ℹ️ Calling API services directly inside drawer components

**Why:** Drawers are presentation containers — API logic belongs in Page/Store layer

**Correct approach:** Accept data and callback props, let the consuming Page wire API calls


### Placement

#### 🟠 Not specifying placement prop on Drawer.Container

**Why:** Default placement may not match the UX intent (detail views slide from right, filters from left)

**Correct approach:** Set placement="right" for details/settings or placement="left" for navigation/filters on Drawer.Container

