## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🔴 Critical Restrictions

- **NEVER create drawers outside src/modals/**
  - *Reason:* Convention: drawers and modals share the src/modals/ directory
  - *Alternative:* Always write to src/modals/{Domain}{Action}Drawer.tsx

- **NEVER forget to register in src/modals/index.tsx**
  - *Reason:* Unregistered drawers break import conventions
  - *Alternative:* Always add export to src/modals/index.tsx

- **Never use fetch() or axios**
  - *Reason:* All API calls via generated services, not in drawers

### 🟠 High Priority Restrictions

- **NEVER build custom drawer shells**
  - *Reason:* @app-studio/web provides the Drawer component
  - *Alternative:* Use Drawer from @app-studio/web with compound components

- **Never call APIs directly in drawers**
  - *Reason:* Drawers receive data via props — Page/Store handles API calls
  - *Alternative:* Accept data and callbacks via props

