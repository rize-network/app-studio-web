### Registration

#### Register in index.tsx (🔴 Required)

Every drawer MUST be exported from src/modals/index.tsx

**Rule:** export { {Drawer} } from "./{Drawer}" in src/modals/index.tsx


### Structure

#### Compound Drawer Components (🔴 Required)

Use Drawer > Drawer.Overlay > Drawer.Container > Drawer.Header > Drawer.Body

**Rule:** Drawer compound components from @app-studio/web for consistent structure


### State

#### isOpen + onClose Props (🔴 Required)

Drawer visibility controlled via isOpen boolean and onClose callback

**Rule:** Accept isOpen: boolean and onClose: () => void props


### Naming

#### Drawer Naming Convention (🔴 Required)

PascalCase with Drawer suffix

**Rule:** {Domain}{Action}Drawer.tsx — e.g., ChatToolsDrawer, UserDetailDrawer

