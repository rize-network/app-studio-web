## Common Errors to Avoid

### Test Scope

#### 🔴 Re-testing unaffected endpoints without justification

**Why:** Wastes time, creates noise, delays feedback

**Correct approach:** Use git diff and dependency analysis to test only affected endpoints


### Data Integrity

#### 🔴 Ignoring data consistency issues in tests

**Why:** Data corruption risks slip through, breaks production

**Correct approach:** Validate transactions, constraints, relations in every data test


### Schema Changes

#### 🔴 Not validating Prisma schema changes thoroughly

**Why:** Breaking changes ship, data migrations fail

**Correct approach:** Schema changes automatically increase test scope - check relations, indexes, constraints


### Authorization

#### 🔴 Assuming frontend validation is sufficient

**Why:** Security bypassed through direct API calls

**Correct approach:** Always test authorization and access control at backend level


### Error Handling

#### 🔴 Testing only happy paths

**Why:** Failure modes uncovered in production

**Correct approach:** Test timeouts, retries, partial failures, invalid states


### Documentation

#### 🔴 Not creating agent reports after QA efforts

**Why:** Knowledge lost, repeated blind testing

**Correct approach:** Create agent-report.md with coverage, results, bugs, and recommendations


### API Contracts

#### 🟠 Not verifying stable response shapes

**Why:** Breaking changes break frontend unexpectedly

**Correct approach:** Validate request/response schemas, status codes, error structure


### Seed Data

#### 🔴 Creating test data manually (prisma.create, API calls in beforeAll, manual INSERTs) instead of using seed data

**Why:** The seed system already provides all test entities. Manual data creation duplicates seeds, is slow, creates inconsistencies, and breaks when seeds change.

**Correct approach:** Import seedData from src/shared/seed/seed.data. Use seedData["projectToGenerate"].result.id, seedData["test"].result.id, etc.

**❌ Bad Example:**

```typescript
const testUser = await prisma.user.create({ data: { email: "test@example.com" } })
```

**✅ Good Example:**

```typescript
const userId = seedData["test"].result.id // already seeded
```


#### 🔴 Missing .result in cross-seed references (seed.<name>.id instead of seed.<name>.result.id)

**Why:** Seed data stored as { params, result } - seed.name.id fails silently

**Correct approach:** Always use seed.<name>.result.<property> for cross-file references

**❌ Bad Example:**

```typescript
seedData['projectToGenerate'].id
```

**✅ Good Example:**

```typescript
seedData['projectToGenerate'].result.id
```


#### 🔴 Testing with hardcoded IDs instead of seed references

**Why:** Tests break when seed data regenerates with different IDs

**Correct approach:** Use seedData["<name>"].result.id for dynamic, stable test references

**❌ Bad Example:**

```typescript
const projectId = 'test-project-id-123'
```

**✅ Good Example:**

```typescript
const projectId = seedData['projectToGenerate'].result.id
```


### Test Design

#### 🟠 Non-deterministic or coupled tests

**Why:** Flaky tests create noise, reduce confidence

**Correct approach:** Explicit setup/teardown, isolated tests, deterministic behavior

---

## Conventions

### Seed Data

#### Use Seed Data — Never Create Test Data (🔴 Required)

All E2E and integration tests MUST use seed data from seed.json. The seed system pre-populates the database with users, projects, agents, and all test entities via SeedSpec files.

**Rule:** Import seedData from src/shared/seed/seed.data and reference entities like seedData["projectToGenerate"].result.id. NEVER create test data via prisma.create(), API calls in beforeAll, or manual INSERTs. If data does not exist in seeds, create a new SeedSpec file.

**✅ Good Examples:**

```
const projectId = seedData["projectToGenerate"].result.id
```

```
const userId = seedData["test"].result.id
```

```
const token = authenticate with seedData["test"].result credentials
```

**❌ Bad Examples:**

```
await prisma.user.create({ data: { email: "test@example.com" } })
```

```
await prisma.project.create({ data: { name: "Test Project" } })
```

```
Hardcoding IDs like "test-project-id"
```


### Incremental Testing

#### File-to-Test Mapping (🔴 Required)

Map changed files to affected endpoints and tests

**Rule:** Use git diff -> identify endpoints -> run affected tests only


### Test Priority

#### Critical Path First (🔴 Required)

Test in priority order: business logic, contracts, data, auth, failure modes

**Rule:** Test critical business logic and domain rules before performance


### Test Design

#### One Behavior Per Test (🔴 Required)

Each test validates exactly one behavior or rule

**Rule:** One test = one behavior, explicit setup/teardown, deterministic


### Schema Changes

#### Auto-Expand on Schema Change (🔴 Required)

Prisma schema changes automatically increase test scope

**Rule:** Schema change = validate relations, indexes, constraints, migrations


### API Contracts

#### Contract Validation (🔴 Required)

Verify input validation, status codes, response shapes

**Rule:** Validate DTOs, proper status codes, error structure, no data leakage


### Agent Reports

#### Mandatory QA Reports (🔴 Required)

Create agent-report.md after every significant QA effort

**Rule:** Report must include: context, what was tested, results, bugs, suggestions, follow-ups

