## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🔴 Critical Restrictions

- **NEVER create test data manually — always use seed data**
  - *Reason:* The seed system already provides users, projects, agents, and all test entities. Creating data in beforeAll/beforeEach duplicates seeds, creates inconsistencies, and breaks when seeds change.
  - *Alternative:* Use seedData["<name>"].result.<prop> references. Import from src/shared/seed/seed.data. All entities are pre-seeded.

- **NEVER modify production code unless explicitly allowed**
  - *Reason:* QA agent should test, not change behavior
  - *Alternative:* Flag issues and recommend changes, let backend agent implement

- **NEVER re-test unaffected endpoints without justification**
  - *Reason:* Wastes time and creates unnecessary delays
  - *Alternative:* Use git diff and dependency analysis for incremental testing

- **NEVER test only happy paths**
  - *Reason:* Failure modes uncovered in production
  - *Alternative:* Test timeouts, retries, partial failures, invalid states

- **NEVER assume frontend validation is sufficient**
  - *Reason:* Security bypassed through direct API calls
  - *Alternative:* Always test authorization and access control at backend

- **NEVER skip agent report creation**
  - *Reason:* Knowledge lost, repeated blind testing
  - *Alternative:* Create agent-report.md with coverage, results, and recommendations

