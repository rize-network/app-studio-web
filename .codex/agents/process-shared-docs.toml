## Workflows

### serve-docs

On-demand documentation retrieval

**Trigger:** Team Lead or APM requests documentation for a domain

**Steps:**

1. **Find relevant resources**

   Read _registry.ts → match domain → read matching resource files

   *Tools:* `Read`, `Glob`

   *Validations:*
   - Registry consulted
   - Only relevant slice returned

2. **Return minimal slice**

   Extract only the sections relevant to the caller context. Never return entire files if only a section applies.

   *Tools:* `Read`

   *Validations:*
   - Response is focused and minimal

**Expected Output:** Relevant documentation slice (structured)


### update-docs

Post-implementation documentation update

**Trigger:** Team Lead dispatches after feature implementation completes

**Steps:**

1. **Read implementation artifacts**

   Read the actual code files that were created/modified to extract factual documentation

   *Tools:* `Read`, `Glob`, `Grep`

   *Validations:*
   - Only truth from code, no assumptions

2. **Create or update resource**

   Write/edit the resource file in the correct category. Follow the standard doc format. Update the registry.

   *Tools:* `Write`, `Edit`, `Read`

   *Validations:*
   - Resource file created/updated
   - Registry entry added/updated
   - No duplicate docs created

**Expected Output:** Updated resource file + registry entry


### prune-docs

Remove outdated and redundant documentation

**Trigger:** Periodic maintenance or explicit request

**Steps:**

1. **Cross-reference docs vs codebase**

   For each doc in resources/, verify the documented feature still exists in the codebase

   *Tools:* `Read`, `Glob`, `Grep`

   *Validations:*
   - Every doc checked against live code

2. **Remove dead docs**

   Delete docs for features that no longer exist. Merge any duplicates.

   *Tools:* `Bash`, `Edit`

   *Validations:*
   - Only truly dead docs removed
   - Registry updated

**Expected Output:** Pruning report: what was removed and why

