## Common Errors to Avoid

### Structure

#### ℹ️ Putting all translations in a single file instead of per-domain files

**Why:** Monolithic translation files become unmanageable and cause merge conflicts

**Correct approach:** Use i18n/{locale}/{domain}.json — one file per domain per locale


### Content

#### ℹ️ Exposing technical error details in user-facing messages

**Why:** Users see confusing messages like "P2002: unique constraint violated"

**Correct approach:** Use friendly messages: "An account with this email already exists"


### Locale

#### 🔴 Skipping the default English (en) locale

**Why:** English is the fallback — missing en locale breaks the entire i18n system

**Correct approach:** Always create en locale first, then add additional locales as specified


### Keys

#### ℹ️ Using inconsistent key naming (mixing camelCase, snake_case, dot-separation)

**Why:** Inconsistent keys make it impossible to programmatically look up translations

**Correct approach:** Use dot-separated hierarchical keys: {domain}.{category}.{key}


### Interpolation

#### 🟠 Using non-standard interpolation syntax like %d, $min, or {{var}}

**Why:** Project uses {variableName} syntax — other formats will not be resolved

**Correct approach:** Use {variableName} for dynamic values: "Must be at least {min} characters"


### Coverage

#### ℹ️ Missing translations for validation messages that exist in DTOs

**Why:** Users see raw validator error codes instead of helpful messages

**Correct approach:** Create translation keys matching every class-validator decorator in the DTOs

---

## Conventions

### Structure

#### File Organization (🔴 Required)

Translation files organized by locale and domain

**Rule:** i18n/{locale}/{domain}.json — one file per domain per locale

**✅ Good Examples:**

```
i18n/en/users.json
```

```
i18n/en/auth.json
```

```
i18n/fr/users.json
```

**❌ Bad Examples:**

```
i18n/translations.json (all in one file)
```

```
src/messages.ts
```


### Keys

#### Key Format (🔴 Required)

Dot-separated hierarchical keys

**Rule:** {domain}.{category}.{key} — e.g., users.validation.emailRequired


### Content

#### User-Friendly Messages (🔴 Required)

Messages should guide users, not expose technical details

**Rule:** Say "Please enter a valid email" not "Email validation failed: invalid format"

**✅ Good Examples:**

```
Please enter a valid email address
```

```
Password must be at least 8 characters
```

**❌ Bad Examples:**

```
VALIDATION_ERROR: email field invalid
```

```
P2002: unique constraint violated
```


### Interpolation

#### Dynamic Values (🔴 Required)

Use {variableName} for dynamic interpolation

**Rule:** {min}, {max}, {field}, {value} for dynamic substitution

**✅ Good Examples:**

```
Name must be at least {min} characters
```

```
{field} is required
```

**❌ Bad Examples:**

```
Name must be at least %d characters
```

```
Name must be at least $min characters
```

---

## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🔴 Critical Restrictions

- **Never skip the default (en) locale**
  - *Reason:* English is the fallback locale

### 🟠 High Priority Restrictions

- **Never hardcode messages in service/controller files**
  - *Reason:* All user-facing messages should go through i18n
  - *Alternative:* Reference i18n keys in services, resolve at response time

- **Never expose technical error details in translations**
  - *Reason:* User-facing messages should not leak implementation details
  - *Alternative:* Use generic user-friendly messages, log technical details server-side

