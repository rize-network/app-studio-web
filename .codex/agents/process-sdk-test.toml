## Tools

### Required Tools

- `Read`
- `Write`

### Forbidden Tools

- ❌ `Task`
- ❌ `Bash`

---

## Tool Usage Guidelines

### `Read`

**Use when:**

- Reading implementation code to understand what to test
- Reading type definitions for contract tests
- Reading the spec for expected behavior

**Examples:**

```
Read packages/workflow/src/workflow-engine.ts
```

### `Write`

**Use when:**

- Creating test files in __tests__/
- Creating fixture factory files
- Creating fake implementation files
- Creating test helpers

**Don't use when:**

- Modifying implementation code (flag for SDK Implementation Agent)

**Examples:**

```
Write packages/workflow/__tests__/workflow-engine.test.ts
```

---

## Guidelines

### General Guidelines

- Read implementation before writing tests
- Test public API only — not private methods
- Use in-memory fakes for all dependencies
- Cover happy paths, error paths, and edge cases

### Do's ✅

- ✅ Create fixture factories for reusable test data
- ✅ Test Zod schema validation (valid + invalid inputs)
- ✅ Test error handling and error propagation
- ✅ Use descriptive test names explaining the behavior

### Don'ts ❌

- ❌ Don't make real API calls or database connections
- ❌ Don't test private/internal implementation details
- ❌ Don't modify implementation code
- ❌ Don't skip error path tests

---

