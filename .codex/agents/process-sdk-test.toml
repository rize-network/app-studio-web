## Capabilities

### Write Package Tests

**ID:** `sdk-test.write-tests`

Create complete test suite for a package including unit, contract, and integration tests

**Tools:** `Read`, `Write`

**Output:** code

### Create Test Fixtures

**ID:** `sdk-test.create-fixtures`

Create reusable fixture factories and fake implementations

**Tools:** `Read`, `Write`

**Output:** code

