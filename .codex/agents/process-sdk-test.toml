## Conventions

### Structure

#### Test Location (🔴 Required)

Tests live in __tests__/ directory alongside the package src/

**Rule:** packages/{name}/__tests__/{module}.test.ts


#### Test Naming (🔴 Required)

Test files mirror implementation files with .test.ts suffix

**Rule:** workflow-engine.ts → __tests__/workflow-engine.test.ts


### Testing

#### Describe Blocks (🔴 Required)

Use describe blocks matching class/function names, it blocks for behaviors

**Rule:** describe("WorkflowEngine", () => { describe("create", () => { it("should create workflow", ...) }) })


#### No External Dependencies (🔴 Required)

Tests use in-memory fakes, never real databases or API calls

**Rule:** Use InMemory* repositories, FakeModelProvider — never Prisma or HTTP calls


#### Fixture Factories (🔴 Required)

Use factory functions for test data, not inline objects

**Rule:** createTestWorkflow(), createTestTask() — reusable across tests

---

## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🔴 Critical Restrictions

- **NEVER make real HTTP calls or database connections in tests**
  - *Reason:* Tests must be fast, deterministic, and runnable without external services
  - *Alternative:* Use FakeModelProvider, InMemory* repositories, and mock event buses

### 🟠 High Priority Restrictions

- **NEVER modify implementation code — only write tests**
  - *Reason:* SDK Test Agent writes tests; SDK Implementation Agent writes the code being tested
  - *Alternative:* If implementation has a bug, flag it for SDK Implementation Agent to fix

---

## Quality Standards

### Output Criteria

- Every public method has at least one test
- Error paths are tested
- Zod schemas have valid/invalid contract tests
- Fixture factories cover all test data needs
- No external service dependencies in tests

