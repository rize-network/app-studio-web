## Conventions

### Location

#### Stores in src/stores/ (🔴 Required)

All Zustand stores in src/stores/

**Rule:** src/stores/use{Domain}Store.ts

**✅ Good Examples:**

```
src/stores/useUserStore.ts
```

```
src/stores/useProjectStore.ts
```

**❌ Bad Examples:**

```
src/hooks/useUserStore.ts
```

```
src/context/UserContext.tsx
```


### Library

#### Zustand Only (🔴 Required)

Use Zustand for all global state

**Rule:** import { create } from "zustand" — never Redux, MobX, or React Context for data state


### API

#### No API Imports in Stores (MANDATORY) (🔴 Required)

Stores are pure UI state. They NEVER import from src/services/api/services/*.

**Rule:** Stores import TYPES from src/services/api/models/* only. They NEVER import functions or hooks from src/services/api/services/*. Fetching lives in {page}.request.ts files whose hooks call store setters (setX/upsertX/removeX) via onSuccess.

**✅ Good Examples:**

```
import type { Project } from "src/services/api/models/Project"  // type import OK
```

```
// no imports from src/services/api/services/*
```

**❌ Bad Examples:**

```
import { projectsControllerFindAll } from "src/services/api/services/ProjectsService"  // FORBIDDEN
```

```
import { ProjectsService } from "src/services/api"  // FORBIDDEN inside stores
```

```
fetch("/api/projects")  // FORBIDDEN
```

```
axios.get("/api/projects")  // FORBIDDEN
```


### State

#### No Loading/Error Fields in Stores (🔴 Required)

Loading and error state live on the request hook, not on the store

**Rule:** Stores MUST NOT define isLoading/loading/isSubmitting fields or corresponding selectors. Pages read request.loading and request.error from the request hook. Stores may hold a single `error` field ONLY for errors surfaced by setError() (e.g. optimistic update rollback context).

**✅ Good Examples:**

```
// Store has no loading field — pages read listProjectsRequest.loading from the hook
```

**❌ Bad Examples:**

```
interface ProjectState { projects: Project[]; isLoading: boolean }  // isLoading forbidden
```

```
export const useProjectsLoading = () => useProjectsStore(s => s.isLoading)  // forbidden selector
```


### Types

#### Explicit State Interface (🔴 Required)

Store state must be fully typed

**Rule:** interface {Domain}State { data, loading, error, actions } — no any types


### Naming

#### Hook Naming Pattern (🔴 Required)

Store exports follow React hook naming

**Rule:** export const use{Domain}Store = create<{Domain}State>(...)


### Performance

#### Fine-Grained Selectors (🔴 Required)

Consumers must subscribe to specific fields, never the whole store

**Rule:** Always use useStore(s => s.field) or useStore(s => ({ a: s.a, b: s.b })). NEVER useStore() without a selector — it re-renders on every state change.

**✅ Good Examples:**

```
const name = useUserStore(s => s.name)
```

```
const { items, isLoading } = useProjectStore(s => ({ items: s.items, isLoading: s.isLoading }))
```

**❌ Bad Examples:**

```
const store = useUserStore() — subscribes to EVERYTHING
```

```
const { name } = useUserStore() — still subscribes to EVERYTHING
```


#### Debounce and Throttle (🔴 Required)

Apply debounce/throttle only where genuinely necessary

**Rule:** Debounce: search inputs, auto-save. Throttle: scroll, drag, resize handlers. Do NOT debounce click/submit events.

**✅ Good Examples:**

```
useDebouncedCallback(onSearch, 300)
```

```
throttle(onDrag, 16)
```

**❌ Bad Examples:**

```
debounce(onClick, 300) — unnecessary for single-fire events
```


#### Normalized Entity State (🔴 Required)

Entity collections use normalized shape: byId + allIds

**Rule:** Store entity collections as { byId: Record<string, Entity>, allIds: string[] }. This prevents cloning entire arrays on single-entity updates and enables stable selector references.

**✅ Good Examples:**

```
{ byId: { "1": { id: "1", name: "Alice" } }, allIds: ["1"] }
```

```
updateUser: (id, data) => set(s => ({ byId: { ...s.byId, [id]: { ...s.byId[id], ...data } } }))
```

**❌ Bad Examples:**

```
{ users: User[] } — every update clones the entire array
```

```
users.map(u => u.id === id ? { ...u, ...data } : u) — creates new refs for all items
```


#### Export Named Selectors (🔴 Required)

Export a named selector function for every field that any component needs

**Rule:** Every store must export selectX functions: export const selectUsers = (s: State) => ... Components import and use these selectors. Document which component consumes which selector.

**✅ Good Examples:**

```
export const selectUserById = (id: string) => (s: UserState) => s.byId[id]
```

```
export const selectIsLoading = (s: UserState) => s.isLoading
```

```
// Selector consumers: selectUserById → UserCard, selectIsLoading → UserList
```

**❌ Bad Examples:**

```
No selectors exported — components call useStore(s => s.byId[id]) inline with no documentation
```


### Architecture

#### Store-First for Domain Data (🔴 Required)

Domain/shared data lives in stores, not in props chains

**Rule:** If data is used by multiple components or comes from an API, it belongs in a Zustand store. Pages read stores and pass minimal slices as props to direct children only.


#### One Store Per Domain (🔴 Required)

Stores map to business domains, not components or pages

**Rule:** One Zustand store per domain (e.g., useEditorStore, useAuthStore, useWorkflowStore). NEVER create a store per component or per page. Domain examples: Editor, Identity, Workflow, Auth, App.

**✅ Good Examples:**

```
useEditorStore — owns all editor state
```

```
useAuthStore — owns auth/session
```

**❌ Bad Examples:**

```
useUserCardStore (per-component)
```

```
useDashboardPageStore (per-page)
```


#### createModelStore for Parent-Child (🔴 Required)

Use createModelStore factory for parent-child entity patterns

**Rule:** When entities have parent-child relationships (project→tasks, folder→files), use the established createModelStore pattern. This is already an established convention.


#### Synchronous Setters Only (🔴 Required)

Store actions are SYNCHRONOUS setters (setX/upsertX/removeX). No async logic, no API calls.

**Rule:** Every store action is a pure synchronous state setter. The set of legal action names is: setX(list), upsertX(item) (insert-or-replace by id), removeX(id), set<Field>(value), reset(). NO actions named fetchX/createX/updateX/deleteX — those belong to *.request.ts hooks, whose onSuccess callbacks invoke the store setters defined here.

**✅ Good Examples:**

```
setProjects: (projects) => set({ projects })
```

```
upsertProject: (project) => set((s) => ({ projects: s.projects.some(p => p.id === project.id) ? s.projects.map(p => p.id === project.id ? project : p) : [project, ...s.projects] }))
```

```
removeProject: (id) => set((s) => ({ projects: s.projects.filter(p => p.id !== id) }))
```

```
reset: () => set(initialState)
```

**❌ Bad Examples:**

```
fetchProjects: async () => { const data = await projectsControllerFindAll(); set({ projects: data }) }  // FORBIDDEN — belongs in *.request.ts
```

```
createProject: async (dto) => { const p = await projectsControllerCreate(dto); set(...) }  // FORBIDDEN
```


#### Thin Selector Hooks Only (🔴 Required)

Custom hooks are thin wrappers over store selectors

**Rule:** A custom hook selects specific fields (max 5-8) from a store and returns them. Never create 50-item "god hooks". Never put update logic in hooks.

**✅ Good Examples:**

```
const useUserName = () => useUserStore(s => s.name)
```

**❌ Bad Examples:**

```
const useEditor = () => { ...50 destructured fields + effects + computed values }
```


#### Stores Are the Exception, Not the Default (🔴 Required)

The canonical data-loading mechanism is the request hook (useXxxControllerYyyService) inside a {page}.request.ts file. Pages read request.data / request.loading / request.error DIRECTLY. A store is created ONLY when justified by the "Do I Need a Store?" checklist.

**Rule:** Before creating a Zustand store, apply this checklist — create a store ONLY if ONE or more is true: (1) the data is needed by 2+ pages/features that do not share a parent, (2) the data must persist across route changes, (3) the data is a real-time subscription target (SSE/WebSocket) updated outside request-hook lifecycle, (4) the data is orchestrated by multiple request hooks from different pages that each mutate a shared collection. If all FALSE → NO store; the page reads request.data directly. "Page has loading state" is NOT justification (request.loading provides it). "Page has multiple children" is NOT justification (pass request.data as props, or children call the same memoized hook). When a store IS justified: (a) state fields + synchronous setters (setX/upsertX/removeX/setError/reset) + exported atomic selectors; (b) NEVER import from src/services/api/services/*; (c) fetching is owned by *.request.ts whose onSuccess calls the setters. Gold-standard: src/stores/RoutinesStore.ts (pure UI state), src/stores/AuthStore.ts (session).

**✅ Good Examples:**

```
// ✅ JUSTIFIED stores: AuthStore (session), AppStore (active project), LocaleStore, realtime/KanbanTaskStore (SSE target), useCompanyStore.activeCompany (cross-cutting UI navigation).
```

```
// ✅ JUSTIFIED shape: src/stores/RoutinesStore.ts — pure UI state (drawerOpen, selectedId) + setters (setRoutines, upsertRoutine, removeRoutine) + selectors. No API imports.
```

**❌ Bad Examples:**

```
// ❌ NOT JUSTIFIED: useDepartmentStore when only org.page renders departments → delete the store; read listDepartmentsRequest.data directly.
```

```
// ❌ NOT JUSTIFIED: useRuntimeStore when only runtimes.page displays capabilities → delete; read getRuntimeSummaryRequest.data.
```

```
// ❌ FORBIDDEN shape: store defines fetchX/createX/updateX/deleteX → move async to *.request.ts.
```

```
// ❌ FORBIDDEN: store imports from src/services/api/services/* — only model TYPE imports are allowed.
```

```
// ❌ FORBIDDEN: store keeps a MOCK_* array as initial data. Initial state is empty ([], null, {}).
```

