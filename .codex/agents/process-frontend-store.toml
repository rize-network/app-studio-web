## Common Errors to Avoid

### API

#### 🔴 Using fetch() or axios instead of generated API services

**Why:** Generated services provide type safety and consistent error handling

**Correct approach:** Import from src/services/api/ and call typed service methods


### State

#### ℹ️ Missing loading/error state management in async actions

**Why:** Without loading states, the UI cannot show spinners or error messages

**Correct approach:** Set isLoading true at start, false at end. Catch errors and set error state.


### Library

#### 🔴 Using Redux, MobX, or React Context for global data state

**Why:** Project convention requires Zustand exclusively for consistency

**Correct approach:** Use: import { create } from "zustand" and create<StateInterface>()


### Types

#### ℹ️ Using any type in store state or action signatures

**Why:** Defeats TypeScript type safety and breaks auto-complete for consumers

**Correct approach:** Define explicit interface for all state fields and action parameters


### Scope

#### ℹ️ Storing form input values in Zustand store

**Why:** Form state is managed by Formik — duplicating it causes sync issues

**Correct approach:** Only store domain data (items, selectedItem) and UI state (isLoading, error)


### Error Handling

#### 🟠 Not re-throwing errors in create/update actions

**Why:** Callers (Page Agent) need to know if an action failed to show feedback

**Correct approach:** Catch error, set error state, then re-throw so caller can react

