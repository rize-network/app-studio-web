## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🔴 Critical Restrictions

- **NEVER use fetch(), axios, OR import functions/hooks from src/services/api/services/***
  - *Reason:* Stores are pure UI state. Fetching belongs to *.request.ts files at the page level. Any import from src/services/api/services/* inside a store is a convention violation. Model TYPE imports from src/services/api/models/* remain allowed.
  - *Alternative:* Remove all controller imports from the store. Define synchronous setters (setX/upsertX/removeX) that the page's *.request.ts file will call via hook onSuccess. The pattern is documented in Request File Pattern + Stores Are Pure UI State conventions.

- **NEVER define async fetch/create/update/delete actions on a store**
  - *Reason:* Async actions duplicate the lifecycle management the generated useXxxControllerYyyService hook already provides, and fragment loading/error state across store + UI.
  - *Alternative:* Store actions are SYNCHRONOUS setters only (setX/upsertX/removeX/reset). Async work lives in *.request.ts hooks whose onSuccess calls the setters.

- **NEVER keep mock data arrays (MOCK_*, fixture data) as a store's initial state**
  - *Reason:* Mock initial state masks missing API wiring and makes it hard to detect when a store isn't actually connected to the backend. The 5 worker-ops/memory stores lived for months with MOCK_* arrays before the drift was caught.
  - *Alternative:* Initial state is empty ([] for lists, null for single entities, {} for normalized maps). If development needs seed data, it belongs in a Debug Studio scenario or MSW handler, NOT in the store.

- **Never use Redux, MobX, or React Context for data state**
  - *Reason:* Project uses Zustand exclusively for global state
  - *Alternative:* Use Zustand create()

- **Never consume store without a selector**
  - *Reason:* useStore() without selector subscribes to entire store, causing unnecessary re-renders on every state change
  - *Alternative:* Always use useStore(s => s.specificField) or useStore(s => ({ a: s.a, b: s.b }))

- **Never create a store per component or per page**
  - *Reason:* Stores map to business domains. Per-component stores fragment state and create sync issues.
  - *Alternative:* One store per domain: useEditorStore, useAuthStore, useWorkflowStore, etc.

- **Never use React Context for data that updates during interaction**
  - *Reason:* Context re-renders all consumers on every change. Zustand with selectors only re-renders subscribers of changed fields.
  - *Alternative:* Use Zustand store with fine-grained selectors. Context only for theme/locale.

### 🟠 High Priority Restrictions

- **Never leave setError unimplemented when a store exposes an error field**
  - *Reason:* Pages rely on setError being called by request-hook onError callbacks to surface backend errors. An error field with no setter is dead state.
  - *Alternative:* Every store with an `error` field must export a `setError(error: string | null)` setter. The *.request.ts file's onError callback calls it.

- **Never use any type**
  - *Reason:* Defeats TypeScript type safety
  - *Alternative:* Define explicit state and action types

- **Never store form state in Zustand**
  - *Reason:* Form state belongs to Formik (Form Agent territory)
  - *Alternative:* Store only domain data, not form input values

- **Never create files outside src/stores/**
  - *Reason:* Other folders are owned by other sub-agents

- **Never debounce click or submit handlers**
  - *Reason:* Single-fire user actions do not need debounce — it adds latency with no benefit
  - *Alternative:* Only debounce continuous-input events (search, auto-save) and throttle high-frequency events (scroll, drag, resize)

- **Never put update/mutation logic in custom hooks**
  - *Reason:* Splits mutation logic across hooks and stores, making state flow unpredictable
  - *Alternative:* All mutations are store actions. Hooks are read-only selector wrappers.

- **Never create god hooks with 50+ items**
  - *Reason:* God hooks aggregate too much state, causing unnecessary re-renders and making testing impossible
  - *Alternative:* Create focused selector hooks: max 5-8 selected fields per hook

