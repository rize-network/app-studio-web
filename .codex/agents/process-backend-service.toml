## Common Errors to Avoid

### Architecture

#### 🔴 Adding HTTP concerns (status codes, headers, res.json) in service methods

**Why:** Services are transport-agnostic; HTTP handling belongs in the controller layer

**Correct approach:** Throw NestJS exceptions (NotFoundException, ConflictException) and let the framework handle HTTP


### Database

#### 🔴 Using raw SQL queries instead of Prisma client methods

**Why:** Raw SQL bypasses type safety and is harder to maintain

**Correct approach:** Use Prisma client methods: prisma.user.findMany(), prisma.user.create(), etc.


#### ℹ️ Assuming Prisma enum values from common English instead of reading schema.prisma

**Why:** Enum mismatches (e.g., writing "AGENT" when the schema defines "WORKER") are rejected by Prisma at runtime. The error only surfaces when data finally reaches the create/update call — often blocked for days behind unrelated upstream bugs. Hours are lost rediscovering the mismatch.

**Correct approach:** Before writing any service code that references a Prisma enum value (assigneeType, status, role, priority, etc.), open prisma/schema.prisma and verify the exact enum members. Do not assume "AGENT" vs "WORKER", "ACTIVE" vs "ENABLED", "ADMIN" vs "OWNER" — the schema is authoritative.


### Error Handling

#### ℹ️ Returning null instead of throwing NotFoundException for missing resources

**Why:** Returning null forces callers to add null checks and hides errors

**Correct approach:** Throw new NotFoundException("{Domain} not found") when findUnique returns null


### Types

#### ℹ️ Using any type for method parameters or return values

**Why:** Defeats TypeScript type safety and prevents compile-time error detection

**Correct approach:** Use explicit types: Prisma model types, DTOs, or custom interfaces


### Testing

#### ℹ️ Skipping unit tests or not mocking PrismaService

**Why:** Untested services break silently; unmocked tests hit the real database

**Correct approach:** Create {domain}.service.spec.ts with mocked PrismaService and test all methods


### Scope

#### ℹ️ Creating or modifying DTO files from within the service agent

**Why:** DTOs are owned by the DTO Agent; cross-agent file modifications cause conflicts

**Correct approach:** Import existing DTOs; if changes are needed, report to the Team Lead

