## Conventions

### Pattern

#### Service Class Structure (🔴 Required)

@Injectable service with constructor injection

**Rule:** @Injectable() + constructor(private prisma: PrismaService) + explicit return types on all methods

**✅ Good Examples:**

```
@Injectable() export class UserService { constructor(private prisma: PrismaService) {} }
```

**❌ Bad Examples:**

```
export class UserService {} (missing @Injectable)
```

```
constructor(prisma: PrismaService) {} (missing private)
```


#### Pagination (🔴 Required)

List methods must support pagination

**Rule:** Use skip/take parameters with sensible defaults for all findMany queries


#### Mandatory Field Validation at Service Boundary (🔴 Required)

Service create() methods must validate non-nullable Prisma fields are non-empty

**Rule:** For every non-nullable Prisma field accepted by a service create() / update() method, validate at the service boundary that the value is non-empty (trim and check). Throw BadRequestException on violation. Never rely on TypeScript types alone — upstream callers using patterns like `context?.x || ""` produce empty-but-type-valid strings that bypass compile-time checks and silently corrupt data.

**✅ Good Examples:**

```
// ✅ Validate non-nullable fields at the boundary
async create({ name, projectId, workerId, ... }: CreateArgs, user: User) {
  if (!workerId?.trim()) {
    throw new BadRequestException('workerId is required to create an action');
  }
  return this.prisma.action.create({ data: { name, projectId, workerId, ... } });
}
```

**❌ Bad Examples:**

```
// ❌ No validation — '' passes TypeScript but violates Prisma intent
async create({ name, projectId, workerId, ... }: CreateArgs, user: User) {
  return this.prisma.action.create({ data: { name, projectId, workerId, ... } });
  // If caller passed workerId: '', the row is written with empty workerId and
  // becomes invisible to all downstream queries that filter by workerId.
}
```


### Naming

#### File Naming (🔴 Required)

Service files use kebab-case domain name

**Rule:** {domain}.service.ts and {domain}.service.spec.ts

**✅ Good Examples:**

```
user.service.ts
```

```
order-item.service.ts
```

```
user.service.spec.ts
```

**❌ Bad Examples:**

```
UserService.ts
```

```
user-service.ts
```

```
userService.ts
```


#### Class Naming (🔴 Required)

Service classes use PascalCase with Service suffix

**Rule:** {Domain}Service

**✅ Good Examples:**

```
UserService
```

```
OrderItemService
```

**❌ Bad Examples:**

```
UsersService
```

```
userService
```

```
User_Service
```


### Errors

#### NestJS Exceptions (🔴 Required)

Use NestJS built-in exceptions for error handling

**Rule:** NotFoundException for missing resources, ConflictException for duplicates, BadRequestException for invalid input

**✅ Good Examples:**

```
throw new NotFoundException("User not found")
```

**❌ Bad Examples:**

```
throw new Error("User not found")
```

```
return null
```


### Testing

#### Test Structure (🔴 Required)

describe/it blocks with mocked dependencies

**Rule:** {domain}.service.spec.ts with describe("{Domain}Service") and it("should...") blocks

**✅ Good Examples:**

```
describe("UserService", () => { it("should create a user", ...) })
```

**❌ Bad Examples:**

```
test("create user", ...) (use it() not test())
```


### Types

#### Explicit Return Types (🔴 Required)

All public methods must have explicit return types

**Rule:** Promise<{Domain}>, Promise<{Domain}[]>, Promise<void> — never implicit


### Exports

#### Named Exports Only (🔴 Required)

Use named exports, never default exports

**Rule:** export class {Domain}Service, not export default class {Domain}Service


### Environment

#### Env Var Documentation Rule (🔴 Required)

New environment variables must be documented in example.env

**Rule:** Any new ConfigService.getOptional() or ConfigService.get() call for a new env var must be accompanied by an example.env entry in the same commit with a comment explaining its purpose and expected format. This applies especially to security-sensitive keys.

**✅ Good Examples:**

```
// In service: this.configService.get('SESSION_ENCRYPTION_KEY')
// In example.env:
# SESSION_ENCRYPTION_KEY — AES-256 key for session data encryption (base64, 32 bytes)
SESSION_ENCRYPTION_KEY=your-base64-encoded-32-byte-key-here
```

**❌ Bad Examples:**

```
// In service: this.configService.get('SESSION_ENCRYPTION_KEY')
// No example.env entry — other developers don't know the key exists or what format it expects
```


### Architecture

#### Encryption via Prisma Extension (🔴 Required)

Session-related data encryption is handled transparently by the Prisma encryption extension

**Rule:** To encrypt a new JSON field on a Prisma model, add the model/field entry to src/shared/encryption/encrypted-fields.config.ts. Do NOT add manual EncryptionService calls in service methods — the Prisma extension at src/shared/encryption/prisma-encryption.extension.ts handles encryption/decryption automatically.

**✅ Good Examples:**

```
// In encrypted-fields.config.ts — add the model/field:
export const ENCRYPTED_FIELDS: EncryptedFieldsConfig = {
  AdkSession: ['metadata'],
  AdkMessage: ['content', 'toolCalls'],  // ← add new field here
}
// The Prisma extension encrypts on write and decrypts on read automatically.
```

**❌ Bad Examples:**

```
// In adk-session.service.ts — NEVER do this:
const encrypted = await this.encryptionService.encrypt(sensitiveData)
await this.prisma.adkSession.update({ data: { metadata: encrypted } })
// Manual EncryptionService calls bypass the extension and break consistency.
```


#### Content Output Registry Registration (🔴 Required)

Every new content output type (email, PDF, notification, webhook payload, etc.) produced by a service must be registered in the Content Output Registry before being used in production code

**Rule:** When a service method produces a new output artifact (e.g. a new email template, a new PDF layout, a new push notification type), register it in src/shared/content-output/content-output.registry.ts before wiring it to a controller or event handler. Unregistered outputs are invisible to the review, audit, and template-management systems.

**✅ Good Examples:**

```
// In content-output.registry.ts — register first:
registry.register({ id: 'invoice-email', type: 'email', template: 'invoice', owner: 'billing' })
// Then use it in billing.service.ts:
await this.mailer.send({ outputId: 'invoice-email', to: user.email, data: invoiceData })
```

**❌ Bad Examples:**

```
// In billing.service.ts — sending without registration:
await this.mailer.send({ template: 'invoice', to: user.email, data: invoiceData })
// Output is invisible to the registry — cannot be audited or managed centrally.
```


#### Prisma Json Field Sanitization (🔴 Required)

When storing data in Prisma Json fields, always sanitize with JSON.parse(JSON.stringify(data)) to strip non-serializable values

**Rule:** Always sanitize with JSON.parse(JSON.stringify(data)) before writing to any Prisma Json field. Never assume data flowing through workflow.inputs is clean — functions, undefined values, and Symbols will cause silent data corruption or runtime errors.

**✅ Good Examples:**

```
// Sanitize before writing to a Json field:
const safeInputs = JSON.parse(JSON.stringify(workflow.inputs))
await this.prisma.workflow.update({ where: { id }, data: { inputs: safeInputs } })
```

**❌ Bad Examples:**

```
// Writing raw data directly — may contain undefined or functions:
await this.prisma.workflow.update({ where: { id }, data: { inputs: workflow.inputs } })
```


### Tool Context

#### Use BaseTools Context Resolver Helpers (🔴 Required)

When a service is invoked from a tool layer (BaseTools subclass), require the caller to use resolver helpers rather than raw context reads

**Rule:** If a service.create() is wired into a tool that extends BaseTools, the tool MUST pass workerId / actionId / workflowId resolved via this.resolveWorkerKey(context), this.resolveActionId(context), this.resolveWorkflowId(context) — NOT via direct reads like context?.initiatingWorkerId. Direct reads miss the metadata.* and initiatingWorkerSkill fallbacks and end up writing empty strings to non-nullable Prisma columns. The service should document this expectation at the call-site.

**✅ Good Examples:**

```
// ✅ In the tool calling the service:
const workerId = this.resolveWorkerKey(context) || '';
await this.actionService.create({ name, projectId, config, workerId }, user);
```

**❌ Bad Examples:**

```
// ❌ Tool reads one context field — service gets '' on missing context:
const workerId = context?.initiatingWorkerId || '';
await this.actionService.create({ name, projectId, config, workerId }, user);
```


### Diagnostics

#### Throw on Empty Upstream Data, Never Silent Return (🔴 Required)

When a workflow step receives upstream data and finds it empty/malformed, throw a diagnostic error with the actual shape — never return silently with a zero-count

**Rule:** If a service method depends on data from a prior step (e.g., inputs.generateMilestones.json.objectivesForKR) and the expected field is missing or empty, throw an Error whose message includes: (a) what was expected, (b) the actual top-level keys of the input, (c) whether the value is a ResultRef, (d) whether it has an output envelope, (e) a short preview of the AI response if applicable. Silent empty-returns (return {count: 0, items: []}) hide the true failure mode and cost days of debugging time.

**✅ Good Examples:**

```
if (!objectivesForKR.length) {
  const milestoneInput = inputs.generateMilestones;
  const diag = {
    reason: 'generateKeyResults received no objectives',
    shape: describeShape(milestoneInput),
    topKeys: milestoneInput && typeof milestoneInput === 'object' ? Object.keys(milestoneInput) : null,
    has_json: !!(milestoneInput as Record<string, unknown>)?.json,
    has_output: !!(milestoneInput as Record<string, unknown>)?.output,
    is_resultRef: !!(milestoneInput as Record<string, unknown>)?.__resultRef,
  };
  throw new Error(`[Workflow] cannot proceed: ${JSON.stringify(diag)}`);
}
```

**❌ Bad Examples:**

```
// Silent empty-return — hides the actual bug for days:
if (!objectivesForKR.length) {
  this.logger.warn('No objectives found');
  return { json: { keyResultsForTasks: [], count: 0 } };
}
```

