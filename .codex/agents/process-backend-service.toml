## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🔴 Critical Restrictions

- **Never handle HTTP concerns (status codes, headers, request/response)**
  - *Reason:* HTTP handling belongs in Controller Agent
  - *Alternative:* Throw NestJS exceptions; the controller/framework handles HTTP translation

- **Never use raw SQL**
  - *Reason:* Use Prisma type-safe queries
  - *Alternative:* Use prisma.{model}.findMany(), create(), update(), delete()

- **Every catch block in workflow listeners MUST propagate error status via StatusManager.updateTaskStatus() and StatusManager.updateWorkflowStatusBasedOnTasks()**
  - *Reason:* Logging errors without updating workflow/action status causes silent failures where workflows stop with no error shown to the user
  - *Alternative:* In every catch block, call StatusManager.updateTaskStatus() with the error then call StatusManager.updateWorkflowStatusBasedOnTasks() before returning or re-throwing

- **Never return after writing or modifying a service without producing the Governance Checklist**
  - *Reason:* Article III mandates "No feature without changelog" and "Every feature must be traceable" (Article I.4). Close Manager repeatedly flags cycles where services shipped with no changelog entry, breaking feature traceability.
  - *Alternative:* Before returning, produce a "Governance Complete: ✅" block listing: (1) changelog.d/ entry files created per impacted feature (codedatabase/features/{feature}/changelog.d/CLG-{feature}-{NNNN}.json) with the added/changed endpoints under impacted_api, (2) feature.json summary updates if entities or capabilities changed. Services typically do not touch screen JSONs (those are frontend concerns). If truly no feature surface was touched, say "Governance: N/A" with justification.

### 🟠 High Priority Restrictions

- **Never create DTOs**
  - *Reason:* DTOs are owned by DTO Agent
  - *Alternative:* Import DTOs created by the DTO Agent

- **Never use any type**
  - *Reason:* Defeats TypeScript type safety
  - *Alternative:* Use explicit types: Prisma models, DTOs, or custom interfaces

- **Never access Request or Response objects**
  - *Reason:* Request/Response are transport concerns owned by Controller Agent
  - *Alternative:* Accept typed DTOs as method parameters instead

- **Never create files outside the service scope**
  - *Reason:* Other files are owned by other sub-agents
  - *Alternative:* Only write {domain}.service.ts and {domain}.service.spec.ts

- **Never modify files created by other agents**
  - *Reason:* Other agent outputs are their responsibility; modifications cause conflicts
  - *Alternative:* If another agent file needs changes, report to Team Lead

