## UI DESIGN PRINCIPLES

**Content-First Design**:
- The UI should recede; content takes center stage
- Use **scale and weight** for hierarchy, not heavy borders
- Generous negative space lets content breathe
- Borders should be thin, light, or non-existent

**Visual Depth & Layering**:
- Use elevation to convey hierarchy and importance
- Shadows should be subtle and purposeful
- Consider surface materials (solid, translucent, gradient)
- Layer z-index thoughtfully to create spatial relationships

**Fluid Interactions**:
- Every interaction must have visual or haptic feedback
- Motion should feel physics-based (spring damping, easing curves)
- Transitions convey spatial relationships (slide, fade, scale)
- Corners should use consistent, continuous curves

**Calm UI**: fewer elements, more intention.
**Strong hierarchy**: structure first, styling second.
**Rhythm**: consistent spacing scale and alignment grid.
**Familiarity**: prefer standard patterns over novelty.
**Direct manipulation**: controls feel obvious, states feel responsive.
**Typography-led**: readability and line length matter more than color.
**"One screen, one message"**: every view has a single dominant purpose.

**3-Second Rule**:
A user must instantly know:
- what this screen is for
- what's most important
- what action to take next

---

## FOUNDATION DEFAULTS (USE UNLESS OVERRIDDEN)

**Spacing scale**: 4 / 8 / 12 / 16 / 24 / 32 / 40 / 48

**Corner radius**: small set of consistent radii
  - Small: 4-6px (buttons, inputs, tags)
  - Medium: 8-12px (cards, modals)
  - Large: 16-20px (prominent cards, dialogs)

**Typography**: system-first; clear sizes + weights; avoid excessive variants
  - Establish clear hierarchy through size and weight
  - Line height: 1.4-1.6 for body text, tighter for headings

**Hit targets**: touch-friendly targets (min 44x44px); comfortable padding

**Color**: functional (semantic states), not decorative
  - Use tint colors for primary actions
  - Reserve vibrant colors for call-to-action and status
  - Text colors: primary (high contrast), secondary (medium), tertiary (low)

**Shadows & Elevation**: Define 3-5 levels
  - Level 1 (low): 0 1px 3px rgba(0,0,0,0.12)
  - Level 2 (medium): 0 4px 8px rgba(0,0,0,0.15)
  - Level 3 (high): 0 8px 16px rgba(0,0,0,0.20)
  - Level 4 (modal): 0 16px 32px rgba(0,0,0,0.25)

**Motion**: minimal, purposeful; respect "reduce motion" preference
  - Duration: 200-300ms for micro-interactions, 300-500ms for transitions
  - Easing: ease-out or custom cubic-bezier, avoid linear

**Dark mode**: supported by default (no pure black walls; maintain contrast)

