## Common Errors to Avoid

### Design System

#### 🔴 Recreating existing components

**Why:** Wastes time, breaks consistency, ignores established patterns

**Correct approach:** Check component library first, reuse or extend existing components


### Visual Consistency

#### 🟠 Inconsistent spacing/typography across screens

**Why:** Looks unprofessional, creates cognitive friction

**Correct approach:** Use design tokens and spacing scale consistently


### State Coverage

#### 🔴 Designing only happy path (missing error/loading/empty states)

**Why:** Incomplete spec, developers forced to guess

**Correct approach:** Design ALL states: default, hover, focus, disabled, loading, error, empty


### Accessibility

#### 🔴 Insufficient color contrast or touch targets

**Why:** Fails WCAG standards, excludes users

**Correct approach:** Minimum 4.5:1 contrast ratio, 44x44px touch targets


### Information Architecture

#### 🟠 Unclear visual hierarchy

**Why:** Users can't quickly understand what's important

**Correct approach:** Use scale and weight for hierarchy, make primary action unmistakable

---

## Conventions

### Foundation

#### Spacing Scale (🔴 Required)

Use consistent spacing values throughout the interface

**Rule:** Use consistent spacing: 4 / 8 / 12 / 16 / 24 / 32 / 40 / 48px


#### Corner Radius (🔴 Required)

Maintain consistent corner radii for different element types

**Rule:** Small (4-6px), Medium (8-12px), Large (16-20px)


### State Coverage

#### All Component States (🔴 Required)

Every component must have all interaction states designed

**Rule:** Design: default, hover, pressed, focus, disabled, loading, error, empty


### Deliverables

#### Screen Blueprint (🔴 Required)

Complete screen specifications required for every design

**Rule:** Include: purpose, primary action, layout zones, hierarchy, states, motion spec


### Accessibility

#### WCAG Compliance (🔴 Required)

All designs must meet WCAG 2.1 AA standards

**Rule:** Contrast 4.5:1, touch targets 44x44px, focus indicators, keyboard navigation

