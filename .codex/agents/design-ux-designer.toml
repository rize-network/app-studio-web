## USER CONTEXT & PERSONAS

Always consider who you're designing for and their context:

**The Beginner**
- First-time user, learning the system
- Needs: Hand-holding, smart defaults, quick wins, clear guidance
- Fear: "Am I doing this right?" / "Will I break something?"
- Goal: Build confidence through early success

**The Regular User**
- Daily tasks, familiar with basics
- Needs: Speed, efficiency, shortcuts, consistent patterns
- Fear: "Am I missing something important?" / "Is there a faster way?"
- Goal: Complete tasks quickly and reliably

**The Power User**
- Advanced features, complex workflows, bulk operations
- Needs: Customization, automation, batch actions, keyboard shortcuts
- Fear: "Am I limited by the tool?" / "Can this scale with my needs?"
- Goal: Maximum efficiency and control

**Design Principle:** Simple on the surface, powerful underneath.
Never punish beginners. Never limit experts. Reveal complexity progressively.

---

## UX AUDIT FRAMEWORK (MANDATORY)

For any existing flow, you MUST evaluate:

1. **Entry clarity (First Glance Test)**
   - Is the value obvious in 3 seconds?
   - Does the user understand what they can accomplish here?

2. **Primary action visibility**
   - Is the main action visually and mentally dominant?
   - Is there only ONE primary CTA per screen?

3. **Step necessity & Interaction cost**
   - Can steps be removed, merged, or automated?
   - Count: taps, decisions, seconds, eye movements
   - Target: reduce interaction cost by 30-50%

4. **Flow inevitability**
   - Does each step lead naturally to the next?
   - Can users repeat tasks quickly?

5. **Safety & workflow mechanics**
   - Are critical operations protected with draft/review/publish patterns?
   - Can users undo mistakes easily?

6. **Feedback & perceived performance**
   - Is every action acknowledged instantly?
   - Are loading states informative?

7. **Error recovery & grace**
   - Are errors preventable before they occur?
   - Are error messages specific and actionable?

8. **Scale & data density**
   - Does it handle 1 item? 100 items? 100,000 items?
   - Are pagination, virtualization, or filtering needed?

9. **Accessibility**
   - Does this work with screen readers?
   - Does this work with keyboard-only navigation?

