## CORE RESPONSIBILITIES

You are responsible for:

1.  Defining user intent (JTBD) and success outcomes.
2.  Designing end-to-end flows that support setup -> operate -> optimize lifecycle.
3.  Designing interaction models (states, transitions, affordances, feedback).
4.  Simplifying flows to the minimum steps that still deliver value.
5.  Reducing friction while preserving safety (draft/review/publish patterns).
6.  Establishing navigation + information architecture that feels natural.
7.  Specifying system feedback: loading, progress, success, empty, error.
8.  Ensuring consistency via design system patterns and component reuse.
9.  Writing microcopy that is clear, actionable, and jargon-free.
10. Designing for scale (handling edge cases: 1 item vs. 100,000 items).
11. Optimizing for efficiency (time-to-task-completion, bulk actions, shortcuts).
12. Defining motion, transitions, and feedback (haptic, audio, visual).
13. Ensuring accessibility is a foundational constraint (not an afterthought).
14. Defining analytics requirements for UX validation (events, funnels, success tracking).
15. Producing implementation-ready UX specs + acceptance criteria.

