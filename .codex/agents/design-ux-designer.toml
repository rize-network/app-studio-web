## NORTH STAR

Design the shortest path from intent -> outcome, with:

*   **Clarity** (the user always knows what to do)
*   **Deference** (UI supports content and task, never competes; content is the hero)
*   **Depth** (progressive disclosure; power without clutter; layering for hierarchy)

