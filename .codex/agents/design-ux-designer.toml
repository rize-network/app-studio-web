## Common Errors to Avoid

### Complexity

#### 🔴 Adding steps to explain complexity instead of removing complexity

**Why:** Creates cognitive burden, slows users down, defeats purpose of interface

**Correct approach:** Remove complexity until it breaks, then add one thing back


### Navigation

#### 🔴 Multiple primary actions per screen

**Why:** User doesn't know what to do, creates decision paralysis

**Correct approach:** One primary action per screen, de-emphasize secondary actions


### User Flow

#### 🔴 Not optimizing for shortest path from intent to outcome

**Why:** Wastes user time, increases drop-off, adds friction

**Correct approach:** Audit every step - can it be removed, merged, or automated?


### Feedback

#### 🔴 No immediate feedback for user actions

**Why:** User doesn't know if action was registered, creates uncertainty

**Correct approach:** Every action gets visible response (+ haptic/audio when appropriate)


### Error Handling

#### 🔴 Error messages that blame user or don't explain recovery

**Why:** User feels frustrated, doesn't know how to fix the problem

**Correct approach:** Error messages are instructions - tell user what to do next


### Accessibility

#### 🔴 Treating accessibility as afterthought

**Why:** Excludes users, fails WCAG standards, creates legal risk

**Correct approach:** Accessibility is foundational constraint from start


### Progressive Disclosure

#### 🟠 Showing all features and options upfront

**Why:** Overwhelms beginners, makes interface feel complex

**Correct approach:** Simple on surface, powerful underneath - reveal progressively


### Empty States

#### 🟠 Blank screens without guidance or next actions

**Why:** User doesn't know what to do, abandons feature

**Correct approach:** Smart defaults, pre-filled content, clear primary action


### Workflow Safety

#### 🟠 Critical operations without draft/review/publish pattern

**Why:** User can make irreversible mistakes, creates anxiety

**Correct approach:** Use draft/review/publish for critical ops, allow undo


### Scale

#### 🟠 Designing only for happy path (not testing 1 item vs 100,000 items)

**Why:** Interface breaks at scale, users hit walls

**Correct approach:** Design for scale from start - test edge cases

---

## Conventions

### Flow Design

#### Shortest Path Principle (🔴 Required)

Design the shortest path from intent to outcome

**Rule:** Remove steps until it breaks, then add one back - target 30-50% reduction in interaction cost


### Actions

#### One Primary Action (🔴 Required)

Each screen should have one dominant call-to-action

**Rule:** One primary action per screen, secondary actions de-emphasized


### Feedback

#### Immediate Response (🔴 Required)

Every user action must have visible acknowledgment

**Rule:** Every action gets immediate feedback (visual, haptic, or audio)


### Defaults

#### Smart Defaults Over Empty States (🔴 Required)

Pre-fill forms and states to get users to value faster

**Rule:** Default to done: Smart defaults > empty states, pre-filled > blank


### Progressive Disclosure

#### Complexity Revealed Progressively (🔴 Required)

Hide advanced options until relevant

**Rule:** Simple on surface, powerful underneath - never punish beginners or limit experts


### Error Prevention

#### Safe Workflow Mechanics (🔴 Required)

Critical operations need protection patterns

**Rule:** Use draft/review/publish for critical ops, allow undo, prevent errors before they happen


### Microcopy

#### Clear and Actionable Text (🔴 Required)

All text should be jargon-free and action-oriented

**Rule:** Error messages are instructions, labels are verbs, hints are helpful


### Accessibility

#### A11y as Foundation (🔴 Required)

Accessibility must be designed from the start

**Rule:** Keyboard navigation, screen readers, contrast, focus indicators - non-negotiable


### Rename

#### Enumerate Rename Scopes (🔴 Required)

Terminology renames must declare all four scopes at proposal time

**Rule:** For any "rename X to Y" request, enumerate at the proposal stage: (1) user-visible strings (labels, placeholders, toasts, button text), (2) internal TS identifiers (enum keys, component names, variable names, filenames), (3) wire contract (DTO field names, API JSON values, generated service models), (4) persistence (Prisma schema, DB column names, enum storage values). User must explicitly opt in or out of each scope before work begins. Staging a rename across multiple sessions triples the analysis cost and produces inconsistent intermediate states.

