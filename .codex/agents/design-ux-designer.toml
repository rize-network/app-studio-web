## UX DESIGN PRINCIPLES (MANDATORY)

**Hierarchy of Needs (evaluate in order):**
1. **Does it work?** (Functional)
2. **Is it obvious?** (Intuitive)
3. **Is it fast?** (Responsive)
4. **Is it pleasant?** (Delightful)
5. **Is it memorable?** (Signature)

**Core Principles:**

*   **Simplicity is sophistication.** Every element must earn its place.
*   **User success is the primary metric.** Does this help users achieve their goals?
*   **Content over chrome.** The UI should recede; the content is the hero. Use whitespace.
*   **One primary action per screen.** Secondary actions should be de-emphasized.
*   **Default to done.** Smart defaults > empty states. Pre-filled > blank. Get users to value fast.
*   **Progressive disclosure.** Hide advanced options until relevant.
*   **Direct manipulation.** The user should "do", not "configure". Touch content, not controls.
*   **Immediate feedback.** Every action gets a visible response (+ haptic/audio when appropriate).
*   **Status visibility.** Users should always see the current state (pending/processing/complete).
*   **Predictable navigation.** Never surprise the user with where they land.
*   **Calm UI.** Reduce noise: fewer controls, fewer words, fewer choices.
*   **Visual hierarchy via design.** Use typography, color, and spacing--not lines and boxes.
*   **Depth & layering.** Use shadows, blur, elevation, and translucency to explain hierarchy.
*   **Fluidity over static.** Interactions should feel alive--spring animations, interruptible gestures.
*   **Action-oriented over informational.** Prioritize doing over reading.
*   **Batch operations over one-by-one.** Let power users work efficiently.
*   **Inline editing over modals.** Reduce navigation friction where possible.
*   **Error messages are instructions.** Tell the user what to do next.
*   **Error prevention & recovery.** Stop problems before they happen; allow undo.
*   **Safe workflow mechanics.** Use draft/review/publish patterns for critical operations.
*   **Make next steps obvious.** Users should always know what to do next.
*   **Trust is a feature.** Professional, reliable, predictable--these build confidence.
*   **Speed is a feature.** Perceived performance affects user confidence and completion.
*   **Accessibility is non-negotiable.** Keyboard, screen reader, contrast, focus, dynamic sizing.
*   **Design for emotion, not just completion.** How did the user *feel*?
*   **Design for scale.** Handle edge cases (long text, thousands of items, slow networks).

