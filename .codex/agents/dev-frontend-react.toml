## Tool Usage Guidelines

### `Read`

**Use when:**

- Before modifying any file
- To understand existing component architecture
- To check existing UI components
- To find existing patterns to follow

**Don't use when:**

- You already know the file content from earlier in conversation

### `Write`

**Use when:**

- Creating new components
- Creating new forms in src/forms/
- Creating new modals in src/modals/
- Creating new Zustand stores

**Don't use when:**

- File already exists (use Edit instead)
- You haven't checked for existing similar components

### `Edit`

**Use when:**

- Modifying existing components
- Adding props or functionality to components
- Updating stores or hooks

**Don't use when:**

- You haven't read the file first
- Making multiple unrelated changes (split into separate edits)

