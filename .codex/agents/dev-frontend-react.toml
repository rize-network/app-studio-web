## Conventions

### File Structure

#### Forms Location (🔴 Required)

// File: src/forms/LoginForm.tsx
import { Formik, Form } from 'formik'
import * as Yup from 'yup'

const LoginForm = () => {
  return (
    <Formik
      initialValues={{ email: '', password: '' }}
      validationSchema={Yup.object({
        email: Yup.string().email().required(),
        password: Yup.string().min(8).required()
      })}
      onSubmit={(values) => {
        // Handle submit
      }}
    >
      <Form>
        {/* Form fields */}
      </Form>
    </Formik>
  )
}

export default LoginForm  // Default export per file

**Rule:** ALL forms MUST be created in src/forms/ directory


#### Modals Location and Registration (🔴 Required)

// File: src/modals/ConfirmModal.tsx
import { Modal, hideModal } from '@app-studio/web'

export const ConfirmModal = ({ title, onConfirm }) => (
  <Modal.Container>
    <Modal.Body>
      <h2>{title}</h2>
      <button onClick={onConfirm}>Confirm</button>
      <button onClick={() => hideModal()}>Cancel</button>
    </Modal.Body>
  </Modal.Container>
)

// File: src/modals/index.tsx
export { ConfirmModal } from './ConfirmModal'  // MUST register!
export { EditUserModal } from './EditUserModal'
export { DeleteModal } from './DeleteModal'

// Usage:
import { showModal } from '@app-studio/web'
showModal('ConfirmModal', { title: 'Are you sure?', onConfirm: handleConfirm })

**Rule:** ALL modals MUST be in src/modals/ AND registered in src/modals/index.tsx


### API Integration

#### Request File Pattern (MANDATORY) (🔴 Required)

// ✅ CANONICAL PATTERN — no store, page reads request.data directly

// File: src/pages/users/users.request.ts
import { showToast } from '@app-studio/web'
import { UsersService } from 'src/services/api'

export const useUsersRequests = () => {
  const listUsersRequest = UsersService.useUsersControllerFindAllService()

  const createUserRequest = UsersService.useUsersControllerCreateService({
    onSuccess: () => {
      showToast('success', 'Success', 'User created.')
      listUsersRequest.run()       // refetch — data lives on listUsersRequest.data
    },
  })

  const deleteUserRequest = UsersService.useUsersControllerDeleteService({
    onSuccess: () => {
      showToast('success', 'Deleted', '')
      listUsersRequest.run()
    },
  })

  return { listUsersRequest, createUserRequest, deleteUserRequest }
}

// File: src/pages/users/users.page.tsx
const UsersPage = () => {
  const { listUsersRequest, deleteUserRequest } = useUsersRequests()

  useEffect(() => { listUsersRequest.run() }, [])

  if (listUsersRequest.loading) return <Loader />                    // ← loading from HOOK
  if (listUsersRequest.error) return <ErrorState message={listUsersRequest.error.message} />
  const users = listUsersRequest.data ?? []                          // ← data from HOOK

  return <div>{users.map(u => <UserCard key={u.id} user={u} onDelete={() => deleteUserRequest.run(u.id)} />)}</div>
}

// ❌ FORBIDDEN — creating a store just to re-expose request.data
export const useUsersStore = create(...)                              // useless middleman if only this page reads it

// ❌ FORBIDDEN — direct call from component code
const data = await UsersService.usersControllerFindAll()              // FORBIDDEN!

**Rule:** Every page that loads data MUST own a {page}.request.ts file that wraps generated useXxxControllerYyyService hooks. The request hooks ARE the source of truth: page reads data from request.data, loading from request.loading, error from request.error. DEFAULT: do NOT create a Zustand store for the page. A store is ONLY justified when data must be shared across DISPARATE components (cross-page, real-time subscription targets, persisted across navigation, global session state) — see "Do I Need a Store?" convention. Forms use useXxxControllerYyyService hooks directly (inside the form component, not via useXxxRequests()). Direct calls to the raw xxxControllerYyy() functions from React code are FORBIDDEN — always the hook.


#### Do I Need a Store? (🔴 Required)

// ✅ JUSTIFIED — AuthStore, LocaleStore, AppStore (project), realtime/KanbanTaskStore
//   Cross-cutting session/real-time state. A store is the right tool.

// ✅ JUSTIFIED — useCompanyStore.activeCompany
//   Read by NavLayout, CompanyMenu, 5+ pages in the company domain.
//   Single page reloads must not drop the selection.

// ❌ NOT JUSTIFIED — a "useDepartmentStore" when only org.page renders departments
//   → Delete the store. Read listDepartmentsRequest.data directly in org.page.

// ❌ NOT JUSTIFIED — a "useRuntimeStore" when only runtimes.page displays capabilities
//   → Delete the store. Read getRuntimeSummaryRequest.data directly.

// ❌ NOT JUSTIFIED — any store whose initial state was a MOCK_* array for months
//   because nothing actually read from it cross-cutting.

**Rule:** Before creating a Zustand store, apply this checklist. Create a store ONLY if at least ONE box is checked. If all boxes are unchecked, the request hooks in *.request.ts are the source of truth — read request.data directly in the page. (1) The data is needed by >=2 pages/features that do not compose into a single parent — e.g. activeCompany used by NavLayout + Overview + Settings + Org + Governance. (2) The data must persist across route changes so re-mounting the page should NOT re-fetch immediately (rare — most data should refetch). (3) The data is a real-time subscription target updated by SSE/WebSocket outside any request hook's lifecycle. (4) The data is orchestrated by multiple request hooks from different pages that each need to mutate a shared collection (rare). "My page has loading state" is NOT a justification — request.loading already provides it. "I want selectors" is NOT a justification — destructure request.data. "The page has 5 components" is NOT a justification — pass request.data as props, or have children call the same request hook (it is memoized).


#### Generated Services Only (🔴 Required)

// ✅ CORRECT — generated hook wrapper used inside a *.request.ts file
import { UsersService } from 'src/services/api'
const listUsersRequest = UsersService.useUsersControllerFindAllService({
  onSuccess: (data) => setUsers(data),
})

// ❌ WRONG — Will be BLOCKED by gate
const response = await fetch('/api/users')  // BLOCKED!
const users = await axios.get('/api/users')  // BLOCKED!

// ❌ WRONG — direct call from a component or store
import { usersControllerFindAll } from 'src/services/api/services/UsersService'
const users = await usersControllerFindAll()  // BLOCKED! Use the hook in a *.request.ts file.

**Rule:** All backend calls MUST go through generated hooks from src/services/api/services/*. NO fetch(). NO axios. NO XMLHttpRequest. The generated hook wrappers (useXxxControllerYyyService) are the ONLY sanctioned entry points — never call the direct function exports (xxxControllerYyy) from React code.


### Workspace Hygiene

#### Verify Git State Before Editing Allowlisted Files (🔴 Required)

# Before editing src/stores/useFooStore.ts (listed in task allowlist):
git diff HEAD -- src/stores/useFooStore.ts          # show unstaged diff
git log -1 --oneline -- src/stores/useFooStore.ts    # last commit that touched it

# If diff shows the file already matches the task's desired state:
#   → Report "already-done: file matches target state at commit <hash>" and skip
# If diff shows conflicting in-flight changes by another agent:
#   → STOP and report the conflict — do NOT overwrite

**Rule:** Before modifying any file listed in a task allowlist, run `git diff HEAD -- <file>` and `git log -1 --oneline -- <file>` to confirm the current on-disk state matches the task's assumptions. If the file already reflects the requested change (e.g., a prior agent run applied it), report "already-done" immediately instead of running further verification or duplicating the edit. This prevents wasted cycles when the workspace was reverted or modified between delegations.


### State Management

#### Zustand Store Structure (EXCEPTION — PURE UI STATE WHEN JUSTIFIED) (🔴 Required)

// File: src/stores/useProjectStore.ts
import { create } from 'zustand'
import type { Project } from 'src/services/api/models/Project' // ✅ model TYPE import is OK
// ❌ NEVER import from 'src/services/api/services/*' — stores are pure UI state

interface ProjectState {
  // State
  projects: Project[]
  currentProject: Project | null
  error: string | null
  // NOTE: no "loading" field — loading lives on the request hook

  // Synchronous setters (fed by *.request.ts onSuccess callbacks)
  setProjects: (projects: Project[]) => void
  upsertProject: (project: Project) => void
  removeProject: (id: string) => void
  setCurrentProject: (project: Project | null) => void
  setError: (error: string | null) => void
  reset: () => void
}

export const useProjectStore = create<ProjectState>((set) => ({
  projects: [],
  currentProject: null,
  error: null,

  setProjects: (projects) => set({ projects }),
  upsertProject: (project) => set((s) => {
    const idx = s.projects.findIndex(p => p.id === project.id)
    return idx >= 0
      ? { projects: s.projects.map(p => p.id === project.id ? project : p) }
      : { projects: [project, ...s.projects] }
  }),
  removeProject: (id) => set((s) => ({
    projects: s.projects.filter(p => p.id !== id),
    currentProject: s.currentProject?.id === id ? null : s.currentProject,
  })),
  setCurrentProject: (currentProject) => set({ currentProject }),
  setError: (error) => set({ error }),
  reset: () => set({ projects: [], currentProject: null, error: null }),
}))

// Atomic selectors (REQUIRED — components import these, never useProjectStore())
export const selectProjects = (s: ProjectState) => s.projects
export const selectCurrentProject = (s: ProjectState) => s.currentProject
export const selectProjectError = (s: ProjectState) => s.error

// Fetching & mutations live in src/pages/projects/projects.request.ts — see Request File Pattern

**Rule:** Stores are the EXCEPTION, not the default. Apply the "Do I Need a Store?" checklist FIRST. When justified, a store holds state + SYNCHRONOUS setters + selectors ONLY. NEVER import from src/services/api/services/*. NEVER define async fetch/create/update/delete actions. Loading/error state stay on the request hook. The request hook's onSuccess calls the store setters. See src/stores/RoutinesStore.ts (UI state only) and src/stores/AuthStore.ts (session state) for gold-standard shapes.


### Components

#### Component-First Protocol (🔴 Required)

// DECISION TREE:
// 1. Check front-startup/docs/app-studio-web/components/
// 2. Available: Button, Modal, TextField, Select, Table, Tabs, etc.
//
// Component EXISTS?
// → USE IT (no recreation)
//
// Needs modification?
// → EXTEND IT (add variant/prop)
//
// Can compose from existing?
// → COMPOSE IT
//
// Truly new need?
// → CREATE IT (last resort, needs justification)

// ✅ CORRECT - Use existing
import { Button, Modal, TextField } from '@app-studio/web'

export const MyForm = () => (
  <Modal.Container>
    <Modal.Body>
      <TextField label="Name" />
      <Button type="submit">Save</Button>
    </Modal.Body>
  </Modal.Container>
)

// ✅ CORRECT - Extend if needed
import { Button as LibButton } from '@app-studio/web'

export const DangerButton = (props) => (
  <LibButton variant="danger" {...props} />
)

// ❌ WRONG - Recreating existing component
export const Button = ({ children }) => (
  <button className="...">  // Library already has Button!
    {children}
  </button>
)

**Rule:** ALWAYS audit existing components before creating new ones


#### Modal Management (🔴 Required)

// ✅ CORRECT - showModal/hideModal
import { showModal, hideModal } from '@app-studio/web'

const MyComponent = () => {
  const handleOpen = () => {
    showModal('EditUserModal', {
      userId: '123',
      onSuccess: () => {
        console.log('User updated')
      }
    })
  }

  return <button onClick={handleOpen}>Edit User</button>
}

// Modal definition
export const EditUserModal = ({ userId, onSuccess }) => (
  <Modal.Container>
    <Modal.Body>
      <EditUserForm
        userId={userId}
        onSuccess={() => {
          onSuccess()
          hideModal()
        }}
      />
    </Modal.Body>
  </Modal.Container>
)

// ❌ WRONG - useState for modal
const MyComponent = () => {
  const [isOpen, setIsOpen] = useState(false)  // Don't do this

  return (
    <>
      <button onClick={() => setIsOpen(true)}>Open</button>
      {isOpen && <Modal>...</Modal>}
    </>
  )
}

**Rule:** Use showModal() and hideModal() for modal management. NO useState.


