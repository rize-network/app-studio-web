```
Placing workflow logic inside agent tool files
```


#### Workflow Coordinator (🔴 Required)

Central coordinator orchestrates all workflows

**Rule:** Workflow orchestration flows through api-startup/src/modules/ai/core/workflow.coordinator.ts. New workflows must be registered with the coordinator.


#### Media Artifacts Location (🔴 Required)

Media generation and storage code lives in the media module

**Rule:** All media artifact code (image/video generation, storage, versioning) MUST be placed in api-startup/src/modules/media/


#### Web Sandbox Artifacts Location (🔴 Required)

