## Guidelines

### General Guidelines

- NEVER rush code
- ALWAYS optimize for clarity, correctness, and long-term velocity
- Use library components when library is detected
- Follow component-first protocol
- Follow phased development workflow
- Work inside agent-orchestrated environment
- Collaborate with API, infra, QA, PM agents

### Do's ✅

- ✅ Use library components (Shadcn, Radix, MUI, etc.)
- ✅ Audit existing components before creating new ones
- ✅ Compose from existing components
- ✅ Put ALL forms in src/forms/
- ✅ Put ALL modals in src/modals/ and register them
- ✅ Use showModal() for modal management
- ✅ Use ONLY generated API services from src/services/api/
- ✅ Follow request file pattern
- ✅ Create mock data before API integration
- ✅ Test all states: loading, error, empty, success
- ✅ Use Zustand for state management
- ✅ Create one store per domain
- ✅ Use explicit actions in stores
- ✅ Keep components simple and focused
- ✅ Make state changes explicit and traceable
- ✅ Implement loading, error, and empty states
- ✅ MANDATORY: Run `npm run build` in the target app directory after changes — the modified app MUST compile
- ✅ If working in back-startup: run `cd back-startup && npm run build`
- ✅ If working in front-startup: run `cd front-startup && npm run build`
- ✅ NEVER use `as any` — use proper types, generics, type guards, or `unknown` with narrowing
- ✅ Update documentation after non-trivial tasks
- ✅ Before returning, run `git diff --name-only` and verify it shows ONLY files on the task's allowlist
- ✅ If auto-format-on-save introduced changes to files outside the allowlist, revert those specific files (git checkout -- <file>) before declaring done

### Don'ts ❌

- ❌ Don't use fetch() or axios (BLOCKED by gate)
- ❌ Don't put forms in components/ (must be in src/forms/)
- ❌ Don't put modals in components/ (must be in src/modals/)
- ❌ Don't forget to register modals in src/modals/index.tsx
- ❌ Don't use useState for modal management
- ❌ Don't recreate existing library components
- ❌ Don't skip component audit before creating new components
- ❌ Don't skip mock testing before API integration
- ❌ Don't skip phased development workflow
- ❌ Don't pollute codebase with redundant CSS
- ❌ Don't create "god stores"
- ❌ Don't use inline mutation logic in components
- ❌ Don't create hidden side effects
- ❌ Don't skip agent task reporting
- ❌ Don't use `as any` casts — always use proper TypeScript types
- ❌ Don't skip build verification — ALWAYS run `npm run build` in the target app (front-startup or back-startup) after changes
- ❌ Don't leave the application in a non-deployable state
- ❌ Don't run `npm run lint:fix`, `npm run format`, `prettier --write`, or `eslint --fix` on the whole app unless the task explicitly requests it — it reformats files outside your allowlist
- ❌ Don't run `npm install` / `npm ci` / any lockfile-mutating command unless the task explicitly requests dependency changes
- ❌ Don't use useStore() without a selector (whole-store subscription)
- ❌ Don't subscribe to data stores in structural files (.page/.modal/.drawer)
- ❌ Don't use React Context for data that updates during interaction
- ❌ Don't pass full objects as props when component only needs an ID
- ❌ Don't create inline functions/objects in JSX props for frequently-rendered components
- ❌ Don't rely on React.memo as a band-aid for bad subscription patterns
- ❌ Don't skip render trigger documentation per component

### Best Practices

- Prefer simple components over smart ones
- Business logic in hooks, stores, and services
- Components focus on rendering + user interaction
- One responsibility per component
- Avoid hidden side effects
- Make state changes explicit and traceable
- Use library components for stability and accessibility
- Wrap or style library components as needed
- Follow phased workflow: component → feature → mock → API
- Test with mocks before real API
- Use MSW for API mocking
- Test all states with mocks
- Use generated API services only
- Follow request file pattern for API calls
- Consistent error handling with showToast
- Automatic token management via OpenAPI.TOKEN
- Use fine-grained selectors: useStore(s => s.specificField)
- Keep layouts structural-only — zero store subscriptions
- Pass IDs not objects as props — components read their own data
- Use store actions as stable callback references (not inline functions)
- Normalize entity state: byId + allIds pattern
- Follow pyramid build: 3 layout types (.page/.modal/.drawer) + store.ts + requests.ts + components/
- Document render triggers per component
- Identify hot-path interactions and verify render budget (≤5 per interaction)

