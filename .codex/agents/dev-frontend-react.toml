#### Phased Development (🔴 Required)

// Phase 2A: Component Layer
// 1. Read agents/system/component-first-protocol.md
// 2. Audit existing components in app-studio-web
// 3. Decision: USE existing, EXTEND, COMPOSE, or CREATE

// Phase 2B: Feature Layer
// 1. Assemble feature with MOCK data
// 2. Compose from existing components
// 3. Implement all UI states: loading, error, empty, success

// Phase 2C: Mock Integration
// 1. Create src/features/<feature>/mocks/
// 2. Implement MSW handlers
// 3. Test ALL states with mocks
// 4. ALL mock tests MUST pass

// Phase 3: API Integration
// 1. Replace mocks with real API services
// 2. Use ONLY generated services from src/services/api/
// 3. Verify all states still work
// 4. Tests pass with real API

**Rule:** ALWAYS follow: Phase 2A (components) → 2B (feature) → 2C (mocks) → 3 (API)


### Testing

#### UI State Testing (🔴 Required)

// Test file: UserList.test.tsx
import { render, screen, waitFor } from '@testing-library/react'
import { UserList } from './UserList'
import { server } from 'src/mocks/server'
import { rest } from 'msw'

describe('UserList', () => {
  test('shows loading state', () => {
    render(<UserList />)
    expect(screen.getByText('Loading...')).toBeInTheDocument()
  })

  test('shows users on success', async () => {
    render(<UserList />)
    await waitFor(() => {
      expect(screen.getByText('John Doe')).toBeInTheDocument()
    })
  })

  test('shows empty state when no users', async () => {
    server.use(
      rest.get('/api/users', (req, res, ctx) => {
        return res(ctx.json([]))
      })
    )
    render(<UserList />)
    await waitFor(() => {
      expect(screen.getByText('No users found')).toBeInTheDocument()
    })
  })

  test('shows error state on failure', async () => {
    server.use(
      rest.get('/api/users', (req, res, ctx) => {
        return res(ctx.status(500))
      })
    )
    render(<UserList />)
    await waitFor(() => {
      expect(screen.getByText('Failed to load users')).toBeInTheDocument()
    })
  })

  test('shows network error on offline', async () => {
    server.use(
      rest.get('/api/users', (req, res, ctx) => {
        return res.networkError('Network error')
      })
    )
    render(<UserList />)
    await waitFor(() => {
      expect(screen.getByText('Network error')).toBeInTheDocument()
    })
  })
})

**Rule:** Test all UI states: success, empty, loading, error, network failure


### Performance

#### Fine-Grained Store Selectors (🔴 Required)

// ✅ CORRECT - Fine-grained selector
const userName = useUserStore(s => s.name)
const { items, isLoading } = useProjectStore(
  s => ({ items: s.items, isLoading: s.isLoading }),
  shallow
)

// ❌ WRONG - Subscribes to EVERYTHING, re-renders on any state change
const store = useUserStore()
const { name } = useUserStore() // Still subscribes to everything!

**Rule:** ALWAYS use useStore(s => s.specificField). NEVER use useStore() without a selector. Multi-field selectors use shallow compare.


#### Structural File Data Agnosticism (🔴 Required)

// ✅ CORRECT - Layout is structural only
export const DashboardLayout = ({ children }: { children: React.ReactNode }) => (
  <View>
    <Sidebar>{/* nav items */}</Sidebar>
    <View>{children}</View>
  </View>
)

// ❌ WRONG - Layout subscribes to data
export const DashboardLayout = ({ children }) => {
  const users = useUserStore(s => s.users) // NEVER in layout!
  return <View>{users.length > 0 ? children : <Empty />}</View>
}

**Rule:** Structural files (.page.tsx, .modal.tsx, .drawer.tsx) MUST NOT subscribe to data stores. They are composition-only: arrange components positionally. Components inside read their own data via selectors.


#### Minimal Props Pattern (🔴 Required)

// ✅ CORRECT - Pass ID, component reads its own data
const UserList = () => {
  const userIds = useUserStore(s => s.allIds)
  return userIds.map(id => <UserCard key={id} userId={id} />)
}

const UserCard = ({ userId }: { userId: string }) => {
  const user = useUserStore(s => s.byId[userId])
  return <Card>{user.name}</Card>
}

// ❌ WRONG - Pass full object, causes re-renders when any user changes
const UserList = () => {
  const users = useUserStore(s => s.users) // New array ref on any change
  return users.map(user => <UserCard key={user.id} user={user} />)
}

**Rule:** Pass IDs and primitives as props, not full objects. Components read their own data from store selectors.


#### Stable Callback References (🔴 Required)

// ✅ CORRECT - Store action is a stable reference
const deleteUser = useUserStore(s => s.deleteUser)
return <UserCard onDelete={deleteUser} />

// ❌ WRONG - New function created every render
return <UserCard onDelete={() => useUserStore.getState().deleteUser(id)} />

**Rule:** Pass store actions as callback props directly. Never create inline arrow functions for callbacks in frequently-rendered components.


#### Normalized Entity State (🔴 Required)

// ✅ CORRECT - Normalized state
interface UserState {
  byId: Record<string, User>
  allIds: string[]
  isLoading: boolean
}

// Update one user without affecting others:
updateUser: (id, data) => set(s => ({
  byId: { ...s.byId, [id]: { ...s.byId[id], ...data } }
}))

// ❌ WRONG - Array state (clones entire array on any update)
interface UserState {
  users: User[] // Every update creates new array reference
}

**Rule:** Store entity collections as { byId: Record<string, Entity>, allIds: string[] }. This prevents cloning entire arrays on single-entity updates.


#### Pyramid Build File Convention (🔴 Required)

// Page layout:
// src/pages/users/
// ├── Users.page.tsx        → Structural composition (NO data logic)
// ├── Users.store.ts        → State + actions + selectors
// ├── Users.requests.ts     → API calls using generated services
// └── components/           → Page-specific UI blocks
//
// Modal layout:
// src/modals/
// ├── EditUser.modal.tsx    → Modal structural composition (registered in index.tsx)
//
// Drawer layout:
// src/modals/
// ├── UserDetails.drawer.tsx → Drawer structural composition (registered in index.tsx)

**Rule:** 3 layout types, each structural composition only: .page.tsx (full page), .modal.tsx (modal), .drawer.tsx (drawer). Supporting files: .store.ts, .requests.ts, .selectors.ts, components/


#### Render Trigger Documentation (🔴 Required)

// ✅ CORRECT - Documented render triggers
/**
 * UserCard component
 * Selector: useUserStore(s => s.byId[userId])
 * Render triggers: user entity change in store
 * Safe from: other users changing, loading state, error state
 * Render budget: 1 re-render per user update
 */
export const UserCard = ({ userId }: { userId: string }) => {
  const user = useUserStore(s => s.byId[userId])
  // ...
}

**Rule:** Every component that reads from a store must document its selector and render triggers in a comment.


