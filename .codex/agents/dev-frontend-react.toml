### Performance

#### 🔴 Using useStore() without a selector (whole-store subscription)

**Why:** CRITICAL: Subscribes to entire store. Component re-renders on ANY state change, causing cascade re-renders across the page.

**Correct approach:** ALWAYS use useStore(s => s.specificField) or useStore(s => ({ a: s.a, b: s.b }), shallow)

**❌ Bad Example:**

```typescript

// ❌ CRITICAL — Subscribes to EVERYTHING
const store = useUserStore()
const { name, email } = useUserStore() // Still subscribes to everything!

// This component re-renders when ANY field in user store changes:
// loading, error, unrelated users, etc.
```

**✅ Good Example:**

```typescript

// ✅ CORRECT — Subscribes to specific fields only
const name = useUserStore(s => s.name)
const email = useUserStore(s => s.email)

// Or for multiple fields with shallow compare:
import { shallow } from 'zustand/shallow'
const { name, email } = useUserStore(
  s => ({ name: s.name, email: s.email }),
  shallow
)
// Only re-renders when name or email actually change
```


#### 🔴 Layout component subscribing to data store

**Why:** CRITICAL: Layout data subscriptions re-render the ENTIRE page subtree on any data change. This is the #1 performance anti-pattern.

**Correct approach:** Layouts are structural only. ZERO store subscriptions. If conditional rendering needed, page passes a boolean prop.

**❌ Bad Example:**

```typescript

// ❌ CRITICAL — Layout subscribes to data
// File: src/layouts/DashboardLayout.tsx
import { useUserStore } from '../stores/useUserStore'

export const DashboardLayout = ({ children }) => {
  const users = useUserStore(s => s.users) // NEVER in layout!
  return (
    <View>
      <Sidebar>
        <Text>{users.length} users</Text>  {/* Forces re-render of ENTIRE page */}
      </Sidebar>
      <View>{children}</View>
    </View>
  )
}
```

**✅ Good Example:**

```typescript

// ✅ CORRECT — Layout is structural only
// File: src/layouts/DashboardLayout.tsx
export const DashboardLayout = ({ children }: { children: React.ReactNode }) => (
  <View>
    <Sidebar>{/* Navigation items only */}</Sidebar>
    <View>{children}</View>
  </View>
)

// User count shown in a COMPONENT inside the page, not the layout
// File: src/components/UserCount.tsx
const UserCount = () => {
  const count = useUserStore(s => s.allIds.length)
  return <Text>{count} users</Text>
}
```


#### 🟠 Passing full objects as props when component only needs an ID

**Why:** Object identity changes every render. Child component re-renders unnecessarily even when the object content hasn't changed.

**Correct approach:** Pass IDs as props. Component reads its own data from store selectors.

**❌ Bad Example:**

```typescript

// ❌ WRONG — Passing full object
const UserList = () => {
  const users = useUserStore(s => Object.values(s.byId))
  return users.map(user => (
    <UserCard key={user.id} user={user} />  // New object ref every render!
  ))
}
```

**✅ Good Example:**

```typescript

// ✅ CORRECT — Pass ID, component reads its own data
const UserList = () => {
  const userIds = useUserStore(s => s.allIds)
  return userIds.map(id => (
    <UserCard key={id} userId={id} />  // Stable string prop
  ))
}

const UserCard = ({ userId }: { userId: string }) => {
  const user = useUserStore(s => s.byId[userId])  // Only re-renders when THIS user changes
  return <Card>{user.name}</Card>
}
```


#### 🔴 Using React Context for data that updates during interaction

**Why:** CRITICAL: Every Context value change re-renders the ENTIRE consumer subtree. This is worse than a whole-store subscription.

**Correct approach:** React Context ONLY for: theme, locale, feature flags. ALL updating data goes in Zustand stores with selectors.

**❌ Bad Example:**

```typescript

// ❌ CRITICAL — Context for updating data
const SelectionContext = createContext<{
  selectedIds: string[]
  toggleSelection: (id: string) => void
}>()

// Every child of SelectionContext.Provider re-renders
// on EVERY selection change — even children that don't use selection
```

**✅ Good Example:**

```typescript

// ✅ CORRECT — Selection state in Zustand store
// stores/useSelectionStore.ts
export const useSelectionStore = create<SelectionState>((set) => ({
  selectedIds: [],
  toggleSelection: (id) => set(s => ({
    selectedIds: s.selectedIds.includes(id)
      ? s.selectedIds.filter(i => i !== id)
      : [...s.selectedIds, id]
  })),
}))

// Only components that READ selectedIds re-render on change
const isSelected = useSelectionStore(s => s.selectedIds.includes(myId))
```


### Feature Documentation

#### 🟠 Modified existing feature without checking KB

**Why:** Missing context leads to breaking changes, regression, inconsistent implementations

**Correct approach:** Always read feature.json before modifying documented features

**❌ Bad Example:**

```typescript
// ❌ User asks to update dashboard UI
Assistant: Let me update the dashboard...
[Implements without reading dashboard-001 feature.json]
```

**✅ Good Example:**

```typescript
// ✅ User asks to update dashboard UI
Assistant: Let me first check the existing dashboard feature
Read /codedatabase/features/dashboard-001/feature.json
[Reads current UI requirements, components, user flows]
Assistant: Now I'll update the dashboard with these considerations...
```


#### ℹ️ Implemented feature but did not update KB

**Why:** KB becomes outdated, other agents lack context, duplicate work happens

**Correct approach:** Always update/create feature.json after implementing changes

**❌ Bad Example:**

```typescript
// ❌ Implements new data table component
[Commits code]
// Feature KB not updated - other agents unaware
```

**✅ Good Example:**

```typescript
// ✅ Implements new data table component
Edit /codedatabase/features/dashboard-001/feature.json
// Update frontend.components, ui.components, workflows
npm run codebase:validate dashboard-001
[Commits code with KB update]
```


#### ℹ️ Did not validate feature spec after update

**Why:** Invalid or incomplete specs cause confusion, validation errors in CI/CD

**Correct approach:** Always run codebase:validate after creating/updating feature.json

**❌ Bad Example:**

```typescript
// ❌ Edit feature without validation
Edit /codedatabase/features/dashboard-001/feature.json
[Commits without validation]
// CI fails - missing required fields
```

**✅ Good Example:**

```typescript
// ✅ Edit and validate
Edit /codedatabase/features/dashboard-001/feature.json
npm run codebase:validate dashboard-001
// ✓ Validation passed
[Commits]
```


#### 🟠 Did not run impact analysis before refactoring

**Why:** Breaking changes to dependent features, coordination failures, production issues

**Correct approach:** Always run codebase:impact before major refactoring

**❌ Bad Example:**

```typescript
// ❌ Refactor without checking impact
[Makes breaking changes to shared components]
// 5 features break in production
```

**✅ Good Example:**

```typescript
// ✅ Check impact first
npm run codebase:impact frontend/src/components/shared/Button.tsx
// Shows 5 affected features
// Coordinate with teams, plan migration
[Makes safe, coordinated changes]
```

