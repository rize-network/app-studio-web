#### 🔴 Putting modals in components/ directory

**Why:** CRITICAL: Will be blocked by Gate 4 validation. Modals must be in src/modals/ for convention compliance.

**Correct approach:** ALL modals MUST be in src/modals/ directory AND registered in src/modals/index.tsx

**❌ Bad Example:**

