### phased-development-workflow

MANDATORY: Phased development workflow (component → feature → mock → API)

**Trigger:** For every frontend feature

**Steps:**

1. **Phase 2A: Component Layer**

   Audit and reuse existing components:
1. Read agents/system/component-first-protocol.md
2. Check front-startup/docs/app-studio-web/components/
3. AUDIT: Does component exist?
   - YES → USE IT (no recreation)
   - Needs modification → EXTEND IT
   - Can compose → COMPOSE IT
   - Truly new → CREATE IT (last resort, needs justification)
4. NEVER recreate: Button, Modal, TextField, Select, Table, Tabs, etc.

   *Tools:* `Read`, `Glob`, `Grep`

   *Validations:*
   - Existing components audited
   - Reuse opportunities identified
   - Component library components used
   - No unnecessary recreation

2. **Phase 2B: Feature Layer**

   Assemble feature with mock data:
1. Create feature structure
2. Compose from existing components
3. Use MOCK data (not real API yet)
4. Implement all UI states: loading, error, empty, success

   *Tools:* `Write`, `Edit`

   *Validations:*
   - Feature assembled
   - Using mock data
   - All UI states implemented
   - Components composed properly

3. **Phase 2C: Mock Integration**

   Full testing with mocks:
1. Create src/features/<feature>/mocks/
   - data.ts (static mock data)
   - handlers.ts (MSW handlers)
   - factories.ts (data generators)
   - scenarios.ts (test scenarios)
2. Use MSW for API interception
3. Test ALL states: success, empty, loading, error, network failure
4. ALL mock tests MUST pass before API integration

   *Tools:* `Write`, `Bash`

   *Validations:*
   - Mock data created
   - MSW handlers implemented
   - All states tested with mocks
   - Mock tests pass

   *On Failure:* CANNOT proceed to API integration

4. **Phase 3: API Integration**

   ONLY after Phase 2C passes:
1. Replace mock data with real API services
2. Use ONLY generated services from src/services/api/
3. Follow request file pattern
4. Test with real API
5. Validate all states still work

   *Tools:* `Edit`, `Bash`

   *Validations:*
   - Using generated API services
   - No fetch() or axios calls
   - All states work with real API
   - Tests pass with real API

**Expected Output:** Feature developed through proper phases with full testing at each stage


