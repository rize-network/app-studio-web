### Components

#### 🔴 Recreating library components (Button, Modal, etc.)

**Why:** Library provides stable, accessible components. Recreation wastes time and reduces quality.

**Correct approach:** ALWAYS use library components when library is detected (Shadcn, Radix, MUI, etc.)

**❌ Bad Example:**

```typescript

// ❌ NEVER DO THIS - Recreating Button
// File: src/components/Button.tsx
export const Button = ({ children, onClick }) => (
  <button
    className="px-4 py-2 bg-blue-500 rounded"
    onClick={onClick}
  >
    {children}
  </button>
)

// Library already provides Button!
// This is redundant and pollutes the codebase
```

**✅ Good Example:**

```typescript

// ✅ CORRECT - Use library Button
import { Button } from '@app-studio/web'

export const MyComponent = () => (
  <Button onClick={handleClick}>
    Click Me
  </Button>
)

// ✅ If you need customization, EXTEND it
import { Button as LibButton } from '@app-studio/web'

export const PrimaryButton = (props) => (
  <LibButton variant="primary" {...props} />
)
```


#### 🟠 Not auditing existing components before creating new ones

**Why:** Leads to duplication, inconsistency, and wasted effort

**Correct approach:** ALWAYS audit front-startup/docs/app-studio-web/components/ before creating

**❌ Bad Example:**

```typescript

// ❌ NEVER DO THIS - Create without audit
// User: "Create a modal"
// Immediately start coding new modal
// Result: Library already has 10 modal components!
```

**✅ Good Example:**

```typescript

// ✅ CORRECT - Audit first
// 1. Read front-startup/docs/app-studio-web/components/
// 2. Check: Modal, Drawer, Dialog, Popover available
// 3. Decision tree:
//    - Component exists? USE IT
//    - Needs modification? EXTEND IT
//    - Can compose? COMPOSE IT
//    - Truly new? CREATE IT (last resort)
// 4. Use existing Modal component

import { Modal } from '@app-studio/web'
```


#### 🟠 Business logic in components

**Why:** Makes components hard to test, reuse, and maintain

**Correct approach:** Business logic goes in hooks, stores, and services. Components focus on rendering.

**❌ Bad Example:**

```typescript

// ❌ Business logic in component
export const UserList = () => {
  const [users, setUsers] = useState([])

  useEffect(() => {
    // Business logic in component!
    const fetchUsers = async () => {
      const data = await UsersService.findAll()
      const filtered = data.filter(u => u.active)
      const sorted = filtered.sort((a, b) => a.name.localeCompare(b.name))
      setUsers(sorted)
    }
    fetchUsers()
  }, [])

  return <div>{users.map(...)}</div>
}
```

**✅ Good Example:**

```typescript

// ✅ CORRECT - Logic in hook
// hooks/useUsers.ts
export const useUsers = () => {
  const getUsersRequest = UsersService.useUsersControllerFindAllService()

  const activeUsers = useMemo(() => {
    return getUsersRequest.data
      ?.filter(u => u.active)
      .sort((a, b) => a.name.localeCompare(b.name))
  }, [getUsersRequest.data])

  return { activeUsers, loading: getUsersRequest.loading }
}

// Component focuses on rendering
export const UserList = () => {
  const { activeUsers, loading } = useUsers()

  if (loading) return <Loader />
  return <div>{activeUsers.map(...)}</div>
}
```


### Workflow

#### 🔴 Skipping mock testing before API integration

**Why:** Violates phased development workflow, leads to bugs and integration issues

**Correct approach:** Phase 2C (mocks) MUST pass before Phase 3 (API integration)

**❌ Bad Example:**

```typescript

// ❌ NEVER DO THIS - Skip mocks, go straight to API
// Phase 2A: Components ✓
// Phase 2B: Feature assembled ✓
// Phase 2C: Mock testing ✗ SKIPPED
// Phase 3: API integration ← WRONG! Can't skip Phase 2C

// Result: No testing of edge cases, error states untested
```

**✅ Good Example:**

```typescript

// ✅ CORRECT - Test with mocks first (Phase 2C)
// 1. Create src/features/users/mocks/
//    - data.ts: Static mock data
//    - handlers.ts: MSW handlers
//    - scenarios.ts: Test scenarios
//
// 2. Test ALL states with mocks:
//    - Success (with data)
//    - Empty (no data)
//    - Loading (delayed response)
//    - Error (4xx, 5xx)
//    - Network failure
//
// 3. ALL mock tests MUST pass
//
// 4. THEN Phase 3: Replace mocks with real API
```


#### 🟠 Not following phased development workflow

**Why:** Leads to unstructured development, integration issues, and missed edge cases

**Correct approach:** ALWAYS follow: Phase 2A (components) → 2B (feature) → 2C (mocks) → 3 (API)

**❌ Bad Example:**

```typescript

// ❌ Unstructured development
// Start coding feature
// Create new components (ignoring existing ones)
// Integrate API immediately (no mocks)
// Fix bugs as they come up
// Result: Messy code, duplicated components, untested edge cases
```

**✅ Good Example:**

```typescript

// ✅ CORRECT - Phased workflow
// Phase 2A: Component Layer
// - Audit existing components
// - Reuse Button, Modal, TextField
// - Only create truly new components
//
// Phase 2B: Feature Layer
// - Assemble feature with MOCK data
// - Implement all UI states
//
// Phase 2C: Mock Integration
// - Create MSW handlers
// - Test ALL states with mocks
// - ALL tests pass
//
// Phase 3: API Integration
// - Replace mocks with real API
// - Verify all states still work
```


### State Management

#### 🟠 Creating god stores with all app state

**Why:** Tight coupling, hard to maintain, performance issues

**Correct approach:** Create one store per domain (auth, project, workflow, ui, etc.)

**❌ Bad Example:**

```typescript

// ❌ God store with everything
export const useAppStore = create((set) => ({
  // Auth
  user: null,
  token: null,
  login: () => {},
  logout: () => {},

  // Projects
  projects: [],
  currentProject: null,
  createProject: () => {},

  // Workflows
  workflows: [],
  createWorkflow: () => {},

  // UI
  theme: 'light',
  sidebar: true,

  // ... 50 more fields
}))
```

**✅ Good Example:**

```typescript

// ✅ CORRECT - Separate stores per domain
// stores/auth.ts
export const useAuthStore = create((set) => ({
  user: null,
  token: null,
  login: () => {},
  logout: () => {},
}))

// stores/projects.ts
export const useProjectStore = create((set) => ({
  projects: [],
  currentProject: null,
  createProject: () => {},
}))

// stores/ui.ts
export const useUIStore = create((set) => ({
  theme: 'light',
  sidebarOpen: true,
  toggleSidebar: () => {},
}))
```


#### 🟠 Inline mutation logic in components

**Why:** Makes state changes hard to track, test, and maintain

**Correct approach:** Use explicit actions in stores, no inline mutations

**❌ Bad Example:**

```typescript

// ❌ Inline mutations
const MyComponent = () => {
  const { users, setUsers } = useUserStore()

  const handleDelete = (id) => {
    // Inline mutation logic!
    setUsers(users.filter(u => u.id !== id))
  }

  const handleUpdate = (id, data) => {
    // More inline logic!
    setUsers(users.map(u => u.id === id ? { ...u, ...data } : u))
  }
}
```

**✅ Good Example:**

```typescript

// ✅ CORRECT - Explicit actions in store
// stores/users.ts
export const useUserStore = create((set) => ({
  users: [],

  deleteUser: (id) => {
    set((state) => ({
      users: state.users.filter(u => u.id !== id)
    }))
  },

  updateUser: (id, data) => {
    set((state) => ({
      users: state.users.map(u =>
        u.id === id ? { ...u, ...data } : u
      )
    }))
  },
}))

// Component uses actions
const MyComponent = () => {
  const { users, deleteUser, updateUser } = useUserStore()

  return <button onClick={() => deleteUser(id)}>Delete</button>
}
```


#### ℹ️ Not exposing selectors for performance

**Why:** Unnecessary re-renders, performance issues

**Correct approach:** Expose selectors to allow components to subscribe to specific slices

**❌ Bad Example:**

```typescript

// ❌ No selectors
export const useUserStore = create((set) => ({
  users: [],
  loading: false,
  error: null,
  // No selectors exposed
}))

// Component subscribes to entire store
const UserCount = () => {
  const store = useUserStore()  // Re-renders on any change!
  return <div>{store.users.length}</div>
}
```

**✅ Good Example:**

```typescript

// ✅ CORRECT - Expose selectors
export const useUserStore = create((set) => ({
  users: [],
  loading: false,
  error: null,
}))

// Selectors
export const selectUsers = (state) => state.users
export const selectUserCount = (state) => state.users.length
export const selectLoading = (state) => state.loading

// Component subscribes to specific slice
const UserCount = () => {
  const count = useUserStore(selectUserCount)  // Only re-renders when count changes
  return <div>{count}</div>
}
```


