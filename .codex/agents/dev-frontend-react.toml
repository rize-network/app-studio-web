## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🔴 Critical Restrictions

- **NEVER use fetch() or axios for API calls**
  - *Reason:* Will be BLOCKED by Gate 4 validation. Only generated services are allowed.
  - *Alternative:* Use ONLY generated services from src/services/api/

- **NEVER call the raw xxxControllerYyy() direct-function exports from React components, pages, hooks, stores, forms, or modals**
  - *Reason:* MANDATORY: every data load / mutation from React code must go through the generated useXxxControllerYyyService hook wrapper inside a {page}.request.ts file (for pages) or inline (for forms/modals). The direct-call exports skip loading/error lifecycle management and create inconsistent state flow. This is the violation that caused the 11-store refactor.
  - *Alternative:* Use the generated useXxxControllerYyyService hook inside a *.request.ts file or directly in a form/modal. Chain sequential operations via request.run() + onSuccess callbacks — never via await on direct calls. The direct-call exports are reserved for non-React code paths (scripts, tests).

- **NEVER manually edit files under src/services/api/services/* or src/services/api/models/***
  - *Reason:* These files are auto-generated by `npm run api:local` from the backend swagger. Any manual patch will be silently overwritten the next time the API is regenerated, and the regression will be discovered only when the fix it purported to make disappears in a later branch.
  - *Alternative:* If a generated signature is wrong or a param is missing, the root cause is in the backend swagger (api-startup). Delegate to dev-api to fix the Swagger decorators, or flag via /fix with target=api-startup. After the backend change, run `npm run api:local` in front-startup and back-startup to regenerate. Never patch the generated file directly — not even temporarily, not even with a comment.

- **NEVER import from src/services/api/services/* inside a Zustand store**
  - *Reason:* Stores are pure UI state. Data fetching / mutations live in *.request.ts files whose hooks call store SETTERS (setX/upsertX/removeX) via onSuccess. This was the root-cause convention violation of the 11-store refactor.
  - *Alternative:* Remove all controller imports from the store file. Move the fetching logic into {page}.request.ts. Expose only synchronous setters (setX, upsertX, removeX, reset) on the store.

- **NEVER define async fetch/create/update/delete actions on a Zustand store**
  - *Reason:* Async actions in stores pull loading/error state into the store, fragment mutation logic, and duplicate what the generated useXxxControllerYyyService hook already provides. The gold-standard store (src/stores/RoutinesStore.ts) proves this is unnecessary.
  - *Alternative:* Store actions are SYNCHRONOUS state setters only. All async work (API calls) lives in *.request.ts files. The request hook owns loading/error; its onSuccess calls the store setter.

- **NEVER put forms in components/ directory**
  - *Reason:* Will be BLOCKED by Gate 4 validation. Violates project conventions.
  - *Alternative:* ALL forms MUST be in src/forms/ directory

- **NEVER put modals in components/ directory**
  - *Reason:* Will be BLOCKED by Gate 4 validation. Violates project conventions.
  - *Alternative:* ALL modals MUST be in src/modals/ directory AND registered in src/modals/index.tsx

- **NEVER recreate existing library components (Button, Modal, TextField, Select, etc.)**
  - *Reason:* Wastes time, reduces quality, pollutes codebase, breaks accessibility
  - *Alternative:* ALWAYS audit front-startup/docs/app-studio-web/components/ first. Use, extend, or compose existing components.

- **NEVER skip mock testing before API integration**
  - *Reason:* Violates phased development workflow. Leads to untested edge cases and integration issues.
  - *Alternative:* Phase 2C (mock testing) MUST pass before Phase 3 (API integration)

- **NEVER start frontend work before backend is complete**
  - *Reason:* Gates 1-3 must be complete. No API services available yet.
  - *Alternative:* Verify: 1-backend/api-sync-success.txt exists, src/services/api/ has generated services

- **NEVER skip Gate 6 validation (tests, TypeScript, linting)**
  - *Reason:* Task is NOT complete until all tests pass
  - *Alternative:* Run: npm test, npm run build (or tsc --noEmit), npm run lint

- **NEVER build custom components from scratch when library provides them**
  - *Reason:* Library provides stable, accessible, well-tested components
  - *Alternative:* If library is detected (Shadcn, Radix, MUI), YOU MUST USE IT. May wrap or style, but underlying primitive must be from library.

- **NEVER use useStore() without a selector**
  - *Reason:* Subscribes to entire store. Component re-renders on ANY state change, causing cascade re-renders.
  - *Alternative:* ALWAYS use useStore(s => s.specificField) or useStore(s => ({ a: s.a, b: s.b }), shallow)

- **NEVER subscribe to data stores in structural files (.page/.modal/.drawer)**
  - *Reason:* Structural files are composition only. Data subscriptions cause the entire subtree to re-render on data changes.
  - *Alternative:* Structural files compose components positionally. Components inside read their own data via selectors.

- **NEVER use React Context for data that updates during interaction**
  - *Reason:* Every Context value change re-renders the ENTIRE consumer subtree. This is worse than whole-store subscription.
  - *Alternative:* React Context ONLY for: theme, locale, feature flags. ALL updating data goes in Zustand stores with selectors.

- **NEVER return after writing or modifying frontend code without producing the Governance Checklist**
  - *Reason:* Article III mandates "No feature without changelog" and "No UI change without screen registry update". Close Manager repeatedly flags cycles where frontend work shipped with no changelog entry, no screen JSON update, and unregistered test IDs — creating governance debt that compounds.
  - *Alternative:* Before returning, produce a "Governance Complete: ✅" block listing: (1) changelog.d/ entry files created per impacted feature, (2) screen JSONs updated or created (codedatabase/screens/{pages|modals|drawers}/<Name>.screen.json), (3) new data-testid values registered in codedatabase/testids.registry.json. If truly no feature surface was touched, say "Governance: N/A" with justification.

- **NEVER run `npm run lint:fix`, `npm run format`, `prettier --write`, `eslint --fix`, or any mass-formatting command unless the task request EXPLICITLY includes it**
  - *Reason:* MF-005b (Phase A display-system) ran `npm run lint:fix` as a side effect of an .eslintrc.js edit and reformatted 30+ unrelated files across back-startup + front-startup, plus mutated package-lock.json via `npm install`. APM had to revert twice before the agent stopped writing. The intent of lint:fix looks helpful — the impact is out-of-scope edits that contaminate the PR, make review painful, and risk conflicts with in-flight branches.
  - *Alternative:* Restrict file modifications to the allowlist given in the task. If formatting is truly needed on specific files, run `npx prettier --write <exact files from allowlist>` or `npx eslint --fix <exact files from allowlist>` — never the package.json script that applies to the whole app. Before returning, run `git diff --name-only` and confirm it matches the allowlist.

- **NEVER run `npm install`, `npm ci`, `pnpm install`, `yarn install`, or any lockfile-mutating command unless the task EXPLICITLY requests dependency changes**
  - *Reason:* Same Phase A incident: the agent triggered `npm install` which rewrote package-lock.json (thousands of lines changed). That mutation escaped the task allowlist and got mixed into what should have been a 3-file PR. Lockfile churn also invalidates CI caches and makes review untrustworthy.
  - *Alternative:* If a dependency is truly missing, STOP and report it — let APM or the user make an explicit decision to add it. Never silently install to unblock your current task.

