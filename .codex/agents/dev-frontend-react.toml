### Tooling

#### ESLint `no-restricted-syntax` severity discipline (🔴 Required)

// ❌ WRONG — new hint selector gets error severity from the enclosing array
'no-restricted-syntax': [
  'error',  // ← applies to ALL selectors below
  { selector: "CallExpression[callee.name='alert']", message: "..." },  // security rule (error)
  { selector: "Property[key.name='myField'] > Literal", message: "hint..." },  // inherits error ❌
]

// ✅ CORRECT — split via overrides
overrides: [
  {
    files: ['src/**/*.ts'],
    rules: {
      'no-restricted-syntax': [
        'warn',
        { selector: "Property[key.name='myField'] > Literal", message: "hint..." }
      ],
    },
  },
]
// plus keep the security selectors in the base config at 'error' severity.

**Rule:** ESLint's `no-restricted-syntax` rule shares severity across ALL entries in a single rule array. When adding selectors at a DIFFERENT severity from the existing rule (e.g., adding a "warn"-level hint to a rule currently at "error"), use an ESLint `overrides` block, split into a dedicated plugin, or move the existing rule to a different key — NEVER silently append entries that inherit a mismatched severity, because the new entries will fire at the existing severity and may break builds. When in doubt, flag the situation to the user and stop rather than shipping a build-breaking "hint".


### Application Architecture

#### Tool Location (🔴 Required)

Agent tools live in a dedicated directory with a shared base class

**Rule:** All agent tools MUST be placed in api-startup/src/modules/ai/agents/tools/ and extend the base class at api-startup/src/modules/ai/agents/tools/base.tools.ts

**✅ Good Examples:**

```
api-startup/src/modules/ai/agents/tools/my-feature.tools.ts
```

```
api-startup/src/modules/ai/agents/tools/quality.tools.ts
```

**❌ Bad Examples:**

```
api-startup/src/modules/ai/my-feature.tools.ts
```

```
api-startup/src/tools/my-feature.tools.ts
```

```
Placing tools outside the tools/ directory
```


#### Tool Base Class (🔴 Required)

All tools must extend BaseTools and use the @Tool decorator

**Rule:** Every tool class MUST extend BaseTools from api-startup/src/modules/ai/agents/tools/base.tools.ts and annotate methods with @Tool decorator

**✅ Good Examples:**

```
import { BaseTools } from './base.tools'
import { Tool } from '@langchain/core/tools'

export class MyFeatureTools extends BaseTools {
  @Tool({ name: 'my_tool', description: '...' })
  async myTool(input: MyInput): Promise<MyOutput> { ... }
}
```

**❌ Bad Examples:**

```
Creating a standalone function without extending BaseTools
```

```
Using raw LangChain tool wrappers instead of extending BaseTools
```


#### Workflow Location (🔴 Required)

Workflow services live in the workflow module

**Rule:** All workflow services MUST be placed in api-startup/src/modules/ai/workflow/

**✅ Good Examples:**

```
api-startup/src/modules/ai/workflow/my-page.workflow.service.ts
```

```
api-startup/src/modules/ai/workflow/my-action.workflow.service.ts
```

**❌ Bad Examples:**

```
api-startup/src/modules/ai/agents/my-page.workflow.service.ts
