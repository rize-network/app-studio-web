## Common Errors to Avoid

### Gated Workflow

#### 🔴 Using fetch() or axios for API calls

**Why:** CRITICAL: Will be blocked by Gate 4 validation. Code is actively scanned and will fail deployment.

**Correct approach:** Use ONLY generated API services from src/services/api/

**❌ Bad Example:**

```typescript

// ❌ CRITICAL ERROR - Will be BLOCKED by gate
const fetchUsers = async () => {
  const response = await fetch('/api/users')  // BLOCKED!
  const data = await response.json()
  return data
}

// ❌ Also BLOCKED
import axios from 'axios'
const users = await axios.get('/api/users')  // BLOCKED!
```

**✅ Good Example:**

```typescript

// ✅ CORRECT - Use generated API services
import { UsersService } from 'src/services/api'

export const useUsersRequests = () => {
  const getUsersRequest = UsersService.useUsersControllerFindAllService({
    onSuccess: (data) => {
      showToast('success', 'Success', 'Users loaded')
    },
  })

  return { getUsersRequest }
}
```


