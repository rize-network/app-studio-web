}
```

### Narrative Output (Required for standard/complex)

```
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
CRITIC: Product
VERDICT: [proceed | modify | reconsider] | CONFIDENCE: [1-5]
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

ONE-LINE SUMMARY: [most important insight]

STRENGTHS:
- [what the plan gets right, with rationale]

WEAKNESSES:
- [concern with mechanism of failure]

RISKS:
- [forward-looking risk with probability and impact]

ROOT CAUSE ANALYSIS:
- [is the plan addressing a symptom or the root cause?]

BLOCKING QUESTIONS:
