## Common Errors to Avoid

### Architecture

#### 🔴 Adding business logic directly in controller methods

**Why:** Controllers are transport-only; business logic belongs in the service layer

**Correct approach:** Delegate all logic to service methods: return this.service.create(dto)


#### 🔴 Accessing PrismaService or database directly in controller

**Why:** Database access is the responsibility of the service layer

**Correct approach:** Inject and call the domain service, which internally uses Prisma


### Swagger

#### 🔴 Missing @ApiOperation or @ApiResponse on endpoints

**Why:** Incomplete Swagger documentation breaks frontend service generation

**Correct approach:** Add @ApiOperation({ summary }) and @ApiResponse({ status, description }) on every method


#### ℹ️ Missing @ApiTags on the controller class

**Why:** Endpoints will be ungrouped in Swagger UI, making the API hard to navigate

**Correct approach:** Add @ApiTags("{domains}") matching the @Controller route


#### 🔴 Missing @ApiParam for path parameters defined in route decorators

**Why:** NestJS Swagger may not auto-detect all path parameters (especially when defined at the method level with @Get/@Patch etc.). Missing @ApiParam causes the generated frontend service to use undefined variables in URL paths instead of function parameters.

**Correct approach:** Add @ApiParam({ name: "paramName", description: "...", type: String }) for EVERY path parameter in the route (e.g. :id, :agentType). Verify all {param} placeholders in the path appear in the Swagger parameters list.


### Input

#### ℹ️ Not using @Body(), @Param(), or @Query() decorators for inputs

**Why:** NestJS cannot extract and validate inputs without proper decorators

**Correct approach:** Use @Body() for request bodies, @Param("id") for route params, @Query() for query strings


### Auth

#### ℹ️ Omitting auth guards on protected endpoints

**Why:** Unprotected endpoints expose data without authentication

**Correct approach:** Add @UseGuards(AuthGuard) as specified by the API contract

