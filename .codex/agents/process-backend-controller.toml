## Conventions

### Swagger

#### Complete Swagger Decorators (🔴 Required)

Every endpoint must have full Swagger documentation

**Rule:** @ApiTags on class, @ApiOperation + @ApiResponse on every method

**✅ Good Examples:**

```
@ApiTags("users") @Controller("users") with @ApiOperation on each method
```

**❌ Bad Examples:**

```
@Controller("users") without @ApiTags or missing @ApiOperation on methods
```


#### ApiParam for All Path Parameters (🔴 Required)

Every path parameter in the route must have an explicit @ApiParam decorator

**Rule:** Add @ApiParam({ name: "paramName", description: "...", type: String }) for every :param in the route. NestJS Swagger does not always auto-detect method-level path params.

**✅ Good Examples:**

```
@Get(":agentType/permissions") @ApiParam({ name: "agentType", type: String }) async get(@Param("agentType") agentType: string)
```

**❌ Bad Examples:**

```
@Get(":agentType/permissions") async get(@Param("agentType") agentType: string) — missing @ApiParam causes undefined in generated frontend code
```


### Architecture

#### Transport Layer Only (🔴 Required)

Controllers are transport-only, no business logic

**Rule:** Controllers delegate ALL logic to service methods

**✅ Good Examples:**

```
return this.service.create(dto)
```

**❌ Bad Examples:**

```
const user = await this.prisma.user.create(...)  // direct DB access
```


### Naming

#### File Naming (🔴 Required)

Controller files use kebab-case domain name

**Rule:** {domain}.controller.ts and {domain}.controller.spec.ts

**✅ Good Examples:**

```
user.controller.ts
```

```
order-item.controller.ts
```

**❌ Bad Examples:**

```
UserController.ts
```

```
user-controller.ts
```

```
usersController.ts
```


#### Route Naming (🔴 Required)

Routes use plural kebab-case

**Rule:** @Controller("{domains}") with plural resource name

**✅ Good Examples:**

```
@Controller("users")
```

```
@Controller("order-items")
```

**❌ Bad Examples:**

```
@Controller("user")
```

```
@Controller("Users")
```

```
@Controller("orderItems")
```


### Pattern

#### Input Decorators (🔴 Required)

Use proper NestJS parameter decorators for all inputs

**Rule:** @Body() for POST/PUT/PATCH, @Param() for route params, @Query() for query params


### Auth

#### Auth Guards (🔴 Required)

Apply auth guards where the API contract requires authentication

**Rule:** @UseGuards(AuthGuard) on endpoints or controller class as specified by the API contract


### Exports

#### Named Exports Only (🔴 Required)

Use named exports, never default exports

**Rule:** export class {Domain}Controller, not export default class {Domain}Controller

---

## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🔴 Critical Restrictions

- **Never contain business logic**
  - *Reason:* Business logic belongs in Service Agent output
  - *Alternative:* Delegate all logic to injected service methods

- **Never access database directly**
  - *Reason:* Database access belongs in Service via Prisma
  - *Alternative:* Call service methods which internally use PrismaService

- **Never skip Swagger decorators**
  - *Reason:* Swagger drives frontend service generation
  - *Alternative:* Add @ApiTags, @ApiOperation, and @ApiResponse on every endpoint

### 🟠 High Priority Restrictions

- **Never create DTOs or services**
  - *Reason:* DTOs and services are owned by their respective agents
  - *Alternative:* Import DTOs and services created by other sub-agents

- **Never use any type**
  - *Reason:* Defeats TypeScript type safety
  - *Alternative:* Use DTO types for inputs and response types for outputs

- **Never create files outside the controller scope**
  - *Reason:* Other files are owned by other sub-agents
  - *Alternative:* Only write {domain}.controller.ts and {domain}.controller.spec.ts

- **Never modify files created by other agents**
  - *Reason:* Other agent outputs are their responsibility; modifications cause conflicts
  - *Alternative:* If another agent file needs changes, report to Team Lead

