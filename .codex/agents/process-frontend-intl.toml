## Common Errors to Avoid

### Coverage

#### 🔴 Missing translation keys for form validation messages

**Why:** Untranslated validation messages break the i18n experience and show raw keys to users

**Correct approach:** Create keys for every Yup validation message: {domain}.form.validation.{field}{Rule}


#### ℹ️ Missing translations for empty states and error states

**Why:** Empty and error states are critical UX moments — hardcoded text breaks i18n

**Correct approach:** Include keys for: page.empty, page.emptyAction, common.error, common.retry


### Structure

#### ℹ️ Putting all translations in a single flat file instead of domain-based files

**Why:** Single file becomes unmanageable and causes merge conflicts across features

**Correct approach:** Use per-domain files: src/i18n/locales/{locale}/{domain}.json


### Keys

#### ℹ️ Using inconsistent or flat key naming instead of hierarchical format

**Why:** Flat keys are hard to organize, search, and maintain across domains

**Correct approach:** Use hierarchical keys: {domain}.{section}.{key} (e.g., users.form.fields.email)


### Locale

#### 🔴 Creating translations for other locales but forgetting the default en locale

**Why:** English is the fallback — missing en keys cause the app to show raw key strings

**Correct approach:** Always create en locale first, then add additional locales as needed


### Tone

#### 🟠 Using developer jargon or technical language in user-facing translations

**Why:** End users do not understand technical terms like "Invalid format" or "Required field"

**Correct approach:** Use plain language: "Please enter a valid email address", "Name is required"

---

## Conventions

### Structure

#### File Organization (🔴 Required)

Translation files organized by locale and domain

**Rule:** src/i18n/locales/{locale}/{domain}.json

**✅ Good Examples:**

```
src/i18n/locales/en/users.json
```

```
src/i18n/locales/en/common.json
```

**❌ Bad Examples:**

```
src/translations.json (all in one)
```

```
src/components/UserCard.i18n.ts
```


### Keys

#### Hierarchical Key Format (🔴 Required)

Dot-separated keys organized by section

**Rule:** {domain}.{section}.{key} — e.g., users.form.fields.email


### Coverage

#### Complete Text Coverage (🔴 Required)

Every user-visible string must have an i18n key

**Rule:** No hardcoded text in components. All text via i18n hooks (useTranslation).

**✅ Good Examples:**

```
t("users.page.title")
```

```
t("common.save")
```

**❌ Bad Examples:**

```
"Users" (hardcoded)
```

```
"Save" (hardcoded in JSX)
```


### Validation

#### Match Backend Messages (🔴 Required)

Frontend validation messages should align with backend DTO validation

**Rule:** Yup .email("users.form.validation.emailInvalid") matches backend @IsEmail message


### Interpolation

#### Dynamic Values (🔴 Required)

Use {variableName} for dynamic content

**Rule:** {min}, {max}, {count}, {name} for dynamic substitution

---

## Restrictions & Boundaries

Things this agent should **NEVER** do:

### 🔴 Critical Restrictions

- **Never hardcode user-visible text in components**
  - *Reason:* Hardcoded text cannot be translated
  - *Alternative:* Use i18n keys: t("domain.section.key")

- **Never skip the default (en) locale**
  - *Reason:* English is the fallback locale

### 🟠 High Priority Restrictions

- **Never put translation logic in components**
  - *Reason:* i18n setup is infrastructure, not component responsibility
  - *Alternative:* Use the useTranslation hook, i18n Agent creates the files

- **Never use developer jargon in translations**
  - *Reason:* Translations are user-facing, not developer-facing
  - *Alternative:* Use plain, helpful language: "Please enter a valid email" not "Invalid email format"

---

## Quality Standards

### Output Criteria

- All page titles/subtitles translated
- All form labels/placeholders translated
- All validation messages translated and matching Yup
- All button text translated
- All table headers translated
- All status labels translated
- Empty/error states translated
- en locale always created

